<svg role="img" aria-labelledby="title-1 desc-1"
     viewBox="0 0 800 560"
     width="100%" height="auto"
     xmlns="http://www.w3.org/2000/svg">
  <title id="title-1">Redis maxmemory 도달 시 정책별 분기 흐름도</title>
  <desc id="desc-1">쓰기 명령이 들어올 때 사용 메모리가 maxmemory 한도에 도달했는지 확인하고, 정책(noeviction·allkeys-lru·volatile-lru·allkeys-random·volatile-ttl·volatile-random)에 따라 쓰기 거부 또는 키 축출 후 쓰기로 분기하는 흐름을 보여줍니다</desc>

  <style>
    text { font-family: 'Pretendard', system-ui, sans-serif; }
    .label-title { font-size: 14px; font-weight: 600; }
    .label-body { font-size: 12px; }
    .label-meta { font-size: 11px; fill: #27272A; }
  </style>

  <!-- 제목 -->
  <text x="400" y="30" text-anchor="middle" class="label-title" fill="#0A0A0A">흐름도 — maxmemory 한도 도달 시 정책별 분기</text>

  <!-- === 화살표 (박스보다 먼저) === -->

  <!-- 쓰기 명령 → 메모리 체크 -->
  <line x1="400" y1="76" x2="400" y2="100" stroke="#0A0A0A" stroke-width="1.5" marker-end="url(#arrow-black)"/>

  <!-- 메모리 체크 → 한도 미달 (오른쪽) -->
  <line x1="520" y1="124" x2="632" y2="124" stroke="#059669" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- 메모리 체크 → 한도 초과 (아래) -->
  <line x1="400" y1="148" x2="400" y2="184" stroke="#E11D48" stroke-width="1.5" marker-end="url(#arrow-rose)"/>

  <!-- 정책 선택 → noeviction -->
  <line x1="296" y1="208" x2="192" y2="240" stroke="#0A0A0A" stroke-width="1.5" marker-end="url(#arrow-black)"/>

  <!-- 정책 선택 → allkeys-lru -->
  <line x1="352" y1="220" x2="312" y2="240" stroke="#0A0A0A" stroke-width="1.5" marker-end="url(#arrow-black)"/>

  <!-- 정책 선택 → volatile-lru -->
  <line x1="400" y1="228" x2="400" y2="240" stroke="#0A0A0A" stroke-width="1.5" marker-end="url(#arrow-black)"/>

  <!-- 정책 선택 → allkeys-random -->
  <line x1="448" y1="220" x2="488" y2="240" stroke="#0A0A0A" stroke-width="1.5" marker-end="url(#arrow-black)"/>

  <!-- 정책 선택 → volatile-ttl -->
  <line x1="496" y1="214" x2="584" y2="240" stroke="#0A0A0A" stroke-width="1.5" marker-end="url(#arrow-black)"/>

  <!-- 정책 선택 → volatile-random (맨 오른쪽) -->
  <line x1="514" y1="212" x2="688" y2="240" stroke="#0A0A0A" stroke-width="1.5" marker-end="url(#arrow-black)"/>

  <!-- noeviction → OOM Error -->
  <line x1="160" y1="296" x2="160" y2="340" stroke="#E11D48" stroke-width="1.5" marker-end="url(#arrow-rose)"/>

  <!-- allkeys-lru → 축출 후 쓰기 -->
  <line x1="312" y1="296" x2="400" y2="390" stroke="#059669" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- volatile-lru → 축출 후 쓰기 -->
  <line x1="400" y1="296" x2="400" y2="390" stroke="#059669" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- allkeys-random → 축출 후 쓰기 -->
  <line x1="488" y1="296" x2="420" y2="390" stroke="#059669" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- volatile-ttl → 축출 후 쓰기 -->
  <line x1="600" y1="296" x2="440" y2="390" stroke="#059669" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- volatile-random → 축출 후 쓰기 -->
  <line x1="696" y1="296" x2="456" y2="390" stroke="#059669" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- 한도 미달 → 쓰기 직접 수행 -->
  <line x1="696" y1="140" x2="696" y2="390" stroke="#059669" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arrow-green)"/>

  <!-- 축출 후 쓰기 → 완료 -->
  <line x1="400" y1="434" x2="400" y2="468" stroke="#059669" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- 직접 쓰기 → 완료 -->
  <line x1="696" y1="434" x2="608" y2="468" stroke="#059669" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arrow-green)"/>

  <!-- 화살표 마커 정의 -->
  <defs>
    <marker id="arrow-black" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#0A0A0A"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#059669"/>
    </marker>
    <marker id="arrow-rose" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#E11D48"/>
    </marker>
  </defs>

  <!-- === 박스 === -->

  <!-- 쓰기 명령 진입 -->
  <rect x="296" y="48" width="208" height="28" rx="4"
        fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="400" y="66" text-anchor="middle" class="label-body" fill="#047857">쓰기 명령 진입 (SET / HSET / XADD …)</text>

  <!-- 메모리 체크 마름모 -->
  <polygon points="400,100 520,124 400,148 280,124"
           fill="#FFFBEB" stroke="#D97706" stroke-width="1.5"/>
  <text x="400" y="120" text-anchor="middle" class="label-body" fill="#B45309">used_memory</text>
  <text x="400" y="135" text-anchor="middle" class="label-body" fill="#B45309">≥ maxmemory?</text>

  <!-- "아니오" 레이블 -->
  <rect x="532" y="112" width="52" height="18" rx="2" fill="#FAFAFA"/>
  <text x="558" y="124" text-anchor="middle" class="label-meta" fill="#059669">아니오</text>

  <!-- "예" 레이블 -->
  <rect x="368" y="152" width="28" height="18" rx="2" fill="#FAFAFA"/>
  <text x="382" y="164" text-anchor="middle" class="label-meta" fill="#E11D48">예</text>

  <!-- 정책 선택 박스 -->
  <rect x="280" y="184" width="240" height="28" rx="4"
        fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="400" y="202" text-anchor="middle" class="label-body" fill="#6D28D9">maxmemory-policy 확인</text>

  <!-- noeviction -->
  <rect x="96" y="240" width="128" height="56" rx="4"
        fill="#FFF1F2" stroke="#E11D48" stroke-width="1.5"/>
  <text x="160" y="262" text-anchor="middle" class="label-body" fill="#BE123C">noeviction</text>
  <text x="160" y="278" text-anchor="middle" class="label-meta">쓰기 거부</text>

  <!-- allkeys-lru -->
  <rect x="248" y="240" width="128" height="56" rx="4"
        fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="312" y="262" text-anchor="middle" class="label-body" fill="#047857">allkeys-lru</text>
  <text x="312" y="278" text-anchor="middle" class="label-meta">전체 키 LRU 축출</text>

  <!-- volatile-lru -->
  <rect x="336" y="240" width="128" height="56" rx="4"
        fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="400" y="262" text-anchor="middle" class="label-body" fill="#047857">volatile-lru</text>
  <text x="400" y="278" text-anchor="middle" class="label-meta">TTL 키만 LRU 축출</text>

  <!-- allkeys-random -->
  <rect x="424" y="240" width="128" height="56" rx="4"
        fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="488" y="262" text-anchor="middle" class="label-body" fill="#047857">allkeys-random</text>
  <text x="488" y="278" text-anchor="middle" class="label-meta">전체 키 무작위 축출</text>

  <!-- volatile-ttl -->
  <rect x="536" y="240" width="128" height="56" rx="4"
        fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="600" y="262" text-anchor="middle" class="label-body" fill="#047857">volatile-ttl</text>
  <text x="600" y="278" text-anchor="middle" class="label-meta">TTL 짧은 키 우선 축출</text>

  <!-- volatile-random -->
  <rect x="632" y="240" width="128" height="56" rx="4"
        fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="696" y="262" text-anchor="middle" class="label-body" fill="#047857">volatile-random</text>
  <text x="696" y="278" text-anchor="middle" class="label-meta">TTL 키 무작위 축출</text>

  <!-- OOM Error -->
  <rect x="80" y="340" width="160" height="40" rx="4"
        fill="#FFF1F2" stroke="#E11D48" stroke-width="2"/>
  <text x="160" y="358" text-anchor="middle" class="label-body" fill="#BE123C">OOM command not allowed</text>
  <text x="160" y="373" text-anchor="middle" class="label-meta">클라이언트에 에러 반환</text>

  <!-- 축출 후 쓰기 수행 -->
  <rect x="296" y="390" width="208" height="44" rx="4"
        fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="400" y="410" text-anchor="middle" class="label-body" fill="#047857">키 축출 후 쓰기 수행</text>
  <text x="400" y="427" text-anchor="middle" class="label-meta">확보된 메모리에 명령 실행</text>

  <!-- 직접 쓰기 (점선 경로 - 한도 미달) -->
  <rect x="600" y="390" width="192" height="44" rx="4"
        fill="#ECFDF5" stroke="#059669" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text x="696" y="410" text-anchor="middle" class="label-body" fill="#047857">쓰기 직접 수행</text>
  <text x="696" y="427" text-anchor="middle" class="label-meta">(한도 미달, 축출 불필요)</text>

  <!-- 완료 -->
  <rect x="296" y="468" width="416" height="36" rx="4"
        fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="504" y="491" text-anchor="middle" class="label-body" fill="#047857">쓰기 완료 → 클라이언트 응답</text>

  <!-- 범례 -->
  <rect x="24" y="460" width="200" height="72" rx="4"
        fill="#F8FAFC" stroke="#D4D4D8" stroke-width="1"/>
  <text x="36" y="478" class="label-meta" fill="#334155">범례</text>
  <line x1="36" y1="492" x2="60" y2="492" stroke="#059669" stroke-width="1.5"/>
  <text x="68" y="496" class="label-meta" fill="#334155">쓰기 허용 경로</text>
  <line x1="36" y1="508" x2="60" y2="508" stroke="#E11D48" stroke-width="1.5"/>
  <text x="68" y="512" class="label-meta" fill="#334155">쓰기 거부 / 오류</text>
  <line x1="36" y1="522" x2="60" y2="522" stroke="#059669" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text x="68" y="526" class="label-meta" fill="#334155">한도 미달 직접 경로</text>

</svg>
