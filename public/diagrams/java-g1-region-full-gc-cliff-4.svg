<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" role="img" aria-labelledby="t4 d4" font-family="Pretendard, ui-sans-serif, system-ui, -apple-system, sans-serif">
  <title id="t4">A humongous object wastes the tail of its region and demands contiguous ones</title>
  <desc id="d4">Above: an object larger than half a region is classified as humongous and placed directly in old, skipping eden entirely. It owns the region outright, so whatever space is left over at the end cannot be shared with any other object and is simply wasted. Below: an object larger than a single region needs several regions side by side, and side by side is a strict requirement. Free regions scattered across the heap do not help; if no contiguous run is long enough the allocation fails and forces a collection. On top of both costs, a humongous allocation pushes old occupancy up in one jump, which can cross the IHOP threshold and start a concurrent marking cycle earlier than the heap would otherwise have needed.</desc>
  <rect x="0" y="0" width="800" height="360" fill="#FFFFFF"/>

  <text x="50" y="44" font-size="15" font-weight="700" fill="#B45309">700KB object · 1MB region</text>

  <rect x="50" y="62" width="330" height="66" rx="8" fill="#FFFFFF" stroke="#D97706" stroke-width="2.2"/>
  <rect x="52" y="64" width="229" height="62" rx="6" fill="#FFFBEB"/>
  <text x="166" y="101" text-anchor="middle" font-size="14" font-weight="700" fill="#B45309">humongous object</text>
  <rect x="283" y="64" width="95" height="62" rx="6" fill="#F8FAFC"/>
  <text x="330" y="97" text-anchor="middle" font-size="13" font-weight="700" fill="#334155">wasted</text>
  <text x="330" y="117" text-anchor="middle" font-size="13" font-weight="600" fill="#334155">300KB</text>

  <text x="410" y="90" font-size="14" font-weight="700" fill="#B45309">&gt; 50% of the region</text>
  <text x="410" y="114" font-size="13" font-weight="600" fill="#334155">tail cannot be shared</text>

  <line x1="50" y1="160" x2="750" y2="160" stroke="#E4E4E7" stroke-width="1.5"/>

  <text x="50" y="200" font-size="15" font-weight="700" fill="#B45309">1.5MB object · needs 2 regions side by side</text>

  <rect x="50" y="220" width="100" height="60" rx="6" fill="#FFFBEB" stroke="#D97706" stroke-width="2.2"/>
  <rect x="152" y="220" width="100" height="60" rx="6" fill="#FFFBEB" stroke="#D97706" stroke-width="2.2"/>
  <text x="151" y="256" text-anchor="middle" font-size="14" font-weight="700" fill="#B45309">H    H</text>

  <rect x="300" y="220" width="70" height="60" rx="6" fill="#F8FAFC" stroke="#475569" stroke-width="1.6" stroke-dasharray="5 3"/>
  <rect x="380" y="220" width="70" height="60" rx="6" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.6"/>
  <rect x="460" y="220" width="70" height="60" rx="6" fill="#F8FAFC" stroke="#475569" stroke-width="1.6" stroke-dasharray="5 3"/>
  <rect x="540" y="220" width="70" height="60" rx="6" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.6"/>
  <rect x="620" y="220" width="70" height="60" rx="6" fill="#F8FAFC" stroke="#475569" stroke-width="1.6" stroke-dasharray="5 3"/>
  <text x="335" y="256" text-anchor="middle" font-size="13" font-weight="700" fill="#334155">free</text>
  <text x="495" y="256" text-anchor="middle" font-size="13" font-weight="700" fill="#334155">free</text>
  <text x="655" y="256" text-anchor="middle" font-size="13" font-weight="700" fill="#334155">free</text>

  <text x="495" y="312" text-anchor="middle" font-size="14" font-weight="700" fill="#BE123C">enough free space, no contiguous run → allocation fails</text>
  <text x="495" y="338" text-anchor="middle" font-size="13" font-weight="700" fill="#B45309">and old jumps → IHOP → concurrent marking</text>
</svg>
