<svg role="img" aria-labelledby="title-1 desc-1" viewBox="0 0 800 560" width="100%" height="auto" xmlns="http://www.w3.org/2000/svg">
  <title id="title-1">k6 내부 구조 — VU 풀에서 thresholds 판정까지</title>
  <desc id="desc-1">JS 시나리오가 goja 엔진을 거쳐 VU 풀로 실행되고, 메트릭 집계를 거쳐 thresholds가 합격/불합격을 판정하는 5단계 흐름</desc>

  <style>
    .label-title { font-family: 'Pretendard', system-ui, sans-serif; font-size: 14px; font-weight: 600; }
    .label-body  { font-family: 'Pretendard', system-ui, sans-serif; font-size: 12px; }
    .label-meta  { font-family: 'Pretendard', system-ui, sans-serif; font-size: 11px; fill: #27272A; }
    .label-code  { font-family: 'Geist Mono', 'Courier New', monospace; font-size: 11px; }
    .arrow-label { font-family: 'Pretendard', system-ui, sans-serif; font-size: 11px; fill: #334155; }
  </style>

  <!-- 배경 -->
  <rect width="800" height="560" fill="#FAFAFA" rx="4"/>

  <!-- 다이어그램 타이틀 -->
  <text x="400" y="34" text-anchor="middle" class="label-title" fill="#0A0A0A" font-size="15">아키텍처 — k6 실행 흐름</text>

  <!-- ===== 화살표 먼저 ===== -->
  <!-- 1: JS 시나리오 → goja 엔진 -->
  <line x1="192" y1="130" x2="264" y2="130" stroke="#0A0A0A" stroke-width="1.5" marker-end="url(#arrow-dark)"/>
  <!-- 2: goja 엔진 → VU 풀 -->
  <line x1="456" y1="130" x2="528" y2="130" stroke="#0A0A0A" stroke-width="1.5" marker-end="url(#arrow-dark)"/>
  <!-- 3: VU 풀 → 메트릭 집계 -->
  <line x1="660" y1="160" x2="660" y2="258" stroke="#0A0A0A" stroke-width="1.5" marker-end="url(#arrow-dark)"/>
  <!-- 4: 메트릭 집계 → thresholds 판정 -->
  <line x1="580" y1="310" x2="488" y2="310" stroke="#0A0A0A" stroke-width="1.5" marker-end="url(#arrow-dark)"/>
  <!-- 5: 메트릭 집계 → output 플러그인 -->
  <line x1="660" y1="362" x2="660" y2="430" stroke="#0A0A0A" stroke-width="1.5" marker-end="url(#arrow-dark)"/>
  <!-- 6: thresholds 판정 → 종료 결과 -->
  <line x1="400" y1="362" x2="400" y2="430" stroke="#7C3AED" stroke-width="2" marker-end="url(#arrow-accent)"/>

  <!-- 화살표 라벨 배경 -->
  <rect x="196" y="118" width="68" height="16" fill="#FAFAFA"/>
  <text x="230" y="129" text-anchor="middle" class="arrow-label">실행 단위 생성</text>

  <rect x="460" y="118" width="68" height="16" fill="#FAFAFA"/>
  <text x="494" y="129" text-anchor="middle" class="arrow-label">VU 할당</text>

  <rect x="664" y="198" width="72" height="16" fill="#FAFAFA"/>
  <text x="700" y="209" text-anchor="middle" class="arrow-label">샘플 스트림</text>

  <rect x="496" y="298" width="80" height="16" fill="#FAFAFA"/>
  <text x="536" y="309" text-anchor="middle" class="arrow-label">집계 결과 전달</text>

  <rect x="664" y="388" width="64" height="16" fill="#FAFAFA"/>
  <text x="696" y="399" text-anchor="middle" class="arrow-label">Push / write</text>

  <rect x="340" y="388" width="64" height="16" fill="#FAFAFA"/>
  <text x="372" y="399" text-anchor="middle" class="arrow-label" fill="#6D28D9">판정 신호</text>

  <!-- 화살표 마커 정의 -->
  <defs>
    <marker id="arrow-dark" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#0A0A0A"/>
    </marker>
    <marker id="arrow-accent" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7C3AED"/>
    </marker>
  </defs>

  <!-- ===== 박스들 ===== -->

  <!-- 1. JS 시나리오 파일 (External/slate) -->
  <rect x="24" y="96" width="168" height="68" rx="6" fill="#F8FAFC" stroke="#475569" stroke-width="1.5"/>
  <text x="108" y="120" text-anchor="middle" class="label-title" fill="#334155">JS 시나리오</text>
  <text x="108" y="138" text-anchor="middle" class="label-meta">options · scenarios · thresholds</text>
  <text x="108" y="152" text-anchor="middle" class="label-code" fill="#475569">queue-oneshot.js</text>

  <!-- 2. goja 엔진 (Backend/emerald) -->
  <rect x="264" y="88" width="192" height="84" rx="6" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="360" y="116" text-anchor="middle" class="label-title" fill="#047857">goja 엔진</text>
  <text x="360" y="134" text-anchor="middle" class="label-meta">Go 내 JS 런타임</text>
  <text x="360" y="150" text-anchor="middle" class="label-meta">(ECMAScript 5.1+)</text>
  <text x="360" y="164" text-anchor="middle" class="label-meta">VU마다 독립 인스턴스</text>

  <!-- 3. VU 풀 (Frontend/cyan) -->
  <rect x="528" y="88" width="200" height="84" rx="6" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.5"/>
  <text x="628" y="116" text-anchor="middle" class="label-title" fill="#0E7490">VU 풀</text>
  <text x="628" y="134" text-anchor="middle" class="label-meta">executor 스케줄러 제어</text>
  <text x="628" y="150" text-anchor="middle" class="label-meta">VU당 ~5 MB 메모리</text>
  <text x="628" y="164" text-anchor="middle" class="label-meta">goroutine 1개 per VU</text>

  <!-- 4. 메트릭 집계 (Cloud/amber) -->
  <rect x="580" y="258" width="160" height="104" rx="6" fill="#FFFBEB" stroke="#D97706" stroke-width="1.5"/>
  <text x="660" y="282" text-anchor="middle" class="label-title" fill="#B45309">메트릭 집계기</text>
  <text x="660" y="300" text-anchor="middle" class="label-meta">Trend · Rate · Counter · Gauge</text>
  <text x="660" y="316" text-anchor="middle" class="label-meta">내장 메트릭 + 커스텀 메트릭</text>
  <text x="660" y="332" text-anchor="middle" class="label-meta">p50 / p95 / p99 계산</text>
  <text x="660" y="348" text-anchor="middle" class="label-meta">실시간 집계 (1s 인터벌)</text>

  <!-- 5. thresholds 판정 (Security/rose) -->
  <rect x="256" y="270" width="232" height="100" rx="6" fill="#FFF1F2" stroke="#E11D48" stroke-width="1.5"/>
  <text x="372" y="295" text-anchor="middle" class="label-title" fill="#BE123C">thresholds 판정기</text>
  <text x="372" y="313" text-anchor="middle" class="label-meta">선언적 합격/불합격 조건</text>
  <text x="372" y="330" text-anchor="middle" class="label-meta">매 집계 구간마다 평가</text>
  <text x="372" y="347" text-anchor="middle" class="label-meta">위반 시 exit code 99 반환</text>
  <text x="372" y="362" text-anchor="middle" class="label-code" fill="#E11D48">abortOnFail 옵션 가능</text>

  <!-- 6. output 플러그인 (DB/violet) -->
  <rect x="572" y="430" width="176" height="100" rx="6" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="660" y="456" text-anchor="middle" class="label-title" fill="#6D28D9">output 플러그인</text>
  <text x="660" y="474" text-anchor="middle" class="label-meta">Prometheus Remote Write</text>
  <text x="660" y="490" text-anchor="middle" class="label-meta">InfluxDB · CSV · JSON</text>
  <text x="660" y="506" text-anchor="middle" class="label-meta">stdout (기본)</text>
  <text x="660" y="522" text-anchor="middle" class="label-code" fill="#7C3AED">→ Grafana Mimir</text>

  <!-- 7. 종료 결과 (Security/rose) -->
  <rect x="296" y="430" width="208" height="100" rx="6" fill="#FFF1F2" stroke="#E11D48" stroke-width="2"/>
  <text x="400" y="456" text-anchor="middle" class="label-title" fill="#BE123C">테스트 종료 결과</text>
  <text x="400" y="474" text-anchor="middle" class="label-meta">exit 0: 모든 threshold 통과</text>
  <text x="400" y="490" text-anchor="middle" class="label-meta">exit 99: threshold 위반</text>
  <text x="400" y="508" text-anchor="middle" class="label-meta">✓ / ✗ 항목 summary 출력</text>
  <text x="400" y="524" text-anchor="middle" class="label-code" fill="#E11D48">CI 파이프라인 합격 신호</text>

  <!-- 범례 -->
  <rect x="24" y="430" width="232" height="128" rx="6" fill="#FAFAFA" stroke="#D4D4D8" stroke-width="1"/>
  <text x="140" y="452" text-anchor="middle" class="label-title" fill="#0A0A0A" font-size="12">범례</text>
  <rect x="36" y="462" width="14" height="14" rx="2" fill="#ECFDF5" stroke="#059669"/>
  <text x="58" y="473" class="label-meta">Go 런타임 계층</text>
  <rect x="36" y="482" width="14" height="14" rx="2" fill="#ECFEFF" stroke="#0891B2"/>
  <text x="58" y="493" class="label-meta">VU 실행 계층</text>
  <rect x="36" y="502" width="14" height="14" rx="2" fill="#FFFBEB" stroke="#D97706"/>
  <text x="58" y="513" class="label-meta">메트릭 처리 계층</text>
  <rect x="36" y="522" width="14" height="14" rx="2" fill="#FFF1F2" stroke="#E11D48"/>
  <text x="58" y="533" class="label-meta">판정 / 출력 계층</text>
  <rect x="140" y="462" width="14" height="14" rx="2" fill="#F5F3FF" stroke="#7C3AED"/>
  <text x="162" y="473" class="label-meta">외부 연동 계층</text>
</svg>
