<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" role="img" aria-labelledby="t2 d2" width="100%" height="auto" preserveAspectRatio="xMidYMid meet" style="max-width: 800px;">
  <title id="t2">Trace abc123 워터폴 다이어그램 (Total 350ms)</title>
  <desc id="d2">frontend GET /checkout 350ms 안에서 api-gateway 300ms, 그 안에 payment 250ms와 inventory 50ms가 병렬 호출되고 payment 안에서 bank-api 200ms가 가장 큰 비중. 전체 350ms 중 bank-api 200ms가 57퍼센트를 차지하는 병목</desc>

  <style><![CDATA[
    .label { font-family: 'Pretendard', sans-serif; font-size: 13px; font-weight: 600; }
    .meta  { font-family: 'Geist Mono', ui-monospace, Menlo, monospace; font-size: 11px; fill: #27272A; }
    .head  { font-family: 'Pretendard', sans-serif; font-size: 14px; font-weight: 700; }
  ]]></style>

  <!-- Frame -->
  <rect x="32" y="32" width="736" height="416" rx="8" fill="#FAFAFA" stroke="#D4D4D8" stroke-width="1.5"/>
  <text x="48" y="60" class="head" fill="#0A0A0A">Trace abc123</text>
  <text x="752" y="60" text-anchor="end" class="meta">Total: 350ms</text>

  <!-- Time axis labels (0~350ms) -->
  <line x1="56" y1="84" x2="752" y2="84" stroke="#D4D4D8" stroke-width="1"/>
  <text x="56" y="100" class="meta">0ms</text>
  <text x="404" y="100" text-anchor="middle" class="meta">175ms</text>
  <text x="752" y="100" text-anchor="end" class="meta">350ms</text>

  <!-- Span 1: frontend GET /checkout (root, 350ms) - external/slate -->
  <text x="56" y="138" class="label">frontend [GET /checkout]</text>
  <rect x="56" y="148" width="696" height="20" rx="3" fill="#475569"/>
  <text x="752" y="163" text-anchor="end" class="meta" fill="#FAFAFA">350ms</text>

  <!-- Span 2: api-gateway POST /api/order (300ms) - backend/emerald -->
  <text x="80" y="194" class="label">└── api-gateway [POST /api/order]</text>
  <rect x="80" y="204" width="596" height="20" rx="3" fill="#059669"/>
  <text x="676" y="219" text-anchor="end" class="meta" fill="#FAFAFA">300ms</text>

  <!-- Span 3: payment processPayment (250ms) - database/violet -->
  <text x="104" y="250" class="label">├── payment [processPayment]</text>
  <rect x="104" y="260" width="496" height="20" rx="3" fill="#7C3AED"/>
  <text x="600" y="275" text-anchor="end" class="meta" fill="#FAFAFA">250ms</text>

  <!-- Span 4: bank-api POST /charge (200ms) - security/rose - 병목 -->
  <text x="128" y="306" class="label" fill="#BE123C">│   └── bank-api [POST /charge] · 병목</text>
  <rect x="128" y="316" width="396" height="20" rx="3" fill="#E11D48"/>
  <text x="524" y="331" text-anchor="end" class="meta" fill="#FAFAFA">200ms</text>

  <!-- Span 5: inventory checkStock (50ms) - cloud/amber - 병렬 -->
  <text x="104" y="362" class="label">└── inventory [checkStock]</text>
  <rect x="104" y="372" width="100" height="20" rx="3" fill="#D97706"/>
  <text x="204" y="387" text-anchor="end" class="meta" fill="#FAFAFA">50ms</text>

  <!-- Bottom note -->
  <text x="400" y="424" text-anchor="middle" class="meta">전체 350ms 중 bank-api 200ms가 약 57% 차지 — 외부 의존이 가장 큰 병목</text>
</svg>
