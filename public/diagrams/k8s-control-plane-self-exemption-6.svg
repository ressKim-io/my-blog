<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" width="100%" height="100%" role="img" aria-labelledby="title desc" font-family="Pretendard, ui-sans-serif, system-ui, -apple-system, sans-serif">
  <title id="title">Container Env Injection: Go Runtime vs K8s Audit</title>
  <desc id="desc">Two-track handling of container environment variables by Go runtime engines directly scanning os.Environ versus K8s API server audit logs.</desc>
  <defs>
    <style>
      .bg { fill: #FAFAFA; }
      .title { font-size: 20px; font-weight: 700; fill: #0A0A0A; text-anchor: middle; }
      .header { font-size: 17px; font-weight: 700; text-anchor: middle; }
      .label { font-size: 16px; font-weight: 700; text-anchor: middle; }
      .sub { font-size: 14px; font-weight: 600; text-anchor: middle; }
      .box-top { fill: #F8FAFC; stroke: #475569; stroke-width: 2; rx: 10; }
      .box-emerald { fill: #ECFDF5; stroke: #059669; stroke-width: 2.5; rx: 12; }
      .box-emerald-hdr { fill: #D1FAE5; stroke: #059669; stroke-width: 2; rx: 8; }
      .box-amber { fill: #FFFBEB; stroke: #D97706; stroke-width: 2.5; rx: 12; }
      .box-amber-hdr { fill: #FEF3C7; stroke: #D97706; stroke-width: 2; rx: 8; }
      .card { fill: #FFFFFF; stroke-width: 2; rx: 8; }
    </style>
    <marker id="arr-g" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#059669" />
    </marker>
    <marker id="arr-o" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#D97706" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="380" class="bg" rx="12" />
  <text x="400" y="38" class="title">Container Env Injection: Go Runtime vs K8s Audit</text>

  <!-- Top Input Box -->
  <rect x="180" y="62" width="440" height="48" class="box-top" />
  <text x="400" y="92" class="label" fill="#1E293B">Container Env (GOGC, GOMEMLIMIT)</text>

  <!-- Split Arrows -->
  <path d="M 320 110 L 210 138" stroke="#059669" stroke-width="3" marker-end="url(#arr-g)" />
  <path d="M 480 110 L 590 138" stroke="#D97706" stroke-width="3" marker-end="url(#arr-o)" />

  <!-- LEFT: Go Runtime Engine Track -->
  <rect x="35" y="142" width="350" height="210" class="box-emerald" />
  <rect x="55" y="158" width="310" height="36" class="box-emerald-hdr" />
  <text x="210" y="182" class="header" fill="#047857">1. Go Runtime Engine Track</text>

  <rect x="55" y="206" width="310" height="52" class="card" stroke="#059669" />
  <text x="210" y="238" class="label" fill="#047857">schedinit() (OS Environment Scan)</text>

  <path d="M 210 258 L 210 274" stroke="#059669" stroke-width="2.5" marker-end="url(#arr-g)" />

  <rect x="55" y="280" width="310" height="52" class="card" stroke="#059669" fill="#ECFDF5" />
  <text x="210" y="312" class="label" fill="#047857">Direct Physical Setup</text>

  <!-- RIGHT: K8s API Server Track -->
  <rect x="415" y="142" width="350" height="210" class="box-amber" />
  <rect x="435" y="158" width="310" height="36" class="box-amber-hdr" />
  <text x="590" y="182" class="header" fill="#B45309">2. K8s API Server Track</text>

  <rect x="435" y="206" width="310" height="52" class="card" stroke="#D97706" />
  <text x="590" y="238" class="label" fill="#B45309">No debug.* API Calls</text>

  <path d="M 590 258 L 590 274" stroke="#D97706" stroke-width="2.5" marker-end="url(#arr-o)" />

  <rect x="435" y="280" width="310" height="52" class="card" stroke="#D97706" fill="#FFFBEB" />
  <text x="590" y="312" class="label" fill="#B45309">Audit Logging (klog.InfoS)</text>
</svg>
