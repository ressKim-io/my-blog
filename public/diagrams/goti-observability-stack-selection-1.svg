<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 720" role="img" aria-labelledby="t1 d1" width="100%" height="auto" preserveAspectRatio="xMidYMid meet" style="max-width: 800px;">
  <title id="t1">관측성 스택 최종 아키텍처 — Grafana LGTM + Alloy + Kafka 버퍼</title>
  <desc id="d1">애플리케이션 OTel Java Agent가 OTLP gRPC 4317로 Alloy Agent DaemonSet에 송신. Alloy Agent에서 메트릭은 remote_write로 Mimir에 직접 전달하고, 로그·트레이스는 tail sampling 후 Kafka topic(otlp_logs, otlp_spans)으로 버퍼링. Alloy Gateway가 Kafka에서 소비해 Loki·Tempo로 전송하고, Grafana가 Mimir·Loki·Tempo 3개 데이터소스를 통합 시각화</desc>

  <defs>
    <marker id="arr1" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#0A0A0A"/>
    </marker>
  </defs>

  <style><![CDATA[
    .label { font-family: 'Pretendard', sans-serif; font-size: 13px; font-weight: 600; }
    .meta  { font-family: 'Geist Mono', ui-monospace, Menlo, monospace; font-size: 11px; fill: #27272A; }
    .arrlbl { font-family: 'Pretendard', sans-serif; font-size: 11px; fill: #27272A; }
    .arrow { stroke: #0A0A0A; stroke-width: 1.5; fill: none; marker-end: url(#arr1); }
  ]]></style>

  <!-- App (backend / emerald) -->
  <rect x="280" y="600" width="240" height="64" rx="6" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="400" y="624" text-anchor="middle" class="label" fill="#047857">Application</text>
  <text x="400" y="644" text-anchor="middle" class="meta">OTel SDK / OTel Java Agent</text>

  <line x1="400" y1="600" x2="400" y2="552" class="arrow"/>
  <text x="412" y="582" class="arrlbl">OTLP gRPC :4317</text>

  <!-- Alloy Agent DaemonSet (cloud / amber) -->
  <rect x="200" y="488" width="400" height="64" rx="6" fill="#FFFBEB" stroke="#D97706" stroke-width="1.5"/>
  <text x="400" y="512" text-anchor="middle" class="label" fill="#B45309">Alloy Agent (DaemonSet)</text>
  <text x="400" y="532" text-anchor="middle" class="meta">tail sampling 10% / ServiceMonitor scrape</text>

  <!-- 3 paths up: metrics 직접, logs/traces Kafka -->
  <path d="M 240 488 V 432 H 160 V 384" class="arrow"/>
  <text x="172" y="464" class="arrlbl">remote_write</text>

  <line x1="400" y1="488" x2="400" y2="416" class="arrow"/>
  <text x="412" y="448" class="arrlbl">otlp_logs / otlp_spans</text>

  <!-- Kafka topics (database / violet) -->
  <rect x="280" y="352" width="320" height="64" rx="6" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="440" y="376" text-anchor="middle" class="label" fill="#6D28D9">Kafka topics</text>
  <text x="440" y="396" text-anchor="middle" class="meta">otlp_logs / otlp_spans (버퍼 — 버스트 흡수)</text>

  <line x1="440" y1="352" x2="440" y2="304" class="arrow"/>

  <!-- Alloy Gateway (cloud / amber) -->
  <rect x="280" y="240" width="320" height="64" rx="6" fill="#FFFBEB" stroke="#D97706" stroke-width="1.5"/>
  <text x="440" y="264" text-anchor="middle" class="label" fill="#B45309">Alloy Gateway</text>
  <text x="440" y="284" text-anchor="middle" class="meta">batch + export</text>

  <path d="M 360 240 V 200 H 320 V 168" class="arrow"/>
  <path d="M 520 240 V 200 H 600 V 168" class="arrow"/>

  <!-- Mimir (database / violet) -->
  <rect x="80" y="320" width="160" height="64" rx="6" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="160" y="344" text-anchor="middle" class="label" fill="#6D28D9">Mimir</text>
  <text x="160" y="364" text-anchor="middle" class="meta">메트릭</text>

  <line x1="160" y1="320" x2="160" y2="168" class="arrow"/>

  <!-- Loki (database / violet) -->
  <rect x="240" y="104" width="160" height="64" rx="6" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="320" y="128" text-anchor="middle" class="label" fill="#6D28D9">Loki</text>
  <text x="320" y="148" text-anchor="middle" class="meta">로그</text>

  <!-- Tempo (database / violet) -->
  <rect x="520" y="104" width="160" height="64" rx="6" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="600" y="128" text-anchor="middle" class="label" fill="#6D28D9">Tempo</text>
  <text x="600" y="148" text-anchor="middle" class="meta">트레이스</text>

  <rect x="80" y="104" width="160" height="64" rx="6" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="160" y="128" text-anchor="middle" class="label" fill="#6D28D9">Mimir</text>
  <text x="160" y="148" text-anchor="middle" class="meta">메트릭 저장</text>

  <!-- arrows up to Grafana -->
  <path d="M 160 104 V 64 H 320 V 32" class="arrow"/>
  <path d="M 320 104 V 64 H 400 V 32" class="arrow"/>
  <path d="M 600 104 V 64 H 480 V 32" class="arrow"/>

  <!-- Grafana (frontend / cyan) -->
  <rect x="240" y="32" width="320" height="40" rx="6" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.5"/>
  <text x="400" y="56" text-anchor="middle" class="label" fill="#0E7490">Grafana — Mimir / Loki / Tempo 통합</text>
</svg>
