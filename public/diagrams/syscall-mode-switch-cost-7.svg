<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" role="img" aria-labelledby="t7 d7" font-family="Pretendard, ui-sans-serif, system-ui, -apple-system, sans-serif">
  <title id="t7">Who stands between your read() call and the kernel</title>
  <desc id="d7">Rust goes through a thin libc wrapper straight to the syscall, with no runtime in the way. Go issues the syscall directly without libc, but its runtime wraps the crossing so a blocking call hands the logical processor to another goroutine. Java reaches the syscall through JVM native code and libc, under generations of abstraction. The physical cost of the syscall itself is identical for all three.</desc>
  <defs>
    <marker id="s7" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="800" height="460" fill="#FFFFFF"/>

  <line x1="152" y1="316" x2="152" y2="352" stroke="#475569" stroke-width="1.6" marker-end="url(#s7)"/>
  <line x1="400" y1="316" x2="400" y2="352" stroke="#475569" stroke-width="1.6" marker-end="url(#s7)"/>
  <line x1="648" y1="316" x2="648" y2="352" stroke="#475569" stroke-width="1.6" marker-end="url(#s7)"/>

  <text x="152" y="46" text-anchor="middle" font-size="15" font-weight="700" fill="#334155">Rust app</text>
  <text x="400" y="46" text-anchor="middle" font-size="15" font-weight="700" fill="#334155">Go app</text>
  <text x="648" y="46" text-anchor="middle" font-size="15" font-weight="700" fill="#334155">Java app</text>

  <rect x="40" y="72" width="224" height="60" rx="8" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.6"/>
  <text x="152" y="108" text-anchor="middle" font-size="14" fill="#0E7490" font-family="ui-monospace, monospace">std::fs::read</text>
  <rect x="288" y="72" width="224" height="60" rx="8" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.6"/>
  <text x="400" y="108" text-anchor="middle" font-size="14" fill="#0E7490" font-family="ui-monospace, monospace">file.Read()</text>
  <rect x="536" y="72" width="224" height="60" rx="8" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.6"/>
  <text x="648" y="108" text-anchor="middle" font-size="14" fill="#0E7490" font-family="ui-monospace, monospace">InputStream.read()</text>

  <rect x="40" y="160" width="224" height="68" rx="8" fill="#F8FAFC" stroke="#94A3B8" stroke-width="1.4" stroke-dasharray="5 3"/>
  <text x="152" y="200" text-anchor="middle" font-size="14" fill="#64748B">no runtime</text>
  <rect x="288" y="160" width="224" height="68" rx="8" fill="#ECFDF5" stroke="#059669" stroke-width="1.8"/>
  <text x="400" y="200" text-anchor="middle" font-size="14" font-weight="700" fill="#047857">Go runtime</text>
  <rect x="536" y="160" width="224" height="68" rx="8" fill="#ECFDF5" stroke="#059669" stroke-width="1.8"/>
  <text x="648" y="200" text-anchor="middle" font-size="14" font-weight="700" fill="#047857">JVM + JNI</text>

  <rect x="40" y="256" width="224" height="60" rx="8" fill="#F8FAFC" stroke="#475569" stroke-width="1.5"/>
  <text x="152" y="292" text-anchor="middle" font-size="14" fill="#334155" font-family="ui-monospace, monospace">libc</text>
  <rect x="288" y="256" width="224" height="60" rx="8" fill="#FFFBEB" stroke="#D97706" stroke-width="1.5"/>
  <text x="400" y="292" text-anchor="middle" font-size="14" font-weight="700" fill="#B45309">direct syscall</text>
  <rect x="536" y="256" width="224" height="60" rx="8" fill="#F8FAFC" stroke="#475569" stroke-width="1.5"/>
  <text x="648" y="292" text-anchor="middle" font-size="14" fill="#334155" font-family="ui-monospace, monospace">libc</text>

  <rect x="40" y="356" width="720" height="72" rx="9" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.8"/>
  <text x="400" y="388" text-anchor="middle" font-size="15" font-weight="700" fill="#6D28D9">Kernel — Ring 0</text>
  <text x="400" y="412" text-anchor="middle" font-size="13" fill="#6D28D9" font-family="ui-monospace, monospace">sys_read</text>
</svg>
