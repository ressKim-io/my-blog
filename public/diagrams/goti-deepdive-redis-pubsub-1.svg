<svg role="img" aria-labelledby="title-1 desc-1" viewBox="0 0 800 520" width="100%" height="auto" xmlns="http://www.w3.org/2000/svg" font-family="'Pretendard', system-ui, sans-serif">
  <title id="title-1">Polling vs Pub/Sub 메시지 전달 방식 비교</title>
  <desc id="desc-1">왼쪽은 클라이언트가 주기적으로 서버에 상태를 요청하는 polling 방식, 오른쪽은 Redis Pub/Sub 채널을 통해 publisher가 발행하면 subscriber가 즉시 받는 push 방식을 비교합니다</desc>

  <!-- 배경 분할선 -->
  <line x1="400" y1="0" x2="400" y2="520" stroke="#E4E4E7" stroke-width="1.5" stroke-dasharray="6 3"/>

  <!-- 왼쪽 제목: Polling -->
  <text x="200" y="36" text-anchor="middle" font-size="15" font-weight="700" fill="#0A0A0A">Polling 방식</text>
  <text x="200" y="54" text-anchor="middle" font-size="12" fill="#475569">클라이언트가 주기적으로 서버에 요청</text>

  <!-- 오른쪽 제목: Pub/Sub -->
  <text x="600" y="36" text-anchor="middle" font-size="15" font-weight="700" fill="#0A0A0A">Pub/Sub 방식</text>
  <text x="600" y="54" text-anchor="middle" font-size="12" fill="#475569">발행 즉시 채널로 push</text>

  <!-- === Polling 왼쪽 === -->

  <!-- Client 박스 -->
  <rect x="80" y="80" width="130" height="56" rx="6" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="145" y="105" text-anchor="middle" font-size="13" font-weight="600" fill="#047857">Client</text>
  <text x="145" y="122" text-anchor="middle" font-size="11" fill="#27272A">(결제 완료 확인 중)</text>

  <!-- Server 박스 -->
  <rect x="80" y="240" width="130" height="56" rx="6" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="145" y="265" text-anchor="middle" font-size="13" font-weight="600" fill="#047857">Server</text>
  <text x="145" y="282" text-anchor="middle" font-size="11" fill="#27272A">(상태 DB 조회)</text>

  <!-- polling 화살표 1: 요청 -->
  <defs>
    <marker id="arrow-dark" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#0A0A0A"/>
    </marker>
    <marker id="arrow-slate" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#475569"/>
    </marker>
    <marker id="arrow-emerald" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#059669"/>
    </marker>
    <marker id="arrow-violet" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7C3AED"/>
    </marker>
  </defs>

  <!-- 요청 1 -->
  <line x1="120" y1="136" x2="120" y2="238" stroke="#0A0A0A" stroke-width="1.5" marker-end="url(#arrow-dark)"/>
  <rect x="58" y="173" width="50" height="18" rx="3" fill="#FAFAFA"/>
  <text x="83" y="186" text-anchor="middle" font-size="11" fill="#0A0A0A">GET /status</text>

  <!-- 응답 1 (아직 pending) -->
  <line x1="170" y1="238" x2="170" y2="136" stroke="#475569" stroke-width="1.5" stroke-dasharray="4 2" marker-end="url(#arrow-slate)"/>
  <rect x="172" y="173" width="72" height="18" rx="3" fill="#FAFAFA"/>
  <text x="208" y="186" text-anchor="middle" font-size="11" fill="#475569">pending...</text>

  <!-- 요청 2 -->
  <line x1="120" y1="136" x2="120" y2="160" stroke="#0A0A0A" stroke-width="1" stroke-dasharray="3 2"/>
  <!-- 시간 경과 표시 -->
  <text x="130" y="158" font-size="10" fill="#B45309">2초 후</text>

  <!-- 반복 화살표 표시 -->
  <line x1="100" y1="136" x2="100" y2="238" stroke="#B45309" stroke-width="1" stroke-dasharray="3 2" marker-end="url(#arrow-dark)"/>
  <rect x="30" y="173" width="56" height="18" rx="3" fill="#FFFBEB"/>
  <text x="58" y="186" text-anchor="middle" font-size="11" fill="#B45309">반복 요청</text>

  <!-- 최종 응답 -->
  <rect x="80" y="364" width="130" height="40" rx="6" fill="#FFFBEB" stroke="#D97706" stroke-width="1.5"/>
  <text x="145" y="384" text-anchor="middle" font-size="12" fill="#B45309">n번 요청 후 완료 수신</text>
  <text x="145" y="399" text-anchor="middle" font-size="11" fill="#B45309">(불필요한 네트워크 낭비)</text>

  <line x1="145" y1="296" x2="145" y2="362" stroke="#D97706" stroke-width="1.5" marker-end="url(#arrow-dark)"/>

  <!-- === Pub/Sub 오른쪽 === -->

  <!-- Publisher 박스 -->
  <rect x="448" y="80" width="130" height="56" rx="6" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="513" y="105" text-anchor="middle" font-size="13" font-weight="600" fill="#047857">Publisher</text>
  <text x="513" y="122" text-anchor="middle" font-size="11" fill="#27272A">(결제 서버)</text>

  <!-- Redis Channel 박스 -->
  <rect x="456" y="220" width="114" height="56" rx="6" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="513" y="245" text-anchor="middle" font-size="13" font-weight="600" fill="#6D28D9">Redis 채널</text>
  <text x="513" y="262" text-anchor="middle" font-size="11" fill="#27272A">payment:status</text>

  <!-- Publisher → Channel -->
  <line x1="513" y1="136" x2="513" y2="218" stroke="#059669" stroke-width="1.5" marker-end="url(#arrow-emerald)"/>
  <rect x="519" y="166" width="56" height="18" rx="3" fill="#FAFAFA"/>
  <text x="547" y="179" text-anchor="middle" font-size="11" fill="#059669">PUBLISH</text>

  <!-- Subscriber 1 박스 -->
  <rect x="448" y="348" width="114" height="48" rx="6" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.5"/>
  <text x="505" y="370" text-anchor="middle" font-size="13" font-weight="600" fill="#0E7490">Subscriber A</text>
  <text x="505" y="387" text-anchor="middle" font-size="11" fill="#27272A">(결제 UI)</text>

  <!-- Subscriber 2 박스 -->
  <rect x="616" y="348" width="114" height="48" rx="6" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.5"/>
  <text x="673" y="370" text-anchor="middle" font-size="13" font-weight="600" fill="#0E7490">Subscriber B</text>
  <text x="673" y="387" text-anchor="middle" font-size="11" fill="#27272A">(알림 서비스)</text>

  <!-- Channel → Subscriber 1 (fan-out) -->
  <line x1="490" y1="276" x2="490" y2="346" stroke="#7C3AED" stroke-width="1.5" marker-end="url(#arrow-violet)"/>
  <rect x="440" y="302" width="36" height="16" rx="3" fill="#FAFAFA"/>
  <text x="458" y="314" text-anchor="middle" font-size="10" fill="#7C3AED">push</text>

  <!-- Channel → Subscriber 2 (fan-out) -->
  <line x1="548" y1="270" x2="660" y2="346" stroke="#7C3AED" stroke-width="1.5" marker-end="url(#arrow-violet)"/>
  <rect x="608" y="298" width="36" height="16" rx="3" fill="#FAFAFA"/>
  <text x="626" y="310" text-anchor="middle" font-size="10" fill="#7C3AED">push</text>

  <!-- fan-out 라벨 -->
  <text x="600" y="432" text-anchor="middle" font-size="12" fill="#6D28D9" font-weight="600">fan-out: 모든 구독자에게 동시 전달</text>

  <!-- 오른쪽 하단: fire-and-forget 주의 박스 -->
  <rect x="448" y="450" width="282" height="36" rx="6" fill="#FFF1F2" stroke="#E11D48" stroke-width="1.2"/>
  <text x="589" y="469" text-anchor="middle" font-size="12" fill="#BE123C" font-weight="600">주의: 구독 안 한 사이 메시지는 소멸</text>
  <text x="589" y="482" text-anchor="middle" font-size="11" fill="#BE123C">(fire-and-forget — 영속성 없음)</text>

  <!-- 범례 -->
  <rect x="24" y="468" width="200" height="44" rx="4" fill="#F8FAFC" stroke="#D4D4D8" stroke-width="1"/>
  <text x="34" y="484" font-size="11" font-weight="600" fill="#0A0A0A">범례</text>
  <line x1="34" y1="494" x2="54" y2="494" stroke="#059669" stroke-width="2"/>
  <text x="58" y="497" font-size="11" fill="#27272A">Service / API</text>
  <line x1="110" y1="494" x2="130" y2="494" stroke="#7C3AED" stroke-width="2"/>
  <text x="134" y="497" font-size="11" fill="#27272A">Redis / Cache</text>
  <line x1="34" y1="506" x2="54" y2="506" stroke="#0891B2" stroke-width="2"/>
  <text x="58" y="509" font-size="11" fill="#27272A">Subscriber (Client)</text>
</svg>
