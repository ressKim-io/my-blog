<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430" role="img" aria-labelledby="t4 d4" font-family="Pretendard, ui-sans-serif, system-ui, -apple-system, sans-serif">
  <title id="t4">Go's GMP — per-P run queues, work stealing, the global queue and the netpoller</title>
  <desc id="d4">Each logical processor P owns a local run queue of goroutines, and most scheduling happens lock-free inside that queue. A P whose queue runs empty steals half the goroutines from a random other P. Overflow goroutines wait in a global run queue that Ps check periodically, and goroutines parked on I/O sit in the netpoller holding no OS thread. A goroutine needs a P, and a P needs an M, so the number of simultaneously running goroutines equals GOMAXPROCS.</desc>
