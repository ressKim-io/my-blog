<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" role="img" aria-labelledby="t4 d4" font-family="Pretendard, ui-sans-serif, system-ui, -apple-system, sans-serif">
  <title id="t4">Watch a different gauge for each runtime</title>
  <desc id="d4">Four dashboard panels, one per runtime, each naming the single signal that Part 5's measurements showed actually matters for it. For a Go pod, watch GC CPU alongside memory, because tightening GOMEMLIMIT moves the cost from memory into CPU and a memory-only dashboard hides the trade. For a G1 pod, watch the gap between memory.current and what Native Memory Tracking reports, because the off-heap death of episode 20 never appears on a heap gauge at all. For a ZGC pod, watch shmem rather than anon in memory.stat, because ZGC's heap is backed by a memfd and lands in the shared-memory column, so an anon-only view makes the heap look like it vanished. For any pod with a warmup curve, gate readiness on being warm rather than on being up, because the 6.7 times gap otherwise reaches users directly.</desc>
  <rect x="0" y="0" width="800" height="340" fill="#FFFFFF"/>

  <rect x="35" y="50" width="175" height="180" rx="8" fill="#ECFDF5" stroke="#059669" stroke-width="2.5"/>
  <rect x="228" y="50" width="175" height="180" rx="8" fill="#ECFEFF" stroke="#0891B2" stroke-width="2.5"/>
  <rect x="421" y="50" width="175" height="180" rx="8" fill="#FFF1F2" stroke="#E11D48" stroke-width="2.5"/>
  <rect x="614" y="50" width="151" height="180" rx="8" fill="#F5F3FF" stroke="#7C3AED" stroke-width="2.5"/>

  <text x="122" y="82" text-anchor="middle" font-size="16" font-weight="700" fill="#047857">Go pod</text>
  <text x="315" y="82" text-anchor="middle" font-size="16" font-weight="700" fill="#0E7490">G1 pod</text>
  <text x="508" y="82" text-anchor="middle" font-size="16" font-weight="700" fill="#BE123C">ZGC pod</text>
  <text x="689" y="82" text-anchor="middle" font-size="16" font-weight="700" fill="#6D28D9">warm-up pod</text>

  <line x1="60" y1="104" x2="185" y2="104" stroke="#059669" stroke-width="1.5"/>
  <line x1="253" y1="104" x2="378" y2="104" stroke="#0891B2" stroke-width="1.5"/>
  <line x1="446" y1="104" x2="571" y2="104" stroke="#E11D48" stroke-width="1.5"/>
  <line x1="634" y1="104" x2="745" y2="104" stroke="#7C3AED" stroke-width="1.5"/>

  <text x="122" y="150" text-anchor="middle" font-size="16" font-weight="700" fill="#047857">GC CPU</text>
  <text x="122" y="178" text-anchor="middle" font-size="14" font-weight="600" fill="#047857">next to memory</text>

  <text x="315" y="150" text-anchor="middle" font-size="16" font-weight="700" fill="#0E7490">memory.current</text>
  <text x="315" y="178" text-anchor="middle" font-size="14" font-weight="600" fill="#0E7490">minus NMT</text>

  <text x="508" y="150" text-anchor="middle" font-size="16" font-weight="700" fill="#BE123C">shmem</text>
  <text x="508" y="178" text-anchor="middle" font-size="14" font-weight="600" fill="#BE123C">not anon</text>

  <text x="689" y="150" text-anchor="middle" font-size="16" font-weight="700" fill="#6D28D9">"warmed up"</text>
  <text x="689" y="178" text-anchor="middle" font-size="14" font-weight="600" fill="#6D28D9">not "up"</text>

  <text x="400" y="290" text-anchor="middle" font-size="16" font-weight="700" fill="#334155">the same dashboard hides a different failure in each runtime</text>
</svg>
