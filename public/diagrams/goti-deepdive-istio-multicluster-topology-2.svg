<svg role="img" aria-labelledby="title-2 desc-2" viewBox="0 0 800 560" width="100%" height="auto" xmlns="http://www.w3.org/2000/svg" font-family="'Pretendard', system-ui, sans-serif">
  <title id="title-2">독립 mesh의 blast radius 격리 구조</title>
  <desc id="desc-2">한 클러스터의 istiod가 장애를 일으켜도 반대 클러스터의 istiod와 서비스에는 영향이 없음을 보여주는 다이어그램입니다. Primary-Remote와 비교해 격리 효과를 대조합니다.</desc>

  <style>
    .label-title  { font-size: 13px; font-weight: 700; fill: #0A0A0A; }
    .label-sub    { font-size: 11px; fill: #27272A; }
    .label-ok     { font-size: 11px; font-weight: 600; fill: #047857; }
    .label-fail   { font-size: 11px; font-weight: 600; fill: #BE123C; }
    .label-note   { font-size: 10px; fill: #475569; }
    .arrow-ok     { stroke: #059669; stroke-width: 1.5; fill: none; }
    .arrow-fail   { stroke: #E11D48; stroke-width: 1.5; fill: none; stroke-dasharray: 5 3; }
    .box-cp-ok    { fill: #ECFDF5; stroke: #059669; stroke-width: 1.5; }
    .box-cp-fail  { fill: #FFF1F2; stroke: #E11D48; stroke-width: 2; }
    .box-cluster  { fill: #FFFBEB; stroke: #D97706; stroke-width: 1.5; }
    .box-svc-ok   { fill: #ECFDF5; stroke: #059669; stroke-width: 1.2; }
    .box-svc-fail { fill: #FFF1F2; stroke: #E11D48; stroke-width: 1.2; }
    .box-header   { fill: #F8FAFC; stroke: #D4D4D8; stroke-width: 1; }
    .divider      { stroke: #E4E4E7; stroke-width: 1; stroke-dasharray: 3 2; }
  </style>

  <!-- 제목 -->
  <text x="400" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#0A0A0A">독립 mesh vs Primary-Remote — blast radius 비교</text>
  <text x="400" y="48" text-anchor="middle" font-size="11" fill="#475569">istiod 장애 시 영향 범위</text>

  <!-- 구분선 -->
  <line x1="400" y1="60" x2="400" y2="500" class="divider"/>

  <!-- ===== 왼쪽: 독립 mesh ===== -->
  <text x="200" y="74" text-anchor="middle" font-size="12" font-weight="700" fill="#059669">독립 mesh — istiod 장애 격리됨</text>

  <!-- AWS EKS — istiod 장애 -->
  <rect x="32" y="88" width="160" height="180" rx="8" class="box-cluster"/>
  <text x="112" y="108" text-anchor="middle" class="label-title">AWS EKS</text>

  <!-- 장애난 istiod -->
  <rect x="48" y="116" width="128" height="40" rx="4" class="box-cp-fail"/>
  <text x="112" y="132" text-anchor="middle" font-size="12" font-weight="700" fill="#BE123C">istiod ❌</text>
  <text x="112" y="148" text-anchor="middle" class="label-note">Control Plane 장애</text>

  <!-- 서비스들 (기존 설정으로 유지) -->
  <rect x="48" y="164" width="56" height="28" rx="4" class="box-svc-ok"/>
  <text x="76" y="182" text-anchor="middle" font-size="10" fill="#047857">Service A</text>
  <rect x="112" y="164" width="56" height="28" rx="4" class="box-svc-ok"/>
  <text x="140" y="182" text-anchor="middle" font-size="10" fill="#047857">Service B</text>

  <rect x="48" y="200" width="128" height="28" rx="4" class="box-svc-ok"/>
  <text x="112" y="218" text-anchor="middle" font-size="10" fill="#047857">Envoy (기존 설정 유지)</text>

  <text x="112" y="248" text-anchor="middle" font-size="10" fill="#047857">기존 xDS 캐시로</text>
  <text x="112" y="260" text-anchor="middle" font-size="10" fill="#047857">단기간 트래픽 처리 가능</text>

  <!-- GCP GKE — 정상 -->
  <rect x="216" y="88" width="160" height="180" rx="8" class="box-cluster"/>
  <text x="296" y="108" text-anchor="middle" class="label-title">GCP GKE</text>

  <!-- 정상 istiod -->
  <rect x="232" y="116" width="128" height="40" rx="4" class="box-cp-ok"/>
  <text x="296" y="132" text-anchor="middle" font-size="12" font-weight="700" fill="#047857">istiod ✓</text>
  <text x="296" y="148" text-anchor="middle" class="label-note">영향 없음</text>

  <rect x="232" y="164" width="56" height="28" rx="4" class="box-svc-ok"/>
  <text x="260" y="182" text-anchor="middle" font-size="10" fill="#047857">Service C</text>
  <rect x="296" y="164" width="56" height="28" rx="4" class="box-svc-ok"/>
  <text x="324" y="182" text-anchor="middle" font-size="10" fill="#047857">Service D</text>

  <rect x="232" y="200" width="128" height="28" rx="4" class="box-svc-ok"/>
  <text x="296" y="218" text-anchor="middle" font-size="10" fill="#047857">Envoy (정상 동작)</text>

  <text x="296" y="248" text-anchor="middle" font-size="10" fill="#047857">GCP 쪽 트래픽</text>
  <text x="296" y="260" text-anchor="middle" font-size="10" fill="#047857">완전 정상 처리</text>

  <!-- 차단 표시 (mesh 간 연결 없음) -->
  <line x1="192" y1="190" x2="216" y2="190" stroke="#E4E4E7" stroke-width="2"/>
  <text x="204" y="185" text-anchor="middle" font-size="9" fill="#475569">분리</text>

  <!-- 결과 박스 -->
  <rect x="32" y="284" width="344" height="60" rx="6" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="204" y="304" text-anchor="middle" font-size="11" font-weight="700" fill="#047857">격리 결과</text>
  <text x="204" y="322" text-anchor="middle" font-size="10" fill="#27272A">AWS istiod 장애 → AWS 서비스에만 영향</text>
  <text x="204" y="336" text-anchor="middle" font-size="10" fill="#27272A">GCP 클러스터는 완전 정상 가동 지속</text>

  <!-- ===== 오른쪽: Primary-Remote ===== -->
  <text x="600" y="74" text-anchor="middle" font-size="12" font-weight="700" fill="#BE123C">Primary-Remote — 단일 CP 장애 전파</text>

  <!-- Primary — istiod 장애 -->
  <rect x="424" y="88" width="160" height="180" rx="8" class="box-cluster"/>
  <text x="504" y="108" text-anchor="middle" class="label-title">Primary</text>

  <rect x="440" y="116" width="128" height="40" rx="4" class="box-cp-fail"/>
  <text x="504" y="132" text-anchor="middle" font-size="12" font-weight="700" fill="#BE123C">istiod ❌</text>
  <text x="504" y="148" text-anchor="middle" class="label-note">Control Plane 장애</text>

  <rect x="440" y="164" width="56" height="28" rx="4" class="box-svc-fail"/>
  <text x="468" y="182" text-anchor="middle" font-size="10" fill="#BE123C">Service A</text>
  <rect x="504" y="164" width="56" height="28" rx="4" class="box-svc-fail"/>
  <text x="532" y="182" text-anchor="middle" font-size="10" fill="#BE123C">Service B</text>

  <rect x="440" y="200" width="128" height="28" rx="4" class="box-svc-fail"/>
  <text x="504" y="218" text-anchor="middle" font-size="10" fill="#BE123C">설정 갱신 불가</text>

  <text x="504" y="248" text-anchor="middle" font-size="10" fill="#BE123C">새 서비스 등록·변경</text>
  <text x="504" y="260" text-anchor="middle" font-size="10" fill="#BE123C">전파 불가</text>

  <!-- Remote — 영향 받음 -->
  <rect x="608" y="88" width="160" height="180" rx="8" fill="#FFF1F2" stroke="#E11D48" stroke-width="2"/>
  <text x="688" y="108" text-anchor="middle" class="label-title">Remote</text>

  <rect x="624" y="116" width="128" height="40" rx="4" fill="#FFF1F2" stroke="#E11D48" stroke-width="1"/>
  <text x="688" y="132" text-anchor="middle" font-size="12" font-weight="700" fill="#BE123C">CP 연결 끊김</text>
  <text x="688" y="148" text-anchor="middle" class="label-note">xDS 동기화 중단</text>

  <rect x="624" y="164" width="56" height="28" rx="4" class="box-svc-fail"/>
  <text x="652" y="182" text-anchor="middle" font-size="10" fill="#BE123C">Service C</text>
  <rect x="688" y="164" width="56" height="28" rx="4" class="box-svc-fail"/>
  <text x="716" y="182" text-anchor="middle" font-size="10" fill="#BE123C">Service D</text>

  <rect x="624" y="200" width="128" height="28" rx="4" class="box-svc-fail"/>
  <text x="688" y="218" text-anchor="middle" font-size="10" fill="#BE123C">설정 갱신 불가</text>

  <text x="688" y="248" text-anchor="middle" font-size="10" fill="#BE123C">서비스 업데이트·</text>
  <text x="688" y="260" text-anchor="middle" font-size="10" fill="#BE123C">스케일 불가</text>

  <!-- Primary → Remote 끊긴 화살표 -->
  <line x1="584" y1="136" x2="624" y2="136" class="arrow-fail"/>
  <line x1="606" y1="128" x2="606" y2="144" stroke="#E11D48" stroke-width="2"/>
  <text x="604" y="126" text-anchor="middle" font-size="9" fill="#BE123C">xDS 차단</text>

  <!-- 결과 박스 -->
  <rect x="424" y="284" width="344" height="60" rx="6" fill="#FFF1F2" stroke="#E11D48" stroke-width="1.5"/>
  <text x="596" y="304" text-anchor="middle" font-size="11" font-weight="700" fill="#BE123C">장애 전파 결과</text>
  <text x="596" y="322" text-anchor="middle" font-size="10" fill="#27272A">Primary istiod 장애 → 양 클러스터 설정 동기화 중단</text>
  <text x="596" y="336" text-anchor="middle" font-size="10" fill="#27272A">Remote 클러스터도 신규 서비스 등록·업데이트 불가</text>

  <!-- 하단 요약 -->
  <rect x="32" y="364" width="736" height="124" rx="8" class="box-header"/>
  <text x="400" y="386" text-anchor="middle" font-size="12" font-weight="700" fill="#0A0A0A">blast radius 격리 원리</text>

  <rect x="48" y="396" width="328" height="80" rx="4" fill="#ECFDF5" stroke="#059669" stroke-width="1"/>
  <text x="212" y="414" text-anchor="middle" font-size="11" font-weight="700" fill="#047857">독립 mesh — 격리 이유</text>
  <text x="60" y="432" font-size="10" fill="#27272A">각 클러스터가 자체 istiod를 보유합니다</text>
  <text x="60" y="448" font-size="10" fill="#27272A">클러스터 간 설정 동기화 경로가 없습니다</text>
  <text x="60" y="464" font-size="10" fill="#27272A">한 클러스터의 CP 장애는 해당 클러스터 범위에서</text>
  <text x="60" y="478" font-size="10" fill="#27272A">멈추고, 반대 클러스터로 전파되지 않습니다</text>

  <rect x="424" y="396" width="328" height="80" rx="4" fill="#FFF1F2" stroke="#E11D48" stroke-width="1"/>
  <text x="588" y="414" text-anchor="middle" font-size="11" font-weight="700" fill="#BE123C">Primary-Remote — 전파 이유</text>
  <text x="436" y="432" font-size="10" fill="#27272A">단일 istiod가 모든 클러스터의 xDS를 담당합니다</text>
  <text x="436" y="448" font-size="10" fill="#27272A">Remote 클러스터는 CP 없이 Primary에 의존합니다</text>
  <text x="436" y="464" font-size="10" fill="#27272A">Primary CP 장애 = 모든 클러스터의 설정 동기화</text>
  <text x="436" y="478" font-size="10" fill="#27272A">경로 동시 차단 → blast radius가 전체로 확산됩니다</text>

  <!-- 범례 -->
  <rect x="32" y="502" width="736" height="28" rx="4" fill="#F8FAFC" stroke="#E4E4E7" stroke-width="1"/>
  <rect x="48" y="511" width="12" height="12" rx="2" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="66" y="521" font-size="10" fill="#27272A">정상 동작</text>
  <rect x="170" y="511" width="12" height="12" rx="2" fill="#FFF1F2" stroke="#E11D48" stroke-width="1.5"/>
  <text x="188" y="521" font-size="10" fill="#27272A">장애 / 영향 받음</text>
  <line x1="350" y1="517" x2="375" y2="517" stroke="#E11D48" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text x="382" y="521" font-size="10" fill="#27272A">끊긴 xDS 연결</text>
  <line x1="530" y1="517" x2="555" y2="517" stroke="#059669" stroke-width="1.5"/>
  <text x="562" y="521" font-size="10" fill="#27272A">정상 처리 경로</text>
</svg>
