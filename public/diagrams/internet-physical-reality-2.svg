<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 420" font-family="Pretendard, ui-sans-serif, system-ui, -apple-system, sans-serif">
  <rect x="0" y="0" width="520" height="420" fill="#FFFFFF"/>

  <text x="260" y="26" text-anchor="middle" font-size="13" font-weight="700" fill="#334155">ISP Data Center — one rack</text>

  <!-- rack chassis -->
  <rect x="120" y="44" width="260" height="300" rx="10" fill="#F1F5F9" stroke="#475569" stroke-width="2"/>

  <!-- ISP units -->
  <rect x="140" y="60" width="220" height="42" rx="6" fill="#FFFBEB" stroke="#D97706" stroke-width="1.5"/>
  <circle cx="151" cy="81" r="2.6" fill="#D97706"/><circle cx="160" cy="81" r="2.6" fill="#D97706"/><circle cx="169" cy="81" r="2.6" fill="#D97706"/>
  <text x="258" y="85" text-anchor="middle" font-size="12.5" font-weight="600" fill="#B45309">ISP Router</text>

  <rect x="140" y="110" width="220" height="42" rx="6" fill="#FFFBEB" stroke="#D97706" stroke-width="1.5"/>
  <circle cx="151" cy="131" r="2.6" fill="#D97706"/><circle cx="160" cy="131" r="2.6" fill="#D97706"/><circle cx="169" cy="131" r="2.6" fill="#D97706"/>
  <text x="258" y="135" text-anchor="middle" font-size="12.5" font-weight="600" fill="#B45309">ISP Switch</text>

  <!-- divider -->
  <line x1="140" y1="166" x2="360" y2="166" stroke="#CBD5E1" stroke-width="1.2" stroke-dasharray="4 3"/>
  <text x="250" y="162" text-anchor="middle" font-size="9.5" fill="#94A3B8">rack space leased to CDNs</text>

  <!-- CDN units -->
  <rect x="140" y="178" width="220" height="42" rx="6" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <circle cx="151" cy="199" r="2.6" fill="#059669"/><circle cx="160" cy="199" r="2.6" fill="#059669"/><circle cx="169" cy="199" r="2.6" fill="#059669"/>
  <text x="258" y="203" text-anchor="middle" font-size="12.5" font-weight="600" fill="#047857">CDN Cache Box — A</text>

  <rect x="140" y="228" width="220" height="42" rx="6" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <circle cx="151" cy="249" r="2.6" fill="#059669"/><circle cx="160" cy="249" r="2.6" fill="#059669"/><circle cx="169" cy="249" r="2.6" fill="#059669"/>
  <text x="258" y="253" text-anchor="middle" font-size="12.5" font-weight="600" fill="#047857">CDN Cache Box — B</text>

  <rect x="140" y="278" width="220" height="42" rx="6" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <circle cx="151" cy="299" r="2.6" fill="#059669"/><circle cx="160" cy="299" r="2.6" fill="#059669"/><circle cx="169" cy="299" r="2.6" fill="#059669"/>
  <text x="258" y="303" text-anchor="middle" font-size="12.5" font-weight="600" fill="#047857">CDN Cache Box — C</text>

  <!-- brackets -->
  <path d="M388,60 L396,60 L396,152 L388,152" fill="none" stroke="#D97706" stroke-width="1.3"/>
  <text x="402" y="110" font-size="11.5" font-weight="600" fill="#B45309">ISP gear</text>

  <path d="M388,178 L396,178 L396,320 L388,320" fill="none" stroke="#059669" stroke-width="1.3"/>
  <text x="402" y="245" font-size="11.5" font-weight="600" fill="#047857">CDN boxes</text>
  <text x="402" y="259" font-size="9.5" fill="#94A3B8">into ISP LAN</text>

  <!-- notes -->
  <text x="260" y="362" text-anchor="middle" font-size="11" fill="#64748B">Pre-filled overnight · served from here by day</text>
  <rect x="180" y="374" width="160" height="22" rx="11" fill="#ECFDF5" stroke="#059669" stroke-width="1"/>
  <text x="260" y="389" text-anchor="middle" font-size="11" font-weight="600" fill="#047857">AS boundary crossed: 0</text>
</svg>
