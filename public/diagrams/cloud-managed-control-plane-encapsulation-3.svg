<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" width="100%" height="100%">
  <defs>
    <style>
      .bg { fill: #FAFAFA; }
      .title { font-family: 'Pretendard', -apple-system, sans-serif; font-size: 18px; font-weight: 700; fill: #0A0A0A; }
      .subtitle { font-family: 'Pretendard', -apple-system, sans-serif; font-size: 14px; font-weight: 500; fill: #475569; }
      .box-cyan { fill: #ECFEFF; stroke: #0891B2; stroke-width: 2; rx: 8; }
      .box-red { fill: #FFF1F2; stroke: #E11D48; stroke-width: 2; rx: 8; }
      .box-green { fill: #ECFDF5; stroke: #059669; stroke-width: 2; rx: 8; stroke-dasharray: 6 3; }
      .box-amber { fill: #FFFBEB; stroke: #D97706; stroke-width: 2; rx: 8; }
      .txt-header { font-family: 'Pretendard', -apple-system, sans-serif; font-size: 16px; font-weight: 700; fill: #0A0A0A; text-anchor: middle; }
      .txt-body { font-family: 'Geist Mono', monospace; font-size: 14px; font-weight: 500; fill: #27272A; text-anchor: middle; }
      .txt-cyan { font-family: 'Pretendard', -apple-system, sans-serif; font-size: 14px; font-weight: 700; fill: #0891B2; text-anchor: middle; }
      .txt-red { font-family: 'Geist Mono', monospace; font-size: 14px; font-weight: 700; fill: #E11D48; text-anchor: middle; }
      .txt-green { font-family: 'Geist Mono', monospace; font-size: 14px; font-weight: 700; fill: #059669; text-anchor: middle; }
      .txt-amber { font-family: 'Pretendard', -apple-system, sans-serif; font-size: 14px; font-weight: 700; fill: #D97706; text-anchor: middle; }
      .timeline { stroke: #94A3B8; stroke-width: 2; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="480" class="bg" rx="12"/>

  <!-- Title Section -->
  <text x="40" y="42" class="title">Watch Seat Lifecycle: Initialization vs Streaming Phase</text>
  <text x="40" y="66" class="subtitle">apf_controller.go Execution Seat Acquisition (+1) and Release (-1)</text>

  <!-- Timeline Header -->
  <line x1="200" y1="90" x2="760" y2="90" class="timeline"/>
  <text x="240" y="82" class="txt-body" font-size="13">T0: Request</text>
  <text x="460" y="82" class="txt-body" font-size="13">T1: Init Done</text>
  <text x="680" y="82" class="txt-body" font-size="13">T2: Streaming</text>

  <!-- Track 1: General REST API (List/Get) -->
  <text x="110" y="150" class="txt-header">General API</text>
  <text x="110" y="172" class="txt-body" font-size="13">(List / Get)</text>

  <rect x="200" y="116" width="560" height="84" class="box-cyan"/>
  <text x="480" y="152" class="txt-header">Execution Seat Occupied Continuously</text>
  <text x="480" y="180" class="txt-cyan">Holds Seat Until HTTP Response Complete</text>

  <!-- Track 2: Watch API -->
  <text x="110" y="270" class="txt-header">Watch API</text>
  <text x="110" y="292" class="txt-body" font-size="13">(Informer)</text>

  <rect x="200" y="236" width="240" height="84" class="box-red"/>
  <text x="320" y="272" class="txt-header">1. Init Phase</text>
  <text x="320" y="300" class="txt-red">noteExecutingDelta(+1)</text>

  <rect x="456" y="236" width="304" height="84" class="box-green"/>
  <text x="608" y="272" class="txt-header">2. Streaming Phase</text>
  <text x="608" y="300" class="txt-green">noteExecutingDelta(-1)</text>

  <!-- Bottom Box: Thundering Herd Risk -->
  <rect x="40" y="356" width="720" height="96" class="box-amber"/>
  <text x="400" y="392" class="txt-header">Thundering Herd Risk (Simultaneous Re-watch)</text>
  <text x="400" y="424" class="txt-amber">Thousands of Init Phase (+1) Requests Exhaust Seats &amp; Cause 429 Storm</text>
</svg>
