<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280" role="img" aria-labelledby="t2 d2" font-family="Pretendard, ui-sans-serif, system-ui, -apple-system, sans-serif">
  <title id="t2">One spectrum, two readings — weight and peak throughput point the same way</title>
  <desc id="d2">Read left to right, the runtimes get heavier: larger binaries, higher baseline memory, slower startup. Read the same axis as peak throughput after warm-up and the direction is unchanged, which means the heaviest end wins on long-running hot paths. Weight is not a sin but a trade.</desc>
  <defs>
    <marker id="w2" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="800" height="280" fill="#FFFFFF"/>

  <text x="48" y="44" font-size="14" font-weight="700" fill="#334155">weight — binary size · baseline memory · startup</text>
  <line x1="48" y1="72" x2="752" y2="72" stroke="#475569" stroke-width="1.6" marker-end="url(#w2)"/>
  <text x="56" y="94" font-size="13" fill="#64748B">lighter</text>
  <text x="744" y="94" text-anchor="end" font-size="13" fill="#64748B">heavier</text>

  <rect x="60" y="120" width="140" height="56" rx="8" fill="#ECFDF5" stroke="#059669" stroke-width="1.6"/>
  <text x="130" y="154" text-anchor="middle" font-size="15" font-weight="700" fill="#047857">Rust</text>
  <rect x="240" y="120" width="140" height="56" rx="8" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.6"/>
  <text x="310" y="154" text-anchor="middle" font-size="15" font-weight="700" fill="#0E7490">Go</text>
  <rect x="420" y="120" width="160" height="56" rx="8" fill="#FFFBEB" stroke="#D97706" stroke-width="1.6"/>
  <text x="500" y="154" text-anchor="middle" font-size="14" font-weight="700" fill="#B45309">native-image</text>
  <rect x="620" y="120" width="140" height="56" rx="8" fill="#FFF1F2" stroke="#E11D48" stroke-width="1.6"/>
  <text x="690" y="154" text-anchor="middle" font-size="15" font-weight="700" fill="#BE123C">JVM</text>

  <line x1="48" y1="212" x2="752" y2="212" stroke="#475569" stroke-width="1.6" marker-end="url(#w2)"/>
  <text x="48" y="248" font-size="14" font-weight="700" fill="#334155">peak throughput after warm-up — same direction</text>
</svg>
