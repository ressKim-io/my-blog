<svg role="img" aria-labelledby="title-1 desc-1"
  viewBox="0 0 800 520"
  width="100%" height="auto"
  xmlns="http://www.w3.org/2000/svg"
  font-family="'Pretendard', system-ui, sans-serif">

  <title id="title-1">AOF appendfsync 모드별 유실 윈도우 타임라인</title>
  <desc id="desc-1">always·everysec·no 세 모드에서 쓰기 명령이 AOF 버퍼를 거쳐 디스크에 fsync되는 시점과, 장애 발생 시 데이터 유실 구간을 비교한 타임라인</desc>

  <!-- 배경 -->
  <rect width="800" height="520" fill="#FAFAFA" rx="4"/>

  <!-- 제목 -->
  <text x="400" y="36" text-anchor="middle" font-size="15" font-weight="700" fill="#0A0A0A">AOF appendfsync — 모드별 유실 윈도우</text>

  <!-- 시간 축 레이블 -->
  <text x="120" y="68" text-anchor="middle" font-size="11" fill="#27272A">0 ms</text>
  <text x="240" y="68" text-anchor="middle" font-size="11" fill="#27272A">500 ms</text>
  <text x="360" y="68" text-anchor="middle" font-size="11" fill="#27272A">1000 ms</text>
  <text x="480" y="68" text-anchor="middle" font-size="11" fill="#27272A">1500 ms</text>
  <text x="600" y="68" text-anchor="middle" font-size="11" fill="#27272A">2000 ms</text>
  <text x="720" y="68" text-anchor="middle" font-size="11" fill="#27272A">2500 ms</text>

  <!-- 시간 축 눈금선 (점선) -->
  <line x1="120" y1="75" x2="120" y2="480" stroke="#E4E4E7" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="240" y1="75" x2="240" y2="480" stroke="#E4E4E7" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="360" y1="75" x2="360" y2="480" stroke="#E4E4E7" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="480" y1="75" x2="480" y2="480" stroke="#E4E4E7" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="600" y1="75" x2="600" y2="480" stroke="#E4E4E7" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="720" y1="75" x2="720" y2="480" stroke="#E4E4E7" stroke-width="1" stroke-dasharray="3 3"/>

  <!-- ── always 모드 ── -->
  <text x="28" y="116" font-size="12" font-weight="700" fill="#059669">always</text>
  <text x="28" y="132" font-size="10" fill="#27272A">유실 0</text>

  <!-- always: 쓰기 명령 이벤트 (각 명령마다 즉시 fsync) -->
  <!-- 명령 바 -->
  <rect x="120" y="98" width="18" height="26" rx="3" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <rect x="200" y="98" width="18" height="26" rx="3" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <rect x="310" y="98" width="18" height="26" rx="3" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <rect x="430" y="98" width="18" height="26" rx="3" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <rect x="570" y="98" width="18" height="26" rx="3" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>

  <!-- always: fsync 마커 (즉시) -->
  <text x="129" y="143" text-anchor="middle" font-size="9" fill="#047857">fsync</text>
  <text x="209" y="143" text-anchor="middle" font-size="9" fill="#047857">fsync</text>
  <text x="319" y="143" text-anchor="middle" font-size="9" fill="#047857">fsync</text>
  <text x="439" y="143" text-anchor="middle" font-size="9" fill="#047857">fsync</text>
  <text x="579" y="143" text-anchor="middle" font-size="9" fill="#047857">fsync</text>

  <!-- always: 구분선 -->
  <line x1="80" y1="158" x2="760" y2="158" stroke="#E4E4E7" stroke-width="1"/>

  <!-- ── everysec 모드 ── -->
  <text x="28" y="186" font-size="12" font-weight="700" fill="#7C3AED">everysec</text>
  <text x="28" y="202" font-size="10" fill="#27272A">유실 ≤ 1초</text>

  <!-- everysec: 명령 바 -->
  <rect x="120" y="168" width="18" height="26" rx="3" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <rect x="200" y="168" width="18" height="26" rx="3" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <rect x="310" y="168" width="18" height="26" rx="3" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <rect x="430" y="168" width="18" height="26" rx="3" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <rect x="570" y="168" width="18" height="26" rx="3" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>

  <!-- everysec: 1초마다 fsync 마커 -->
  <line x1="360" y1="168" x2="360" y2="212" stroke="#7C3AED" stroke-width="1.5" stroke-dasharray="3 2"/>
  <text x="360" y="222" text-anchor="middle" font-size="9" fill="#6D28D9">fsync (1s)</text>
  <line x1="600" y1="168" x2="600" y2="212" stroke="#7C3AED" stroke-width="1.5" stroke-dasharray="3 2"/>
  <text x="600" y="222" text-anchor="middle" font-size="9" fill="#6D28D9">fsync (2s)</text>

  <!-- everysec: 장애 지점 -->
  <line x1="490" y1="160" x2="490" y2="245" stroke="#E11D48" stroke-width="2" stroke-dasharray="5 3"/>
  <text x="490" y="252" text-anchor="middle" font-size="10" font-weight="700" fill="#BE123C">장애</text>

  <!-- everysec: 유실 구간 강조 -->
  <rect x="361" y="170" width="128" height="20" rx="2" fill="#FFF1F2" stroke="#E11D48" stroke-width="1" opacity="0.7"/>
  <text x="425" y="184" text-anchor="middle" font-size="9" fill="#BE123C">유실 구간 (≤ 1초)</text>

  <!-- everysec: 구분선 -->
  <line x1="80" y1="264" x2="760" y2="264" stroke="#E4E4E7" stroke-width="1"/>

  <!-- ── no 모드 ── -->
  <text x="28" y="292" font-size="12" font-weight="700" fill="#D97706">no</text>
  <text x="28" y="308" font-size="10" fill="#27272A">유실 가변</text>

  <!-- no: 명령 바 -->
  <rect x="120" y="274" width="18" height="26" rx="3" fill="#FFFBEB" stroke="#D97706" stroke-width="1.5"/>
  <rect x="200" y="274" width="18" height="26" rx="3" fill="#FFFBEB" stroke="#D97706" stroke-width="1.5"/>
  <rect x="310" y="274" width="18" height="26" rx="3" fill="#FFFBEB" stroke="#D97706" stroke-width="1.5"/>
  <rect x="430" y="274" width="18" height="26" rx="3" fill="#FFFBEB" stroke="#D97706" stroke-width="1.5"/>
  <rect x="570" y="274" width="18" height="26" rx="3" fill="#FFFBEB" stroke="#D97706" stroke-width="1.5"/>
  <rect x="680" y="274" width="18" height="26" rx="3" fill="#FFFBEB" stroke="#D97706" stroke-width="1.5"/>

  <!-- no: OS 결정 fsync (임의) -->
  <line x1="720" y1="274" x2="720" y2="318" stroke="#D97706" stroke-width="1.5" stroke-dasharray="3 2"/>
  <text x="720" y="328" text-anchor="middle" font-size="9" fill="#B45309">OS fsync</text>
  <text x="720" y="340" text-anchor="middle" font-size="9" fill="#B45309">(임의)</text>

  <!-- no: 장애 지점 -->
  <line x1="490" y1="266" x2="490" y2="360" stroke="#E11D48" stroke-width="2" stroke-dasharray="5 3"/>
  <text x="490" y="367" text-anchor="middle" font-size="10" font-weight="700" fill="#BE123C">장애</text>

  <!-- no: 유실 구간 강조 (더 넓음) -->
  <rect x="121" y="275" width="368" height="20" rx="2" fill="#FFF1F2" stroke="#E11D48" stroke-width="1" opacity="0.7"/>
  <text x="305" y="289" text-anchor="middle" font-size="9" fill="#BE123C">유실 구간 (가변 — OS 버퍼 전체)</text>

  <!-- no: 구분선 -->
  <line x1="80" y1="382" x2="760" y2="382" stroke="#E4E4E7" stroke-width="1"/>

  <!-- ── 흐름 범례 ── -->
  <text x="400" y="402" text-anchor="middle" font-size="12" font-weight="700" fill="#0A0A0A">쓰기 흐름</text>
  <text x="400" y="420" text-anchor="middle" font-size="11" fill="#27272A">명령 수신 → AOF 버퍼 (in-memory) → fsync → 디스크 (AOF 파일)</text>

  <!-- 흐름 화살표 -->
  <rect x="100" y="435" width="100" height="28" rx="4" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="150" y="453" text-anchor="middle" font-size="11" fill="#047857">명령 수신</text>
  <line x1="200" y1="449" x2="224" y2="449" stroke="#0A0A0A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="224" y="435" width="110" height="28" rx="4" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="279" y="453" text-anchor="middle" font-size="11" fill="#6D28D9">AOF 버퍼</text>
  <line x1="334" y1="449" x2="358" y2="449" stroke="#0A0A0A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="358" y="435" width="80" height="28" rx="4" fill="#FFFBEB" stroke="#D97706" stroke-width="1.5"/>
  <text x="398" y="453" text-anchor="middle" font-size="11" fill="#B45309">fsync</text>
  <line x1="438" y1="449" x2="462" y2="449" stroke="#0A0A0A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="462" y="435" width="120" height="28" rx="4" fill="#F8FAFC" stroke="#475569" stroke-width="1.5"/>
  <text x="522" y="453" text-anchor="middle" font-size="11" fill="#334155">디스크 (AOF)</text>

  <!-- 장애 범례 -->
  <line x1="620" y1="449" x2="650" y2="449" stroke="#E11D48" stroke-width="2" stroke-dasharray="5 3"/>
  <text x="720" y="453" text-anchor="middle" font-size="11" fill="#BE123C">장애 발생 지점</text>

  <!-- 화살표 마커 -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#0A0A0A"/>
    </marker>
  </defs>

  <!-- 하단 노트 -->
  <text x="400" y="500" text-anchor="middle" font-size="10" fill="#475569">* 버퍼 단계까지는 세 모드 동일 — fsync 시점만 다름</text>

</svg>
