<svg
  role="img"
  aria-labelledby="title-cf-edge-1 desc-cf-edge-1"
  viewBox="0 0 800 520"
  width="100%"
  height="auto"
  xmlns="http://www.w3.org/2000/svg"
  style="font-family: 'Pretendard', system-ui, sans-serif;"
>
  <title id="title-cf-edge-1">Cloudflare Pages + Workers 엣지 라우팅 구조도</title>
  <desc id="desc-cf-edge-1">클라이언트 요청이 Cloudflare 엣지 PoP에 도달한 뒤, 정적 파일은 Pages가 서빙하고 /api/* 경로는 Workers가 백엔드로 프록시하는 분기 구조</desc>

  <style>
    .label-sm { font-size: 11px; fill: #27272A; }
    .label-md { font-size: 13px; }
    .label-lg { font-size: 14px; font-weight: 600; }
    .path-label { font-size: 11px; fill: #047857; font-weight: 600; }
    .path-label-api { font-size: 11px; fill: #0E7490; font-weight: 600; }
    .note { font-size: 11px; fill: #6D28D9; font-style: italic; }
    .section-label { font-size: 12px; fill: #475569; font-weight: 600; letter-spacing: 0.05em; }
  </style>

  <!-- 배경 영역: Cloudflare 네트워크 -->
  <rect x="200" y="40" width="440" height="400" rx="12"
        fill="#FFFBEB" stroke="#D97706" stroke-width="1.5" stroke-dasharray="6 3"/>
  <text x="420" y="30" text-anchor="middle" class="section-label" fill="#B45309">Cloudflare 네트워크 (엣지 PoP)</text>

  <!-- 클라이언트 박스 -->
  <rect x="24" y="220" width="136" height="72" rx="8"
        fill="#F8FAFC" stroke="#475569" stroke-width="1.5"/>
  <text x="92" y="251" text-anchor="middle" class="label-lg" fill="#334155">Browser</text>
  <text x="92" y="269" text-anchor="middle" class="label-sm">dev.go-ti.shop</text>
  <text x="92" y="283" text-anchor="middle" class="label-sm">으로 요청</text>

  <!-- 엣지 PoP (라우터 역할) 박스 -->
  <rect x="240" y="200" width="160" height="88" rx="8"
        fill="#FFFBEB" stroke="#D97706" stroke-width="2"/>
  <text x="320" y="228" text-anchor="middle" class="label-lg" fill="#B45309">Cloudflare Edge PoP</text>
  <text x="320" y="248" text-anchor="middle" class="label-sm">• SSL 종단 (TLS 1.3)</text>
  <text x="320" y="262" text-anchor="middle" class="label-sm">• 경로 기반 라우팅</text>
  <text x="320" y="276" text-anchor="middle" class="label-sm">• 캐시 레이어</text>

  <!-- Pages 박스 -->
  <rect x="470" y="80" width="148" height="96" rx="8"
        fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="544" y="110" text-anchor="middle" class="label-lg" fill="#047857">Cloudflare Pages</text>
  <text x="544" y="130" text-anchor="middle" class="label-sm">정적 파일 서빙</text>
  <text x="544" y="146" text-anchor="middle" class="label-sm">HTML / JS / CSS / 이미지</text>
  <text x="544" y="162" text-anchor="middle" class="label-sm">SPA fallback (정적에만)</text>

  <!-- Workers 박스 -->
  <rect x="470" y="284" width="148" height="88" rx="8"
        fill="#ECFEFF" stroke="#0891B2" stroke-width="1.5"/>
  <text x="544" y="312" text-anchor="middle" class="label-lg" fill="#0E7490">Cloudflare Workers</text>
  <text x="544" y="332" text-anchor="middle" class="label-sm">V8 isolate 런타임</text>
  <text x="544" y="348" text-anchor="middle" class="label-sm">/api/* 요청 프록시</text>
  <text x="544" y="364" text-anchor="middle" class="label-sm">엣지 로직 실행</text>

  <!-- 백엔드 박스 -->
  <rect x="680" y="284" width="104" height="88" rx="8"
        fill="#F8FAFC" stroke="#475569" stroke-width="1.5"/>
  <text x="732" y="316" text-anchor="middle" class="label-lg" fill="#334155">Backend</text>
  <text x="732" y="334" text-anchor="middle" class="label-sm">Istio Gateway</text>
  <text x="732" y="350" text-anchor="middle" class="label-sm">Kind PC</text>
  <text x="732" y="366" text-anchor="middle" class="label-sm">(dev 환경)</text>

  <!-- 화살표: Client → Edge PoP -->
  <line x1="160" y1="256" x2="238" y2="244" stroke="#0A0A0A" stroke-width="1.5" marker-end="url(#arrow-black)"/>
  <rect x="162" y="232" width="60" height="16" fill="#FAFAFA"/>
  <text x="192" y="244" text-anchor="middle" class="label-sm">HTTPS 요청</text>

  <!-- 화살표: Edge PoP → Pages (/* 경로) -->
  <line x1="400" y1="225" x2="468" y2="155" stroke="#059669" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <rect x="402" y="168" width="58" height="30" fill="#FAFAFA"/>
  <text x="431" y="181" text-anchor="middle" class="path-label">/* 경로</text>
  <text x="431" y="193" text-anchor="middle" class="path-label">(정적 파일)</text>

  <!-- 화살표: Edge PoP → Workers (/api/* 경로) -->
  <line x1="400" y1="260" x2="468" y2="316" stroke="#0891B2" stroke-width="1.5" marker-end="url(#arrow-cyan)"/>
  <rect x="400" y="276" width="58" height="30" fill="#FAFAFA"/>
  <text x="429" y="289" text-anchor="middle" class="path-label-api">/api/*</text>
  <text x="429" y="301" text-anchor="middle" class="path-label-api">(동적 요청)</text>

  <!-- 화살표: Workers → Backend -->
  <line x1="618" y1="328" x2="678" y2="328" stroke="#0891B2" stroke-width="1.5" marker-end="url(#arrow-cyan)"/>
  <rect x="622" y="315" width="48" height="16" fill="#FAFAFA"/>
  <text x="646" y="327" text-anchor="middle" class="label-sm">프록시</text>

  <!-- 화살표: Pages → Client (응답) -->
  <line x1="468" y1="148" x2="160" y2="250" stroke="#059669" stroke-width="1" stroke-dasharray="4 2" marker-end="url(#arrow-green)"/>
  <rect x="272" y="173" width="82" height="16" fill="#FAFAFA"/>
  <text x="313" y="185" text-anchor="middle" class="label-sm" fill="#047857">정적 파일 응답</text>

  <!-- 화살표: Backend → Client (응답) -->
  <line x1="680" y1="342" x2="163" y2="270" stroke="#0891B2" stroke-width="1" stroke-dasharray="4 2" marker-end="url(#arrow-cyan)"/>
  <rect x="390" y="320" width="82" height="16" fill="#FAFAFA"/>
  <text x="431" y="332" text-anchor="middle" class="label-sm" fill="#0E7490">API JSON 응답</text>

  <!-- SPA fallback 주석 박스 -->
  <rect x="440" y="188" width="220" height="36" rx="6"
        fill="#F5F3FF" stroke="#7C3AED" stroke-width="1"/>
  <text x="550" y="206" text-anchor="middle" class="note">SPA fallback은 Pages 영역에만 적용</text>
  <text x="550" y="218" text-anchor="middle" class="note">/api/* 에러 응답은 그대로 전달됨</text>

  <!-- 범례 -->
  <rect x="24" y="408" width="152" height="80" rx="6"
        fill="#F8FAFC" stroke="#D4D4D8" stroke-width="1"/>
  <text x="100" y="425" text-anchor="middle" class="label-sm" fill="#27272A" font-weight="600">범례</text>
  <line x1="36" y1="438" x2="64" y2="438" stroke="#059669" stroke-width="1.5"/>
  <text x="72" y="442" class="label-sm">정적 파일 경로</text>
  <line x1="36" y1="455" x2="64" y2="455" stroke="#0891B2" stroke-width="1.5"/>
  <text x="72" y="459" class="label-sm">API 프록시 경로</text>
  <line x1="36" y1="472" x2="64" y2="472" stroke="#0A0A0A" stroke-width="1" stroke-dasharray="4 2"/>
  <text x="72" y="476" class="label-sm">응답 흐름</text>

  <!-- 화살표 마커 정의 -->
  <defs>
    <marker id="arrow-black" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#0A0A0A"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#059669"/>
    </marker>
    <marker id="arrow-cyan" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#0891B2"/>
    </marker>
  </defs>
</svg>
