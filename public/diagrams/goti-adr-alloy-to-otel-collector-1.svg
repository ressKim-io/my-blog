<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 560" role="img" aria-labelledby="t1 d1" width="100%" height="auto" preserveAspectRatio="xMidYMid meet" style="max-width: 800px;">
  <title id="t1">기존 Alloy 기반 관측성 파이프라인 (Before)</title>
  <desc id="d1">Spring Boot OTel SDK가 OTLP로 Grafana Alloy DaemonSet에 전송. Alloy가 metrics를 Mimir로 직접 전송, logs는 Loki로 직접 전송(버퍼 없음), traces는 Kafka로 버퍼링 후 Tempo로 전송. logs만 Kafka 버퍼가 빠진 비대칭 구조</desc>

  <defs>
    <marker id="arr1" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#0A0A0A"/>
    </marker>
    <marker id="arr1r" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#BE123C"/>
    </marker>
  </defs>

  <style><![CDATA[
    .label { font-family: 'Pretendard', sans-serif; font-size: 13px; font-weight: 600; }
    .meta  { font-family: 'Geist Mono', ui-monospace, Menlo, monospace; font-size: 11px; fill: #27272A; }
    .arrlbl { font-family: 'Pretendard', sans-serif; font-size: 11px; fill: #27272A; }
    .arrow { stroke: #0A0A0A; stroke-width: 1.5; fill: none; marker-end: url(#arr1); }
    .nobuf { stroke: #BE123C; stroke-width: 1.5; fill: none; marker-end: url(#arr1r); }
  ]]></style>

  <!-- Spring Boot (backend) -->
  <rect x="280" y="32" width="240" height="64" rx="6" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="400" y="56" text-anchor="middle" class="label" fill="#047857">Spring Boot (OTel SDK)</text>
  <text x="400" y="78" text-anchor="middle" class="meta">OTLP gRPC/HTTP 송신</text>

  <line x1="400" y1="96" x2="400" y2="128" class="arrow"/>

  <!-- Grafana Alloy (cloud / amber) -->
  <rect x="120" y="128" width="560" height="120" rx="6" fill="#FFFBEB" stroke="#D97706" stroke-width="1.5"/>
  <text x="400" y="156" text-anchor="middle" class="label" fill="#B45309">Grafana Alloy (DaemonSet, v1.6.1)</text>
  <text x="200" y="190" text-anchor="middle" class="meta">Metrics</text>
  <text x="400" y="190" text-anchor="middle" class="meta">Logs</text>
  <text x="600" y="190" text-anchor="middle" class="meta">Traces</text>
  <text x="400" y="226" text-anchor="middle" class="meta">River 문법 — 커뮤니티 자료 부족, Kafka 연동 예제 부족</text>

  <!-- arrows -->
  <line x1="200" y1="248" x2="200" y2="296" class="arrow"/>
  <line x1="400" y1="248" x2="400" y2="296" class="nobuf"/>
  <text x="412" y="276" class="arrlbl" fill="#BE123C">버퍼 없음 ⚠</text>
  <line x1="600" y1="248" x2="600" y2="296" class="arrow"/>

  <!-- Mimir (database / violet) -->
  <rect x="100" y="296" width="200" height="80" rx="6" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="200" y="320" text-anchor="middle" class="label" fill="#6D28D9">Mimir (분산 7P)</text>
  <text x="200" y="342" text-anchor="middle" class="meta">메트릭 직접 저장</text>
  <text x="200" y="362" text-anchor="middle" class="meta">OTLP native</text>

  <!-- Loki (security - 위험) -->
  <rect x="300" y="296" width="200" height="80" rx="6" fill="#FFF1F2" stroke="#E11D48" stroke-width="1.5"/>
  <text x="400" y="320" text-anchor="middle" class="label" fill="#BE123C">Loki</text>
  <text x="400" y="342" text-anchor="middle" class="meta">로그 직접 저장</text>
  <text x="400" y="362" text-anchor="middle" class="meta">스파이크 시 OOM 위험</text>

  <!-- Kafka traces (database / violet) -->
  <rect x="500" y="296" width="200" height="80" rx="6" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="600" y="320" text-anchor="middle" class="label" fill="#6D28D9">Kafka (traces only)</text>
  <text x="600" y="342" text-anchor="middle" class="meta">디스크 버퍼</text>
  <text x="600" y="362" text-anchor="middle" class="meta">replication</text>

  <line x1="600" y1="376" x2="600" y2="408" class="arrow"/>

  <!-- Tempo (database / violet) -->
  <rect x="500" y="408" width="200" height="64" rx="6" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="600" y="432" text-anchor="middle" class="label" fill="#6D28D9">Tempo</text>
  <text x="600" y="452" text-anchor="middle" class="meta">트레이스 저장</text>

  <text x="400" y="516" text-anchor="middle" class="meta" fill="#BE123C">핵심 약점 — logs만 Kafka 버퍼 누락 (비대칭)</text>
</svg>
