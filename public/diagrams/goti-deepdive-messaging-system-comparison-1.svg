<svg role="img" aria-labelledby="title-1 desc-1" viewBox="0 0 800 560" width="100%" height="auto" xmlns="http://www.w3.org/2000/svg">
  <title id="title-1">메시징 시스템 비교 — Kafka · RabbitMQ · Redis Streams 저장·소비 모델</title>
  <desc id="desc-1">세 메시징 시스템의 저장 모델(로그 vs 큐 vs 스트림)과 Consumer 소비 방식(offset vs ACK vs XREADGROUP)을 나란히 비교한 구조도</desc>

  <style>
    text { font-family: 'Pretendard', system-ui, sans-serif; }
    .title-text { font-size: 15px; font-weight: 700; fill: #0A0A0A; }
    .sub-text  { font-size: 12px; fill: #27272A; }
    .note-text { font-size: 11px; fill: #475569; }
    .badge-text{ font-size: 11px; fill: #FAFAFA; font-weight: 600; }
    .label-text{ font-size: 12px; fill: #0A0A0A; font-weight: 600; }
    .arrow-label{ font-size: 11px; fill: #334155; }
  </style>

  <!-- ─── 배경 ─── -->
  <rect x="0" y="0" width="800" height="560" fill="#FAFAFA" rx="0"/>

  <!-- ─── 섹션 헤더 타이틀 ─── -->
  <text x="400" y="30" text-anchor="middle" class="title-text">메시징 시스템 저장·소비 모델 비교</text>

  <!-- ═══════════════════════════════
       Column 1 — Kafka
  ═══════════════════════════════ -->
  <!-- 헤더 배지 -->
  <rect x="40" y="48" width="220" height="28" rx="6" fill="#059669"/>
  <text x="150" y="67" text-anchor="middle" class="badge-text">Apache Kafka</text>

  <!-- 파티션 로그 -->
  <rect x="40" y="90" width="220" height="100" rx="6" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="150" y="110" text-anchor="middle" class="label-text" fill="#047857">파티션 로그 (디스크 영속)</text>
  <!-- 로그 세그먼트 표현 -->
  <rect x="56" y="120" width="36" height="22" rx="3" fill="#059669"/>
  <text x="74" y="135" text-anchor="middle" class="badge-text">0</text>
  <rect x="96" y="120" width="36" height="22" rx="3" fill="#059669"/>
  <text x="114" y="135" text-anchor="middle" class="badge-text">1</text>
  <rect x="136" y="120" width="36" height="22" rx="3" fill="#059669"/>
  <text x="154" y="135" text-anchor="middle" class="badge-text">2</text>
  <rect x="176" y="120" width="36" height="22" rx="3" fill="#059669"/>
  <text x="194" y="135" text-anchor="middle" class="badge-text">3</text>
  <text x="150" y="176" text-anchor="middle" class="note-text">offset 0 → 3, 순서 보장</text>

  <!-- 복제 팩터 표시 -->
  <rect x="40" y="204" width="220" height="34" rx="6" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1"/>
  <text x="150" y="218" text-anchor="middle" class="sub-text" fill="#6D28D9">복제 팩터 3 · ISR 유지</text>
  <text x="150" y="231" text-anchor="middle" class="note-text">리더 + 팔로워 2대에 복제</text>

  <!-- Consumer Group -->
  <rect x="40" y="252" width="220" height="60" rx="6" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="150" y="270" text-anchor="middle" class="label-text" fill="#047857">Consumer Group</text>
  <text x="150" y="286" text-anchor="middle" class="sub-text">파티션 1개 = Consumer 1개 할당</text>
  <text x="150" y="300" text-anchor="middle" class="note-text">offset 커밋으로 소비 위치 추적</text>

  <!-- offset 재처리 -->
  <rect x="40" y="326" width="220" height="44" rx="6" fill="#ECFDF5" stroke="#059669" stroke-width="1"/>
  <text x="150" y="344" text-anchor="middle" class="label-text" fill="#047857">offset 리셋 → 재처리</text>
  <text x="150" y="360" text-anchor="middle" class="note-text">--from-beginning / 특정 offset</text>

  <!-- 처리량 뱃지 -->
  <rect x="40" y="384" width="220" height="28" rx="14" fill="#059669"/>
  <text x="150" y="403" text-anchor="middle" class="badge-text">처리량 수백만 msg/s</text>

  <!-- 적합 시나리오 -->
  <rect x="40" y="426" width="220" height="64" rx="6" fill="#ECFDF5" stroke="#059669" stroke-width="1"/>
  <text x="150" y="444" text-anchor="middle" class="label-text" fill="#047857">적합 시나리오</text>
  <text x="150" y="460" text-anchor="middle" class="sub-text">이벤트 소싱 · 로그 파이프라인</text>
  <text x="150" y="476" text-anchor="middle" class="sub-text">재처리 필요 · 대용량 스트림</text>

  <!-- ═══════════════════════════════
       Column 2 — RabbitMQ
  ═══════════════════════════════ -->
  <rect x="292" y="48" width="220" height="28" rx="6" fill="#D97706"/>
  <text x="402" y="67" text-anchor="middle" class="badge-text">RabbitMQ</text>

  <!-- 큐 구조 -->
  <rect x="292" y="90" width="220" height="100" rx="6" fill="#FFFBEB" stroke="#D97706" stroke-width="1.5"/>
  <text x="402" y="110" text-anchor="middle" class="label-text" fill="#B45309">큐 (소비 후 삭제)</text>
  <!-- 메시지 박스들 -->
  <rect x="308" y="120" width="44" height="22" rx="3" fill="#D97706"/>
  <text x="330" y="135" text-anchor="middle" class="badge-text">msg</text>
  <rect x="356" y="120" width="44" height="22" rx="3" fill="#D97706"/>
  <text x="378" y="135" text-anchor="middle" class="badge-text">msg</text>
  <rect x="404" y="120" width="44" height="22" rx="3" fill="#D97706"/>
  <text x="426" y="135" text-anchor="middle" class="badge-text">msg</text>
  <!-- ACK 후 삭제 표시 -->
  <line x1="308" y1="157" x2="452" y2="157" stroke="#D97706" stroke-width="1" stroke-dasharray="4 2"/>
  <text x="402" y="173" text-anchor="middle" class="note-text">ACK 수신 즉시 큐에서 제거</text>

  <!-- 내구성 -->
  <rect x="292" y="204" width="220" height="34" rx="6" fill="#FFFBEB" stroke="#D97706" stroke-width="1"/>
  <text x="402" y="218" text-anchor="middle" class="sub-text" fill="#B45309">디스크 영속 · Mirroring</text>
  <text x="402" y="231" text-anchor="middle" class="note-text">Classic/Quorum 큐 선택</text>

  <!-- Consumer -->
  <rect x="292" y="252" width="220" height="60" rx="6" fill="#FFFBEB" stroke="#D97706" stroke-width="1.5"/>
  <text x="402" y="270" text-anchor="middle" class="label-text" fill="#B45309">Consumer</text>
  <text x="402" y="286" text-anchor="middle" class="sub-text">라운드로빈 · ACK 기반 분배</text>
  <text x="402" y="300" text-anchor="middle" class="note-text">수동 ACK / Auto ACK 선택</text>

  <!-- DLQ -->
  <rect x="292" y="326" width="220" height="44" rx="6" fill="#FFFBEB" stroke="#D97706" stroke-width="1"/>
  <text x="402" y="344" text-anchor="middle" class="label-text" fill="#B45309">Dead Letter Queue</text>
  <text x="402" y="360" text-anchor="middle" class="note-text">NACK/만료 메시지 DLQ 이동</text>

  <!-- 처리량 뱃지 -->
  <rect x="292" y="384" width="220" height="28" rx="14" fill="#D97706"/>
  <text x="402" y="403" text-anchor="middle" class="badge-text">처리량 수만 msg/s</text>

  <!-- 적합 시나리오 -->
  <rect x="292" y="426" width="220" height="64" rx="6" fill="#FFFBEB" stroke="#D97706" stroke-width="1"/>
  <text x="402" y="444" text-anchor="middle" class="label-text" fill="#B45309">적합 시나리오</text>
  <text x="402" y="460" text-anchor="middle" class="sub-text">작업 큐 · 라우팅 복잡 패턴</text>
  <text x="402" y="476" text-anchor="middle" class="sub-text">알림·이메일 발송</text>

  <!-- ═══════════════════════════════
       Column 3 — Redis Streams
  ═══════════════════════════════ -->
  <rect x="544" y="48" width="220" height="28" rx="6" fill="#7C3AED"/>
  <text x="654" y="67" text-anchor="middle" class="badge-text">Redis Streams</text>

  <!-- 스트림 구조 -->
  <rect x="544" y="90" width="220" height="100" rx="6" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="654" y="110" text-anchor="middle" class="label-text" fill="#6D28D9">스트림 (메모리 우선)</text>
  <!-- 엔트리 표현 -->
  <rect x="556" y="120" width="56" height="22" rx="3" fill="#7C3AED"/>
  <text x="584" y="135" text-anchor="middle" class="badge-text">1-0</text>
  <rect x="616" y="120" width="56" height="22" rx="3" fill="#7C3AED"/>
  <text x="644" y="135" text-anchor="middle" class="badge-text">2-0</text>
  <rect x="676" y="120" width="56" height="22" rx="3" fill="#7C3AED"/>
  <text x="704" y="135" text-anchor="middle" class="badge-text">3-0</text>
  <text x="654" y="173" text-anchor="middle" class="note-text">ID = timestamp-sequence</text>

  <!-- 내구성 -->
  <rect x="544" y="204" width="220" height="34" rx="6" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1"/>
  <text x="654" y="218" text-anchor="middle" class="sub-text" fill="#6D28D9">AOF / RDB (메모리 기반)</text>
  <text x="654" y="231" text-anchor="middle" class="note-text">Kafka 대비 제한적 내구성</text>

  <!-- Consumer Group -->
  <rect x="544" y="252" width="220" height="60" rx="6" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="654" y="270" text-anchor="middle" class="label-text" fill="#6D28D9">Consumer Group</text>
  <text x="654" y="286" text-anchor="middle" class="sub-text">XREADGROUP 명령으로 소비</text>
  <text x="654" y="300" text-anchor="middle" class="note-text">XACK로 처리 완료 신호</text>

  <!-- 재처리 제한 -->
  <rect x="544" y="326" width="220" height="44" rx="6" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1"/>
  <text x="654" y="344" text-anchor="middle" class="label-text" fill="#6D28D9">재처리 — ID 지정</text>
  <text x="654" y="360" text-anchor="middle" class="note-text">PEL 기반, 제한적 replay</text>

  <!-- 처리량 뱃지 -->
  <rect x="544" y="384" width="220" height="28" rx="14" fill="#7C3AED"/>
  <text x="654" y="403" text-anchor="middle" class="badge-text">처리량 수십만 msg/s</text>

  <!-- 적합 시나리오 -->
  <rect x="544" y="426" width="220" height="64" rx="6" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1"/>
  <text x="654" y="444" text-anchor="middle" class="label-text" fill="#6D28D9">적합 시나리오</text>
  <text x="654" y="460" text-anchor="middle" class="sub-text">대기열 · 실시간 카운터</text>
  <text x="654" y="476" text-anchor="middle" class="sub-text">분산 락 · 짧은 TTL 데이터</text>

  <!-- ─── 구분선 ─── -->
  <line x1="278" y1="48" x2="278" y2="500" stroke="#E4E4E7" stroke-width="1"/>
  <line x1="530" y1="48" x2="530" y2="500" stroke="#E4E4E7" stroke-width="1"/>

  <!-- ─── 행 라벨 (좌측) ─── -->
  <!-- 각 행에 범례 라벨 -->
  <text x="400" y="520" text-anchor="middle" class="note-text">* 처리량은 하드웨어·설정에 따라 다를 수 있으며, 공개 벤치마크 기준 대략적 수치입니다</text>
</svg>
