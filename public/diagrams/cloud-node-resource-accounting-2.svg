<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 420" width="100%" height="100%">
  <defs>
    <style>
      .bg { fill: #FAFAFA; }
      .title { font-family: 'Pretendard', system-ui, sans-serif; font-size: 18px; font-weight: 700; fill: #0A0A0A; }
      .subtitle { font-family: 'Pretendard', system-ui, sans-serif; font-size: 14px; font-weight: 500; fill: #475569; }
      .box-eks { fill: #FFFBEB; stroke: #D97706; stroke-width: 2; rx: 8; }
      .box-gke { fill: #ECFEFF; stroke: #0891B2; stroke-width: 2; rx: 8; }
      .inner { fill: #FFFFFF; stroke: #D4D4D8; stroke-width: 1.5; rx: 6; }
      .h-eks { font-family: 'Pretendard', system-ui, sans-serif; font-size: 15px; font-weight: 700; fill: #B45309; text-anchor: middle; }
      .h-gke { font-family: 'Pretendard', system-ui, sans-serif; font-size: 15px; font-weight: 700; fill: #0E7490; text-anchor: middle; }
      .mono { font-family: 'Geist Mono', ui-monospace, monospace; font-size: 13px; font-weight: 500; fill: #334155; text-anchor: middle; }
      .body { font-family: 'Pretendard', system-ui, sans-serif; font-size: 14px; font-weight: 500; fill: #334155; text-anchor: middle; }
      .big-eks { font-family: 'Pretendard', system-ui, sans-serif; font-size: 17px; font-weight: 700; fill: #B45309; text-anchor: middle; }
      .big-gke { font-family: 'Pretendard', system-ui, sans-serif; font-size: 17px; font-weight: 700; fill: #0E7490; text-anchor: middle; }
      .note { font-family: 'Pretendard', system-ui, sans-serif; font-size: 14px; font-weight: 600; fill: #334155; text-anchor: middle; }
    </style>
  </defs>

  <rect width="820" height="420" class="bg" rx="12"/>

  <text x="40" y="40" class="title">Memory Reservation: Head Count vs Property Value</text>
  <text x="40" y="64" class="subtitle">Same 64 GiB node — EKS taxes maxPods, GKE taxes total RAM</text>

  <!-- EKS -->
  <rect x="40" y="96" width="360" height="240" class="box-eks"/>
  <text x="220" y="126" class="h-eks">EKS — nodeadm (AL2023)</text>

  <rect x="66" y="146" width="308" height="46" class="inner"/>
  <text x="220" y="175" class="mono">11 MiB x maxPods + 255 MiB</text>

  <rect x="66" y="206" width="308" height="46" class="inner"/>
  <text x="220" y="235" class="mono">m5.4xlarge: 11 x 234 + 255</text>

  <text x="220" y="290" class="big-eks">2,829 MiB reserved</text>
  <text x="220" y="316" class="body">RAM size is absent from the formula</text>

  <!-- GKE -->
  <rect x="430" y="96" width="350" height="240" class="box-gke"/>
  <text x="605" y="126" class="h-gke">GKE — stepped tiers</text>

  <rect x="456" y="146" width="298" height="46" class="inner"/>
  <text x="605" y="175" class="mono">25% / 20% / 10% / 6% / 2%</text>

  <rect x="456" y="206" width="298" height="46" class="inner"/>
  <text x="605" y="235" class="mono">1024 + 819 + 819 + 2949</text>

  <text x="605" y="290" class="big-gke">5,611.5 MiB reserved</text>
  <text x="605" y="316" class="body">maxPods is absent from the formula</text>

  <text x="410" y="374" class="note">GKE reserves 1.98x more — 2.72 GiB less allocatable for pods</text>
</svg>
