<svg role="img" aria-labelledby="title-1 desc-1" viewBox="0 0 800 540" width="100%" xmlns="http://www.w3.org/2000/svg">
  <title id="title-1">Dual-write 실패 vs Outbox 경유 흐름 비교</title>
  <desc id="desc-1">두 저장소에 쓰기가 원자적이지 않은 dual-write 실패 시나리오와, outbox 테이블을 경유해 at-least-once 전달을 보장하는 Outbox 패턴 흐름을 나란히 비교합니다</desc>
  <style>
    text { font-family: 'Pretendard', system-ui, sans-serif; }
    .title-label { font-size: 13px; font-weight: 700; fill: #0A0A0A; }
    .box-label { font-size: 13px; fill: #0A0A0A; }
    .sub-label { font-size: 11px; fill: #27272A; }
    .arrow-label { font-size: 11px; fill: #27272A; }
    .section-title { font-size: 14px; font-weight: 700; }
    .warn-label { font-size: 11px; fill: #BE123C; }
  </style>

  <!-- 배경 구분선 -->
  <rect x="0" y="0" width="800" height="540" fill="#FAFAFA" rx="0"/>
  <rect x="0" y="0" width="392" height="540" fill="#FFF1F2" rx="0" opacity="0.35"/>
  <rect x="408" y="0" width="392" height="540" fill="#ECFDF5" rx="0" opacity="0.35"/>
  <line x1="400" y1="0" x2="400" y2="540" stroke="#D4D4D8" stroke-width="1" stroke-dasharray="6 3"/>

  <!-- 섹션 제목 -->
  <text x="196" y="32" text-anchor="middle" class="section-title" fill="#BE123C">❌ Dual-write — 원자성 없음</text>
  <text x="604" y="32" text-anchor="middle" class="section-title" fill="#059669">✅ Outbox 패턴 — 트랜잭션 경계 보장</text>

  <!-- ===== 왼쪽: Dual-write 실패 시나리오 ===== -->

  <!-- Application -->
  <rect x="72" y="56" width="128" height="48" rx="6" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="136" y="77" text-anchor="middle" class="box-label" font-weight="600">Application</text>
  <text x="136" y="93" text-anchor="middle" class="sub-label">서비스 레이어</text>

  <!-- 화살표: App → DB1 -->
  <line x1="136" y1="104" x2="80" y2="172" stroke="#0A0A0A" stroke-width="1.5" marker-end="url(#arrow-black)"/>
  <text x="80" y="158" class="arrow-label" fill="#27272A">① RDS 쓰기</text>

  <!-- DB1: RDS -->
  <rect x="24" y="176" width="112" height="48" rx="6" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="80" y="197" text-anchor="middle" class="box-label" font-weight="600">RDS</text>
  <text x="80" y="213" text-anchor="middle" class="sub-label">영속 저장소</text>

  <!-- 크래시 표시 -->
  <rect x="148" y="148" width="96" height="40" rx="6" fill="#FFF1F2" stroke="#E11D48" stroke-width="1.5" stroke-dasharray="4 2"/>
  <text x="196" y="165" text-anchor="middle" class="warn-label" font-weight="700">💥 크래시 / 오류</text>
  <text x="196" y="182" text-anchor="middle" class="warn-label">② 여기서 실패</text>

  <!-- 화살표: App → Redis (실패 표시) -->
  <line x1="176" y1="124" x2="240" y2="172" stroke="#E11D48" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arrow-rose)"/>

  <!-- Redis (미반영) -->
  <rect x="208" y="176" width="112" height="48" rx="6" fill="#F8FAFC" stroke="#475569" stroke-width="1.5" stroke-dasharray="4 2"/>
  <text x="264" y="197" text-anchor="middle" class="box-label" fill="#64748B" font-weight="600">Redis</text>
  <text x="264" y="213" text-anchor="middle" class="sub-label" fill="#94A3B8">미반영 (불일치)</text>

  <!-- 결과 설명 -->
  <rect x="40" y="256" width="264" height="80" rx="6" fill="#FFF1F2" stroke="#E11D48" stroke-width="1"/>
  <text x="172" y="276" text-anchor="middle" class="warn-label" font-weight="700">불일치 상태 발생</text>
  <text x="172" y="295" text-anchor="middle" class="sub-label" fill="#BE123C">RDS에는 쓰였으나 Redis에는 없음</text>
  <text x="172" y="313" text-anchor="middle" class="sub-label" fill="#BE123C">두 저장소 사이 정합성 보장 불가</text>
  <text x="172" y="329" text-anchor="middle" class="sub-label" fill="#BE123C">재시도해도 중복 쓰기 위험</text>

  <!-- ===== 오른쪽: Outbox 패턴 ===== -->

  <!-- Application -->
  <rect x="472" y="56" width="128" height="48" rx="6" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="536" y="77" text-anchor="middle" class="box-label" font-weight="600">Application</text>
  <text x="536" y="93" text-anchor="middle" class="sub-label">서비스 레이어</text>

  <!-- DB 트랜잭션 경계 박스 -->
  <rect x="416" y="130" width="248" height="112" rx="8" fill="none" stroke="#7C3AED" stroke-width="1.5" stroke-dasharray="6 3"/>
  <text x="540" y="150" text-anchor="middle" font-size="11px" fill="#7C3AED" font-weight="700">단일 DB 트랜잭션 (원자적)</text>

  <!-- 화살표: App → 트랜잭션 -->
  <line x1="536" y1="104" x2="536" y2="130" stroke="#0A0A0A" stroke-width="1.5" marker-end="url(#arrow-black)"/>

  <!-- RDS rows -->
  <rect x="432" y="160" width="100" height="40" rx="5" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="482" y="178" text-anchor="middle" class="box-label" font-size="12px" font-weight="600">RDS</text>
  <text x="482" y="193" text-anchor="middle" class="sub-label">비즈니스 데이터</text>

  <!-- Outbox table -->
  <rect x="548" y="160" width="100" height="40" rx="5" fill="#FFFBEB" stroke="#D97706" stroke-width="1.5"/>
  <text x="598" y="178" text-anchor="middle" class="box-label" font-size="12px" font-weight="600">Outbox 테이블</text>
  <text x="598" y="193" text-anchor="middle" class="sub-label">이벤트 기록</text>

  <!-- 화살표: Outbox → Poller -->
  <line x1="598" y1="242" x2="598" y2="296" stroke="#0A0A0A" stroke-width="1.5" marker-end="url(#arrow-black)"/>
  <text x="612" y="274" class="arrow-label">폴링</text>

  <!-- Poller / Worker -->
  <rect x="548" y="296" width="100" height="40" rx="5" fill="#FFFBEB" stroke="#D97706" stroke-width="1.5"/>
  <text x="598" y="314" text-anchor="middle" class="box-label" font-size="12px" font-weight="600">Poller / Worker</text>
  <text x="598" y="329" text-anchor="middle" class="sub-label">이벤트 소비</text>

  <!-- 화살표: Poller → Redis/RDS -->
  <line x1="548" y1="316" x2="456" y2="360" stroke="#0A0A0A" stroke-width="1.5" marker-end="url(#arrow-black)"/>
  <text x="472" y="348" class="arrow-label">동기화</text>

  <!-- 대상 저장소 -->
  <rect x="416" y="360" width="100" height="40" rx="5" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="466" y="378" text-anchor="middle" class="box-label" font-size="12px" font-weight="600">Redis</text>
  <text x="466" y="393" text-anchor="middle" class="sub-label">또는 RDS</text>

  <!-- at-least-once 라벨 -->
  <rect x="416" y="424" width="248" height="64" rx="6" fill="#ECFDF5" stroke="#059669" stroke-width="1"/>
  <text x="540" y="444" text-anchor="middle" font-size="12px" font-weight="700" fill="#047857">at-least-once 전달 보장</text>
  <text x="540" y="463" text-anchor="middle" class="sub-label" fill="#059669">Outbox 미처리 행 재시도 가능</text>
  <text x="540" y="481" text-anchor="middle" class="sub-label" fill="#059669">멱등 처리로 중복 안전</text>

  <!-- 화살표 마커 정의 -->
  <defs>
    <marker id="arrow-black" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#0A0A0A"/>
    </marker>
    <marker id="arrow-rose" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#E11D48"/>
    </marker>
  </defs>
</svg>
