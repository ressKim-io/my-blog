<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" role="img" aria-labelledby="t8 d8" font-family="Pretendard, ui-sans-serif, system-ui, -apple-system, sans-serif">
  <title id="t8">Profile feedback timing — AOT applies it once at build, JIT applies it continuously</title>
  <desc id="d8">Ahead-of-time compilation with profile guided optimization reads the profile once at build time, after which the machine code is frozen and cannot follow shifting traffic. A just-in-time compiler collects a profile for as long as the process lives and rewrites machine code again and again, so it adapts instead of holding a snapshot.</desc>
  <defs>
    <marker id="a8" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#475569"/>
    </marker>
    <marker id="a8g" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#059669"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="800" height="340" fill="#FFFFFF"/>

  <line x1="288" y1="88" x2="328" y2="88" stroke="#475569" stroke-width="1.6" marker-end="url(#a8)"/>
  <line x1="512" y1="88" x2="552" y2="88" stroke="#475569" stroke-width="1.6" marker-end="url(#a8)"/>
  <line x1="272" y1="248" x2="312" y2="248" stroke="#059669" stroke-width="1.6" marker-end="url(#a8g)"/>
  <line x1="464" y1="248" x2="504" y2="248" stroke="#059669" stroke-width="1.6" marker-end="url(#a8g)"/>
  <path d="M576,224 L576,196 L392,196 L392,222" fill="none" stroke="#059669" stroke-width="1.5" stroke-dasharray="6 4" marker-end="url(#a8g)"/>

  <text x="60" y="94" text-anchor="middle" font-size="15" font-weight="700" fill="#334155">AOT</text>
  <text x="60" y="254" text-anchor="middle" font-size="15" font-weight="700" fill="#334155">JIT</text>

  <rect x="112" y="56" width="176" height="64" rx="8" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.6"/>
  <text x="200" y="95" text-anchor="middle" font-size="15" font-weight="700" fill="#0E7490">build + PGO</text>

  <rect x="328" y="56" width="184" height="64" rx="8" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.6"/>
  <text x="420" y="95" text-anchor="middle" font-size="15" font-weight="700" fill="#6D28D9">machine code</text>

  <rect x="552" y="56" width="216" height="64" rx="8" fill="#FFF1F2" stroke="#E11D48" stroke-width="1.6"/>
  <text x="660" y="95" text-anchor="middle" font-size="15" font-weight="700" fill="#BE123C">frozen</text>

  <text x="420" y="146" text-anchor="middle" font-size="13" font-weight="700" fill="#64748B">profile applied once</text>

  <rect x="112" y="216" width="160" height="64" rx="8" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.6"/>
  <text x="192" y="255" text-anchor="middle" font-size="15" font-weight="700" fill="#0E7490">run</text>

  <rect x="312" y="216" width="152" height="64" rx="8" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.6"/>
  <text x="388" y="255" text-anchor="middle" font-size="15" font-weight="700" fill="#6D28D9">profile</text>

  <rect x="504" y="216" width="152" height="64" rx="8" fill="#ECFDF5" stroke="#059669" stroke-width="1.6"/>
  <text x="580" y="255" text-anchor="middle" font-size="15" font-weight="700" fill="#047857">recompile</text>

  <text x="384" y="316" text-anchor="middle" font-size="13" font-weight="700" fill="#64748B">profile fed back for the whole run</text>
</svg>
