<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-labelledby="t7 d7" font-family="Pretendard, ui-sans-serif, system-ui, -apple-system, sans-serif">
  <title id="t7">When profile feedback is applied — once at build, or continuously at run time</title>
  <desc id="d7">Both AOT and JIT consume execution profiles, so profile-guided optimization is not exclusive to JIT. The difference is timing. An AOT build applies the profile once, at build time, after which the machine code is frozen no matter how traffic shifts. A JIT collects a profile throughout execution and rewrites machine code repeatedly, adapting to what the program actually does.</desc>
  <defs>
    <marker id="m7" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#475569"/>
    </marker>
    <marker id="m7v" markerWidth="9" markerHeight="9" refX="6" refY="2.6" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L6,2.6 L0,5.2 Z" fill="#6D28D9"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="800" height="400" fill="#FFFFFF"/>

  <text x="400" y="26" text-anchor="middle" font-size="12" fill="#64748B">PGO is not a JIT privilege — the difference is when the profile lands</text>

  <text x="60" y="66" font-size="12" font-weight="700" fill="#0E7490">AOT (Rust · Go · native-image)</text>

  <rect x="60" y="82" width="132" height="46" rx="7" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.5"/>
  <text x="126" y="103" text-anchor="middle" font-size="10.5" font-weight="700" fill="#0E7490">build + PGO</text>
  <text x="126" y="119" text-anchor="middle" font-size="10" fill="#0E7490">profile applied once</text>

  <line x1="192" y1="105" x2="240" y2="105" stroke="#475569" stroke-width="1.5" marker-end="url(#m7)"/>

  <rect x="244" y="82" width="496" height="46" rx="7" fill="#F8FAFC" stroke="#475569" stroke-width="1.4"/>
  <text x="492" y="103" text-anchor="middle" font-size="11" font-weight="700" fill="#334155">machine code frozen — .text never changes again</text>
  <text x="492" y="119" text-anchor="middle" font-size="10" fill="#64748B">traffic shifts, hot branches move, the code does not</text>

  <text x="60" y="164" font-size="10.5" fill="#0E7490">a snapshot taken once, at build time</text>
  <text x="740" y="164" text-anchor="end" font-size="10.5" font-weight="700" fill="#0E7490">p99 stays glued to p50</text>

  <line x1="60" y1="186" x2="740" y2="186" stroke="#E4E4E7" stroke-width="1.2"/>

  <text x="60" y="216" font-size="12" font-weight="700" fill="#6D28D9">JIT (JVM)</text>

  <rect x="60" y="232" width="132" height="46" rx="7" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="126" y="253" text-anchor="middle" font-size="10.5" font-weight="700" fill="#6D28D9">interpret</text>
  <text x="126" y="269" text-anchor="middle" font-size="10" fill="#6D28D9">start collecting profile</text>

  <line x1="192" y1="255" x2="240" y2="255" stroke="#475569" stroke-width="1.5" marker-end="url(#m7)"/>

  <rect x="244" y="232" width="496" height="46" rx="7" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="492" y="253" text-anchor="middle" font-size="11" font-weight="700" fill="#6D28D9">machine code rewritten again and again</text>
  <text x="492" y="269" text-anchor="middle" font-size="10" fill="#6D28D9">it learns which branch is hot and which call site is really one type</text>

  <line x1="300" y1="290" x2="300" y2="278" stroke="#7C3AED" stroke-width="1.3" marker-end="url(#m7v)"/>
  <line x1="380" y1="290" x2="380" y2="278" stroke="#7C3AED" stroke-width="1.3" marker-end="url(#m7v)"/>
  <line x1="460" y1="290" x2="460" y2="278" stroke="#7C3AED" stroke-width="1.3" marker-end="url(#m7v)"/>
  <line x1="540" y1="290" x2="540" y2="278" stroke="#7C3AED" stroke-width="1.3" marker-end="url(#m7v)"/>
  <line x1="620" y1="290" x2="620" y2="278" stroke="#7C3AED" stroke-width="1.3" marker-end="url(#m7v)"/>
  <line x1="700" y1="290" x2="700" y2="278" stroke="#7C3AED" stroke-width="1.3" marker-end="url(#m7v)"/>
  <text x="492" y="308" text-anchor="middle" font-size="10" fill="#6D28D9">profile fed back continuously, for as long as the process lives</text>

  <text x="60" y="336" font-size="10.5" fill="#6D28D9">adaptation, not a snapshot</text>
  <text x="740" y="336" text-anchor="end" font-size="10.5" font-weight="700" fill="#6D28D9">warm-up + deopt spikes in the tail</text>

  <rect x="60" y="352" width="680" height="34" rx="7" fill="#FFFBEB" stroke="#D97706" stroke-width="1.2"/>
  <text x="400" y="374" text-anchor="middle" font-size="11" font-weight="700" fill="#B45309">AOT's weakness is that it cannot re-optimize itself — not that it cannot see a profile</text>
</svg>
