<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" role="img" aria-labelledby="c1 d1" font-family="Pretendard, ui-sans-serif, system-ui, -apple-system, sans-serif">
  <title id="c1">Nobody designed this shape; the hardware dictated it</title>
  <desc id="d1">Three facts about the machine force three properties on any allocator. A trip into the kernel is expensive, so the allocator must take memory in bulk and hand it out in layers that amortise the cost. A lock on a shared structure is a bottleneck on many cores, so the layer nearest the program must be private to a thread and free of locks. Caches and translation buffers reward locality, so objects of the same size are grouped and the most recently freed one is handed back first.</desc>
  <defs>
    <marker id="cv1" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#334155"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="800" height="380" fill="#FFFFFF"/>

  <text x="188" y="48" text-anchor="middle" font-size="14" font-weight="700" fill="#334155">physics</text>
  <text x="612" y="48" text-anchor="middle" font-size="14" font-weight="700" fill="#334155">forced shape</text>

  <line x1="336" y1="112" x2="464" y2="112" stroke="#334155" stroke-width="1.8" marker-end="url(#cv1)"/>
  <line x1="336" y1="200" x2="464" y2="200" stroke="#334155" stroke-width="1.8" marker-end="url(#cv1)"/>
  <line x1="336" y1="288" x2="464" y2="288" stroke="#334155" stroke-width="1.8" marker-end="url(#cv1)"/>

  <rect x="48" y="80" width="288" height="64" rx="9" fill="#FFFBEB" stroke="#D97706" stroke-width="1.8"/>
  <text x="192" y="119" text-anchor="middle" font-size="14" font-weight="700" fill="#B45309">kernel trip is costly</text>
  <rect x="472" y="80" width="280" height="64" rx="9" fill="#F5F3FF" stroke="#7C3AED" stroke-width="2"/>
  <text x="612" y="119" text-anchor="middle" font-size="14" font-weight="700" fill="#6D28D9">layered · amortised</text>

  <rect x="48" y="168" width="288" height="64" rx="9" fill="#FFF1F2" stroke="#E11D48" stroke-width="1.8"/>
  <text x="192" y="207" text-anchor="middle" font-size="14" font-weight="700" fill="#BE123C">shared lock is a bottleneck</text>
  <rect x="472" y="168" width="280" height="64" rx="9" fill="#ECFDF5" stroke="#059669" stroke-width="2"/>
  <text x="612" y="207" text-anchor="middle" font-size="14" font-weight="700" fill="#047857">local · lock-free</text>

  <rect x="48" y="256" width="288" height="64" rx="9" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.8"/>
  <text x="192" y="295" text-anchor="middle" font-size="14" font-weight="700" fill="#0E7490">cache · TLB want locality</text>
  <rect x="472" y="256" width="280" height="64" rx="9" fill="#F5F3FF" stroke="#7C3AED" stroke-width="2"/>
  <text x="612" y="295" text-anchor="middle" font-size="14" font-weight="700" fill="#6D28D9">size classes · LIFO</text>
</svg>
