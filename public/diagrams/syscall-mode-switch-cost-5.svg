<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-labelledby="t5 d5" font-family="Pretendard, ui-sans-serif, system-ui, -apple-system, sans-serif">
  <title id="t5">KPTI before and after — the kernel is removed from the user page table</title>
  <desc id="d5">Before KPTI a process had a single page table holding both user and kernel mappings, with the kernel hidden only by permission bits, which Meltdown bypassed through speculative execution. With KPTI the page table is split in two: the user table keeps only a tiny trampoline stub, and the kernel table holds everything. Isolation becomes physical, at the price of swapping CR3 on every crossing.</desc>
  <defs>
    <marker id="s5" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#E11D48"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="800" height="400" fill="#FFFFFF"/>

  <line x1="400" y1="24" x2="400" y2="376" stroke="#E4E4E7" stroke-width="1.2"/>

  <text x="200" y="46" text-anchor="middle" font-size="15" font-weight="700" fill="#BE123C">KPTI OFF</text>
  <text x="600" y="46" text-anchor="middle" font-size="15" font-weight="700" fill="#047857">KPTI ON</text>

  <rect x="48" y="76" width="304" height="180" rx="9" fill="#F8FAFC" stroke="#475569" stroke-width="1.6"/>
  <text x="200" y="104" text-anchor="middle" font-size="14" font-weight="700" fill="#334155">one page table</text>
  <rect x="68" y="120" width="264" height="52" rx="5" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.3"/>
  <text x="200" y="152" text-anchor="middle" font-size="14" fill="#0E7490">user mappings</text>
  <rect x="68" y="184" width="264" height="52" rx="5" fill="#FFF1F2" stroke="#E11D48" stroke-width="1.3"/>
  <text x="200" y="216" text-anchor="middle" font-size="14" fill="#BE123C">kernel mappings</text>

  <rect x="48" y="288" width="304" height="72" rx="9" fill="#FFF1F2" stroke="#E11D48" stroke-width="1.4" stroke-dasharray="5 3"/>
  <text x="200" y="316" text-anchor="middle" font-size="13" font-weight="700" fill="#BE123C">kernel is in the map</text>
  <text x="200" y="340" text-anchor="middle" font-size="13" fill="#BE123C">Meltdown could peek</text>

  <rect x="440" y="76" width="150" height="180" rx="9" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.6"/>
  <text x="515" y="104" text-anchor="middle" font-size="14" font-weight="700" fill="#0E7490">user table</text>
  <rect x="456" y="120" width="118" height="52" rx="5" fill="#FFFFFF" stroke="#0891B2" stroke-width="1.3"/>
  <text x="515" y="152" text-anchor="middle" font-size="13" fill="#0E7490">user only</text>
  <rect x="456" y="184" width="118" height="52" rx="5" fill="#FFFBEB" stroke="#D97706" stroke-width="1.3"/>
  <text x="515" y="216" text-anchor="middle" font-size="13" fill="#B45309">trampoline</text>

  <rect x="618" y="76" width="150" height="180" rx="9" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.6"/>
  <text x="693" y="104" text-anchor="middle" font-size="14" font-weight="700" fill="#6D28D9">kernel table</text>
  <rect x="634" y="120" width="118" height="116" rx="5" fill="#FFFFFF" stroke="#7C3AED" stroke-width="1.3"/>
  <text x="693" y="184" text-anchor="middle" font-size="13" fill="#6D28D9">user + kernel</text>

  <line x1="592" y1="166" x2="616" y2="166" stroke="#E11D48" stroke-width="1.8" marker-end="url(#s5)"/>
  <line x1="616" y1="190" x2="592" y2="190" stroke="#E11D48" stroke-width="1.8" marker-end="url(#s5)"/>
  <text x="604" y="272" text-anchor="middle" font-size="13" font-weight="700" fill="#BE123C" font-family="ui-monospace, monospace">CR3</text>

  <rect x="440" y="288" width="328" height="72" rx="9" fill="#FFF1F2" stroke="#E11D48" stroke-width="1.4" stroke-dasharray="5 3"/>
  <text x="604" y="316" text-anchor="middle" font-size="13" font-weight="700" fill="#BE123C">swapped every crossing</text>
  <text x="604" y="340" text-anchor="middle" font-size="13" fill="#BE123C">TLB pressure</text>
</svg>
