<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 740 440" font-family="Pretendard, ui-sans-serif, system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="ar" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="740" height="440" fill="#FFFFFF"/>

  <text x="370" y="28" text-anchor="middle" font-size="12" fill="#64748B">Under memory pressure the kernel escalates — each step costs more, the last one kills</text>

  <!-- 1. pressure -->
  <rect x="210" y="48" width="320" height="58" rx="9" fill="#F8FAFC" stroke="#475569" stroke-width="1.6"/>
  <text x="370" y="74" text-anchor="middle" font-size="13.5" font-weight="700" fill="#334155">memory pressure rises</text>
  <text x="370" y="93" text-anchor="middle" font-size="11" fill="#64748B">free pages drop below the watermark</text>

  <line x1="370" y1="106" x2="370" y2="134" stroke="#475569" stroke-width="1.6" marker-end="url(#ar)"/>

  <!-- 2. kswapd -->
  <rect x="190" y="136" width="360" height="62" rx="9" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.6"/>
  <text x="370" y="162" text-anchor="middle" font-size="13.5" font-weight="700" fill="#0E7490">kswapd — background reclaim</text>
  <text x="370" y="182" text-anchor="middle" font-size="11" fill="#475569">async, the app keeps running — cheap</text>

  <line x1="370" y1="198" x2="370" y2="226" stroke="#475569" stroke-width="1.6" marker-end="url(#ar)"/>

  <!-- 3. direct reclaim -->
  <rect x="170" y="228" width="400" height="68" rx="9" fill="#FFFBEB" stroke="#D97706" stroke-width="1.7"/>
  <text x="370" y="254" text-anchor="middle" font-size="13.5" font-weight="700" fill="#B45309">direct reclaim</text>
  <text x="370" y="274" text-anchor="middle" font-size="11.5" fill="#92400E">the allocating thread reclaims inline → stalls</text>
  <text x="370" y="290" text-anchor="middle" font-size="11" font-weight="700" fill="#B45309">← hidden source of p99 latency spikes</text>

  <line x1="370" y1="296" x2="370" y2="324" stroke="#475569" stroke-width="1.6" marker-end="url(#ar)"/>

  <!-- 4. OOM killer -->
  <rect x="190" y="326" width="360" height="68" rx="9" fill="#FFF1F2" stroke="#E11D48" stroke-width="1.8"/>
  <text x="370" y="352" text-anchor="middle" font-size="13.5" font-weight="700" fill="#BE123C">OOM killer</text>
  <text x="370" y="372" text-anchor="middle" font-size="11.5" fill="#BE123C">picks a victim by oom_score → SIGKILL</text>
  <text x="370" y="388" text-anchor="middle" font-size="11" fill="#9F1239">in a container: cgroup limit exceeded → killed inside that cgroup</text>

  <!-- severity rail -->
  <text x="600" y="80" font-size="10.5" fill="#94A3B8">cost</text>
  <line x1="612" y1="92" x2="612" y2="360" stroke="#CBD5E1" stroke-width="1.4"/>
  <path d="M612,360 L608,350 L616,350 Z" fill="#CBD5E1"/>
  <text x="624" y="120" font-size="10.5" fill="#0891B2">low</text>
  <text x="624" y="262" font-size="10.5" fill="#D97706">high</text>
  <text x="624" y="356" font-size="10.5" fill="#BE123C">fatal</text>
</svg>
