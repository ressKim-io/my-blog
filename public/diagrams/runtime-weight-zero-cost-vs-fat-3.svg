<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" role="img" aria-labelledby="t3 d3" font-family="Pretendard, ui-sans-serif, system-ui, -apple-system, sans-serif">
  <title id="t3">Three answers to the same layer — Rust, Go and the JVM</title>
  <desc id="d3">In Rust the application code is already native machine code and only a thin startup shim sits between it and the kernel, shipped as one static binary. In Go the application code and the runtime — GMP scheduler, concurrent GC, allocator, netpoller — are statically linked into a single binary. On the JVM the application ships as bytecode and needs a separate virtual machine process, holding a class loader and interpreter, the C1 and C2 JIT compilers, and a garbage collector.</desc>
  <rect x="0" y="0" width="800" height="440" fill="#FFFFFF"/>

  <text x="140" y="44" text-anchor="middle" font-size="15" font-weight="700" fill="#047857">Rust</text>
  <text x="400" y="44" text-anchor="middle" font-size="15" font-weight="700" fill="#0E7490">Go</text>
  <text x="660" y="44" text-anchor="middle" font-size="15" font-weight="700" fill="#BE123C">JVM</text>

  <rect x="32" y="68" width="216" height="60" rx="8" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.6"/>
  <text x="140" y="104" text-anchor="middle" font-size="14" font-weight="700" fill="#0E7490">app code — native</text>
  <rect x="32" y="140" width="216" height="44" rx="8" fill="#ECFDF5" stroke="#059669" stroke-width="1.4"/>
  <text x="140" y="168" text-anchor="middle" font-size="13" fill="#047857" font-family="ui-monospace, monospace">lang_start shim</text>
  <text x="140" y="216" text-anchor="middle" font-size="13" font-weight="700" fill="#047857">runtime ≈ empty</text>

  <rect x="292" y="68" width="216" height="60" rx="8" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.6"/>
  <text x="400" y="104" text-anchor="middle" font-size="14" font-weight="700" fill="#0E7490">app code</text>
  <rect x="292" y="140" width="216" height="152" rx="8" fill="#ECFDF5" stroke="#059669" stroke-width="1.8"/>
  <text x="400" y="168" text-anchor="middle" font-size="14" font-weight="700" fill="#047857">Go runtime</text>
  <text x="400" y="200" text-anchor="middle" font-size="13" fill="#047857">GMP scheduler</text>
  <text x="400" y="228" text-anchor="middle" font-size="13" fill="#047857">concurrent GC</text>
  <text x="400" y="256" text-anchor="middle" font-size="13" fill="#047857">netpoller · allocator</text>
  <text x="400" y="320" text-anchor="middle" font-size="13" font-weight="700" fill="#047857">fat but self-contained</text>

  <rect x="552" y="68" width="216" height="60" rx="8" fill="#FFFBEB" stroke="#D97706" stroke-width="1.6"/>
  <text x="660" y="104" text-anchor="middle" font-size="14" font-weight="700" fill="#B45309" font-family="ui-monospace, monospace">.class bytecode</text>
  <rect x="552" y="140" width="216" height="152" rx="8" fill="#FFF1F2" stroke="#E11D48" stroke-width="1.8"/>
  <text x="660" y="168" text-anchor="middle" font-size="14" font-weight="700" fill="#BE123C">JVM process</text>
  <text x="660" y="200" text-anchor="middle" font-size="13" fill="#BE123C">class loader</text>
  <text x="660" y="228" text-anchor="middle" font-size="13" fill="#BE123C">C1 / C2 JIT</text>
  <text x="660" y="256" text-anchor="middle" font-size="13" fill="#BE123C">GC · code cache</text>
  <text x="660" y="320" text-anchor="middle" font-size="13" font-weight="700" fill="#BE123C">a whole virtual machine</text>

  <rect x="32" y="356" width="736" height="56" rx="8" fill="#F8FAFC" stroke="#475569" stroke-width="1.6"/>
  <text x="400" y="390" text-anchor="middle" font-size="15" font-weight="700" fill="#334155">OS kernel</text>
</svg>
