<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 470" role="img" aria-labelledby="t3 d3" font-family="Pretendard, ui-sans-serif, system-ui, -apple-system, sans-serif">
  <title id="t3">How each language fills the runtime layer</title>
  <desc id="d3">Three columns above a shared OS kernel. Rust: native app code with only a thin lang_start shim, the runtime layer nearly empty. Go: one static binary containing both the app code and a fat runtime with the GMP scheduler, concurrent GC, allocator, netpoller and sysmon. JVM: bytecode that needs a separate virtual machine process with class loader, interpreter, JIT compilers and GC — a runtime bigger than the app.</desc>
  <defs>
    <marker id="m3" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="800" height="470" fill="#FFFFFF"/>

  <text x="400" y="26" text-anchor="middle" font-size="12" fill="#64748B">three answers to the same layer</text>

  <text x="160" y="58" text-anchor="middle" font-size="12.5" font-weight="700" fill="#0E7490">Rust</text>
  <text x="400" y="58" text-anchor="middle" font-size="12.5" font-weight="700" fill="#047857">Go</text>
  <text x="652" y="58" text-anchor="middle" font-size="12.5" font-weight="700" fill="#6D28D9">JVM (traditional)</text>

  <rect x="72" y="76" width="176" height="232" rx="8" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.5"/>
  <text x="160" y="182" text-anchor="middle" font-size="12.5" font-weight="700" fill="#0E7490">app code</text>
  <text x="160" y="202" text-anchor="middle" font-size="10.5" fill="#0E7490">(native machine code)</text>

  <rect x="72" y="316" width="176" height="30" rx="6" fill="#F8FAFC" stroke="#0891B2" stroke-width="1.2" stroke-dasharray="4 2"/>
  <text x="160" y="335" text-anchor="middle" font-size="10.5" fill="#0E7490">lang_start shim</text>

  <rect x="312" y="76" width="176" height="270" rx="10" fill="none" stroke="#475569" stroke-width="1.3" stroke-dasharray="5 3"/>
  <text x="400" y="95" text-anchor="middle" font-size="10.5" fill="#64748B">one static binary</text>

  <rect x="328" y="104" width="144" height="56" rx="7" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.4"/>
  <text x="400" y="136" text-anchor="middle" font-size="12" font-weight="700" fill="#0E7490">app code</text>

  <rect x="328" y="172" width="144" height="160" rx="7" fill="#ECFDF5" stroke="#059669" stroke-width="1.6"/>
  <text x="400" y="194" text-anchor="middle" font-size="12" font-weight="700" fill="#047857">Go runtime</text>
  <text x="400" y="216" text-anchor="middle" font-size="10.5" fill="#047857">GMP scheduler</text>
  <text x="400" y="234" text-anchor="middle" font-size="10.5" fill="#047857">concurrent GC</text>
  <text x="400" y="252" text-anchor="middle" font-size="10.5" fill="#047857">allocator (mcache)</text>
  <text x="400" y="270" text-anchor="middle" font-size="10.5" fill="#047857">netpoller (epoll)</text>
  <text x="400" y="288" text-anchor="middle" font-size="10.5" fill="#047857">sysmon monitor</text>
  <text x="400" y="314" text-anchor="middle" font-size="10" fill="#64748B">statically linked in</text>

  <rect x="568" y="76" width="168" height="56" rx="7" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.4"/>
  <text x="652" y="100" text-anchor="middle" font-size="11.5" font-weight="700" fill="#0E7490">.class bytecode</text>
  <text x="652" y="118" text-anchor="middle" font-size="10.5" fill="#0E7490">(needs a VM to run)</text>

  <rect x="552" y="148" width="200" height="198" rx="8" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.7"/>
  <text x="652" y="172" text-anchor="middle" font-size="12" font-weight="700" fill="#6D28D9">JVM process</text>
  <text x="652" y="196" text-anchor="middle" font-size="10.5" fill="#6D28D9">class loader + interpreter</text>
  <text x="652" y="214" text-anchor="middle" font-size="10.5" fill="#6D28D9">C1 / C2 JIT compiler</text>
  <text x="652" y="232" text-anchor="middle" font-size="10.5" fill="#6D28D9">GC (G1 / ZGC)</text>
  <text x="652" y="250" text-anchor="middle" font-size="10.5" fill="#6D28D9">Metaspace · code cache</text>
  <text x="652" y="268" text-anchor="middle" font-size="10.5" fill="#6D28D9">GC + JIT threads</text>
  <text x="652" y="296" text-anchor="middle" font-size="10" fill="#64748B">a separate process —</text>
  <text x="652" y="312" text-anchor="middle" font-size="10" fill="#64748B">runtime bigger than the app</text>

  <line x1="160" y1="346" x2="160" y2="392" stroke="#475569" stroke-width="1.5" marker-end="url(#m3)"/>
  <line x1="400" y1="346" x2="400" y2="392" stroke="#475569" stroke-width="1.5" marker-end="url(#m3)"/>
  <line x1="652" y1="346" x2="652" y2="392" stroke="#475569" stroke-width="1.5" marker-end="url(#m3)"/>
  <line x1="652" y1="132" x2="652" y2="144" stroke="#475569" stroke-width="1.3" marker-end="url(#m3)"/>

  <rect x="48" y="396" width="704" height="40" rx="8" fill="#F8FAFC" stroke="#475569" stroke-width="1.4"/>
  <text x="400" y="421" text-anchor="middle" font-size="12" font-weight="700" fill="#334155">OS kernel</text>

  <text x="160" y="458" text-anchor="middle" font-size="10.5" fill="#0E7490">runtime ≈ empty</text>
  <text x="400" y="458" text-anchor="middle" font-size="10.5" fill="#047857">fat but self-contained</text>
  <text x="652" y="458" text-anchor="middle" font-size="10.5" fill="#6D28D9">a whole virtual machine</text>
</svg>
