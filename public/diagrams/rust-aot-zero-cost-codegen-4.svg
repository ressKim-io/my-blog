<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-labelledby="t4 d4" font-family="Pretendard, ui-sans-serif, system-ui, -apple-system, sans-serif">
  <title id="t4">Fat pointer and vtable — the physical price of dynamic dispatch</title>
  <desc id="d4">A dyn Trait reference is two words wide: a data pointer to the value and a vtable pointer to a static function pointer table in the read-only data section. The first three vtable slots are fixed — destructor, size, alignment — and trait method pointers follow. Calling a method loads a slot and jumps to it indirectly, which risks a branch target mispredict and blocks inlining outright.</desc>
  <defs>
    <marker id="a4" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#475569"/>
    </marker>
    <marker id="a4r" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#E11D48"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="800" height="400" fill="#FFFFFF"/>

  <line x1="120" y1="228" x2="120" y2="272" stroke="#475569" stroke-width="1.5" marker-end="url(#a4)"/>
  <line x1="210" y1="206" x2="268" y2="180" stroke="#475569" stroke-width="1.5" marker-end="url(#a4)"/>
  <line x1="500" y1="236" x2="556" y2="184" stroke="#E11D48" stroke-width="1.6" marker-end="url(#a4r)"/>
  <line x1="664" y1="212" x2="664" y2="244" stroke="#E11D48" stroke-width="1.6" marker-end="url(#a4r)"/>

  <rect x="32" y="120" width="176" height="108" rx="8" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.6"/>
  <text x="120" y="148" text-anchor="middle" font-size="15" font-weight="700" fill="#0E7490" font-family="ui-monospace, monospace">&amp;dyn Draw</text>
  <rect x="46" y="162" width="148" height="26" rx="3" fill="#FFFFFF" stroke="#0891B2" stroke-width="1.1"/>
  <text x="120" y="181" text-anchor="middle" font-size="13" fill="#0E7490" font-family="ui-monospace, monospace">data_ptr</text>
  <rect x="46" y="194" width="148" height="26" rx="3" fill="#FFFFFF" stroke="#0891B2" stroke-width="1.1"/>
  <text x="120" y="213" text-anchor="middle" font-size="13" fill="#0E7490" font-family="ui-monospace, monospace">vtable_ptr</text>

  <rect x="32" y="276" width="176" height="52" rx="8" fill="#F8FAFC" stroke="#475569" stroke-width="1.5"/>
  <text x="120" y="308" text-anchor="middle" font-size="14" font-weight="700" fill="#334155">the value</text>

  <rect x="272" y="56" width="228" height="264" rx="8" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.6"/>
  <text x="386" y="84" text-anchor="middle" font-size="15" font-weight="700" fill="#6D28D9">vtable</text>
  <text x="386" y="106" text-anchor="middle" font-size="13" fill="#6D28D9" font-family="ui-monospace, monospace">.rodata</text>
  <rect x="288" y="120" width="196" height="30" rx="3" fill="#FFFFFF" stroke="#7C3AED" stroke-width="1.1"/>
  <text x="386" y="141" text-anchor="middle" font-size="13" fill="#6D28D9" font-family="ui-monospace, monospace">[0] drop_in_place</text>
  <rect x="288" y="156" width="196" height="30" rx="3" fill="#FFFFFF" stroke="#7C3AED" stroke-width="1.1"/>
  <text x="386" y="177" text-anchor="middle" font-size="13" fill="#6D28D9" font-family="ui-monospace, monospace">[1] size</text>
  <rect x="288" y="192" width="196" height="30" rx="3" fill="#FFFFFF" stroke="#7C3AED" stroke-width="1.1"/>
  <text x="386" y="213" text-anchor="middle" font-size="13" fill="#6D28D9" font-family="ui-monospace, monospace">[2] align</text>
  <rect x="288" y="228" width="196" height="30" rx="3" fill="#ECFDF5" stroke="#059669" stroke-width="1.3"/>
  <text x="386" y="249" text-anchor="middle" font-size="13" font-weight="700" fill="#047857" font-family="ui-monospace, monospace">[3] method0</text>
  <rect x="288" y="264" width="196" height="30" rx="3" fill="#FFFFFF" stroke="#7C3AED" stroke-width="1.1"/>
  <text x="386" y="285" text-anchor="middle" font-size="13" fill="#6D28D9" font-family="ui-monospace, monospace">[4] method1</text>

  <rect x="560" y="148" width="208" height="64" rx="8" fill="#FFF1F2" stroke="#E11D48" stroke-width="1.6"/>
  <text x="664" y="176" text-anchor="middle" font-size="15" font-weight="700" fill="#BE123C" font-family="ui-monospace, monospace">blr x8</text>
