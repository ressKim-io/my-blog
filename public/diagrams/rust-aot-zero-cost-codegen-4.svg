<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" role="img" aria-labelledby="t4 d4" font-family="Pretendard, ui-sans-serif, system-ui, -apple-system, sans-serif">
  <title id="t4">Codegen units trade build speed for optimization horizon</title>
  <desc id="d4">rustc splits a crate's monomorphized items into N codegen units and runs LLVM on them in parallel. Many units means a fast parallel build but inlining cannot cross a unit boundary. Setting codegen-units to one puts the whole crate under a single optimization horizon at the cost of all parallelism. Release defaults to 16, debug to 256.</desc>
  <defs>
    <marker id="m4" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#BE123C"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="800" height="380" fill="#FFFFFF"/>

  <text x="400" y="26" text-anchor="middle" font-size="12" fill="#64748B">how wide can LLVM see? — the optimization horizon inside one crate</text>

  <line x1="400" y1="44" x2="400" y2="308" stroke="#D4D4D8" stroke-width="1.2" stroke-dasharray="5 4"/>

  <text x="200" y="62" text-anchor="middle" font-size="12.5" font-weight="700" fill="#334155">many CGUs — the default</text>
  <text x="200" y="80" text-anchor="middle" font-size="10.5" fill="#64748B">release = 16 · debug = 256</text>

  <rect x="48" y="96" width="70" height="88" rx="7" fill="#ECFDF5" stroke="#059669" stroke-width="1.4"/>
  <text x="83" y="146" text-anchor="middle" font-size="11" font-weight="700" fill="#047857">CGU</text>
  <rect x="126" y="96" width="70" height="88" rx="7" fill="#ECFDF5" stroke="#059669" stroke-width="1.4"/>
  <text x="161" y="146" text-anchor="middle" font-size="11" font-weight="700" fill="#047857">CGU</text>
  <rect x="204" y="96" width="70" height="88" rx="7" fill="#ECFDF5" stroke="#059669" stroke-width="1.4"/>
  <text x="239" y="146" text-anchor="middle" font-size="11" font-weight="700" fill="#047857">CGU</text>
  <rect x="282" y="96" width="70" height="88" rx="7" fill="#ECFDF5" stroke="#059669" stroke-width="1.4"/>
  <text x="317" y="146" text-anchor="middle" font-size="11" font-weight="700" fill="#047857">CGU</text>

  <text x="200" y="204" text-anchor="middle" font-size="10.5" fill="#047857">one LLVM instance each, all in parallel</text>

  <line x1="118" y1="140" x2="124" y2="140" stroke="#E11D48" stroke-width="1.6"/>
  <line x1="196" y1="140" x2="202" y2="140" stroke="#E11D48" stroke-width="1.6"/>
  <line x1="274" y1="140" x2="280" y2="140" stroke="#E11D48" stroke-width="1.6"/>
  <text x="200" y="230" text-anchor="middle" font-size="10.5" font-weight="700" fill="#BE123C">inlining cannot cross a CGU boundary</text>
  <text x="200" y="248" text-anchor="middle" font-size="10.5" fill="#BE123C">optimization opportunities are lost there</text>

  <rect x="48" y="266" width="304" height="42" rx="7" fill="#ECFDF5" stroke="#A7F3D0" stroke-width="1.2"/>
  <text x="200" y="292" text-anchor="middle" font-size="11" font-weight="700" fill="#047857">fast build · weaker code</text>

  <text x="600" y="62" text-anchor="middle" font-size="12.5" font-weight="700" fill="#334155">codegen-units = 1</text>
  <text x="600" y="80" text-anchor="middle" font-size="10.5" fill="#64748B">maximum optimization</text>

  <rect x="448" y="96" width="304" height="88" rx="7" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.7"/>
  <text x="600" y="136" text-anchor="middle" font-size="12" font-weight="700" fill="#6D28D9">one CGU — the whole crate</text>
  <text x="600" y="158" text-anchor="middle" font-size="10.5" fill="#6D28D9">a single optimization horizon</text>

  <text x="600" y="204" text-anchor="middle" font-size="10.5" fill="#6D28D9">one LLVM instance, no parallelism</text>
  <text x="600" y="230" text-anchor="middle" font-size="10.5" font-weight="700" fill="#6D28D9">every inline opportunity is visible</text>
  <text x="600" y="248" text-anchor="middle" font-size="10.5" fill="#6D28D9">nothing is hidden behind a boundary</text>

  <rect x="448" y="266" width="304" height="42" rx="7" fill="#F5F3FF" stroke="#DDD6FE" stroke-width="1.2"/>
  <text x="600" y="292" text-anchor="middle" font-size="11" font-weight="700" fill="#6D28D9">slow build · stronger code</text>

  <text x="400" y="346" text-anchor="middle" font-size="10.5" fill="#64748B">debug builds pick 256 on purpose — code quality is irrelevant there, build speed is everything</text>
</svg>
