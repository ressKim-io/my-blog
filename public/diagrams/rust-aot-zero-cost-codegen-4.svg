  <rect x="560" y="248" width="208" height="88" rx="9" fill="#FFF1F2" stroke="#E11D48" stroke-width="1.4" stroke-dasharray="5 3"/>
  <text x="664" y="278" text-anchor="middle" font-size="13" font-weight="700" fill="#BE123C">BTB mispredict</text>
  <text x="664" y="304" text-anchor="middle" font-size="13" fill="#BE123C">inlining blocked</text>
</svg>
