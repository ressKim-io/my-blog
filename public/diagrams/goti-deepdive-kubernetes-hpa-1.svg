<svg role="img" aria-labelledby="title-hpa-loop desc-hpa-loop"
  viewBox="0 0 800 520"
  width="100%"
  height="auto"
  xmlns="http://www.w3.org/2000/svg"
  font-family="'Pretendard', system-ui, sans-serif">

  <title id="title-hpa-loop">제어 루프 — HPA가 메트릭을 읽고 Deployment replica를 조정하는 흐름</title>
  <desc id="desc-hpa-loop">metrics-server가 kubelet에서 CPU 사용량을 수집하고, HPA 컨트롤러가 15초마다 이 값을 읽어 desired replica를 계산한 뒤, Deployment spec.replicas를 갱신하고, Deployment 컨트롤러가 ReplicaSet을 통해 Pod를 조정하는 4단계 제어 루프</desc>

  <!-- 화살표 먼저 -->
  <!-- 1. kubelet -> metrics-server -->
  <line x1="200" y1="108" x2="360" y2="108" stroke="#0A0A0A" stroke-width="1.5" marker-end="url(#arrow-black)"/>
  <!-- 2. metrics-server -> HPA 컨트롤러 (scrape, 15s) -->
  <line x1="504" y1="108" x2="616" y2="108" stroke="#0A0A0A" stroke-width="1.5" marker-end="url(#arrow-black)"/>
  <!-- 3. HPA 컨트롤러 -> Deployment (patch replicas) -->
  <path d="M 640 160 L 640 280 L 504 280" stroke="#7C3AED" stroke-width="2" fill="none" marker-end="url(#arrow-violet)"/>
  <!-- 4. Deployment -> ReplicaSet -> Pod -->
  <line x1="360" y1="280" x2="240" y2="280" stroke="#059669" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <line x1="160" y1="280" x2="160" y2="340" stroke="#059669" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <!-- 5. Pod -> kubelet (CPU 사용량 보고, 점선) -->
  <path d="M 120 400 L 120 460 L 160 460 L 160 340" stroke="#D4D4D8" stroke-width="1.5" stroke-dasharray="5 3" fill="none" marker-end="url(#arrow-gray)"/>
  <path d="M 120 460 L 120 476 L 120 480" stroke="none"/>
  <!-- kubelet 아래로 -->
  <line x1="120" y1="400" x2="120" y2="140" stroke="#D4D4D8" stroke-width="1.5" stroke-dasharray="5 3" fill="none"/>

  <!-- 화살표 마커 정의 -->
  <defs>
    <marker id="arrow-black" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#0A0A0A"/>
    </marker>
    <marker id="arrow-violet" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7C3AED"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#059669"/>
    </marker>
    <marker id="arrow-gray" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#D4D4D8"/>
    </marker>
  </defs>

  <!-- kubelet (External/Other — slate) -->
  <rect x="40" y="72" width="160" height="72" rx="6" fill="#F8FAFC" stroke="#475569" stroke-width="1.5"/>
  <text x="120" y="100" text-anchor="middle" font-size="13" font-weight="600" fill="#334155">kubelet</text>
  <text x="120" y="118" text-anchor="middle" font-size="11" fill="#475569">각 노드 에이전트</text>
  <text x="120" y="134" text-anchor="middle" font-size="11" fill="#475569">CPU·메모리 수집</text>

  <!-- metrics-server (Cloud/Infra — amber) -->
  <rect x="360" y="72" width="144" height="72" rx="6" fill="#FFFBEB" stroke="#D97706" stroke-width="1.5"/>
  <text x="432" y="100" text-anchor="middle" font-size="13" font-weight="600" fill="#B45309">metrics-server</text>
  <text x="432" y="118" text-anchor="middle" font-size="11" fill="#D97706">클러스터 애드온</text>
  <text x="432" y="134" text-anchor="middle" font-size="11" fill="#D97706">메트릭 집계 API</text>

  <!-- HPA 컨트롤러 (Backend — emerald) -->
  <rect x="560" y="72" width="160" height="72" rx="6" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="640" y="100" text-anchor="middle" font-size="13" font-weight="600" fill="#047857">HPA 컨트롤러</text>
  <text x="640" y="118" text-anchor="middle" font-size="11" fill="#059669">kube-controller-manager</text>
  <text x="640" y="134" text-anchor="middle" font-size="11" fill="#059669">15초 주기 실행</text>

  <!-- Deployment (Backend — emerald) -->
  <rect x="360" y="248" width="144" height="64" rx="6" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="432" y="276" text-anchor="middle" font-size="13" font-weight="600" fill="#047857">Deployment</text>
  <text x="432" y="296" text-anchor="middle" font-size="11" fill="#059669">spec.replicas 갱신</text>

  <!-- ReplicaSet (Cloud/Infra — amber) -->
  <rect x="96" y="248" width="128" height="64" rx="6" fill="#FFFBEB" stroke="#D97706" stroke-width="1.5"/>
  <text x="160" y="276" text-anchor="middle" font-size="13" font-weight="600" fill="#B45309">ReplicaSet</text>
  <text x="160" y="296" text-anchor="middle" font-size="11" fill="#D97706">Pod 수 관리</text>

  <!-- Pod x3 (Frontend — cyan) -->
  <rect x="40" y="352" width="72" height="56" rx="6" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.5"/>
  <text x="76" y="380" text-anchor="middle" font-size="12" font-weight="600" fill="#0E7490">Pod 1</text>
  <text x="76" y="396" text-anchor="middle" font-size="11" fill="#0891B2">Running</text>

  <rect x="128" y="352" width="72" height="56" rx="6" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.5"/>
  <text x="164" y="380" text-anchor="middle" font-size="12" font-weight="600" fill="#0E7490">Pod 2</text>
  <text x="164" y="396" text-anchor="middle" font-size="11" fill="#0891B2">Running</text>

  <rect x="216" y="352" width="72" height="56" rx="6" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.5"/>
  <text x="252" y="380" text-anchor="middle" font-size="12" font-weight="600" fill="#0E7490">Pod 3</text>
  <text x="252" y="396" text-anchor="middle" font-size="11" fill="#0891B2">Running</text>

  <!-- 화살표 라벨 -->
  <rect x="200" y="90" width="116" height="18" rx="3" fill="#FAFAFA"/>
  <text x="258" y="103" text-anchor="middle" font-size="11" fill="#27272A">CPU 사용량 수집</text>

  <rect x="504" y="90" width="118" height="18" rx="3" fill="#FAFAFA"/>
  <text x="563" y="103" text-anchor="middle" font-size="11" fill="#27272A">Metrics API 조회 (15s)</text>

  <rect x="512" y="262" width="90" height="18" rx="3" fill="#FAFAFA"/>
  <text x="557" y="275" text-anchor="middle" font-size="11" fill="#7C3AED">replicas 패치</text>

  <rect x="252" y="262" width="100" height="18" rx="3" fill="#FAFAFA"/>
  <text x="302" y="275" text-anchor="middle" font-size="11" fill="#059669">Pod 생성/삭제 위임</text>

  <rect x="84" y="308" width="88" height="18" rx="3" fill="#FAFAFA"/>
  <text x="128" y="321" text-anchor="middle" font-size="11" fill="#475569">Pod 조정 (생성/삭제)</text>

  <!-- 15초 루프 표시 -->
  <text x="640" y="200" text-anchor="middle" font-size="11" fill="#7C3AED" font-style="italic">⟳ 15초마다 반복</text>

  <!-- 제목 텍스트 -->
  <text x="400" y="488" text-anchor="middle" font-size="12" fill="#27272A">흐름도 — HPA 제어 루프 (metrics-server → HPA 컨트롤러 → Deployment → Pod)</text>

  <!-- 범례 -->
  <rect x="488" y="368" width="272" height="96" rx="4" fill="#F8FAFC" stroke="#D4D4D8" stroke-width="1"/>
  <text x="624" y="388" text-anchor="middle" font-size="11" font-weight="600" fill="#27272A">범례</text>
  <line x1="504" y1="404" x2="536" y2="404" stroke="#0A0A0A" stroke-width="1.5"/>
  <text x="544" y="408" font-size="11" fill="#334155">정상 데이터 흐름</text>
  <line x1="504" y1="424" x2="536" y2="424" stroke="#7C3AED" stroke-width="2"/>
  <text x="544" y="428" font-size="11" fill="#334155">HPA 조정 명령</text>
  <line x1="504" y1="444" x2="536" y2="444" stroke="#D4D4D8" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text x="544" y="448" font-size="11" fill="#334155">간접 데이터 수집 (비동기)</text>
</svg>
