<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 380" role="img" aria-labelledby="t2 d2" width="100%" height="auto" preserveAspectRatio="xMidYMid meet" style="max-width: 720px;">
  <title id="t2">ArgoCD 리소스 소유권 충돌</title>
  <desc id="d2">monitoring-custom과 external-secrets-config 두 ArgoCD Application이 동일한 ExternalSecret(grafana-admin-secret)을 동시에 관리하려 해서 sync가 실패하는 구조</desc>

  <defs>
    <marker id="arr2" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#E11D48"/>
    </marker>
  </defs>

  <style><![CDATA[
    .label { font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif; font-size: 14px; font-weight: 600; }
    .sub   { font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif; font-size: 11px; fill: #27272A; }
    .meta  { font-family: 'Geist Mono', ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 11px; fill: #27272A; }
    .conflict { font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif; font-size: 12px; fill: #BE123C; font-weight: 600; }
    .arr-label { font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif; font-size: 11px; fill: #BE123C; font-weight: 600; }
  ]]></style>

  <!-- Application 1: monitoring-custom (cloud / amber) -->
  <rect x="40" y="32" width="280" height="100" rx="6" fill="#FFFBEB" stroke="#D97706" stroke-width="1.5"/>
  <text x="180" y="60" text-anchor="middle" class="label" fill="#B45309">monitoring-custom</text>
  <text x="180" y="80" text-anchor="middle" class="sub">ArgoCD Application</text>
  <text x="180" y="106" text-anchor="middle" class="meta">charts/goti-monitoring/templates/</text>
  <text x="180" y="122" text-anchor="middle" class="meta">grafana-admin-externalsecret.yaml</text>

  <!-- Application 2: external-secrets-config -->
  <rect x="400" y="32" width="280" height="100" rx="6" fill="#FFFBEB" stroke="#D97706" stroke-width="1.5"/>
  <text x="540" y="60" text-anchor="middle" class="label" fill="#B45309">external-secrets-config</text>
  <text x="540" y="80" text-anchor="middle" class="sub">ArgoCD Application</text>
  <text x="540" y="106" text-anchor="middle" class="meta">infrastructure/prod/external-secrets/</text>
  <text x="540" y="122" text-anchor="middle" class="meta">grafana-admin-externalsecret.yaml</text>

  <!-- Conflict arrows -->
  <path d="M 180 132 L 290 248" stroke="#E11D48" stroke-width="1.5" fill="none" marker-end="url(#arr2)"/>
  <path d="M 540 132 L 430 248" stroke="#E11D48" stroke-width="1.5" fill="none" marker-end="url(#arr2)"/>
  <text x="200" y="200" class="arr-label">manages</text>
  <text x="520" y="200" class="arr-label">manages</text>

  <!-- ExternalSecret box (충돌 강조 — 굵은 rose 외곽선) -->
  <rect x="220" y="248" width="280" height="100" rx="6" fill="#FFF1F2" stroke="#E11D48" stroke-width="2.5"/>
  <text x="360" y="276" text-anchor="middle" class="label" fill="#BE123C">ExternalSecret</text>
  <text x="360" y="296" text-anchor="middle" class="meta">grafana-admin-secret</text>
  <text x="360" y="312" text-anchor="middle" class="meta">namespace: monitoring</text>
  <text x="360" y="338" text-anchor="middle" class="conflict">⚠ 소유권 충돌 — sync 실패</text>
</svg>
