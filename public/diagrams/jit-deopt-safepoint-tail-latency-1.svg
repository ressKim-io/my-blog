<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 424" role="img" aria-labelledby="t7 d7" font-family="Pretendard, ui-sans-serif, system-ui, -apple-system, sans-serif">
  <title id="t7">Deoptimization rebuilds an interpreter frame from the scope descriptor</title>
  <desc id="d7">A C2 compiled frame keeps its locals in registers and stack slots, and carries a scope descriptor that maps each machine code point back to a bytecode index and each local back to its location. When an optimistic assumption is violated, the JVM reads that map, rebuilds an interpreter frame, resumes execution there, discards the invalid machine code and recompiles. The request caught in that moment sees a tail latency spike.</desc>
  <defs>
    <marker id="m6r" markerWidth="11" markerHeight="11" refX="7.5" refY="3.2" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7.5,3.2 L0,6.4 Z" fill="#E11D48"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="800" height="424" fill="#FFFFFF"/>

  <line x1="272" y1="136" x2="520" y2="136" stroke="#E11D48" stroke-width="2.4" marker-end="url(#m6r)"/>
  <text x="396" y="122" text-anchor="middle" font-size="14" font-weight="700" fill="#BE123C">assumption broken</text>

  <line x1="152" y1="208" x2="336" y2="234" stroke="#7C3AED" stroke-width="1.4" stroke-dasharray="5 3"/>
  <line x1="464" y1="234" x2="648" y2="208" stroke="#7C3AED" stroke-width="1.4" stroke-dasharray="5 3"/>

  <rect x="32" y="48" width="240" height="160" rx="10" fill="#ECFDF5" stroke="#059669" stroke-width="1.8"/>
  <text x="152" y="86" text-anchor="middle" font-size="15" font-weight="700" fill="#047857">C2 frame</text>
  <text x="152" y="122" text-anchor="middle" font-size="13" fill="#047857" font-family="ui-monospace, monospace">x → R8</text>
  <text x="152" y="148" text-anchor="middle" font-size="13" fill="#047857" font-family="ui-monospace, monospace">y → [SP+16]</text>
  <text x="152" y="184" text-anchor="middle" font-size="13" fill="#047857">optimistic</text>

  <rect x="528" y="48" width="240" height="160" rx="10" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.8"/>
  <text x="648" y="94" text-anchor="middle" font-size="15" font-weight="700" fill="#0E7490">interpreter frame</text>
  <text x="648" y="130" text-anchor="middle" font-size="13" fill="#0E7490">rebuilt from map</text>
  <text x="648" y="164" text-anchor="middle" font-size="13" fill="#0E7490">resumes there</text>

  <rect x="304" y="232" width="192" height="96" rx="10" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.8"/>
  <text x="400" y="266" text-anchor="middle" font-size="14" font-weight="700" fill="#6D28D9">scope descriptor</text>
  <text x="400" y="292" text-anchor="middle" font-size="13" fill="#6D28D9">bytecode index</text>
  <text x="400" y="314" text-anchor="middle" font-size="13" fill="#6D28D9">locals → slots</text>

  <rect x="32" y="352" width="440" height="48" rx="9" fill="#F8FAFC" stroke="#475569" stroke-width="1.4"/>
  <text x="252" y="382" text-anchor="middle" font-size="14" fill="#334155">discard · recollect MDO · recompile</text>

  <rect x="504" y="352" width="264" height="48" rx="9" fill="#FFF1F2" stroke="#E11D48" stroke-width="1.6"/>
  <text x="636" y="382" text-anchor="middle" font-size="15" font-weight="700" fill="#BE123C">tail latency spike</text>
</svg>
