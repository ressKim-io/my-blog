<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" role="img" aria-labelledby="t8 d8" font-family="Pretendard, ui-sans-serif, system-ui, -apple-system, sans-serif">
  <title id="t8">Growing a goroutine stack means copying it and rewriting every pointer into it</title>
  <desc id="d8">When a goroutine runs out of stack the runtime allocates a new stack twice the size, copies the frames across, and then walks the copied frames rewriting every pointer that referred to the old stack so it points into the new one. The copy itself is cheap; the pointer rewriting is where the real cost sits, and it grows with how many pointers live on the stack.</desc>
  <defs>
    <marker id="g8d" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#334155"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="800" height="380" fill="#FFFFFF"/>

  <line x1="224" y1="200" x2="296" y2="200" stroke="#334155" stroke-width="1.8" marker-end="url(#g8d)"/>
  <line x1="496" y1="200" x2="568" y2="200" stroke="#334155" stroke-width="1.8" marker-end="url(#g8d)"/>
  <rect x="234" y="170" width="56" height="22" fill="#FFFFFF"/>
  <text x="262" y="187" text-anchor="middle" font-size="13" fill="#334155">copy</text>

  <text x="144" y="62" text-anchor="middle" font-size="14" font-weight="700" fill="#BE123C">old · 2KB</text>
  <rect x="64" y="80" width="160" height="240" rx="10" fill="#FFF1F2" stroke="#E11D48" stroke-width="2"/>
  <rect x="80" y="104" width="128" height="48" rx="6" fill="#FFFFFF" stroke="#E11D48" stroke-width="1.4"/>
  <text x="144" y="134" text-anchor="middle" font-size="13" font-weight="700" fill="#BE123C">frame C</text>
  <rect x="80" y="168" width="128" height="48" rx="6" fill="#FFFFFF" stroke="#E11D48" stroke-width="1.4"/>
  <text x="144" y="198" text-anchor="middle" font-size="13" font-weight="700" fill="#BE123C">frame B</text>
  <rect x="80" y="232" width="128" height="48" rx="6" fill="#FFFFFF" stroke="#E11D48" stroke-width="1.4"/>
  <text x="144" y="262" text-anchor="middle" font-size="13" font-weight="700" fill="#BE123C">frame A</text>

  <rect x="304" y="168" width="192" height="64" rx="9" fill="#FFF1F2" stroke="#E11D48" stroke-width="2"/>
  <text x="400" y="207" text-anchor="middle" font-size="15" font-weight="700" fill="#BE123C">pointer fixup</text>
  <text x="400" y="262" text-anchor="middle" font-size="13" font-weight="700" fill="#BE123C">the real cost</text>

  <text x="656" y="38" text-anchor="middle" font-size="14" font-weight="700" fill="#047857">new · 4KB</text>
  <rect x="576" y="56" width="160" height="296" rx="10" fill="#ECFDF5" stroke="#059669" stroke-width="2"/>
  <rect x="592" y="80" width="128" height="48" rx="6" fill="#FFFFFF" stroke="#059669" stroke-width="1.4"/>
  <rect x="592" y="144" width="128" height="48" rx="6" fill="#FFFFFF" stroke="#059669" stroke-width="1.4"/>
  <rect x="592" y="208" width="128" height="48" rx="6" fill="#FFFFFF" stroke="#059669" stroke-width="1.4"/>
  <rect x="592" y="272" width="128" height="64" rx="6" fill="#FFFFFF" stroke="#059669" stroke-width="1.4" stroke-dasharray="5 3"/>
  <text x="656" y="310" text-anchor="middle" font-size="13" fill="#047857">headroom</text>
</svg>
