<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 920" role="img" aria-labelledby="t1 d1" width="100%" height="auto" preserveAspectRatio="xMidYMid meet" style="max-width: 920px;">
  <title id="t1">Goti의 Istio Sidecar 채택 — 전체 아키텍처</title>
  <desc id="d1">istiod 컨트롤 플레인이 CRD를 푸시하고, 외부 트래픽이 Istio Ingress Gateway에서 JWT/Rate Limiting을 거쳐 mTLS로 Service A → Service B Pod의 Envoy 사이드카에 전달되며, Envoy가 L7 메트릭과 OTel trace를 OTLP로 Alloy → Tempo/Prometheus/Grafana 파이프라인으로 보내는 구조</desc>

  <defs>
    <marker id="arr1" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#0A0A0A"/>
    </marker>
  </defs>

  <style><![CDATA[
    .label   { font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif; font-size: 14px; font-weight: 600; }
    .meta    { font-family: 'Geist Mono', ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 11px; fill: #27272A; }
    .item    { font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif; font-size: 12px; fill: #0A0A0A; }
    .arr-l   { font-family: 'Geist Mono', ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 11px; fill: #27272A; }
    .arrow   { stroke: #0A0A0A; stroke-width: 1.5; fill: none; marker-end: url(#arr1); }
  ]]></style>

  <!-- istiod control plane -->
  <rect x="240" y="24" width="440" height="76" rx="6" fill="#FFFBEB" stroke="#D97706" stroke-width="1.5"/>
  <text x="460" y="52" text-anchor="middle" class="label" fill="#B45309">Istio Control Plane (istiod)</text>
  <text x="460" y="76" text-anchor="middle" class="meta">config / cert / service discovery</text>

  <line x1="460" y1="100" x2="460" y2="148" class="arrow"/>
  <text x="476" y="128" class="arr-l">CRD push</text>

  <!-- External Traffic -->
  <rect x="24" y="200" width="160" height="56" rx="6" fill="#F8FAFC" stroke="#475569" stroke-width="1.5"/>
  <text x="104" y="232" text-anchor="middle" class="label" fill="#334155">External Traffic</text>

  <line x1="184" y1="228" x2="240" y2="228" class="arrow"/>

  <!-- Istio Ingress Gateway -->
  <rect x="240" y="160" width="440" height="160" rx="6" fill="#FFF1F2" stroke="#E11D48" stroke-width="1.5"/>
  <text x="460" y="188" text-anchor="middle" class="label" fill="#BE123C">Istio Ingress Gateway</text>

  <rect x="272" y="208" width="184" height="56" rx="4" fill="#FAFAFA" stroke="#E11D48" stroke-width="1.5"/>
  <text x="364" y="232" text-anchor="middle" class="item" fill="#BE123C">JWT 검증</text>
  <text x="364" y="252" text-anchor="middle" class="meta">JWKS</text>

  <rect x="464" y="208" width="184" height="56" rx="4" fill="#FAFAFA" stroke="#E11D48" stroke-width="1.5"/>
  <text x="556" y="232" text-anchor="middle" class="item" fill="#BE123C">Rate Limiting</text>
  <text x="556" y="252" text-anchor="middle" class="meta">local / global</text>

  <line x1="460" y1="320" x2="460" y2="372" class="arrow"/>
  <text x="476" y="352" class="arr-l">mTLS</text>

  <!-- Service A Pod -->
  <rect x="200" y="380" width="520" height="156" rx="6" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="460" y="408" text-anchor="middle" class="label" fill="#047857">Service A Pod</text>

  <rect x="232" y="424" width="200" height="96" rx="4" fill="#FAFAFA" stroke="#E11D48" stroke-width="1.5"/>
  <text x="332" y="448" text-anchor="middle" class="item" fill="#BE123C">Envoy sidecar</text>
  <text x="252" y="472" class="meta">- L7 metrics</text>
  <text x="252" y="490" class="meta">- OTel trace</text>
  <text x="252" y="508" class="meta">- circuit breaker</text>

  <line x1="432" y1="472" x2="488" y2="472" class="arrow"/>

  <rect x="488" y="424" width="200" height="96" rx="4" fill="#FAFAFA" stroke="#059669" stroke-width="1.5"/>
  <text x="588" y="448" text-anchor="middle" class="item" fill="#047857">Application</text>

  <line x1="460" y1="536" x2="460" y2="580" class="arrow"/>
  <text x="476" y="562" class="arr-l">mTLS</text>

  <!-- Service B Pod -->
  <rect x="200" y="588" width="520" height="120" rx="6" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="460" y="616" text-anchor="middle" class="label" fill="#047857">Service B Pod</text>

  <rect x="232" y="632" width="200" height="60" rx="4" fill="#FAFAFA" stroke="#E11D48" stroke-width="1.5"/>
  <text x="332" y="668" text-anchor="middle" class="item" fill="#BE123C">Envoy sidecar</text>

  <line x1="432" y1="660" x2="488" y2="660" class="arrow"/>

  <rect x="488" y="632" width="200" height="60" rx="4" fill="#FAFAFA" stroke="#059669" stroke-width="1.5"/>
  <text x="588" y="668" text-anchor="middle" class="item" fill="#047857">Application</text>

  <!-- arrow to telemetry -->
  <line x1="460" y1="708" x2="460" y2="752" class="arrow"/>
  <text x="476" y="734" class="arr-l">OTel OTLP</text>

  <!-- Telemetry pipeline -->
  <rect x="200" y="760" width="520" height="136" rx="6" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="460" y="788" text-anchor="middle" class="label" fill="#6D28D9">Telemetry Pipeline</text>
  <text x="232" y="820" class="item">Alloy → Tempo (traces)</text>
  <text x="232" y="844" class="item">      → Prometheus (metrics)</text>
  <text x="232" y="868" class="item">      → Grafana (dashboard)</text>
</svg>
