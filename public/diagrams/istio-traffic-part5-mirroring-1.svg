<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" role="img" aria-labelledby="t1 d1" width="100%" height="auto" preserveAspectRatio="xMidYMid meet" style="max-width: 800px;">
  <title id="t1">Mirror는 Fire-and-Forget — 원본 흐름과 미러 흐름 비교</title>
  <desc id="d1">원본 요청은 v1 처리 후 응답을 기다려 사용자에게 반환되지만, 미러 요청은 v2로 복제된 뒤 응답을 기다리지 않고 버림. 결과적으로 v2 응답 시간과 에러는 사용자 경험에 영향을 주지 않고 메트릭과 로그로만 확인 가능</desc>

  <defs>
    <marker id="arr1" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#0A0A0A"/>
    </marker>
    <marker id="arr1d" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#7C3AED"/>
    </marker>
  </defs>

  <style><![CDATA[
    .label { font-family: 'Pretendard', sans-serif; font-size: 13px; font-weight: 600; }
    .meta  { font-family: 'Geist Mono', ui-monospace, Menlo, monospace; font-size: 11px; fill: #27272A; }
    .arrlbl { font-family: 'Pretendard', sans-serif; font-size: 11px; fill: #27272A; }
    .arrow { stroke: #0A0A0A; stroke-width: 1.5; fill: none; marker-end: url(#arr1); }
    .mirror { stroke: #7C3AED; stroke-width: 1.5; stroke-dasharray: 5 3; fill: none; marker-end: url(#arr1d); }
  ]]></style>

  <!-- 원본 요청 흐름 (위) -->
  <text x="48" y="56" class="label" fill="#047857">원본 요청 흐름 (v1) — 동기, 사용자에게 응답</text>

  <rect x="48" y="72" width="120" height="56" rx="6" fill="#F8FAFC" stroke="#475569" stroke-width="1.5"/>
  <text x="108" y="96" text-anchor="middle" class="meta">사용자</text>
  <text x="108" y="116" text-anchor="middle" class="meta">요청</text>

  <line x1="168" y1="100" x2="240" y2="100" class="arrow"/>

  <rect x="240" y="72" width="160" height="56" rx="6" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="320" y="96" text-anchor="middle" class="label" fill="#047857">v1 처리</text>
  <text x="320" y="116" text-anchor="middle" class="meta">정상 처리</text>

  <line x1="400" y1="100" x2="472" y2="100" class="arrow"/>
  <text x="436" y="92" text-anchor="middle" class="arrlbl">응답 대기</text>

  <rect x="472" y="72" width="160" height="56" rx="6" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="552" y="96" text-anchor="middle" class="label" fill="#047857">응답 수신</text>
  <text x="552" y="116" text-anchor="middle" class="meta">200 OK</text>

  <line x1="632" y1="100" x2="712" y2="100" class="arrow"/>
  <text x="672" y="92" text-anchor="middle" class="arrlbl">사용자에게</text>

  <rect x="688" y="72" width="64" height="56" rx="6" fill="#F8FAFC" stroke="#475569" stroke-width="1.5"/>
  <text x="720" y="104" text-anchor="middle" class="meta">사용자</text>

  <!-- divider -->
  <line x1="32" y1="172" x2="768" y2="172" stroke="#D4D4D8" stroke-width="1" stroke-dasharray="3 3"/>

  <!-- 미러 요청 흐름 (아래) -->
  <text x="48" y="200" class="label" fill="#6D28D9">미러 요청 흐름 (v2) — 비동기, 응답 폐기</text>

  <rect x="48" y="216" width="120" height="56" rx="6" fill="#F8FAFC" stroke="#475569" stroke-width="1.5"/>
  <text x="108" y="240" text-anchor="middle" class="meta">사용자 요청</text>
  <text x="108" y="260" text-anchor="middle" class="meta">(원본과 동일)</text>

  <line x1="168" y1="244" x2="240" y2="244" class="mirror"/>
  <text x="204" y="236" text-anchor="middle" class="arrlbl" fill="#6D28D9">복제</text>

  <rect x="240" y="216" width="160" height="56" rx="6" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="320" y="240" text-anchor="middle" class="label" fill="#6D28D9">v2 전송</text>
  <text x="320" y="260" text-anchor="middle" class="meta">Host: ...-shadow</text>

  <line x1="400" y1="244" x2="472" y2="244" class="mirror"/>
  <text x="436" y="236" text-anchor="middle" class="arrlbl" fill="#6D28D9">응답 안 기다림</text>

  <rect x="472" y="216" width="160" height="56" rx="6" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="552" y="240" text-anchor="middle" class="label" fill="#6D28D9">v2 응답</text>
  <text x="552" y="260" text-anchor="middle" class="meta">→ 폐기</text>

  <rect x="664" y="216" width="104" height="56" rx="6" fill="#FAFAFA" stroke="#D4D4D8" stroke-width="1.5"/>
  <text x="716" y="240" text-anchor="middle" class="meta" fill="#475569">메트릭/로그</text>
  <text x="716" y="260" text-anchor="middle" class="meta" fill="#475569">로만 확인</text>
  <line x1="632" y1="244" x2="664" y2="244" class="mirror"/>

  <text x="400" y="320" text-anchor="middle" class="meta">v2 응답 시간·에러는 사용자에게 전달되지 않음 — 안전한 새 버전 검증</text>
</svg>
