<svg role="img" aria-labelledby="title-1 desc-1" viewBox="0 0 800 600" width="100%" height="auto" xmlns="http://www.w3.org/2000/svg" font-family="'Pretendard', system-ui, sans-serif">
  <title id="title-1">JWE vs JWS 구조 비교</title>
  <desc id="desc-1">JWE(JSON Web Encryption)의 5-segment 구조와 JWS(JSON Web Signature)의 3-segment 구조를 나란히 비교합니다. JWE는 헤더·암호화된 키·IV·암호문·태그 5개 segment로 구성되며, JWS는 헤더·페이로드·서명 3개 segment로 구성됩니다.</desc>

  <!-- 배경 -->
  <rect width="800" height="600" fill="#FAFAFA"/>

  <!-- 제목 -->
  <text x="400" y="36" text-anchor="middle" font-size="15" font-weight="700" fill="#0A0A0A">JWE vs JWS — 구조 비교</text>

  <!-- ── JWS 섹션 (왼쪽) ─────────────────────────────── -->
  <text x="200" y="72" text-anchor="middle" font-size="13" font-weight="700" fill="#047857">JWS (JSON Web Signature)</text>
  <text x="200" y="90" text-anchor="middle" font-size="11" fill="#27272A">서명 — 무결성만 보장, 내용 노출</text>

  <!-- JWS 토큰 조각 표시 -->
  <!-- Segment 1: Header -->
  <rect x="40" y="108" width="150" height="48" rx="6" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="115" y="128" text-anchor="middle" font-size="13" font-weight="600" fill="#047857">Header</text>
  <text x="115" y="148" text-anchor="middle" font-size="10" fill="#047857">{"alg":"RS256","typ":"JWT"}</text>

  <!-- dot -->
  <text x="194" y="136" text-anchor="middle" font-size="20" font-weight="700" fill="#0A0A0A">.</text>

  <!-- Segment 2: Payload -->
  <rect x="200" y="108" width="150" height="48" rx="6" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="275" y="128" text-anchor="middle" font-size="13" font-weight="600" fill="#047857">Payload</text>
  <text x="275" y="148" text-anchor="middle" font-size="10" fill="#047857">{"sub":"user","exp":...}</text>

  <!-- dot -->
  <text x="354" y="136" text-anchor="middle" font-size="20" font-weight="700" fill="#0A0A0A">.</text>

  <!-- Segment 3: Signature -->
  <rect x="360" y="108" width="150" height="48" rx="6" fill="#FFF1F2" stroke="#E11D48" stroke-width="1.5"/>
  <text x="435" y="128" text-anchor="middle" font-size="13" font-weight="600" fill="#BE123C">Signature</text>
  <text x="435" y="148" text-anchor="middle" font-size="10" fill="#BE123C">RSA/HMAC 서명값</text>

  <!-- JWS 주의 박스 -->
  <rect x="40" y="176" width="470" height="36" rx="4" fill="#FFFBEB" stroke="#D97706" stroke-width="1"/>
  <text x="275" y="198" text-anchor="middle" font-size="11" fill="#B45309">⚠ Payload는 Base64url 인코딩일 뿐 — 누구나 디코딩해 내용을 읽을 수 있음</text>

  <!-- ── 구분선 ─────────────────────────────────────── -->
  <line x1="40" y1="232" x2="760" y2="232" stroke="#E4E4E7" stroke-width="1.5" stroke-dasharray="6 3"/>

  <!-- ── JWE 섹션 ─────────────────────────────────── -->
  <text x="400" y="264" text-anchor="middle" font-size="13" font-weight="700" fill="#6D28D9">JWE (JSON Web Encryption)</text>
  <text x="400" y="282" text-anchor="middle" font-size="11" fill="#27272A">암호화 — 기밀성 + 무결성 동시 보장 (AEAD)</text>

  <!-- JWE 5-segment -->
  <!-- S1: Protected Header -->
  <rect x="40" y="300" width="128" height="60" rx="6" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="104" y="323" text-anchor="middle" font-size="12" font-weight="600" fill="#6D28D9">Protected</text>
  <text x="104" y="339" text-anchor="middle" font-size="12" font-weight="600" fill="#6D28D9">Header</text>
  <text x="104" y="355" text-anchor="middle" font-size="10" fill="#6D28D9">alg, enc 명시</text>

  <text x="172" y="333" text-anchor="middle" font-size="20" font-weight="700" fill="#0A0A0A">.</text>

  <!-- S2: Encrypted Key -->
  <rect x="180" y="300" width="128" height="60" rx="6" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="244" y="323" text-anchor="middle" font-size="12" font-weight="600" fill="#6D28D9">Encrypted</text>
  <text x="244" y="339" text-anchor="middle" font-size="12" font-weight="600" fill="#6D28D9">Key</text>
  <text x="244" y="355" text-anchor="middle" font-size="10" fill="#6D28D9">CEK 암호화</text>

  <text x="312" y="333" text-anchor="middle" font-size="20" font-weight="700" fill="#0A0A0A">.</text>

  <!-- S3: IV -->
  <rect x="320" y="300" width="128" height="60" rx="6" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="384" y="323" text-anchor="middle" font-size="12" font-weight="600" fill="#6D28D9">IV</text>
  <text x="384" y="339" text-anchor="middle" font-size="12" font-weight="600" fill="#6D28D9">(Nonce)</text>
  <text x="384" y="355" text-anchor="middle" font-size="10" fill="#6D28D9">랜덤 96-bit</text>

  <text x="452" y="333" text-anchor="middle" font-size="20" font-weight="700" fill="#0A0A0A">.</text>

  <!-- S4: Ciphertext -->
  <rect x="460" y="300" width="128" height="60" rx="6" fill="#F5F3FF" stroke="#7C3AED" stroke-width="2"/>
  <text x="524" y="323" text-anchor="middle" font-size="12" font-weight="600" fill="#6D28D9">Ciphertext</text>
  <text x="524" y="339" text-anchor="middle" font-size="12" font-weight="600" fill="#6D28D9">(암호문)</text>
  <text x="524" y="355" text-anchor="middle" font-size="10" fill="#6D28D9">AES-GCM 암호화</text>

  <text x="592" y="333" text-anchor="middle" font-size="20" font-weight="700" fill="#0A0A0A">.</text>

  <!-- S5: Auth Tag -->
  <rect x="600" y="300" width="128" height="60" rx="6" fill="#FFF1F2" stroke="#E11D48" stroke-width="1.5"/>
  <text x="664" y="323" text-anchor="middle" font-size="12" font-weight="600" fill="#BE123C">Auth Tag</text>
  <text x="664" y="339" text-anchor="middle" font-size="12" font-weight="600" fill="#BE123C">(인증 태그)</text>
  <text x="664" y="355" text-anchor="middle" font-size="10" fill="#BE123C">GCM MAC</text>

  <!-- AEAD 설명 화살표 영역 -->
  <rect x="40" y="384" width="688" height="72" rx="6" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1"/>

  <!-- Ciphertext + AuthTag → AEAD 브래킷 -->
  <line x1="460" y1="380" x2="460" y2="384" stroke="#7C3AED" stroke-width="1.5"/>
  <line x1="728" y1="380" x2="728" y2="384" stroke="#7C3AED" stroke-width="1.5"/>

  <text x="400" y="407" text-anchor="middle" font-size="12" font-weight="700" fill="#6D28D9">AEAD (Authenticated Encryption with Associated Data)</text>
  <text x="400" y="427" text-anchor="middle" font-size="11" fill="#6D28D9">AES-256-GCM은 암호화(Ciphertext)와 무결성 검증(Auth Tag)을 한 번의 연산으로 수행합니다</text>
  <text x="400" y="447" text-anchor="middle" font-size="11" fill="#6D28D9">키 없이는 복호화도, 위변조 탐지도 불가능합니다</text>

  <!-- ── 비교 요약 표 ─────────────────────────────── -->
  <rect x="40" y="480" width="720" height="100" rx="6" fill="#F8FAFC" stroke="#D4D4D8" stroke-width="1"/>
  <text x="400" y="503" text-anchor="middle" font-size="12" font-weight="700" fill="#0A0A0A">핵심 차이 요약</text>

  <!-- 표 헤더 -->
  <line x1="40" y1="512" x2="760" y2="512" stroke="#D4D4D8" stroke-width="1"/>
  <text x="200" y="528" text-anchor="middle" font-size="11" font-weight="600" fill="#0A0A0A">항목</text>
  <text x="460" y="528" text-anchor="middle" font-size="11" font-weight="600" fill="#047857">JWS</text>
  <text x="660" y="528" text-anchor="middle" font-size="11" font-weight="600" fill="#6D28D9">JWE</text>
  <line x1="40" y1="534" x2="760" y2="534" stroke="#E4E4E7" stroke-width="1"/>

  <text x="200" y="551" text-anchor="middle" font-size="11" fill="#27272A">페이로드 내용</text>
  <text x="460" y="551" text-anchor="middle" font-size="11" fill="#047857">누구나 디코딩 가능</text>
  <text x="660" y="551" text-anchor="middle" font-size="11" fill="#6D28D9">키 없이 읽기 불가</text>

  <text x="200" y="568" text-anchor="middle" font-size="11" fill="#27272A">보장하는 속성</text>
  <text x="460" y="568" text-anchor="middle" font-size="11" fill="#047857">무결성 (위변조 탐지)</text>
  <text x="660" y="568" text-anchor="middle" font-size="11" fill="#6D28D9">기밀성 + 무결성</text>

  <line x1="380" y1="480" x2="380" y2="580" stroke="#E4E4E7" stroke-width="1"/>
  <line x1="560" y1="480" x2="560" y2="580" stroke="#E4E4E7" stroke-width="1"/>

  <!-- 범례 -->
  <rect x="40" y="572" width="14" height="14" rx="2" fill="#ECFDF5" stroke="#059669" stroke-width="1"/>
  <text x="60" y="583" font-size="10" fill="#27272A">공개 가능 (JWS)</text>
  <rect x="160" y="572" width="14" height="14" rx="2" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1"/>
  <text x="180" y="583" font-size="10" fill="#27272A">암호화 영역 (JWE)</text>
  <rect x="290" y="572" width="14" height="14" rx="2" fill="#FFF1F2" stroke="#E11D48" stroke-width="1"/>
  <text x="310" y="583" font-size="10" fill="#27272A">인증/서명 영역</text>
</svg>
