<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" role="img" aria-labelledby="t1 d1" font-family="Pretendard, ui-sans-serif, system-ui, -apple-system, sans-serif">
  <title id="t1">The rustc pipeline — safety decided in MIR, speed decided in LLVM</title>
  <desc id="d1">Rust source passes through four intermediate representations. The rustc frontend owns HIR and MIR, where the borrow checker and automatic drop insertion decide safety and leave no runtime trace. The LLVM backend owns LLVM IR onward, where monomorphized instances multiply and the -O3 passes decide most of the runtime speed. The result is fixed machine code.</desc>
  <defs>
    <marker id="a1" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="800" height="520" fill="#FFFFFF"/>

  <line x1="400" y1="104" x2="400" y2="132" stroke="#475569" stroke-width="1.6" marker-end="url(#a1)"/>
  <line x1="400" y1="192" x2="400" y2="220" stroke="#475569" stroke-width="1.6" marker-end="url(#a1)"/>
  <line x1="400" y1="296" x2="400" y2="324" stroke="#475569" stroke-width="1.6" marker-end="url(#a1)"/>
  <line x1="400" y1="400" x2="400" y2="428" stroke="#475569" stroke-width="1.6" marker-end="url(#a1)"/>
  <line x1="224" y1="216" x2="246" y2="216" stroke="#94A3B8" stroke-width="1.3" stroke-dasharray="4 3"/>
  <line x1="224" y1="364" x2="246" y2="364" stroke="#94A3B8" stroke-width="1.3" stroke-dasharray="4 3"/>
  <line x1="554" y1="260" x2="574" y2="260" stroke="#94A3B8" stroke-width="1.3" stroke-dasharray="4 3"/>
  <line x1="554" y1="364" x2="574" y2="364" stroke="#94A3B8" stroke-width="1.3" stroke-dasharray="4 3"/>

  <rect x="248" y="48" width="304" height="56" rx="8" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.6"/>
  <text x="400" y="83" text-anchor="middle" font-size="15" font-weight="700" fill="#0E7490" font-family="ui-monospace, monospace">source .rs</text>

  <rect x="248" y="136" width="304" height="56" rx="8" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.6"/>
  <text x="400" y="171" text-anchor="middle" font-size="15" font-weight="700" fill="#6D28D9">HIR</text>

  <rect x="248" y="224" width="304" height="72" rx="8" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.8"/>
  <text x="400" y="253" text-anchor="middle" font-size="15" font-weight="700" fill="#6D28D9">MIR</text>
  <text x="400" y="277" text-anchor="middle" font-size="13" fill="#6D28D9">basic-block CFG</text>

  <rect x="248" y="328" width="304" height="72" rx="8" fill="#FFFBEB" stroke="#D97706" stroke-width="1.8"/>
  <text x="400" y="357" text-anchor="middle" font-size="15" font-weight="700" fill="#B45309">LLVM IR</text>
  <text x="400" y="381" text-anchor="middle" font-size="13" fill="#B45309">instances multiply</text>

  <rect x="248" y="432" width="304" height="56" rx="8" fill="#ECFDF5" stroke="#059669" stroke-width="1.6"/>
  <text x="400" y="467" text-anchor="middle" font-size="15" font-weight="700" fill="#047857">machine code</text>

  <rect x="40" y="136" width="184" height="160" rx="8" fill="#F8FAFC" stroke="#475569" stroke-width="1.5"/>
  <text x="132" y="208" text-anchor="middle" font-size="15" font-weight="700" fill="#334155">rustc frontend</text>
  <text x="132" y="232" text-anchor="middle" font-size="13" fill="#334155">safety</text>

  <rect x="40" y="328" width="184" height="72" rx="8" fill="#F8FAFC" stroke="#475569" stroke-width="1.5"/>
  <text x="132" y="357" text-anchor="middle" font-size="15" font-weight="700" fill="#334155">LLVM backend</text>
  <text x="132" y="381" text-anchor="middle" font-size="13" fill="#334155">speed</text>

  <rect x="576" y="224" width="184" height="72" rx="8" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.3" stroke-dasharray="5 3"/>
  <text x="668" y="253" text-anchor="middle" font-size="13" fill="#6D28D9">borrow check</text>
  <text x="668" y="277" text-anchor="middle" font-size="13" fill="#6D28D9">drop insertion</text>

  <rect x="576" y="328" width="184" height="72" rx="8" fill="#FFFBEB" stroke="#D97706" stroke-width="1.3" stroke-dasharray="5 3"/>
  <text x="668" y="357" text-anchor="middle" font-size="13" fill="#B45309">-O3 passes</text>
  <text x="668" y="381" text-anchor="middle" font-size="13" fill="#B45309">inline · vectorize</text>
</svg>
