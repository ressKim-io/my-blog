<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 336" role="img" aria-labelledby="t6 d6" font-family="Pretendard, ui-sans-serif, system-ui, -apple-system, sans-serif">
  <title id="t6">Contiguous values versus an array of references</title>
  <desc id="d6">A Go slice of structs stores each element inline and back to back, so a sequential walk is a sequential memory access and the hardware prefetcher keeps the data in cache. A Java array of a plain class stores pointers, and the objects sit scattered across the heap, so walking the array chases pointers and defeats the prefetcher.</desc>
  <defs>
    <marker id="a6" markerWidth="9" markerHeight="9" refX="6.5" refY="2.8" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L6.5,2.8 L0,5.6 Z" fill="#BE123C"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="800" height="336" fill="#FFFFFF"/>

  <line x1="400" y1="24" x2="400" y2="312" stroke="#E4E4E7" stroke-width="1.2"/>

  <text x="196" y="48" text-anchor="middle" font-size="15" font-weight="700" fill="#047857" font-family="ui-monospace, monospace">Go []Point</text>
  <text x="596" y="48" text-anchor="middle" font-size="15" font-weight="700" fill="#BE123C" font-family="ui-monospace, monospace">Java Point[]</text>

  <rect x="24" y="80" width="344" height="64" rx="6" fill="#ECFDF5" stroke="#059669" stroke-width="1.6"/>
  <rect x="32" y="90" width="76" height="44" rx="3" fill="#FFFFFF" stroke="#059669" stroke-width="1.1"/>
  <text x="70" y="118" text-anchor="middle" font-size="14" font-weight="700" fill="#047857">P0</text>
  <rect x="116" y="90" width="76" height="44" rx="3" fill="#FFFFFF" stroke="#059669" stroke-width="1.1"/>
  <text x="154" y="118" text-anchor="middle" font-size="14" font-weight="700" fill="#047857">P1</text>
  <rect x="200" y="90" width="76" height="44" rx="3" fill="#FFFFFF" stroke="#059669" stroke-width="1.1"/>
  <text x="238" y="118" text-anchor="middle" font-size="14" font-weight="700" fill="#047857">P2</text>
  <rect x="284" y="90" width="76" height="44" rx="3" fill="#FFFFFF" stroke="#059669" stroke-width="1.1"/>
  <text x="322" y="118" text-anchor="middle" font-size="14" font-weight="700" fill="#047857">P3</text>

  <text x="196" y="180" text-anchor="middle" font-size="14" font-weight="700" fill="#0E7490">contiguous</text>

  <rect x="24" y="208" width="344" height="80" rx="9" fill="#ECFDF5" stroke="#059669" stroke-width="1.4" stroke-dasharray="5 3"/>
  <text x="196" y="240" text-anchor="middle" font-size="15" font-weight="700" fill="#047857">the prefetcher works</text>
  <text x="196" y="266" text-anchor="middle" font-size="13" fill="#047857">data is in cache before you ask</text>

  <rect x="432" y="80" width="336" height="44" rx="6" fill="#FFF1F2" stroke="#E11D48" stroke-width="1.6"/>
  <rect x="440" y="88" width="72" height="28" rx="3" fill="#FFFFFF" stroke="#E11D48" stroke-width="1.1"/>
  <text x="476" y="107" text-anchor="middle" font-size="13" fill="#BE123C" font-family="ui-monospace, monospace">ptr0</text>
  <rect x="520" y="88" width="72" height="28" rx="3" fill="#FFFFFF" stroke="#E11D48" stroke-width="1.1"/>
  <text x="556" y="107" text-anchor="middle" font-size="13" fill="#BE123C" font-family="ui-monospace, monospace">ptr1</text>
  <rect x="600" y="88" width="72" height="28" rx="3" fill="#FFFFFF" stroke="#E11D48" stroke-width="1.1"/>
  <text x="636" y="107" text-anchor="middle" font-size="13" fill="#BE123C" font-family="ui-monospace, monospace">ptr2</text>
  <rect x="680" y="88" width="72" height="28" rx="3" fill="#FFFFFF" stroke="#E11D48" stroke-width="1.1"/>
  <text x="716" y="107" text-anchor="middle" font-size="13" fill="#BE123C" font-family="ui-monospace, monospace">ptr3</text>

  <line x1="476" y1="124" x2="464" y2="158" stroke="#BE123C" stroke-width="1.3" marker-end="url(#a6)"/>
  <line x1="556" y1="124" x2="632" y2="158" stroke="#BE123C" stroke-width="1.3" marker-end="url(#a6)"/>
  <line x1="636" y1="124" x2="716" y2="158" stroke="#BE123C" stroke-width="1.3" marker-end="url(#a6)"/>
  <line x1="716" y1="124" x2="552" y2="158" stroke="#BE123C" stroke-width="1.3" marker-end="url(#a6)"/>

  <text x="440" y="152" font-size="13" fill="#334155">heap</text>
  <rect x="432" y="162" width="336" height="46" rx="6" fill="#FFFBEB" stroke="#D97706" stroke-width="1.4"/>
  <rect x="440" y="170" width="56" height="30" rx="3" fill="#FFFFFF" stroke="#D97706" stroke-width="1"/>
  <text x="468" y="190" text-anchor="middle" font-size="13" fill="#B45309">P0</text>
  <rect x="524" y="170" width="56" height="30" rx="3" fill="#FFFFFF" stroke="#D97706" stroke-width="1"/>
  <text x="552" y="190" text-anchor="middle" font-size="13" fill="#B45309">P3</text>
  <rect x="604" y="170" width="56" height="30" rx="3" fill="#FFFFFF" stroke="#D97706" stroke-width="1"/>
  <text x="632" y="190" text-anchor="middle" font-size="13" fill="#B45309">P1</text>
  <rect x="688" y="170" width="56" height="30" rx="3" fill="#FFFFFF" stroke="#D97706" stroke-width="1"/>
  <text x="716" y="190" text-anchor="middle" font-size="13" fill="#B45309">P2</text>

  <rect x="432" y="228" width="336" height="80" rx="9" fill="#FFF1F2" stroke="#E11D48" stroke-width="1.4" stroke-dasharray="5 3"/>
  <text x="600" y="260" text-anchor="middle" font-size="15" font-weight="700" fill="#BE123C">the prefetcher is defeated</text>
  <text x="600" y="286" text-anchor="middle" font-size="13" fill="#BE123C">each element is a pointer chase</text>
</svg>
