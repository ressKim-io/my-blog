<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" role="img" aria-labelledby="t1b d1b" font-family="Pretendard, ui-sans-serif, system-ui, -apple-system, sans-serif">
  <title id="t1b">Escape analysis already filters out most of the short-lived objects</title>
  <desc id="d1b">Two columns compare where short-lived objects end up. On the JVM side, objects are born on the heap, so the collector is the only thing that can clean them up, and splitting the heap into a young and an old generation is what makes that cleanup cheap. On the Go side, escape analysis in the compiler decides at build time that an object which never outlives its function can live on the stack instead, and a stack frame is reclaimed for free when the function returns. The work a young generation exists to do has largely been taken over by the compiler before the collector ever sees it, which is a large part of why Go does not bother with generations at all.</desc>
  <rect x="0" y="0" width="800" height="380" fill="#FFFFFF"/>

  <text x="190" y="46" text-anchor="middle" font-size="16" font-weight="700" fill="#6D28D9">JVM</text>
  <text x="600" y="46" text-anchor="middle" font-size="16" font-weight="700" fill="#0E7490">Go</text>

  <rect x="70" y="70" width="240" height="46" rx="8" fill="#F8FAFC" stroke="#475569" stroke-width="1.8"/>
  <text x="190" y="99" text-anchor="middle" font-size="14" font-weight="700" fill="#334155">short-lived objects</text>

  <rect x="480" y="70" width="240" height="46" rx="8" fill="#F8FAFC" stroke="#475569" stroke-width="1.8"/>
  <text x="600" y="99" text-anchor="middle" font-size="14" font-weight="700" fill="#334155">short-lived objects</text>

  <path d="M 190 122 L 190 160" stroke="#475569" stroke-width="2" marker-end="url(#s1b)"/>

  <rect x="480" y="140" width="240" height="46" rx="8" fill="#ECFEFF" stroke="#0891B2" stroke-width="2.4"/>
  <text x="600" y="169" text-anchor="middle" font-size="14" font-weight="700" fill="#0E7490">escape analysis</text>
  <path d="M 600 122 L 600 134" stroke="#475569" stroke-width="2" marker-end="url(#s1b)"/>

  <rect x="70" y="166" width="240" height="70" rx="10" fill="#F5F3FF" stroke="#7C3AED" stroke-width="2.2"/>
  <text x="190" y="196" text-anchor="middle" font-size="15" font-weight="700" fill="#6D28D9">heap</text>
  <text x="190" y="219" text-anchor="middle" font-size="13" font-weight="600" fill="#6D28D9">only the GC can clean it</text>

  <rect x="480" y="212" width="110" height="60" rx="10" fill="#ECFDF5" stroke="#059669" stroke-width="2.2"/>
  <text x="535" y="238" text-anchor="middle" font-size="14" font-weight="700" fill="#047857">stack</text>
  <text x="535" y="259" text-anchor="middle" font-size="13" font-weight="600" fill="#047857">free on return</text>

  <rect x="610" y="212" width="110" height="60" rx="10" fill="#F5F3FF" stroke="#7C3AED" stroke-width="2.2"/>
  <text x="665" y="238" text-anchor="middle" font-size="14" font-weight="700" fill="#6D28D9">heap</text>
  <text x="665" y="259" text-anchor="middle" font-size="13" font-weight="600" fill="#6D28D9">the rest</text>

  <path d="M 570 192 L 540 206" stroke="#059669" stroke-width="2.2" marker-end="url(#g1b)"/>
  <path d="M 630 192 L 660 206" stroke="#7C3AED" stroke-width="2.2" marker-end="url(#v1b)"/>

  <path d="M 190 242 L 190 280" stroke="#475569" stroke-width="2" marker-end="url(#s1b)"/>
  <rect x="70" y="286" width="240" height="46" rx="8" fill="#FFFBEB" stroke="#D97706" stroke-width="2.2"/>
  <text x="190" y="315" text-anchor="middle" font-size="14" font-weight="700" fill="#B45309">generations pay off</text>

  <rect x="480" y="286" width="240" height="46" rx="8" fill="#F8FAFC" stroke="#475569" stroke-width="1.8" stroke-dasharray="6 4"/>
  <text x="600" y="315" text-anchor="middle" font-size="14" font-weight="700" fill="#334155">less left to gain</text>

  <defs>
    <marker id="s1b" markerWidth="9" markerHeight="9" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#475569"/></marker>
    <marker id="g1b" markerWidth="9" markerHeight="9" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#059669"/></marker>
    <marker id="v1b" markerWidth="9" markerHeight="9" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#7C3AED"/></marker>
  </defs>
</svg>
