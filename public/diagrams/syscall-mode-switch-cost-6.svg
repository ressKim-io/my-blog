<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-labelledby="t6 d6" font-family="Pretendard, ui-sans-serif, system-ui, -apple-system, sans-serif">
  <title id="t6">Four ways to pay less toll at the same gate</title>
  <desc id="d6">Naively, each operation crosses the kernel boundary once. Batching buffers several operations and crosses once. vDSO maps kernel code into user space so there is no crossing at all. eBPF pushes your logic down into the kernel so there are no round trips.</desc>
  <defs>
    <marker id="s6" markerWidth="9" markerHeight="9" refX="6.5" refY="2.8" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L6.5,2.8 L0,5.6 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="800" height="400" fill="#FFFFFF"/>

  <rect x="24" y="76" width="752" height="104" rx="8" fill="#ECFEFF" opacity="0.45"/>
  <rect x="24" y="228" width="752" height="104" rx="8" fill="#F5F3FF" opacity="0.55"/>
  <text x="36" y="98" font-size="13" font-weight="700" fill="#0E7490">user space</text>
  <text x="36" y="250" font-size="13" font-weight="700" fill="#6D28D9">kernel</text>

  <text x="112" y="48" text-anchor="middle" font-size="15" font-weight="700" fill="#BE123C">naive</text>
  <text x="304" y="48" text-anchor="middle" font-size="15" font-weight="700" fill="#334155">batching</text>
  <text x="496" y="48" text-anchor="middle" font-size="15" font-weight="700" fill="#334155">vDSO</text>
  <text x="688" y="48" text-anchor="middle" font-size="15" font-weight="700" fill="#334155">eBPF</text>

  <line x1="80" y1="180" x2="80" y2="228" stroke="#E11D48" stroke-width="1.6" marker-end="url(#s6)"/>
  <line x1="112" y1="180" x2="112" y2="228" stroke="#E11D48" stroke-width="1.6" marker-end="url(#s6)"/>
  <line x1="144" y1="180" x2="144" y2="228" stroke="#E11D48" stroke-width="1.6" marker-end="url(#s6)"/>
  <text x="112" y="368" text-anchor="middle" font-size="14" font-weight="700" fill="#BE123C">3 crossings</text>

  <rect x="240" y="104" width="128" height="52" rx="6" fill="#FFFFFF" stroke="#0891B2" stroke-width="1.5"/>
  <text x="304" y="136" text-anchor="middle" font-size="13" fill="#0E7490">buffer</text>
  <line x1="304" y1="180" x2="304" y2="228" stroke="#475569" stroke-width="1.8" marker-end="url(#s6)"/>
  <text x="304" y="368" text-anchor="middle" font-size="14" font-weight="700" fill="#334155">1 crossing</text>

  <rect x="432" y="104" width="128" height="52" rx="6" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="496" y="136" text-anchor="middle" font-size="13" fill="#6D28D9">kernel code</text>
  <text x="496" y="368" text-anchor="middle" font-size="14" font-weight="700" fill="#047857">0 crossings</text>

  <rect x="624" y="252" width="128" height="52" rx="6" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.5"/>
  <text x="688" y="284" text-anchor="middle" font-size="13" fill="#0E7490">your logic</text>
  <text x="688" y="368" text-anchor="middle" font-size="14" font-weight="700" fill="#047857">no round trips</text>
</svg>
