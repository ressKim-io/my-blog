<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430" role="img" aria-labelledby="t6 d6" font-family="Pretendard, ui-sans-serif, system-ui, -apple-system, sans-serif">
  <title id="t6">Four patterns for reducing kernel crossings</title>
  <desc id="d6">Four panels around one user-kernel boundary. Naive: every operation crosses the boundary once. Batching: operations are collected in a buffer or queue and cross together. vDSO: kernel code is mapped into user space so no crossing happens. eBPF: user logic is pushed into the kernel so events are handled without round trips.</desc>
  <defs>
    <marker id="ar6" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#475569"/>
    </marker>
    <marker id="ar6g" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#059669"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="800" height="430" fill="#FFFFFF"/>

  <text x="400" y="26" text-anchor="middle" font-size="12" fill="#64748B">four ways to pay less toll at the same gate</text>

  <!-- boundary -->
  <line x1="32" y1="250" x2="768" y2="250" stroke="#475569" stroke-width="1.5"/>
  <text x="36" y="240" font-size="10.5" fill="#64748B">user space</text>
  <text x="36" y="266" font-size="10.5" fill="#64748B">kernel</text>

  <!-- panel titles -->
  <text x="133" y="60" text-anchor="middle" font-size="11.5" font-weight="700" fill="#334155">naive</text>
  <text x="133" y="76" text-anchor="middle" font-size="10" fill="#64748B">1 op = 1 crossing</text>
  <text x="317" y="60" text-anchor="middle" font-size="11.5" font-weight="700" fill="#334155">batching</text>
  <text x="317" y="76" text-anchor="middle" font-size="10" fill="#64748B">buffered I/O · readv · io_uring</text>
  <text x="501" y="60" text-anchor="middle" font-size="11.5" font-weight="700" fill="#334155">vDSO</text>
  <text x="501" y="76" text-anchor="middle" font-size="10" fill="#64748B">kernel code mapped up</text>
  <text x="685" y="60" text-anchor="middle" font-size="11.5" font-weight="700" fill="#334155">eBPF</text>
  <text x="685" y="76" text-anchor="middle" font-size="10" fill="#64748B">your logic pushed down</text>

  <!-- panel separators -->
  <line x1="225" y1="88" x2="225" y2="340" stroke="#E4E4E7" stroke-width="1"/>
  <line x1="409" y1="88" x2="409" y2="340" stroke="#E4E4E7" stroke-width="1"/>
  <line x1="593" y1="88" x2="593" y2="340" stroke="#E4E4E7" stroke-width="1"/>

  <!-- A: naive — three crossing pairs -->
  <line x1="93" y1="180" x2="93" y2="312" stroke="#475569" stroke-width="1.5" marker-end="url(#ar6)"/>
  <line x1="105" y1="312" x2="105" y2="184" stroke="#475569" stroke-width="1.5" marker-end="url(#ar6)"/>
  <line x1="133" y1="180" x2="133" y2="312" stroke="#475569" stroke-width="1.5" marker-end="url(#ar6)"/>
  <line x1="145" y1="312" x2="145" y2="184" stroke="#475569" stroke-width="1.5" marker-end="url(#ar6)"/>
  <line x1="173" y1="180" x2="173" y2="312" stroke="#475569" stroke-width="1.5" marker-end="url(#ar6)"/>
  <line x1="185" y1="312" x2="185" y2="184" stroke="#475569" stroke-width="1.5" marker-end="url(#ar6)"/>
  <text x="139" y="366" text-anchor="middle" font-size="10.5" font-weight="700" fill="#BE123C">3 ops → 3 crossings</text>

  <!-- B: batching -->
  <line x1="287" y1="104" x2="287" y2="132" stroke="#475569" stroke-width="1.3" marker-end="url(#ar6)"/>
  <line x1="317" y1="104" x2="317" y2="132" stroke="#475569" stroke-width="1.3" marker-end="url(#ar6)"/>
  <line x1="347" y1="104" x2="347" y2="132" stroke="#475569" stroke-width="1.3" marker-end="url(#ar6)"/>
  <rect x="262" y="136" width="110" height="44" rx="8" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.5"/>
  <text x="317" y="162" text-anchor="middle" font-size="10.5" font-weight="700" fill="#0E7490">buffer / queue</text>
  <line x1="317" y1="180" x2="317" y2="312" stroke="#059669" stroke-width="2.4" marker-end="url(#ar6g)"/>
  <text x="317" y="366" text-anchor="middle" font-size="10.5" font-weight="700" fill="#047857">3 ops → 1 crossing</text>

  <!-- C: vDSO -->
  <rect x="446" y="100" width="110" height="40" rx="8" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.5"/>
  <text x="501" y="124" text-anchor="middle" font-size="10.5" font-weight="700" fill="#0E7490">app call</text>
  <line x1="501" y1="140" x2="501" y2="158" stroke="#475569" stroke-width="1.5" marker-end="url(#ar6)"/>
  <rect x="446" y="162" width="110" height="52" rx="8" fill="#ECFDF5" stroke="#059669" stroke-width="1.6"/>
  <text x="501" y="184" text-anchor="middle" font-size="10.5" font-weight="700" fill="#047857">kernel code</text>
  <text x="501" y="200" text-anchor="middle" font-size="9.5" fill="#047857">mapped read-only</text>
  <text x="501" y="366" text-anchor="middle" font-size="10.5" font-weight="700" fill="#047857">0 crossings</text>

  <!-- D: eBPF -->
  <rect x="630" y="272" width="110" height="52" rx="8" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.6"/>
  <text x="685" y="294" text-anchor="middle" font-size="10.5" font-weight="700" fill="#0E7490">your logic</text>
  <text x="685" y="310" text-anchor="middle" font-size="9.5" fill="#334155">verified bytecode</text>
  <line x1="608" y1="298" x2="626" y2="298" stroke="#475569" stroke-width="1.5" marker-end="url(#ar6)"/>
  <text x="608" y="288" text-anchor="end" font-size="9.5" fill="#64748B">events</text>
  <text x="685" y="366" text-anchor="middle" font-size="10.5" font-weight="700" fill="#047857">no round trips</text>

  <!-- bottom legend -->
  <rect x="48" y="384" width="704" height="32" rx="7" fill="#F8FAFC" stroke="#E4E4E7" stroke-width="1"/>
  <text x="400" y="404" text-anchor="middle" font-size="11.5" fill="#334155">the gate's toll is fixed — performance work is about crossing it less often</text>
</svg>
