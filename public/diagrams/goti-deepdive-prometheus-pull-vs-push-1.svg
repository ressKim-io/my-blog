<svg role="img" aria-labelledby="title-1 desc-1"
  viewBox="0 0 800 480" width="100%" height="auto"
  xmlns="http://www.w3.org/2000/svg"
  style="font-family: 'Pretendard', system-ui, sans-serif;">
  <title id="title-1">Pull 모델 vs Push 모델 — Prometheus scrape와 OTLP push 비교</title>
  <desc id="desc-1">왼쪽 pull 모델에서는 Prometheus 서버가 타깃 /metrics 엔드포인트를 주기적으로 scrape하고, 오른쪽 push 모델에서는 앱이 OTel Collector에 OTLP로 직접 전송한다</desc>

  <!-- 배경 -->
  <rect width="800" height="480" fill="#FAFAFA"/>

  <!-- 제목 -->
  <text x="400" y="32" text-anchor="middle" font-size="15" font-weight="700" fill="#0A0A0A">수집 모델 비교 — Pull(Scrape) vs Push(OTLP)</text>

  <!-- ====== 왼쪽: Pull 모델 ====== -->
  <!-- 영역 배경 -->
  <rect x="24" y="48" width="360" height="400" rx="8" fill="#F8FAFC" stroke="#D4D4D8" stroke-width="1"/>
  <text x="204" y="74" text-anchor="middle" font-size="13" font-weight="700" fill="#334155">Pull 모델 (Scrape)</text>

  <!-- Prometheus 서버 박스 -->
  <rect x="104" y="88" width="200" height="64" rx="6" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="204" y="114" text-anchor="middle" font-size="13" font-weight="600" fill="#047857">Prometheus 서버</text>
  <text x="204" y="132" text-anchor="middle" font-size="11" fill="#27272A">15~30s scrape interval</text>

  <!-- scrape 화살표 (아래로) -->
  <line x1="204" y1="152" x2="204" y2="192" stroke="#0A0A0A" stroke-width="1.5" marker-end="url(#arrow-dark)"/>
  <rect x="144" y="162" width="120" height="18" rx="3" fill="#FAFAFA"/>
  <text x="204" y="175" text-anchor="middle" font-size="11" fill="#27272A">GET /metrics (HTTP)</text>

  <!-- 타깃 박스 그룹 -->
  <!-- 타깃 A -->
  <rect x="40" y="200" width="136" height="56" rx="6" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.5"/>
  <text x="108" y="224" text-anchor="middle" font-size="12" font-weight="600" fill="#0E7490">App A</text>
  <text x="108" y="242" text-anchor="middle" font-size="11" fill="#27272A">/metrics 노출</text>

  <!-- 타깃 B -->
  <rect x="192" y="200" width="136" height="56" rx="6" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.5"/>
  <text x="260" y="224" text-anchor="middle" font-size="12" font-weight="600" fill="#0E7490">App B</text>
  <text x="260" y="242" text-anchor="middle" font-size="11" fill="#27272A">/metrics 노출</text>

  <!-- scrape 화살표 (타깃 A) -->
  <line x1="148" y1="192" x2="108" y2="200" stroke="#0A0A0A" stroke-width="1" stroke-dasharray="4 2"/>
  <!-- scrape 화살표 (타깃 B) -->
  <line x1="260" y1="192" x2="260" y2="200" stroke="#0A0A0A" stroke-width="1" stroke-dasharray="4 2"/>

  <!-- 응답 화살표 (타깃A → Prometheus) -->
  <line x1="176" y1="228" x2="176" y2="160" stroke="#059669" stroke-width="1.5" marker-end="url(#arrow-green)" stroke-dasharray="5 3"/>

  <!-- TSDB 박스 -->
  <rect x="104" y="288" width="200" height="56" rx="6" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="204" y="313" text-anchor="middle" font-size="12" font-weight="600" fill="#6D28D9">로컬 TSDB</text>
  <text x="204" y="331" text-anchor="middle" font-size="11" fill="#27272A">단일 노드 저장</text>

  <!-- Prometheus → TSDB -->
  <line x1="204" y1="152" x2="204" y2="288" stroke="#7C3AED" stroke-width="1.5" marker-end="url(#arrow-violet)" stroke-dasharray="4 2"/>

  <!-- up 메트릭 안내 -->
  <rect x="64" y="360" width="280" height="52" rx="6" fill="#FFFBEB" stroke="#D97706" stroke-width="1"/>
  <text x="204" y="382" text-anchor="middle" font-size="12" font-weight="600" fill="#B45309">up 메트릭</text>
  <text x="204" y="399" text-anchor="middle" font-size="11" fill="#27272A">scrape 성공=1, 실패=0으로 타깃 상태 추적</text>

  <!-- ====== 오른쪽: Push 모델 ====== -->
  <rect x="416" y="48" width="360" height="400" rx="8" fill="#F8FAFC" stroke="#D4D4D8" stroke-width="1"/>
  <text x="596" y="74" text-anchor="middle" font-size="13" font-weight="700" fill="#334155">Push 모델 (OTLP)</text>

  <!-- App 박스들 (push 전송 주체) -->
  <rect x="432" y="88" width="136" height="56" rx="6" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.5"/>
  <text x="500" y="112" text-anchor="middle" font-size="12" font-weight="600" fill="#0E7490">App A</text>
  <text x="500" y="130" text-anchor="middle" font-size="11" fill="#27272A">SDK 계측</text>

  <rect x="584" y="88" width="136" height="56" rx="6" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.5"/>
  <text x="652" y="112" text-anchor="middle" font-size="12" font-weight="600" fill="#0E7490">App B</text>
  <text x="652" y="130" text-anchor="middle" font-size="11" fill="#27272A">SDK 계측</text>

  <!-- Push 화살표 App A → Collector -->
  <line x1="500" y1="144" x2="548" y2="192" stroke="#0A0A0A" stroke-width="1.5" marker-end="url(#arrow-dark)"/>
  <rect x="488" y="156" width="60" height="18" rx="3" fill="#FAFAFA"/>
  <text x="518" y="169" text-anchor="middle" font-size="10" fill="#27272A">OTLP/gRPC</text>

  <!-- Push 화살표 App B → Collector -->
  <line x1="652" y1="144" x2="604" y2="192" stroke="#0A0A0A" stroke-width="1.5" marker-end="url(#arrow-dark)"/>
  <rect x="596" y="156" width="60" height="18" rx="3" fill="#FAFAFA"/>
  <text x="626" y="169" text-anchor="middle" font-size="10" fill="#27272A">OTLP/gRPC</text>

  <!-- OTel Collector 박스 -->
  <rect x="496" y="200" width="200" height="56" rx="6" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="596" y="224" text-anchor="middle" font-size="13" font-weight="600" fill="#047857">OTel Collector</text>
  <text x="596" y="242" text-anchor="middle" font-size="11" fill="#27272A">수신·변환·전달</text>

  <!-- Collector → 저장소 -->
  <line x1="596" y1="256" x2="596" y2="288" stroke="#0A0A0A" stroke-width="1.5" marker-end="url(#arrow-dark)"/>

  <!-- 원격 저장소 박스 -->
  <rect x="496" y="288" width="200" height="56" rx="6" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="596" y="313" text-anchor="middle" font-size="12" font-weight="600" fill="#6D28D9">원격 저장소 (Mimir 등)</text>
  <text x="596" y="331" text-anchor="middle" font-size="11" fill="#27272A">분산·장기 보존</text>

  <!-- 특징 안내 -->
  <rect x="456" y="360" width="280" height="52" rx="6" fill="#FFFBEB" stroke="#D97706" stroke-width="1"/>
  <text x="596" y="382" text-anchor="middle" font-size="12" font-weight="600" fill="#B45309">앱이 전송 주체</text>
  <text x="596" y="399" text-anchor="middle" font-size="11" fill="#27272A">/metrics 노출 없이도 수집 가능</text>

  <!-- 화살표 마커 정의 -->
  <defs>
    <marker id="arrow-dark" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#0A0A0A"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#059669"/>
    </marker>
    <marker id="arrow-violet" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7C3AED"/>
    </marker>
  </defs>
</svg>
