<svg
  role="img"
  aria-labelledby="title-2 desc-2"
  viewBox="0 0 800 520"
  width="100%"
  height="auto"
  xmlns="http://www.w3.org/2000/svg"
  style="font-family: 'Pretendard', system-ui, sans-serif;"
>
  <title id="title-2">Loki 스트림 정의와 LogQL 처리 흐름</title>
  <desc id="desc-2">레이블 조합이 스트림을 정의하고, 로그 라인이 청크로 묶여 Object Storage에 저장된 뒤, LogQL 쿼리가 인덱스를 통해 대상 청크만 선택해 필터링하는 흐름을 보여주는 다이어그램</desc>

  <!-- 배경 -->
  <rect width="800" height="520" fill="#FAFAFA"/>

  <!-- 제목 -->
  <text x="400" y="36" text-anchor="middle" font-size="15" font-weight="700" fill="#0A0A0A">Loki 스트림 → 청크 → LogQL 처리 흐름</text>

  <!-- ── 왼쪽: 스트림 정의 ── -->

  <!-- 스트림 A -->
  <rect x="32" y="56" width="216" height="96" rx="6" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="140" y="76" text-anchor="middle" font-size="12" font-weight="600" fill="#047857">스트림 A</text>
  <text x="140" y="94" text-anchor="middle" font-size="11" fill="#27272A">{app="payment",</text>
  <text x="140" y="110" text-anchor="middle" font-size="11" fill="#27272A"> level="error"}</text>
  <text x="140" y="128" text-anchor="middle" font-size="10" fill="#047857">레이블 조합 = 스트림 식별자</text>
  <text x="140" y="144" text-anchor="middle" font-size="10" fill="#475569">namespace="goti-prod"</text>

  <!-- 스트림 B -->
  <rect x="32" y="168" width="216" height="96" rx="6" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="140" y="188" text-anchor="middle" font-size="12" font-weight="600" fill="#047857">스트림 B</text>
  <text x="140" y="206" text-anchor="middle" font-size="11" fill="#27272A">{app="ticketing",</text>
  <text x="140" y="222" text-anchor="middle" font-size="11" fill="#27272A"> level="info"}</text>
  <text x="140" y="240" text-anchor="middle" font-size="10" fill="#047857">다른 레이블 → 다른 스트림</text>
  <text x="140" y="256" text-anchor="middle" font-size="10" fill="#475569">namespace="goti-prod"</text>

  <!-- 스트림 C -->
  <rect x="32" y="280" width="216" height="96" rx="6" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="140" y="300" text-anchor="middle" font-size="12" font-weight="600" fill="#047857">스트림 C</text>
  <text x="140" y="318" text-anchor="middle" font-size="11" fill="#27272A">{app="user",</text>
  <text x="140" y="334" text-anchor="middle" font-size="11" fill="#27272A"> level="warn"}</text>
  <text x="140" y="352" text-anchor="middle" font-size="10" fill="#047857">레이블 카디널리티 = 스트림 수</text>
  <text x="140" y="368" text-anchor="middle" font-size="10" fill="#475569">namespace="goti-prod"</text>

  <!-- 스트림 주석 -->
  <text x="140" y="404" text-anchor="middle" font-size="11" fill="#047857">스트림 수가 적을수록</text>
  <text x="140" y="420" text-anchor="middle" font-size="11" fill="#047857">인덱스가 작아짐</text>
  <text x="140" y="436" text-anchor="middle" font-size="10" fill="#BE123C">⚠ 고카디널리티 레이블은 스트림 폭발 유발</text>

  <!-- ── 중앙: 청크 저장 ── -->
  <defs>
    <marker id="arrow-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#059669"/>
    </marker>
    <marker id="arrow-violet" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7C3AED"/>
    </marker>
    <marker id="arrow-dark2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#0A0A0A"/>
    </marker>
  </defs>

  <!-- 스트림 A → 청크 A -->
  <line x1="248" y1="104" x2="320" y2="104" stroke="#059669" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <!-- 스트림 B → 청크 B -->
  <line x1="248" y1="216" x2="320" y2="216" stroke="#059669" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <!-- 스트림 C → 청크 C -->
  <line x1="248" y1="328" x2="320" y2="328" stroke="#059669" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- 청크 A -->
  <rect x="320" y="72" width="176" height="64" rx="6" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="408" y="92" text-anchor="middle" font-size="12" font-weight="600" fill="#6D28D9">청크 A</text>
  <text x="408" y="110" text-anchor="middle" font-size="10" fill="#27272A">로그 라인 묶음 (gzip)</text>
  <text x="408" y="126" text-anchor="middle" font-size="10" fill="#475569">Object Storage 경로</text>

  <!-- 청크 B -->
  <rect x="320" y="184" width="176" height="64" rx="6" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="408" y="204" text-anchor="middle" font-size="12" font-weight="600" fill="#6D28D9">청크 B</text>
  <text x="408" y="222" text-anchor="middle" font-size="10" fill="#27272A">로그 라인 묶음 (gzip)</text>
  <text x="408" y="238" text-anchor="middle" font-size="10" fill="#475569">Object Storage 경로</text>

  <!-- 청크 C -->
  <rect x="320" y="296" width="176" height="64" rx="6" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="408" y="316" text-anchor="middle" font-size="12" font-weight="600" fill="#6D28D9">청크 C</text>
  <text x="408" y="334" text-anchor="middle" font-size="10" fill="#27272A">로그 라인 묶음 (gzip)</text>
  <text x="408" y="350" text-anchor="middle" font-size="10" fill="#475569">Object Storage 경로</text>

  <!-- 인덱스 박스 (중앙 하단) -->
  <rect x="320" y="400" width="176" height="64" rx="6" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="408" y="422" text-anchor="middle" font-size="12" font-weight="600" fill="#047857">레이블 인덱스</text>
  <text x="408" y="440" text-anchor="middle" font-size="10" fill="#27272A">스트림 식별자</text>
  <text x="408" y="456" text-anchor="middle" font-size="10" fill="#27272A">→ 청크 A, B, C 위치</text>

  <!-- 청크들 → 인덱스 -->
  <line x1="408" y1="360" x2="408" y2="398" stroke="#059669" stroke-width="1.5" stroke-dasharray="4 2" marker-end="url(#arrow-green)"/>
  <rect x="360" y="372" width="96" height="18" fill="#FAFAFA"/>
  <text x="408" y="384" text-anchor="middle" font-size="10" fill="#047857">인덱스 등록</text>

  <!-- ── 오른쪽: LogQL 처리 ── -->

  <!-- LogQL 쿼리 박스 -->
  <rect x="544" y="56" width="224" height="80" rx="6" fill="#FFF" stroke="#0891B2" stroke-width="1.5"/>
  <text x="656" y="76" text-anchor="middle" font-size="12" font-weight="600" fill="#0E7490">LogQL 쿼리</text>
  <text x="656" y="98" text-anchor="middle" font-size="11" fill="#27272A">{app="payment"}</text>
  <text x="656" y="116" text-anchor="middle" font-size="11" fill="#27272A">  |= "ERROR"</text>

  <!-- 쿼리 → 인덱스 조회 화살표 -->
  <line x1="656" y1="136" x2="656" y2="188" stroke="#0891B2" stroke-width="1.5" marker-end="url(#arrow-dark2)"/>
  <rect x="596" y="148" width="120" height="20" fill="#FAFAFA"/>
  <text x="656" y="162" text-anchor="middle" font-size="10" fill="#0E7490">① 레이블로 스트림 찾기</text>

  <!-- 스트림 선택 박스 -->
  <rect x="544" y="188" width="224" height="56" rx="6" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.5"/>
  <text x="656" y="210" text-anchor="middle" font-size="12" font-weight="600" fill="#0E7490">스트림 선택</text>
  <text x="656" y="228" text-anchor="middle" font-size="10" fill="#27272A">인덱스에서 스트림 A만 매칭</text>
  <text x="656" y="244" text-anchor="middle" font-size="10" fill="#27272A">→ 청크 A 위치 확인</text>

  <!-- 스트림 선택 → 청크 읽기 화살표 -->
  <line x1="656" y1="244" x2="656" y2="292" stroke="#0891B2" stroke-width="1.5" marker-end="url(#arrow-dark2)"/>
  <rect x="596" y="254" width="120" height="20" fill="#FAFAFA"/>
  <text x="656" y="268" text-anchor="middle" font-size="10" fill="#0E7490">② 해당 청크만 읽기</text>

  <!-- 청크 읽기 박스 -->
  <rect x="544" y="292" width="224" height="56" rx="6" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="656" y="314" text-anchor="middle" font-size="12" font-weight="600" fill="#6D28D9">청크 A 압축 해제</text>
  <text x="656" y="332" text-anchor="middle" font-size="10" fill="#27272A">Object Storage에서</text>
  <text x="656" y="348" text-anchor="middle" font-size="10" fill="#27272A">청크 A 파일만 fetch</text>

  <!-- 청크 읽기 → 필터링 화살표 -->
  <line x1="656" y1="348" x2="656" y2="396" stroke="#0891B2" stroke-width="1.5" marker-end="url(#arrow-dark2)"/>
  <rect x="596" y="358" width="120" height="20" fill="#FAFAFA"/>
  <text x="656" y="372" text-anchor="middle" font-size="10" fill="#0E7490">③ 전문 필터링</text>

  <!-- 결과 박스 -->
  <rect x="544" y="396" width="224" height="56" rx="6" fill="#FFF" stroke="#0891B2" stroke-width="1.5"/>
  <text x="656" y="418" text-anchor="middle" font-size="12" font-weight="600" fill="#0E7490">"ERROR" 포함 라인 반환</text>
  <text x="656" y="436" text-anchor="middle" font-size="10" fill="#27272A">스트림 A 청크 내에서만</text>
  <text x="656" y="452" text-anchor="middle" font-size="10" fill="#27272A">정규식/문자열 필터 적용</text>

  <!-- 청크 B·C는 읽지 않음 표시 -->
  <rect x="544" y="468" width="224" height="28" rx="4" fill="#FFF1F2" stroke="#E11D48" stroke-width="1"/>
  <text x="656" y="486" text-anchor="middle" font-size="10" fill="#BE123C">스트림 B·C 청크는 읽지 않음 (스캔 범위 최소화)</text>
</svg>
