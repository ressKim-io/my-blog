  <line x1="640" y1="256" x2="512" y2="290" stroke="#7C3AED" stroke-width="1.8" marker-end="url(#g9v)"/>

  <rect x="64" y="40" width="192" height="52" rx="8" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.8"/>
  <text x="160" y="72" text-anchor="middle" font-size="15" font-weight="700" fill="#0E7490">Rust</text>
  <rect x="304" y="40" width="192" height="52" rx="8" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.8"/>
  <text x="400" y="72" text-anchor="middle" font-size="15" font-weight="700" fill="#0E7490">Go</text>
  <rect x="544" y="40" width="192" height="52" rx="8" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.8"/>
  <text x="640" y="72" text-anchor="middle" font-size="15" font-weight="700" fill="#0E7490">Java</text>

  <rect x="64" y="136" width="192" height="72" rx="9" fill="#ECFDF5" stroke="#059669" stroke-width="2"/>
  <text x="160" y="180" text-anchor="middle" font-size="14" font-weight="700" fill="#047857">glibc tcache</text>
  <rect x="304" y="136" width="192" height="72" rx="9" fill="#ECFDF5" stroke="#059669" stroke-width="2"/>
  <text x="400" y="180" text-anchor="middle" font-size="14" font-weight="700" fill="#047857">mcache · per P</text>
  <rect x="544" y="136" width="192" height="72" rx="9" fill="#ECFDF5" stroke="#059669" stroke-width="2"/>
  <text x="640" y="180" text-anchor="middle" font-size="14" font-weight="700" fill="#047857">TLAB · per thread</text>

  <text x="160" y="240" text-anchor="middle" font-size="13" fill="#334155">fused with libc</text>
  <text x="400" y="240" text-anchor="middle" font-size="13" fill="#334155">fused with GMP · GC</text>
  <text x="640" y="240" text-anchor="middle" font-size="13" fill="#334155">fused with Eden · GC</text>

  <rect x="200" y="296" width="400" height="64" rx="10" fill="#F5F3FF" stroke="#7C3AED" stroke-width="2"/>
  <text x="400" y="335" text-anchor="middle" font-size="16" font-weight="700" fill="#6D28D9">local cache · no lock</text>
