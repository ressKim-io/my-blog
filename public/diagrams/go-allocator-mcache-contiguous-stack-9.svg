    <marker id="g9d" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#334155"/>
    </marker>
    <marker id="g9v" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#7C3AED"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="800" height="400" fill="#FFFFFF"/>

