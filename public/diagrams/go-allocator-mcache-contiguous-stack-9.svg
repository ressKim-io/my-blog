  <line x1="400" y1="92" x2="400" y2="130" stroke="#334155" stroke-width="1.8" marker-end="url(#g9d)"/>
  <line x1="640" y1="92" x2="640" y2="130" stroke="#334155" stroke-width="1.8" marker-end="url(#g9d)"/>

