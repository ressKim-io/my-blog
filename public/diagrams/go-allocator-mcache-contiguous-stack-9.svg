<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-labelledby="t9 d9" font-family="Pretendard, ui-sans-serif, system-ui, -apple-system, sans-serif">
  <title id="t9">Three languages, three names, one answer</title>
  <desc id="d9">Rust reaches the glibc thread cache, Go reaches the per-processor mcache, and Java reaches its thread-local allocation buffer. The names and the owners differ, but all three arrived at the same answer: the common case, a small allocation, is served from a cache private to the thread or processor, with no lock at all. What differs is what each cache is fused with — the malloc implementation below it, Go's scheduler and collector, or the JVM's Eden and its collector.</desc>
