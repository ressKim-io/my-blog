<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 352" role="img" aria-labelledby="t6 d6" font-family="Pretendard, ui-sans-serif, system-ui, -apple-system, sans-serif">
  <title id="t6">Scalar replacement makes a non-escaping object disappear</title>
  <desc id="d6">Before the optimization, a Point object lives on the heap with an object header and two fields, and the local variable holds a reference to it. After scalar replacement, C2 proves the object never escapes, breaks it into its two fields which live in registers, and the header and the allocation are gone entirely.</desc>
  <defs>
    <marker id="m6v" markerWidth="11" markerHeight="11" refX="7.5" refY="3.2" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7.5,3.2 L0,6.4 Z" fill="#7C3AED"/>
    </marker>
    <marker id="m6a" markerWidth="9" markerHeight="9" refX="6.5" refY="2.8" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L6.5,2.8 L0,5.6 Z" fill="#B45309"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="800" height="352" fill="#FFFFFF"/>

  <line x1="336" y1="176" x2="452" y2="176" stroke="#7C3AED" stroke-width="2.4" marker-end="url(#m6v)"/>
  <text x="392" y="160" text-anchor="middle" font-size="14" font-weight="700" fill="#6D28D9">no escape</text>

  <text x="164" y="48" text-anchor="middle" font-size="15" font-weight="700" fill="#B45309">before</text>

  <rect x="40" y="72" width="112" height="48" rx="6" fill="#F8FAFC" stroke="#475569" stroke-width="1.5"/>
  <text x="96" y="102" text-anchor="middle" font-size="13" fill="#334155" font-family="ui-monospace, monospace">p</text>

  <line x1="152" y1="96" x2="152" y2="96" stroke="#B45309" stroke-width="1.4"/>
  <path d="M152,96 H196 V148" fill="none" stroke="#B45309" stroke-width="1.5" marker-end="url(#m6a)"/>

  <text x="200" y="90" font-size="13" fill="#B45309">reference</text>

  <rect x="40" y="160" width="272" height="128" rx="9" fill="#FFFBEB" stroke="#D97706" stroke-width="1.6"/>
  <text x="64" y="186" font-size="13" font-weight="700" fill="#B45309">heap</text>

  <rect x="64" y="200" width="224" height="32" rx="4" fill="#FFF1F2" stroke="#E11D48" stroke-width="1.3"/>
  <text x="176" y="221" text-anchor="middle" font-size="13" font-weight="700" fill="#BE123C">header 12–16B</text>

  <rect x="64" y="240" width="104" height="32" rx="4" fill="#FFFFFF" stroke="#D97706" stroke-width="1.2"/>
  <text x="116" y="261" text-anchor="middle" font-size="13" fill="#B45309" font-family="ui-monospace, monospace">x</text>
  <rect x="184" y="240" width="104" height="32" rx="4" fill="#FFFFFF" stroke="#D97706" stroke-width="1.2"/>
  <text x="236" y="261" text-anchor="middle" font-size="13" fill="#B45309" font-family="ui-monospace, monospace">y</text>

  <text x="620" y="48" text-anchor="middle" font-size="15" font-weight="700" fill="#047857">after</text>

  <rect x="472" y="72" width="288" height="88" rx="9" fill="#ECFDF5" stroke="#059669" stroke-width="1.6"/>
  <text x="496" y="98" font-size="13" font-weight="700" fill="#047857">registers</text>
  <rect x="496" y="112" width="112" height="32" rx="4" fill="#FFFFFF" stroke="#059669" stroke-width="1.2"/>
  <text x="552" y="133" text-anchor="middle" font-size="13" fill="#047857" font-family="ui-monospace, monospace">x → R8</text>
  <rect x="624" y="112" width="112" height="32" rx="4" fill="#FFFFFF" stroke="#059669" stroke-width="1.2"/>
  <text x="680" y="133" text-anchor="middle" font-size="13" fill="#047857" font-family="ui-monospace, monospace">y → R9</text>

  <rect x="472" y="192" width="288" height="96" rx="9" fill="#ECFDF5" stroke="#059669" stroke-width="1.4" stroke-dasharray="5 3"/>
  <text x="616" y="226" text-anchor="middle" font-size="15" font-weight="700" fill="#047857">no allocation</text>
  <text x="616" y="254" text-anchor="middle" font-size="13" fill="#047857">no header</text>
  <text x="616" y="276" text-anchor="middle" font-size="13" fill="#047857">no object</text>
</svg>
