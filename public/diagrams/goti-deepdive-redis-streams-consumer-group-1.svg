<svg role="img" aria-labelledby="title-1 desc-1" viewBox="0 0 800 600" width="100%" height="auto" xmlns="http://www.w3.org/2000/svg">
  <title id="title-1">Redis Streams Consumer Group 소비 흐름도</title>
  <desc id="desc-1">XADD로 Stream에 항목이 추가되고, XREADGROUP으로 소비자에게 배정되면 PEL에 등록되며, XACK 호출 시 PEL에서 제거되는 구조를 보여줍니다</desc>

  <style>
    text { font-family: 'Pretendard', system-ui, sans-serif; }
    .label-sm { font-size: 11px; fill: #27272A; }
    .label-md { font-size: 13px; fill: #0A0A0A; }
    .label-lg { font-size: 14px; font-weight: 600; }
    .arrow-label { font-size: 11px; fill: #27272A; }
    .section-title { font-size: 12px; font-weight: 600; fill: #475569; }
  </style>

  <!-- ── 배경 구역: Stream ── -->
  <rect x="24" y="40" width="220" height="520" rx="8" fill="#F8FAFC" stroke="#D4D4D8" stroke-width="1.5"/>
  <text x="134" y="65" text-anchor="middle" class="section-title">Stream (append-only log)</text>

  <!-- Stream 항목들 -->
  <rect x="44" y="80" width="180" height="44" rx="4" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="134" y="98" text-anchor="middle" class="label-md" fill="#047857">1745000000001-0</text>
  <text x="134" y="114" text-anchor="middle" class="label-sm">event: ORDER_CREATED</text>

  <rect x="44" y="136" width="180" height="44" rx="4" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="134" y="154" text-anchor="middle" class="label-md" fill="#047857">1745000000002-0</text>
  <text x="134" y="170" text-anchor="middle" class="label-sm">event: SEAT_HOLD</text>

  <rect x="44" y="192" width="180" height="44" rx="4" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="134" y="210" text-anchor="middle" class="label-md" fill="#047857">1745000000003-0</text>
  <text x="134" y="226" text-anchor="middle" class="label-sm">event: PAYMENT_CONFIRMED</text>

  <rect x="44" y="248" width="180" height="44" rx="4" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="134" y="266" text-anchor="middle" class="label-md" fill="#6D28D9">1745000000004-0</text>
  <text x="134" y="282" text-anchor="middle" class="label-sm">event: ORDER_CREATED ← 신규</text>

  <!-- XADD 화살표 (프로듀서 → Stream) -->
  <rect x="34" y="320" width="200" height="36" rx="4" fill="#FFFBEB" stroke="#D97706" stroke-width="1.5"/>
  <text x="134" y="342" text-anchor="middle" class="label-md" fill="#B45309">프로듀서 (Lua EVALSHA)</text>

  <line x1="134" y1="319" x2="134" y2="294" stroke="#D97706" stroke-width="1.5" marker-end="url(#arrow-amber)"/>
  <rect x="90" y="299" width="88" height="18" rx="2" fill="#FAFAFA"/>
  <text x="134" y="311" text-anchor="middle" class="arrow-label">XADD outbox:stream</text>

  <!-- ── 배경 구역: Consumer Group ── -->
  <rect x="280" y="40" width="240" height="280" rx="8" fill="#F8FAFC" stroke="#D4D4D8" stroke-width="1.5"/>
  <text x="400" y="65" text-anchor="middle" class="section-title">Consumer Group: workers</text>

  <!-- Consumer A -->
  <rect x="296" y="80" width="100" height="60" rx="4" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="346" y="105" text-anchor="middle" class="label-lg" fill="#047857">Consumer A</text>
  <text x="346" y="122" text-anchor="middle" class="label-sm">outbox-worker-0</text>

  <!-- Consumer B -->
  <rect x="408" y="80" width="100" height="60" rx="4" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="458" y="105" text-anchor="middle" class="label-lg" fill="#047857">Consumer B</text>
  <text x="458" y="122" text-anchor="middle" class="label-sm">outbox-worker-1</text>

  <!-- XREADGROUP 화살표 Stream → Consumer Group -->
  <line x1="244" y1="192" x2="278" y2="192" stroke="#0891B2" stroke-width="1.5" stroke-dasharray="4 2" marker-end="url(#arrow-cyan)"/>
  <rect x="244" y="178" width="36" height="28" rx="2" fill="#FAFAFA"/>
  <text x="262" y="191" text-anchor="middle" class="arrow-label" fill="#0E7490">XREAD</text>
  <text x="262" y="202" text-anchor="middle" class="arrow-label" fill="#0E7490">GROUP</text>

  <!-- Consumer A XACK 상태 -->
  <rect x="296" y="160" width="100" height="44" rx="4" fill="#ECFDF5" stroke="#059669" stroke-width="1"/>
  <text x="346" y="178" text-anchor="middle" class="label-sm" fill="#047857">처리 완료</text>
  <text x="346" y="194" text-anchor="middle" class="label-sm">XACK ✓</text>

  <!-- Consumer B 크래시 상태 -->
  <rect x="408" y="160" width="100" height="44" rx="4" fill="#FFF1F2" stroke="#E11D48" stroke-width="1"/>
  <text x="458" y="178" text-anchor="middle" class="label-sm" fill="#BE123C">크래시 / 타임아웃</text>
  <text x="458" y="194" text-anchor="middle" class="label-sm" fill="#BE123C">XACK 없음</text>

  <!-- ── PEL 박스 ── -->
  <rect x="280" y="340" width="240" height="180" rx="8" fill="#FFF1F2" stroke="#E11D48" stroke-width="1.5"/>
  <text x="400" y="365" text-anchor="middle" class="section-title" fill="#BE123C">PEL (Pending Entries List)</text>

  <!-- PEL 항목 — ACK됨 -->
  <rect x="296" y="376" width="208" height="36" rx="4" fill="#F8FAFC" stroke="#D4D4D8" stroke-width="1"/>
  <text x="400" y="390" text-anchor="middle" class="label-sm" fill="#475569">1745000000001-0 · Consumer A</text>
  <text x="400" y="404" text-anchor="middle" class="label-sm" fill="#059669">→ XACK 수신 — PEL 제거됨</text>

  <!-- PEL 항목 — 미처리 -->
  <rect x="296" y="424" width="208" height="44" rx="4" fill="#FFF1F2" stroke="#E11D48" stroke-width="1.5"/>
  <text x="400" y="441" text-anchor="middle" class="label-sm" fill="#BE123C">1745000000003-0 · Consumer B</text>
  <text x="400" y="457" text-anchor="middle" class="label-sm" fill="#BE123C">idle 60s 초과 → XCLAIM 재배정 대상</text>

  <!-- 화살표: Consumer A → PEL (ACK) -->
  <line x1="346" y1="204" x2="346" y2="337" stroke="#059669" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <rect x="290" y="262" width="56" height="18" rx="2" fill="#FAFAFA"/>
  <text x="318" y="274" text-anchor="middle" class="arrow-label" fill="#047857">XACK →</text>
  <text x="318" y="285" text-anchor="middle" class="arrow-label" fill="#047857">제거</text>

  <!-- 화살표: Consumer B → PEL (잔류) -->
  <line x1="458" y1="204" x2="458" y2="337" stroke="#E11D48" stroke-width="1.5" stroke-dasharray="4 2" marker-end="url(#arrow-rose)"/>
  <rect x="420" y="262" width="60" height="18" rx="2" fill="#FAFAFA"/>
  <text x="450" y="274" text-anchor="middle" class="arrow-label" fill="#BE123C">ACK 없음</text>
  <text x="450" y="285" text-anchor="middle" class="arrow-label" fill="#BE123C">→ PEL 잔류</text>

  <!-- ── XCLAIM / 재처리 박스 ── -->
  <rect x="570" y="390" width="190" height="80" rx="8" fill="#FFFBEB" stroke="#D97706" stroke-width="1.5"/>
  <text x="665" y="415" text-anchor="middle" class="label-lg" fill="#B45309">XAUTOCLAIM</text>
  <text x="665" y="433" text-anchor="middle" class="label-sm">idle 초과 항목을</text>
  <text x="665" y="449" text-anchor="middle" class="label-sm">Consumer A에게 재배정</text>

  <!-- 화살표: PEL → XCLAIM -->
  <line x1="504" y1="445" x2="568" y2="435" stroke="#D97706" stroke-width="1.5" stroke-dasharray="4 2" marker-end="url(#arrow-amber)"/>
  <rect x="510" y="434" width="54" height="18" rx="2" fill="#FAFAFA"/>
  <text x="537" y="447" text-anchor="middle" class="arrow-label">재배정</text>

  <!-- 화살표: XCLAIM → Consumer A (재처리) -->
  <line x1="570" y1="410" x2="450" y2="155" stroke="#D97706" stroke-width="1" stroke-dasharray="3 3" marker-end="url(#arrow-amber)"/>
  <rect x="520" y="280" width="54" height="18" rx="2" fill="#FAFAFA"/>
  <text x="547" y="292" text-anchor="middle" class="arrow-label">재처리</text>

  <!-- 범례 -->
  <rect x="570" y="500" width="190" height="90" rx="6" fill="#FAFAFA" stroke="#D4D4D8" stroke-width="1"/>
  <text x="665" y="520" text-anchor="middle" font-size="12" font-weight="600" fill="#0A0A0A">범례</text>
  <line x1="585" y1="534" x2="615" y2="534" stroke="#059669" stroke-width="2"/>
  <text x="625" y="538" font-size="11" fill="#27272A">정상 흐름 (ACK)</text>
  <line x1="585" y1="552" x2="615" y2="552" stroke="#E11D48" stroke-width="1.5" stroke-dasharray="4 2"/>
  <text x="625" y="556" font-size="11" fill="#27272A">미처리 / 크래시</text>
  <line x1="585" y1="570" x2="615" y2="570" stroke="#D97706" stroke-width="1.5" stroke-dasharray="4 2"/>
  <text x="625" y="574" font-size="11" fill="#27272A">재배정 경로</text>

  <!-- Arrowhead 마커 정의 -->
  <defs>
    <marker id="arrow-amber" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#D97706"/>
    </marker>
    <marker id="arrow-cyan" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#0891B2"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#059669"/>
    </marker>
    <marker id="arrow-rose" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#E11D48"/>
    </marker>
  </defs>
</svg>
