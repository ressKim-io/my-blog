<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" role="img" aria-labelledby="t4 d4" font-family="Pretendard, ui-sans-serif, system-ui, -apple-system, sans-serif">
  <title id="t4">A TLB hit is nearly free; a miss pays the whole page walk</title>
  <desc id="d4">Every memory access first asks the TLB for a cached translation. On a hit the physical address comes out in about a cycle. On a miss the hardware must walk the four page-table levels, costing tens to hundreds of cycles before the access can proceed.</desc>
  <defs>
    <marker id="k4g" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#059669"/>
    </marker>
    <marker id="k4r" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#E11D48"/>
    </marker>
    <marker id="k4k" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#334155"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="800" height="360" fill="#FFFFFF"/>

  <line x1="216" y1="180" x2="264" y2="180" stroke="#334155" stroke-width="1.6" marker-end="url(#k4k)"/>
  <line x1="404" y1="144" x2="472" y2="96" stroke="#059669" stroke-width="2" marker-end="url(#k4g)"/>
  <line x1="404" y1="216" x2="472" y2="266" stroke="#E11D48" stroke-width="1.8" stroke-dasharray="5 3" marker-end="url(#k4r)"/>

  <rect x="40" y="144" width="176" height="72" rx="9" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.6"/>
  <text x="128" y="188" text-anchor="middle" font-size="14" font-weight="700" fill="#0E7490">virtual address</text>

  <rect x="268" y="136" width="136" height="88" rx="10" fill="#F5F3FF" stroke="#7C3AED" stroke-width="2"/>
  <text x="336" y="176" text-anchor="middle" font-size="16" font-weight="700" fill="#6D28D9">TLB</text>
  <text x="336" y="202" text-anchor="middle" font-size="13" fill="#6D28D9">cached?</text>

  <text x="424" y="106" font-size="14" font-weight="700" fill="#047857">hit</text>
  <rect x="476" y="56" width="284" height="76" rx="9" fill="#ECFDF5" stroke="#059669" stroke-width="1.8"/>
  <text x="618" y="88" text-anchor="middle" font-size="15" font-weight="700" fill="#047857">physical address</text>
  <text x="618" y="114" text-anchor="middle" font-size="13" fill="#047857">~1 cycle</text>

  <text x="418" y="256" font-size="14" font-weight="700" fill="#BE123C">miss</text>
  <rect x="476" y="240" width="284" height="76" rx="9" fill="#FFF1F2" stroke="#E11D48" stroke-width="1.8"/>
  <text x="618" y="272" text-anchor="middle" font-size="15" font-weight="700" fill="#BE123C">4-level walk</text>
  <text x="618" y="298" text-anchor="middle" font-size="13" fill="#BE123C">tens–hundreds of cycles</text>
</svg>
