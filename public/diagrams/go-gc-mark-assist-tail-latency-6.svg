<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" role="img" aria-labelledby="t5 d5" font-family="Pretendard, ui-sans-serif, system-ui, -apple-system, sans-serif">
  <title id="t5">Cheap allocation feeds the loop that bills you in tail latency</title>
  <desc id="d5">A closed loop running clockwise. Because allocation in Go costs almost nothing, a lock free bump in a per-P cache, programs allocate freely. Heavy allocation fills the heap faster than the background marker, which is capped at a quarter of the processors, can keep up with. Once the marker falls behind, the pacer conscripts the allocating goroutine itself into mark assist. That detour surfaces as tail latency, and since the allocation stayed cheap the whole time, nothing in the loop slows down on its own. Turning the GOGC or GOMEMLIMIT knobs only resizes the bill; the one place the loop can actually be broken is by allocating less.</desc>
  <rect x="0" y="0" width="800" height="420" fill="#FFFFFF"/>

  <rect x="290" y="30" width="220" height="56" rx="10" fill="#ECFEFF" stroke="#0891B2" stroke-width="2"/>
  <text x="400" y="55" text-anchor="middle" font-size="15" font-weight="700" fill="#0E7490">cheap allocation</text>
  <text x="400" y="76" text-anchor="middle" font-size="13" font-weight="600" fill="#0E7490">lock-free bump</text>

  <rect x="570" y="170" width="200" height="56" rx="10" fill="#ECFDF5" stroke="#059669" stroke-width="2"/>
  <text x="670" y="195" text-anchor="middle" font-size="15" font-weight="700" fill="#047857">allocate freely</text>
  <text x="670" y="216" text-anchor="middle" font-size="13" font-weight="600" fill="#047857">heap fills fast</text>

  <rect x="290" y="320" width="220" height="56" rx="10" fill="#FFFBEB" stroke="#D97706" stroke-width="2"/>
  <text x="400" y="345" text-anchor="middle" font-size="15" font-weight="700" fill="#B45309">marker falls behind</text>
  <text x="400" y="366" text-anchor="middle" font-size="13" font-weight="600" fill="#B45309">25% is not enough</text>

  <rect x="30" y="170" width="200" height="56" rx="10" fill="#FFF1F2" stroke="#E11D48" stroke-width="2.4"/>
  <text x="130" y="195" text-anchor="middle" font-size="15" font-weight="700" fill="#BE123C">mark assist</text>
  <text x="130" y="216" text-anchor="middle" font-size="13" font-weight="600" fill="#BE123C">tail latency</text>

  <path d="M 515 75 Q 610 110 655 165" stroke="#475569" stroke-width="2.2" fill="none" marker-end="url(#s5)"/>
  <path d="M 655 232 Q 600 320 517 348" stroke="#475569" stroke-width="2.2" fill="none" marker-end="url(#s5)"/>
  <path d="M 285 348 Q 190 320 140 232" stroke="#475569" stroke-width="2.2" fill="none" marker-end="url(#s5)"/>
  <path d="M 140 165 Q 185 110 285 74" stroke="#475569" stroke-width="2.2" fill="none" marker-end="url(#s5)"/>

  <text x="400" y="205" text-anchor="middle" font-size="14" font-weight="700" fill="#334155">the bill is deferred,</text>
  <text x="400" y="228" text-anchor="middle" font-size="14" font-weight="700" fill="#334155">never waived</text>

  <defs>
    <marker id="s5" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#475569"/></marker>
  </defs>
</svg>
