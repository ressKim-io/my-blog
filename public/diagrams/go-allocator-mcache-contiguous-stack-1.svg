<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" role="img" aria-labelledby="t1 d1" font-family="Pretendard, ui-sans-serif, system-ui, -apple-system, sans-serif">
  <title id="t1">Go's three-tier allocator: mcache, mcentral, mheap</title>
  <desc id="d1">A small allocation is served from the mcache, a per-P cache that needs no lock at all. When that cache runs dry it refills from the mcentral, which is shared across processors and therefore locked, and the mcentral in turn grows from the single global mheap. Only when the mheap is empty does the runtime call the kernel and reserve a 64 megabyte arena with mmap. Objects larger than 32 kilobytes skip the caches entirely and are cut straight from the mheap.</desc>
  <defs>
    <marker id="g1d" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#334155"/>
    </marker>
    <marker id="g1r" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#E11D48"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="800" height="460" fill="#FFFFFF"/>

  <path d="M288,44 L560,44 L560,310 L480,310" fill="none" stroke="#E11D48" stroke-width="1.8" stroke-dasharray="6 4" marker-end="url(#g1r)"/>
  <rect x="576" y="160" width="128" height="24" fill="#FFFFFF"/>
  <text x="584" y="178" font-size="13" font-weight="700" fill="#BE123C">&gt; 32KB direct</text>

  <line x1="280" y1="64" x2="280" y2="90" stroke="#334155" stroke-width="1.8" marker-end="url(#g1d)"/>
  <line x1="280" y1="156" x2="280" y2="182" stroke="#334155" stroke-width="1.8" marker-end="url(#g1d)"/>
  <line x1="280" y1="248" x2="280" y2="274" stroke="#334155" stroke-width="1.8" marker-end="url(#g1d)"/>
  <line x1="280" y1="340" x2="280" y2="366" stroke="#334155" stroke-width="1.8" marker-end="url(#g1d)"/>

  <text x="296" y="181" font-size="13" fill="#334155">refill</text>
  <text x="296" y="273" font-size="13" fill="#334155">grow</text>
  <text x="296" y="365" font-size="13" fill="#334155">reserve</text>

  <rect x="88" y="24" width="200" height="40" rx="8" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.8"/>
  <text x="188" y="50" text-anchor="middle" font-size="14" font-weight="700" fill="#0E7490" font-family="ui-monospace, monospace">new(T)</text>

  <rect x="88" y="96" width="392" height="60" rx="9" fill="#ECFDF5" stroke="#059669" stroke-width="2"/>
  <text x="108" y="132" font-size="15" font-weight="700" fill="#047857">mcache</text>
  <text x="460" y="132" text-anchor="end" font-size="13" font-weight="700" fill="#047857">per P · no lock</text>

  <rect x="88" y="188" width="392" height="60" rx="9" fill="#F5F3FF" stroke="#7C3AED" stroke-width="2"/>
  <text x="108" y="224" font-size="15" font-weight="700" fill="#6D28D9">mcentral</text>
  <text x="460" y="224" text-anchor="end" font-size="13" fill="#6D28D9">lock</text>

  <rect x="88" y="280" width="392" height="60" rx="9" fill="#F5F3FF" stroke="#7C3AED" stroke-width="2"/>
  <text x="108" y="316" font-size="15" font-weight="700" fill="#6D28D9">mheap</text>
  <text x="460" y="316" text-anchor="end" font-size="13" fill="#6D28D9">global lock</text>

  <rect x="88" y="372" width="392" height="60" rx="9" fill="#FFFBEB" stroke="#D97706" stroke-width="2"/>
  <text x="108" y="408" font-size="15" font-weight="700" fill="#B45309">kernel</text>
  <text x="460" y="408" text-anchor="end" font-size="13" fill="#B45309">mmap · 64MB arena</text>
</svg>
