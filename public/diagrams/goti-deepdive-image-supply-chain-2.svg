<svg role="img" aria-labelledby="title-sc2 desc-sc2"
  viewBox="0 0 800 600" width="100%" height="auto"
  xmlns="http://www.w3.org/2000/svg"
  style="font-family: 'Pretendard', system-ui, sans-serif; background: #FAFAFA;">

  <title id="title-sc2">Before/After — CSP 독립 빌드(해시 불일치) vs 중앙 검증 후 복제(해시 일치)</title>
  <desc id="desc-sc2">왼쪽은 CSP별로 각각 빌드해 ECR과 GAR의 다이제스트가 달라지는 문제 구조, 오른쪽은 Harbor에서 한 번 빌드·검증 후 동일 다이제스트로 복제하는 개선 구조 비교</desc>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#0A0A0A"/>
    </marker>
    <marker id="arr-red" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#E11D48"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#059669"/>
    </marker>
    <marker id="arr-violet" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7C3AED"/>
    </marker>
  </defs>

  <!-- 구분선 -->
  <line x1="400" y1="48" x2="400" y2="560" stroke="#D4D4D8" stroke-width="1" stroke-dasharray="6 3"/>

  <!-- ===== 왼쪽: Before (CSP 독립 빌드) ===== -->
  <text x="200" y="36" text-anchor="middle" font-size="13" font-weight="700" fill="#BE123C">Before — CSP별 독립 빌드</text>

  <!-- 소스 코드 (공통) -->
  <rect x="136" y="56" width="128" height="48" rx="6"
    fill="#F8FAFC" stroke="#475569" stroke-width="1.5"/>
  <text x="200" y="80" text-anchor="middle" font-size="13" font-weight="600" fill="#334155">소스 코드</text>
  <text x="200" y="96" text-anchor="middle" font-size="11" fill="#475569">(동일 커밋)</text>

  <!-- 소스 → CI-AWS -->
  <line x1="160" y1="104" x2="104" y2="160" stroke="#0A0A0A" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- 소스 → CI-GCP -->
  <line x1="240" y1="104" x2="296" y2="160" stroke="#0A0A0A" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- CI-AWS -->
  <rect x="40" y="160" width="128" height="48" rx="6"
    fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="104" y="184" text-anchor="middle" font-size="12" font-weight="600" fill="#047857">CI (AWS용)</text>
  <text x="104" y="200" text-anchor="middle" font-size="11" fill="#047857">빌드 #1</text>

  <!-- CI-GCP -->
  <rect x="232" y="160" width="128" height="48" rx="6"
    fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="296" y="184" text-anchor="middle" font-size="12" font-weight="600" fill="#047857">CI (GCP용)</text>
  <text x="296" y="200" text-anchor="middle" font-size="11" fill="#047857">빌드 #2</text>

  <!-- CI-AWS → ECR -->
  <line x1="104" y1="208" x2="104" y2="280" stroke="#0A0A0A" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- CI-GCP → GAR -->
  <line x1="296" y1="208" x2="296" y2="280" stroke="#0A0A0A" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ECR (문제) -->
  <rect x="40" y="280" width="128" height="64" rx="6"
    fill="#FFF1F2" stroke="#E11D48" stroke-width="1.5"/>
  <text x="104" y="308" text-anchor="middle" font-size="13" font-weight="600" fill="#BE123C">ECR</text>
  <text x="104" y="324" text-anchor="middle" font-size="11" fill="#BE123C">sha256:aaa...</text>
  <text x="104" y="340" text-anchor="middle" font-size="10" fill="#BE123C">타임스탬프 차이</text>

  <!-- GAR (문제) -->
  <rect x="232" y="280" width="128" height="64" rx="6"
    fill="#FFF1F2" stroke="#E11D48" stroke-width="1.5"/>
  <text x="296" y="308" text-anchor="middle" font-size="13" font-weight="600" fill="#BE123C">GAR</text>
  <text x="296" y="324" text-anchor="middle" font-size="11" fill="#BE123C">sha256:bbb...</text>
  <text x="296" y="340" text-anchor="middle" font-size="10" fill="#BE123C">환경 차이</text>

  <!-- 불일치 표시 -->
  <line x1="168" y1="312" x2="232" y2="312" stroke="#E11D48" stroke-width="2" stroke-dasharray="4 2"/>
  <text x="200" y="308" text-anchor="middle" font-size="13" fill="#BE123C" font-weight="700">≠</text>

  <!-- 문제 결과 박스 -->
  <rect x="40" y="368" width="320" height="52" rx="6"
    fill="#FFF1F2" stroke="#E11D48" stroke-width="1.5"/>
  <text x="200" y="392" text-anchor="middle" font-size="12" font-weight="700" fill="#BE123C">재현성 훼손</text>
  <text x="200" y="410" text-anchor="middle" font-size="11" fill="#BE123C">다이제스트 고정 배포 불가 · 환경별 동작 차이 위험</text>

  <!-- ===== 오른쪽: After (중앙 검증 + 복제) ===== -->
  <text x="600" y="36" text-anchor="middle" font-size="13" font-weight="700" fill="#047857">After — 중앙 검증 후 복제</text>

  <!-- 소스 코드 (공통) -->
  <rect x="536" y="56" width="128" height="48" rx="6"
    fill="#F8FAFC" stroke="#475569" stroke-width="1.5"/>
  <text x="600" y="80" text-anchor="middle" font-size="13" font-weight="600" fill="#334155">소스 코드</text>
  <text x="600" y="96" text-anchor="middle" font-size="11" fill="#475569">(동일 커밋)</text>

  <!-- 소스 → CI 단일 -->
  <line x1="600" y1="104" x2="600" y2="160" stroke="#0A0A0A" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- CI 단일 -->
  <rect x="536" y="160" width="128" height="48" rx="6"
    fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="600" y="184" text-anchor="middle" font-size="12" font-weight="600" fill="#047857">CI (단일 빌드)</text>
  <text x="600" y="200" text-anchor="middle" font-size="11" fill="#047857">빌드 1회</text>

  <!-- CI → Harbor -->
  <line x1="600" y1="208" x2="600" y2="248" stroke="#0A0A0A" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Harbor -->
  <rect x="512" y="248" width="176" height="64" rx="6"
    fill="#F5F3FF" stroke="#7C3AED" stroke-width="2"/>
  <text x="600" y="276" text-anchor="middle" font-size="13" font-weight="600" fill="#6D28D9">Harbor</text>
  <text x="600" y="294" text-anchor="middle" font-size="11" fill="#6D28D9">취약점 스캔 · 서명 검증</text>
  <text x="600" y="308" text-anchor="middle" font-size="10" fill="#27272A">sha256:ccc... 확정</text>

  <!-- Harbor → ECR (복제) -->
  <line x1="544" y1="312" x2="480" y2="368" stroke="#7C3AED" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#arr-violet)"/>
  <text x="498" y="348" text-anchor="middle" font-size="10" fill="#6D28D9">복제</text>

  <!-- Harbor → GAR (복제) -->
  <line x1="656" y1="312" x2="720" y2="368" stroke="#7C3AED" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#arr-violet)"/>
  <text x="702" y="348" text-anchor="middle" font-size="10" fill="#6D28D9">복제</text>

  <!-- ECR (정상) -->
  <rect x="424" y="368" width="112" height="64" rx="6"
    fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="480" y="396" text-anchor="middle" font-size="13" font-weight="600" fill="#047857">ECR</text>
  <text x="480" y="412" text-anchor="middle" font-size="11" fill="#047857">sha256:ccc...</text>
  <text x="480" y="428" text-anchor="middle" font-size="10" fill="#047857">동일</text>

  <!-- GAR (정상) -->
  <rect x="664" y="368" width="112" height="64" rx="6"
    fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="720" y="396" text-anchor="middle" font-size="13" font-weight="600" fill="#047857">GAR</text>
  <text x="720" y="412" text-anchor="middle" font-size="11" fill="#047857">sha256:ccc...</text>
  <text x="720" y="428" text-anchor="middle" font-size="10" fill="#047857">동일</text>

  <!-- 일치 표시 -->
  <line x1="536" y1="400" x2="664" y2="400" stroke="#059669" stroke-width="1.5"/>
  <text x="600" y="396" text-anchor="middle" font-size="13" fill="#047857" font-weight="700">=</text>

  <!-- 개선 결과 박스 -->
  <rect x="416" y="456" width="320" height="52" rx="6"
    fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="576" y="480" text-anchor="middle" font-size="12" font-weight="700" fill="#047857">재현성 보장</text>
  <text x="576" y="498" text-anchor="middle" font-size="11" fill="#047857">다이제스트 고정 배포 가능 · 공급망 SSoT</text>

  <!-- 하단 범례 -->
  <rect x="24" y="528" width="752" height="56" rx="6" fill="#F8FAFC" stroke="#E4E4E7" stroke-width="1"/>
  <rect x="44" y="545" width="12" height="12" rx="2" fill="#FFF1F2" stroke="#E11D48" stroke-width="1.5"/>
  <text x="62" y="556" font-size="11" fill="#334155">해시 불일치 (Before)</text>
  <rect x="188" y="545" width="12" height="12" rx="2" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="206" y="556" font-size="11" fill="#334155">해시 일치 (After)</text>
  <rect x="320" y="545" width="12" height="12" rx="2" fill="#F5F3FF" stroke="#7C3AED" stroke-width="2"/>
  <text x="338" y="556" font-size="11" fill="#334155">Harbor (중앙 SSoT)</text>
  <line x1="464" y1="551" x2="492" y2="551" stroke="#7C3AED" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#arr-violet)"/>
  <text x="500" y="556" font-size="11" fill="#334155">복제 (동일 다이제스트)</text>
  <line x1="640" y1="551" x2="668" y2="551" stroke="#0A0A0A" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="676" y="556" font-size="11" fill="#334155">빌드 / push</text>

  <text x="44" y="576" font-size="10" fill="#475569">Before: 타임스탬프·빌드환경 차이로 동일 소스에서도 sha256 불일치 가능</text>
  <text x="416" y="576" font-size="10" fill="#475569">After: 빌드 1회 → Harbor 1차 검증 → ECR·GAR 동일 다이제스트 복제</text>
</svg>
