<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" role="img" aria-labelledby="t4 d4" font-family="Pretendard, ui-sans-serif, system-ui, -apple-system, sans-serif">
  <title id="t4">Allocation is a bit scan, not a list walk</title>
  <desc id="d4">Because every slot in a span is the same size, the allocator does not have to search a free list for a fitting chunk. It keeps a bitmap called allocCache in which each bit stands for one slot, one meaning taken and zero meaning free. Finding the next free slot is a bit operation on that word, and the slot address follows from its index.</desc>
