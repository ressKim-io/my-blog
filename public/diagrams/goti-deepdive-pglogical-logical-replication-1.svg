<svg role="img" aria-labelledby="title-1 desc-1" viewBox="0 0 800 480" width="100%" height="auto"
  xmlns="http://www.w3.org/2000/svg" font-family="'Pretendard', system-ui, sans-serif">
  <title id="title-1">pglogical 논리 복제 파이프라인</title>
  <desc id="desc-1">Publisher 측 WAL에서 논리 디코딩을 거쳐 복제 슬롯으로 전달되고, Subscriber apply worker가 대상 DB에 재실행하는 전체 흐름도</desc>

  <!-- 배경 -->
  <rect x="0" y="0" width="800" height="480" fill="#FAFAFA"/>

  <!-- 제목 -->
  <text x="400" y="32" text-anchor="middle" font-size="15" font-weight="700" fill="#0A0A0A">pglogical 논리 복제 파이프라인</text>

  <!-- === Publisher 영역 === -->
  <rect x="24" y="48" width="360" height="360" rx="8" fill="#FFFBEB" stroke="#D97706" stroke-width="1.5"/>
  <text x="204" y="72" text-anchor="middle" font-size="13" font-weight="700" fill="#B45309">Publisher (GCE VM / PostgreSQL 16)</text>

  <!-- Client -->
  <rect x="88" y="88" width="144" height="52" rx="6" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="160" y="109" text-anchor="middle" font-size="13" font-weight="600" fill="#047857">클라이언트</text>
  <text x="160" y="128" text-anchor="middle" font-size="11" fill="#047857">INSERT / UPDATE / DELETE</text>

  <!-- WAL -->
  <rect x="56" y="180" width="200" height="52" rx="6" fill="#FFFBEB" stroke="#D97706" stroke-width="1.5"/>
  <text x="156" y="200" text-anchor="middle" font-size="13" font-weight="600" fill="#B45309">WAL (Write-Ahead Log)</text>
  <text x="156" y="220" text-anchor="middle" font-size="11" fill="#B45309">물리 블록 변경 기록</text>

  <!-- 논리 디코딩 플러그인 -->
  <rect x="56" y="272" width="200" height="52" rx="6" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="156" y="292" text-anchor="middle" font-size="13" font-weight="600" fill="#6D28D9">논리 디코딩 플러그인</text>
  <text x="156" y="312" text-anchor="middle" font-size="11" fill="#6D28D9">pglogical_output</text>

  <!-- 복제 슬롯 -->
  <rect x="56" y="360" width="200" height="36" rx="6" fill="#FFF1F2" stroke="#E11D48" stroke-width="1.5"/>
  <text x="156" y="383" text-anchor="middle" font-size="13" font-weight="600" fill="#BE123C">복제 슬롯 (WAL 보존)</text>

  <!-- Client → WAL 화살표 -->
  <line x1="160" y1="140" x2="156" y2="178" stroke="#0A0A0A" stroke-width="1.5" marker-end="url(#arrow-dark)"/>
  <rect x="166" y="152" width="60" height="16" fill="#FAFAFA"/>
  <text x="196" y="164" text-anchor="middle" font-size="10" fill="#27272A">WAL 기록</text>

  <!-- WAL → 논리 디코딩 화살표 -->
  <line x1="156" y1="232" x2="156" y2="270" stroke="#0A0A0A" stroke-width="1.5" marker-end="url(#arrow-dark)"/>
  <rect x="162" y="244" width="72" height="16" fill="#FAFAFA"/>
  <text x="198" y="256" text-anchor="middle" font-size="10" fill="#27272A">블록 → 행 변환</text>

  <!-- 논리 디코딩 → 복제 슬롯 화살표 -->
  <line x1="156" y1="324" x2="156" y2="358" stroke="#0A0A0A" stroke-width="1.5" marker-end="url(#arrow-dark)"/>
  <rect x="162" y="334" width="72" height="16" fill="#FAFAFA"/>
  <text x="198" y="346" text-anchor="middle" font-size="10" fill="#27272A">행 이벤트 큐</text>

  <!-- === 화살표 중앙 연결 === -->
  <!-- 복제 슬롯 → Subscriber 화살표 (수평) -->
  <line x1="256" y1="378" x2="504" y2="340" stroke="#7C3AED" stroke-width="2" stroke-dasharray="6 3" marker-end="url(#arrow-accent)"/>
  <rect x="340" y="342" width="88" height="16" fill="#FAFAFA"/>
  <text x="384" y="354" text-anchor="middle" font-size="10" fill="#6D28D9">복제 프로토콜 (TLS)</text>

  <!-- === Subscriber 영역 === -->
  <rect x="416" y="48" width="360" height="360" rx="8" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.5"/>
  <text x="596" y="72" text-anchor="middle" font-size="13" font-weight="700" fill="#0E7490">Subscriber (AWS RDS / PostgreSQL 16)</text>

  <!-- Apply Worker -->
  <rect x="472" y="88" width="200" height="52" rx="6" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="572" y="109" text-anchor="middle" font-size="13" font-weight="600" fill="#047857">Apply Worker</text>
  <text x="572" y="128" text-anchor="middle" font-size="11" fill="#047857">행 이벤트 재실행</text>

  <!-- Subscriber DB -->
  <rect x="472" y="180" width="200" height="52" rx="6" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="572" y="200" text-anchor="middle" font-size="13" font-weight="600" fill="#6D28D9">Subscriber DB</text>
  <text x="572" y="220" text-anchor="middle" font-size="11" fill="#6D28D9">읽기 전용 (read-only)</text>

  <!-- LSN 확인 -->
  <rect x="472" y="272" width="200" height="36" rx="6" fill="#F8FAFC" stroke="#475569" stroke-width="1.5"/>
  <text x="572" y="295" text-anchor="middle" font-size="12" fill="#334155">LSN 확인 → Publisher에 ACK</text>

  <!-- 복제 슬롯 → Apply Worker 화살표 (수직 연결) -->
  <line x1="572" y1="88" x2="572" y2="88" stroke="#0A0A0A" stroke-width="1.5"/>

  <!-- Apply Worker → Subscriber DB 화살표 -->
  <line x1="572" y1="140" x2="572" y2="178" stroke="#0A0A0A" stroke-width="1.5" marker-end="url(#arrow-dark)"/>
  <rect x="578" y="152" width="60" height="16" fill="#FAFAFA"/>
  <text x="608" y="164" text-anchor="middle" font-size="10" fill="#27272A">재실행</text>

  <!-- Subscriber DB → LSN 확인 화살표 -->
  <line x1="572" y1="232" x2="572" y2="270" stroke="#0A0A0A" stroke-width="1.5" marker-end="url(#arrow-dark)"/>

  <!-- LSN ACK → Publisher (역방향 점선) -->
  <line x1="472" y1="285" x2="256" y2="378" stroke="#475569" stroke-width="1" stroke-dasharray="4 2" marker-end="url(#arrow-slate)"/>
  <rect x="328" y="302" width="56" height="16" fill="#FAFAFA"/>
  <text x="356" y="314" text-anchor="middle" font-size="10" fill="#334155">ACK (LSN)</text>

  <!-- 범례 -->
  <rect x="24" y="420" width="752" height="48" rx="6" fill="#F8FAFC" stroke="#D4D4D8" stroke-width="1"/>
  <text x="40" y="440" font-size="11" font-weight="600" fill="#0A0A0A">범례:</text>
  <line x1="80" y1="438" x2="104" y2="438" stroke="#7C3AED" stroke-width="2" stroke-dasharray="6 3"/>
  <text x="110" y="442" font-size="11" fill="#27272A">복제 스트림</text>
  <line x1="200" y1="438" x2="224" y2="438" stroke="#475569" stroke-width="1" stroke-dasharray="4 2"/>
  <text x="230" y="442" font-size="11" fill="#27272A">ACK 응답</text>
  <line x1="300" y1="438" x2="324" y2="438" stroke="#0A0A0A" stroke-width="1.5"/>
  <text x="330" y="442" font-size="11" fill="#27272A">내부 처리 흐름</text>
  <rect x="436" y="430" width="12" height="12" rx="2" fill="#FFFBEB" stroke="#D97706" stroke-width="1"/>
  <text x="454" y="442" font-size="11" fill="#27272A">Publisher 영역</text>
  <rect x="556" y="430" width="12" height="12" rx="2" fill="#ECFEFF" stroke="#0891B2" stroke-width="1"/>
  <text x="574" y="442" font-size="11" fill="#27272A">Subscriber 영역</text>

  <!-- 화살표 마커 정의 -->
  <defs>
    <marker id="arrow-dark" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#0A0A0A"/>
    </marker>
    <marker id="arrow-accent" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7C3AED"/>
    </marker>
    <marker id="arrow-slate" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#475569"/>
    </marker>
  </defs>
</svg>
