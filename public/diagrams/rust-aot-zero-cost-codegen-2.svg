<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-labelledby="t2 d2" font-family="Pretendard, ui-sans-serif, system-ui, -apple-system, sans-serif">
  <title id="t2">Monomorphization multiplies one generic into many instances</title>
  <desc id="d2">One generic function is cloned into a separate compiled body for every concrete type it is used with, and each clone becomes dedicated branchless machine code. The bill arrives in two forms: the .text section grows and pressures the instruction cache and instruction TLB, and the LLVM IR volume grows as instances times function size, which blows up compile time.</desc>
  <defs>
    <marker id="a2" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#475569"/>
    </marker>
    <marker id="a2r" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#E11D48"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="800" height="400" fill="#FFFFFF"/>

  <line x1="208" y1="120" x2="268" y2="76" stroke="#475569" stroke-width="1.5" marker-end="url(#a2)"/>
  <line x1="208" y1="126" x2="268" y2="142" stroke="#475569" stroke-width="1.5" marker-end="url(#a2)"/>
  <line x1="208" y1="132" x2="268" y2="208" stroke="#475569" stroke-width="1.5" marker-end="url(#a2)"/>
  <line x1="472" y1="76" x2="532" y2="112" stroke="#475569" stroke-width="1.5" marker-end="url(#a2)"/>
  <line x1="472" y1="142" x2="532" y2="126" stroke="#475569" stroke-width="1.5" marker-end="url(#a2)"/>
  <line x1="472" y1="208" x2="532" y2="140" stroke="#475569" stroke-width="1.5" marker-end="url(#a2)"/>
  <line x1="400" y1="262" x2="240" y2="288" stroke="#E11D48" stroke-width="1.6" marker-end="url(#a2r)"/>
  <line x1="400" y1="262" x2="560" y2="288" stroke="#E11D48" stroke-width="1.6" marker-end="url(#a2r)"/>

  <rect x="32" y="88" width="176" height="76" rx="8" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.6"/>
  <text x="120" y="120" text-anchor="middle" font-size="15" font-weight="700" fill="#0E7490" font-family="ui-monospace, monospace">fn max&lt;T&gt;</text>
  <text x="120" y="144" text-anchor="middle" font-size="13" fill="#0E7490">one generic</text>

  <text x="240" y="196" text-anchor="middle" font-size="13" fill="#64748B">monomorphization</text>

  <rect x="272" y="48" width="200" height="52" rx="7" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.4"/>
  <text x="372" y="80" text-anchor="middle" font-size="14" font-weight="700" fill="#6D28D9" font-family="ui-monospace, monospace">max::&lt;i32&gt;</text>
  <rect x="272" y="116" width="200" height="52" rx="7" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.4"/>
  <text x="372" y="148" text-anchor="middle" font-size="14" font-weight="700" fill="#6D28D9" font-family="ui-monospace, monospace">max::&lt;u64&gt;</text>
  <rect x="272" y="184" width="200" height="52" rx="7" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.4"/>
  <text x="372" y="216" text-anchor="middle" font-size="14" font-weight="700" fill="#6D28D9" font-family="ui-monospace, monospace">max::&lt;String&gt;</text>

  <rect x="536" y="88" width="232" height="76" rx="8" fill="#ECFDF5" stroke="#059669" stroke-width="1.6"/>
  <text x="652" y="118" text-anchor="middle" font-size="15" font-weight="700" fill="#047857">machine code</text>
  <text x="652" y="144" text-anchor="middle" font-size="13" fill="#047857" font-family="ui-monospace, monospace">cmov / csel</text>

  <text x="400" y="256" text-anchor="middle" font-size="13" font-weight="700" fill="#BE123C">the bill</text>

  <rect x="72" y="292" width="296" height="80" rx="9" fill="#FFF1F2" stroke="#E11D48" stroke-width="1.5"/>
  <text x="220" y="322" text-anchor="middle" font-size="15" font-weight="700" fill="#BE123C">code bloat</text>
  <text x="220" y="348" text-anchor="middle" font-size="13" fill="#BE123C">i-cache · iTLB pressure</text>

  <rect x="432" y="292" width="296" height="80" rx="9" fill="#FFF1F2" stroke="#E11D48" stroke-width="1.5"/>
  <text x="580" y="322" text-anchor="middle" font-size="15" font-weight="700" fill="#BE123C">compile time</text>
  <text x="580" y="348" text-anchor="middle" font-size="13" fill="#BE123C">IR ≈ instances × size</text>
</svg>
