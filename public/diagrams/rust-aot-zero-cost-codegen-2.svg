<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" role="img" aria-labelledby="t2 d2" font-family="Pretendard, ui-sans-serif, system-ui, -apple-system, sans-serif">
  <title id="t2">What a crate ships inside its rlib</title>
  <desc id="d2">Compiling crate A produces libA.rlib, which holds two kinds of items. Ordinary non-generic functions are already compiled to object code and are opaque to downstream crates, so calls to them remain a CALL instruction at the crate boundary. Generic functions and functions marked inline are serialized as MIR, so crate B reads that MIR and monomorphizes and inlines them on its own side.</desc>
  <defs>
    <marker id="m2" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#475569"/>
    </marker>
    <marker id="m2r" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#BE123C"/>
    </marker>
    <marker id="m2g" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#047857"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="800" height="420" fill="#FFFFFF"/>

  <text x="400" y="26" text-anchor="middle" font-size="12" fill="#64748B">crossing the crate boundary is not a metaphor — it is MIR serialized into the rlib</text>

  <rect x="40" y="48" width="336" height="272" rx="10" fill="none" stroke="#475569" stroke-width="1.5"/>
  <text x="56" y="70" font-size="11.5" font-weight="700" fill="#334155">libA.rlib (crate A, compiled)</text>

  <rect x="56" y="88" width="304" height="96" rx="8" fill="#FFF1F2" stroke="#E11D48" stroke-width="1.5"/>
  <text x="208" y="110" text-anchor="middle" font-size="11.5" font-weight="700" fill="#BE123C">(1) already compiled — object code</text>
  <text x="208" y="132" text-anchor="middle" font-size="10.5" fill="#BE123C">plain non-generic, non-#[inline] functions</text>
  <text x="208" y="152" text-anchor="middle" font-size="10.5" fill="#BE123C">downstream crates cannot see inside</text>
  <text x="208" y="170" text-anchor="middle" font-size="10.5" font-weight="700" fill="#BE123C">opaque</text>

  <rect x="56" y="200" width="304" height="104" rx="8" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="208" y="222" text-anchor="middle" font-size="11.5" font-weight="700" fill="#047857">(2) serialized as MIR</text>
  <text x="208" y="244" text-anchor="middle" font-size="10.5" fill="#047857">generic functions</text>
  <text x="208" y="262" text-anchor="middle" font-size="10.5" fill="#047857">#[inline] functions</text>
  <text x="208" y="280" text-anchor="middle" font-size="10.5" fill="#047857">(+ small-function heuristic)</text>
  <text x="208" y="298" text-anchor="middle" font-size="10" fill="#64748B">the body travels, not just the symbol</text>

  <line x1="360" y1="136" x2="428" y2="136" stroke="#E11D48" stroke-width="1.6" marker-end="url(#m2r)"/>
  <line x1="360" y1="250" x2="428" y2="250" stroke="#059669" stroke-width="1.6" marker-end="url(#m2g)"/>

  <rect x="432" y="48" width="328" height="272" rx="10" fill="none" stroke="#475569" stroke-width="1.5"/>
  <text x="448" y="70" font-size="11.5" font-weight="700" fill="#334155">crate B (compiling now)</text>

  <rect x="448" y="88" width="296" height="96" rx="8" fill="#FFF1F2" stroke="#FECDD3" stroke-width="1.2"/>
  <text x="596" y="112" text-anchor="middle" font-size="11" font-weight="700" fill="#BE123C">stays a CALL at the boundary</text>
  <text x="596" y="134" text-anchor="middle" font-size="10.5" fill="#BE123C">no inlining — the body is invisible</text>
  <text x="596" y="154" text-anchor="middle" font-size="10.5" fill="#BE123C">no downstream optimization</text>
  <text x="596" y="172" text-anchor="middle" font-size="10" fill="#64748B">(default build, LTO off)</text>

  <rect x="448" y="200" width="296" height="104" rx="8" fill="#ECFDF5" stroke="#A7F3D0" stroke-width="1.2"/>
  <text x="596" y="224" text-anchor="middle" font-size="11" font-weight="700" fill="#047857">crate B re-compiles the MIR</text>
  <text x="596" y="246" text-anchor="middle" font-size="10.5" fill="#047857">monomorphize → inline → codegen</text>
  <text x="596" y="266" text-anchor="middle" font-size="10.5" fill="#047857">on its own side of the boundary</text>
  <text x="596" y="290" text-anchor="middle" font-size="10" fill="#64748B">#[inline] = a physical permission switch</text>

  <rect x="40" y="344" width="720" height="48" rx="8" fill="#F5F3FF" stroke="#DDD6FE" stroke-width="1.2"/>
  <text x="400" y="366" text-anchor="middle" font-size="11" font-weight="700" fill="#6D28D9">to tear the boundary down more broadly: LTO</text>
  <text x="400" y="383" text-anchor="middle" font-size="10.5" fill="#6D28D9">link-time optimization re-opens the IR of every crate at link time</text>
</svg>
