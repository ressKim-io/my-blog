<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" role="img" aria-labelledby="t1 d1" width="100%" height="auto" preserveAspectRatio="xMidYMid meet" style="max-width: 800px;">
  <title id="t1">wealist-prod 마이크로서비스 구성</title>
  <desc id="d1">user/board/chat/noti/storage/video 6개 Go 마이크로서비스와 OAuth2·Redis를 사용하는 Java/Spring 기반 auth-service 1개로 구성된 마이크로서비스 아키텍처</desc>

  <style><![CDATA[
    .label { font-family: 'Pretendard', sans-serif; font-size: 14px; font-weight: 600; }
    .meta  { font-family: 'Geist Mono', ui-monospace, Menlo, monospace; font-size: 11px; fill: #27272A; }
  ]]></style>

  <!-- Stack boundary -->
  <rect x="32" y="40" width="736" height="400" rx="10" fill="#FAFAFA" stroke="#D4D4D8" stroke-width="1.5" stroke-dasharray="6 3"/>
  <text x="48" y="68" class="meta" fill="#475569">Microservices · wealist-prod</text>

  <!-- Row 1: Go services (backend / emerald) -->
  <rect x="80" y="100" width="200" height="72" rx="6" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="180" y="128" text-anchor="middle" class="label" fill="#047857">user-service</text>
  <text x="180" y="150" text-anchor="middle" class="meta">Go</text>

  <rect x="300" y="100" width="200" height="72" rx="6" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="400" y="128" text-anchor="middle" class="label" fill="#047857">board-service</text>
  <text x="400" y="150" text-anchor="middle" class="meta">Go</text>

  <rect x="520" y="100" width="200" height="72" rx="6" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="620" y="128" text-anchor="middle" class="label" fill="#047857">chat-service</text>
  <text x="620" y="150" text-anchor="middle" class="meta">Go</text>

  <!-- Row 2: more Go services (backend / emerald) -->
  <rect x="80" y="196" width="200" height="72" rx="6" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="180" y="224" text-anchor="middle" class="label" fill="#047857">noti-service</text>
  <text x="180" y="246" text-anchor="middle" class="meta">Go</text>

  <rect x="300" y="196" width="200" height="72" rx="6" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="400" y="224" text-anchor="middle" class="label" fill="#047857">storage-service</text>
  <text x="400" y="246" text-anchor="middle" class="meta">Go</text>

  <rect x="520" y="196" width="200" height="72" rx="6" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="620" y="224" text-anchor="middle" class="label" fill="#047857">video-service</text>
  <text x="620" y="246" text-anchor="middle" class="meta">Go</text>

  <!-- Row 3: auth-service (security / rose) - 별도 강조 -->
  <rect x="80" y="312" width="640" height="96" rx="6" fill="#FFF1F2" stroke="#E11D48" stroke-width="1.5"/>
  <text x="400" y="340" text-anchor="middle" class="label" fill="#BE123C">auth-service</text>
  <text x="400" y="364" text-anchor="middle" class="meta">Java / Spring</text>
