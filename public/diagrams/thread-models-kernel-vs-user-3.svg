<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" role="img" aria-labelledby="t3 d3" font-family="Pretendard, ui-sans-serif, system-ui, -apple-system, sans-serif">
  <title id="t3">Where each runtime sits — preemption style versus code style</title>
  <desc id="d3">Two axes place the M:N runtimes. Vertically, whether the runtime can interrupt a task on its own (preemptive) or the task must yield by itself (cooperative). Horizontally, whether ordinary blocking code works unchanged (transparent) or the code must be written with async and await (colored). Go goroutines sit at preemptive and transparent, Java virtual threads yield at blocking points but stay transparent, and Rust tokio tasks yield only at await and colour the code.</desc>
  <defs>
    <marker id="m3" markerWidth="9" markerHeight="9" refX="6.5" refY="2.8" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L6.5,2.8 L0,5.6 Z" fill="#94A3B8"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="800" height="420" fill="#FFFFFF"/>

  <rect x="150" y="80" width="560" height="252" rx="8" fill="#FAFAFA" stroke="#E4E4E7" stroke-width="1.4"/>

  <line x1="118" y1="332" x2="118" y2="76" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#m3)"/>
  <line x1="150" y1="364" x2="714" y2="364" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#m3)"/>

  <text x="118" y="62" text-anchor="middle" font-size="14" font-weight="700" fill="#334155">preemptive</text>
  <text x="118" y="352" text-anchor="middle" font-size="14" font-weight="700" fill="#334155">cooperative</text>
  <text x="150" y="390" font-size="14" font-weight="700" fill="#334155">transparent</text>
  <text x="714" y="390" text-anchor="end" font-size="14" font-weight="700" fill="#334155">colored — async/await</text>

  <rect x="176" y="104" width="216" height="56" rx="8" fill="#ECFDF5" stroke="#059669" stroke-width="1.8"/>
  <text x="284" y="138" text-anchor="middle" font-size="15" font-weight="700" fill="#047857">Go goroutines</text>

  <rect x="196" y="196" width="240" height="56" rx="8" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.8"/>
  <text x="316" y="230" text-anchor="middle" font-size="15" font-weight="700" fill="#6D28D9">Java virtual threads</text>

  <rect x="466" y="266" width="216" height="56" rx="8" fill="#FFFBEB" stroke="#D97706" stroke-width="1.8"/>
  <text x="574" y="300" text-anchor="middle" font-size="15" font-weight="700" fill="#B45309">Rust tokio tasks</text>

  <text x="698" y="106" text-anchor="end" font-size="13" fill="#64748B">1:1 OS threads live off this map</text>
</svg>
