<svg role="img" aria-labelledby="title-2 desc-2" viewBox="0 0 800 480" width="100%" height="auto" xmlns="http://www.w3.org/2000/svg" font-family="'Pretendard', system-ui, sans-serif">
  <title id="title-2">Redis Pub/Sub 내부 동작 — SUBSCRIBE·PUBLISH·fire-and-forget 흐름</title>
  <desc id="desc-2">클라이언트가 채널을 구독하고, publisher가 PUBLISH를 실행하면 Redis가 채널 목록을 탐색해 연결된 모든 구독자에게 메시지를 push합니다. 구독 중이지 않은 클라이언트는 해당 메시지를 받지 못합니다.</desc>

  <defs>
    <marker id="arr-dark2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#0A0A0A"/>
    </marker>
    <marker id="arr-violet2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7C3AED"/>
    </marker>
    <marker id="arr-emerald2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#059669"/>
    </marker>
    <marker id="arr-rose2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#E11D48"/>
    </marker>
    <marker id="arr-slate2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#475569"/>
    </marker>
  </defs>

  <!-- 제목 -->
  <text x="400" y="30" text-anchor="middle" font-size="15" font-weight="700" fill="#0A0A0A">Redis Pub/Sub 내부 동작</text>

  <!-- Publisher 박스 -->
  <rect x="56" y="64" width="136" height="56" rx="6" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="124" y="89" text-anchor="middle" font-size="13" font-weight="600" fill="#047857">Publisher</text>
  <text x="124" y="107" text-anchor="middle" font-size="11" fill="#27272A">PUBLISH payment:status "paid"</text>

  <!-- Redis 서버 박스 (중앙) -->
  <rect x="312" y="56" width="176" height="72" rx="6" fill="#F5F3FF" stroke="#7C3AED" stroke-width="2"/>
  <text x="400" y="82" text-anchor="middle" font-size="13" font-weight="700" fill="#6D28D9">Redis 서버</text>
  <text x="400" y="100" text-anchor="middle" font-size="11" fill="#27272A">채널 목록 (Channel Registry)</text>
  <text x="400" y="116" text-anchor="middle" font-size="11" fill="#27272A">payment:status → [A, B]</text>

  <!-- Publisher → Redis -->
  <line x1="192" y1="92" x2="310" y2="92" stroke="#059669" stroke-width="1.5" marker-end="url(#arr-emerald2)"/>
  <rect x="218" y="78" width="72" height="18" rx="3" fill="#FAFAFA"/>
  <text x="254" y="91" text-anchor="middle" font-size="11" fill="#059669">PUBLISH</text>

  <!-- 구독자 A (연결됨) -->
  <rect x="584" y="56" width="136" height="56" rx="6" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.5"/>
  <text x="652" y="80" text-anchor="middle" font-size="13" font-weight="600" fill="#0E7490">Subscriber A</text>
  <text x="652" y="98" text-anchor="middle" font-size="11" fill="#27272A">SUBSCRIBE payment:status</text>

  <!-- Redis → Subscriber A -->
  <line x1="488" y1="80" x2="582" y2="80" stroke="#7C3AED" stroke-width="1.5" marker-end="url(#arr-violet2)"/>
  <rect x="506" y="66" width="58" height="18" rx="3" fill="#FAFAFA"/>
  <text x="535" y="79" text-anchor="middle" font-size="11" fill="#7C3AED">push "paid"</text>

  <!-- 구독자 B (연결됨) -->
  <rect x="584" y="152" width="136" height="56" rx="6" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.5"/>
  <text x="652" y="176" text-anchor="middle" font-size="13" font-weight="600" fill="#0E7490">Subscriber B</text>
  <text x="652" y="194" text-anchor="middle" font-size="11" fill="#27272A">SUBSCRIBE payment:status</text>

  <!-- Redis → Subscriber B -->
  <line x1="488" y1="116" x2="626" y2="152" stroke="#7C3AED" stroke-width="1.5" marker-end="url(#arr-violet2)"/>
  <rect x="524" y="126" width="58" height="18" rx="3" fill="#FAFAFA"/>
  <text x="553" y="139" text-anchor="middle" font-size="11" fill="#7C3AED">push "paid"</text>

  <!-- 오프라인 구독자 (fire-and-forget) -->
  <rect x="584" y="256" width="136" height="56" rx="6" fill="#F8FAFC" stroke="#475569" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text x="652" y="278" text-anchor="middle" font-size="13" font-weight="600" fill="#475569">Subscriber C</text>
  <text x="652" y="296" text-anchor="middle" font-size="11" fill="#475569">(오프라인 / 미구독)</text>

  <!-- Redis ↛ Subscriber C (차단 화살표) -->
  <line x1="488" y1="128" x2="626" y2="256" stroke="#E11D48" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arr-rose2)"/>
  <rect x="520" y="196" width="70" height="18" rx="3" fill="#FFF1F2"/>
  <text x="555" y="209" text-anchor="middle" font-size="11" fill="#BE123C">전달 불가</text>

  <!-- 메시지 소멸 표시 -->
  <text x="652" y="336" text-anchor="middle" font-size="12" fill="#BE123C" font-weight="600">메시지 소멸</text>
  <text x="652" y="352" text-anchor="middle" font-size="11" fill="#BE123C">(복구 불가)</text>

  <!-- 채널 구독 흐름 (아래쪽 설명 구역) -->
  <rect x="56" y="200" width="220" height="80" rx="6" fill="#FFFBEB" stroke="#D97706" stroke-width="1.2"/>
  <text x="166" y="222" text-anchor="middle" font-size="12" font-weight="600" fill="#B45309">SUBSCRIBE 명령 흐름</text>
  <text x="166" y="240" text-anchor="middle" font-size="11" fill="#27272A">1) 클라이언트 → SUBSCRIBE 채널명</text>
  <text x="166" y="256" text-anchor="middle" font-size="11" fill="#27272A">2) Redis: 채널 테이블에 클라이언트 등록</text>
  <text x="166" y="272" text-anchor="middle" font-size="11" fill="#27272A">3) 이후 해당 채널 PUBLISH 시 즉시 push</text>

  <!-- PSUBSCRIBE 패턴 구독 박스 -->
  <rect x="56" y="316" width="220" height="68" rx="6" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.2"/>
  <text x="166" y="336" text-anchor="middle" font-size="12" font-weight="600" fill="#6D28D9">PSUBSCRIBE (패턴 구독)</text>
  <text x="166" y="352" text-anchor="middle" font-size="11" fill="#27272A">PSUBSCRIBE payment:* 로 등록하면</text>
  <text x="166" y="368" text-anchor="middle" font-size="11" fill="#27272A">payment:status, payment:refund 등</text>
  <text x="166" y="382" text-anchor="middle" font-size="11" fill="#27272A">와일드카드 패턴으로 모두 수신</text>

  <!-- 범례 -->
  <rect x="56" y="418" width="300" height="44" rx="4" fill="#F8FAFC" stroke="#D4D4D8" stroke-width="1"/>
  <text x="66" y="434" font-size="11" font-weight="600" fill="#0A0A0A">범례</text>
  <line x1="66" y1="446" x2="90" y2="446" stroke="#059669" stroke-width="2"/>
  <text x="94" y="449" font-size="11" fill="#27272A">PUBLISH (발행)</text>
  <line x1="170" y1="446" x2="194" y2="446" stroke="#7C3AED" stroke-width="2"/>
  <text x="198" y="449" font-size="11" fill="#27272A">push (전달)</text>
  <line x1="280" y1="446" x2="304" y2="446" stroke="#E11D48" stroke-width="2" stroke-dasharray="4 2"/>
  <text x="308" y="449" font-size="11" fill="#27272A">전달 불가</text>
  <text x="66" y="460" font-size="11" fill="#27272A">실선 = 동기 전달 / 점선 = 연결 없음·오프라인</text>
</svg>
