<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" role="img" aria-labelledby="t1 d1" width="100%" height="auto" preserveAspectRatio="xMidYMid meet" style="max-width: 800px;">
  <title id="t1">개선된 Monitoring Stack 최종 아키텍처</title>
  <desc id="d1">Prometheus v2.55.1은 단기 보관용 PVC를 사용하고, Loki 3.6.3과 Tempo 2.6.1은 S3에 로그·트레이스를 저장. ServiceAccount→IAM Role→S3 Policy 체인의 Pod Identity로 인증을 처리해 PVC 의존을 줄인 구성</desc>

  <defs>
    <marker id="arr1" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#0A0A0A"/>
    </marker>
  </defs>

  <style><![CDATA[
    .label { font-family: 'Pretendard', sans-serif; font-size: 14px; font-weight: 600; }
    .meta  { font-family: 'Geist Mono', ui-monospace, Menlo, monospace; font-size: 11px; fill: #27272A; }
    .arrow { stroke: #0A0A0A; stroke-width: 1.5; fill: none; marker-end: url(#arr1); }
  ]]></style>

  <!-- Stack boundary -->
  <rect x="32" y="40" width="736" height="400" rx="10" fill="#FAFAFA" stroke="#D4D4D8" stroke-width="1.5" stroke-dasharray="6 3"/>
  <text x="48" y="68" class="meta" fill="#475569">Monitoring Stack — 단기/장기 분리</text>

  <!-- Row 1: 3 collectors (backend / emerald) -->
  <rect x="80" y="100" width="200" height="80" rx="6" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="180" y="128" text-anchor="middle" class="label" fill="#047857">Prometheus</text>
  <text x="180" y="150" text-anchor="middle" class="meta">v2.55.1</text>
  <text x="180" y="168" text-anchor="middle" class="meta">메트릭</text>

  <rect x="300" y="100" width="200" height="80" rx="6" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="400" y="128" text-anchor="middle" class="label" fill="#047857">Loki</text>
  <text x="400" y="150" text-anchor="middle" class="meta">3.6.3</text>
  <text x="400" y="168" text-anchor="middle" class="meta">로그</text>

  <rect x="520" y="100" width="200" height="80" rx="6" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="620" y="128" text-anchor="middle" class="label" fill="#047857">Tempo</text>
  <text x="620" y="150" text-anchor="middle" class="meta">2.6.1</text>
  <text x="620" y="168" text-anchor="middle" class="meta">트레이스</text>

  <line x1="180" y1="180" x2="180" y2="216" class="arrow"/>
  <line x1="400" y1="180" x2="400" y2="216" class="arrow"/>
  <line x1="620" y1="180" x2="620" y2="216" class="arrow"/>

  <!-- Row 2: PVC / S3 / S3 (database / violet) -->
  <rect x="80" y="216" width="200" height="80" rx="6" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="180" y="244" text-anchor="middle" class="label" fill="#6D28D9">PVC</text>
  <text x="180" y="266" text-anchor="middle" class="meta">단기 보관</text>
  <text x="180" y="284" text-anchor="middle" class="meta">gp3 / 빠른 쿼리</text>

  <rect x="300" y="216" width="200" height="80" rx="6" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="400" y="244" text-anchor="middle" class="label" fill="#6D28D9">S3</text>
  <text x="400" y="266" text-anchor="middle" class="meta">로그 장기 보관</text>
  <text x="400" y="284" text-anchor="middle" class="meta">Lifecycle 정책 적용</text>

  <rect x="520" y="216" width="200" height="80" rx="6" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="620" y="244" text-anchor="middle" class="label" fill="#6D28D9">S3</text>
  <text x="620" y="266" text-anchor="middle" class="meta">트레이스 장기 보관</text>
  <text x="620" y="284" text-anchor="middle" class="meta">Lifecycle 정책 적용</text>

  <!-- Pod Identity (security / rose) -->
  <rect x="80" y="336" width="640" height="72" rx="6" fill="#FFF1F2" stroke="#E11D48" stroke-width="1.5"/>
  <text x="400" y="362" text-anchor="middle" class="label" fill="#BE123C">Pod Identity</text>
  <text x="400" y="384" text-anchor="middle" class="meta">ServiceAccount → IAM Role → S3 Policy (IRSA 대체, Loki/Tempo S3 인증)</text>
</svg>
