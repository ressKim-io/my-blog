<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 270" font-family="Pretendard, ui-sans-serif, system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="ar" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#94A3B8"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="880" height="270" fill="#FFFFFF"/>

  <text x="440" y="30" text-anchor="middle" font-size="13" font-weight="700" fill="#334155">What a cloud provider places in Korea — series recap</text>

  <!-- Region -->
  <rect x="40" y="90" width="170" height="110" rx="9" fill="#FFFBEB" stroke="#D97706" stroke-width="1.5"/>
  <text x="125" y="120" text-anchor="middle" font-size="12.5" font-weight="700" fill="#B45309">Region (VPC)</text>
  <text x="125" y="137" text-anchor="middle" font-size="10" fill="#94A3B8">compute · storage</text>
  <text x="125" y="153" text-anchor="middle" font-size="10.5" fill="#B45309">3 AZs inside</text>
  <text x="125" y="186" text-anchor="middle" font-size="10" font-weight="700" fill="#B45309">Part 2 · East-West</text>

  <!-- Direct Connect -->
  <rect x="232" y="90" width="140" height="110" rx="9" fill="#F8FAFC" stroke="#475569" stroke-width="1.5"/>
  <text x="302" y="120" text-anchor="middle" font-size="12" font-weight="700" fill="#334155">Direct Connect</text>
  <text x="302" y="137" text-anchor="middle" font-size="10" fill="#94A3B8">in colocation DC</text>
  <text x="302" y="186" text-anchor="middle" font-size="10" font-weight="700" fill="#475569">Part 6</text>

  <!-- CDN edge PoP -->
  <rect x="394" y="90" width="140" height="110" rx="9" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="464" y="120" text-anchor="middle" font-size="12" font-weight="700" fill="#047857">CDN edge PoP</text>
  <text x="464" y="137" text-anchor="middle" font-size="10" fill="#94A3B8">content near user</text>
  <text x="464" y="186" text-anchor="middle" font-size="10" font-weight="700" fill="#047857">Part 3·4·5</text>

  <!-- Embedded cache -->
  <rect x="556" y="90" width="150" height="110" rx="9" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="631" y="120" text-anchor="middle" font-size="12" font-weight="700" fill="#047857">Embedded cache</text>
  <text x="631" y="137" text-anchor="middle" font-size="10" fill="#94A3B8">inside ISP building</text>
  <text x="631" y="186" text-anchor="middle" font-size="10" font-weight="700" fill="#047857">Part 5</text>

  <!-- User -->
  <rect x="728" y="90" width="110" height="110" rx="9" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.5"/>
  <text x="783" y="150" text-anchor="middle" font-size="12.5" font-weight="700" fill="#0E7490">User device</text>

  <!-- axis -->
  <line x1="40" y1="232" x2="842" y2="232" stroke="#CBD5E1" stroke-width="1.6" marker-end="url(#ar)"/>
  <text x="44" y="252" font-size="11" fill="#94A3B8">Deep in cloud (compute)</text>
  <text x="838" y="252" text-anchor="end" font-size="11" fill="#94A3B8">Close to user</text>
</svg>
