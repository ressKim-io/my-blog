<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" role="img" aria-labelledby="j3 e3" font-family="Pretendard, ui-sans-serif, system-ui, -apple-system, sans-serif">
  <title id="j3">A moving collector empties Eden whole, which is what lets the pointer keep bumping</title>
  <desc id="e3">When Eden fills up, the collector copies only the objects that are still alive into a survivor space, and then resets Eden in one stroke. The dead objects are never visited and never individually reclaimed; they are simply left behind. Because Eden comes back empty, the allocation pointer can be reset to the front and start bumping again.</desc>
