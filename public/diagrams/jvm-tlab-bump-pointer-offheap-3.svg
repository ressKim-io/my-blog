    <marker id="j3d" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#334155"/>
    </marker>
    <marker id="j3g" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#059669"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="800" height="340" fill="#FFFFFF"/>

  <text x="200" y="48" text-anchor="middle" font-size="14" font-weight="700" fill="#334155">before</text>
  <text x="600" y="48" text-anchor="middle" font-size="14" font-weight="700" fill="#334155">after</text>

  <rect x="48" y="72" width="304" height="64" rx="8" fill="#FFFFFF" stroke="#059669" stroke-width="1.8"/>
