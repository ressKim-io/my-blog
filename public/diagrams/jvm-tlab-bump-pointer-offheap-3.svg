  <rect x="296" y="80" width="44" height="48" rx="4" fill="#ECFDF5" stroke="#059669" stroke-width="1.4"/>
  <text x="200" y="158" text-anchor="middle" font-size="13" font-weight="700" fill="#334155">Eden · full</text>

  <rect x="48" y="192" width="304" height="64" rx="8" fill="#FFFFFF" stroke="#7C3AED" stroke-width="1.8"/>
  <rect x="56" y="200" width="44" height="48" rx="4" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.4"/>
