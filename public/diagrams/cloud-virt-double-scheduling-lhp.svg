<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" width="100%" height="100%">
  <defs>
    <style>
      .bg { fill: #F8FAFC; }
      .title { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 18px; font-weight: 700; fill: #0F172A; }
      .subtitle { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 14px; font-weight: 500; fill: #475569; }
      .box-guest { fill: #FEF2F2; stroke: #EF4444; stroke-width: 2; rx: 8; }
      .box-host { fill: #EFF6FF; stroke: #3B82F6; stroke-width: 2; rx: 8; }
      .box-inner { fill: #FFFFFF; stroke: #CBD5E1; stroke-width: 1.5; rx: 6; }
      .txt-header { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 16px; font-weight: 700; fill: #1E293B; text-anchor: middle; }
      .txt-sub { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 13px; font-weight: 600; fill: #64748B; text-anchor: middle; }
      .txt-body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 14px; font-weight: 500; fill: #334155; text-anchor: middle; }
      .txt-red { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 14px; font-weight: 700; fill: #EF4444; text-anchor: middle; }
      .txt-blue { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 14px; font-weight: 700; fill: #3B82F6; text-anchor: middle; }
      .arrow { stroke: #64748B; stroke-width: 2; marker-end: url(#arrowhead); fill: none; stroke-dasharray: 6 4; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748B"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="460" class="bg" rx="12"/>

  <!-- Title Section -->
  <text x="40" y="42" class="title">Virtualization Double Scheduling Tax &amp; Lock Holder Preemption (LHP)</text>
  <text x="40" y="66" class="subtitle">Why vCPU Preemption During Guest Spinlock Acquisition Freezes Kubernetes Pods</text>

  <!-- Left Column: Guest OS CFS Layer -->
  <rect x="40" y="96" width="340" height="324" class="box-guest"/>
  <text x="210" y="134" class="txt-header">Guest OS Kernel Layer (KVM Guest)</text>
  <text x="210" y="156" class="txt-red">1st CFS Layer: Pod Thread Scheduling</text>

  <rect x="64" y="176" width="292" height="74" class="box-inner"/>
  <text x="210" y="206" class="txt-header">vCPU 0: Pod Thread A</text>
  <text x="210" y="230" class="txt-sub">Acquires Guest Spinlock (rq-&gt;lock / nf_conn)</text>

  <rect x="64" y="266" width="292" height="134" class="box-inner"/>
  <text x="210" y="298" class="txt-header">vCPU 1: Pod Thread B (Spinning)</text>
  <text x="210" y="324" class="txt-body">Waiting for vCPU 0 to Release Lock</text>
  <text x="210" y="350" class="txt-body">Burn CPU Cycles in Tight Loop</text>
  <text x="210" y="380" class="txt-red">Lock Holder Preemption (LHP) Deadlock State</text>

  <!-- Middle Arrow -->
  <path d="M 380 213 L 420 213" class="arrow"/>

  <!-- Right Column: Host Hypervisor CFS Layer -->
  <rect x="420" y="96" width="340" height="324" class="box-host"/>
  <text x="590" y="134" class="txt-header">Host Hypervisor Layer (KVM Host)</text>
  <text x="590" y="156" class="txt-blue">2nd CFS Layer: vCPU Thread Preemption</text>

  <rect x="444" y="176" width="292" height="74" class="box-inner"/>
  <text x="590" y="206" class="txt-header">Host CFS Scheduler Preempts vCPU 0</text>
  <text x="590" y="230" class="txt-sub">qemu-system-x86_64 Swapped Out for Noisy Neighbor</text>

  <rect x="444" y="266" width="292" height="134" class="box-inner"/>
  <text x="590" y="298" class="txt-header">Physical CPU Steal Time (%st)</text>
  <text x="590" y="324" class="txt-body">vCPU 0 Frozen While Holding Guest Lock</text>
  <text x="590" y="350" class="txt-body">Cascading Latency Spike Across All Guest Pods</text>
  <text x="590" y="380" class="txt-blue">Direct Analogy: Runtime Part 24 CFS Runqueue Tax</text>
</svg>
