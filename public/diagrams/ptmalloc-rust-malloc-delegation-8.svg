<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 330" role="img" aria-labelledby="t8 d8" font-family="Pretendard, ui-sans-serif, system-ui, -apple-system, sans-serif">
  <title id="t8">One live chunk in the middle of the heap blocks the whole return</title>
  <desc id="d8">The brk heap grows upward and can only be lowered from its top, so the kernel can reclaim only the free tail above the highest chunk still in use. Everything below that one live chunk stays mapped no matter how much of it is free, which is why resident memory can sit at its peak long after the traffic is gone.</desc>
  <defs>
    <marker id="a8d" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#334155"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="800" height="330" fill="#FFFFFF"/>

  <text x="72" y="60" font-size="13" fill="#334155">low</text>
  <text x="728" y="60" text-anchor="end" font-size="13" fill="#334155">high · brk</text>

  <text x="552" y="96" text-anchor="middle" font-size="14" font-weight="700" fill="#047857">trim only here</text>
  <path d="M368,124 L368,112 L736,112 L736,124" fill="none" stroke="#059669" stroke-width="2"/>

  <rect x="64" y="136" width="128" height="72" fill="#F8FAFC" stroke="#475569" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text x="128" y="178" text-anchor="middle" font-size="13" fill="#334155">free</text>
  <rect x="192" y="136" width="96" height="72" fill="#F8FAFC" stroke="#475569" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text x="240" y="178" text-anchor="middle" font-size="13" fill="#334155">free</text>
  <rect x="288" y="136" width="80" height="72" fill="#FFF1F2" stroke="#E11D48" stroke-width="2.2"/>
  <text x="328" y="178" text-anchor="middle" font-size="13" font-weight="700" fill="#BE123C">in use</text>
  <rect x="368" y="136" width="368" height="72" fill="#FFFBEB" stroke="#D97706" stroke-width="1.8"/>
  <text x="552" y="178" text-anchor="middle" font-size="14" font-weight="700" fill="#B45309">top chunk</text>

  <path d="M64,220 L64,232 L368,232 L368,220" fill="none" stroke="#E11D48" stroke-width="2"/>
  <text x="216" y="258" text-anchor="middle" font-size="14" font-weight="700" fill="#BE123C">stuck · RSS stays</text>

  <line x1="368" y1="104" x2="368" y2="284" stroke="#E11D48" stroke-width="1.6" stroke-dasharray="6 4"/>
  <text x="380" y="304" font-size="13" font-weight="700" fill="#BE123C">brk cannot pass</text>
</svg>
