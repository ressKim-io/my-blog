<svg role="img" aria-labelledby="title-hpa-calc desc-hpa-calc"
  viewBox="0 0 800 440"
  width="100%"
  height="auto"
  xmlns="http://www.w3.org/2000/svg"
  font-family="'Pretendard', system-ui, sans-serif">

  <title id="title-hpa-calc">desired replica 계산 흐름 — 현재 CPU 관측에서 replica 수 결정까지</title>
  <desc id="desc-hpa-calc">HPA 컨트롤러가 현재 CPU 합산값과 targetCPU로 rawDesired를 계산하고, minReplicas와 maxReplicas 범위로 클램핑하여 최종 desired replica를 결정하는 3단계 흐름. scale-up 쿨다운(3분)과 scale-down 쿨다운(5분) 제약도 포함</desc>

  <defs>
    <marker id="arrow-b" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#0A0A0A"/>
    </marker>
    <marker id="arrow-v" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7C3AED"/>
    </marker>
    <marker id="arrow-r" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#E11D48"/>
    </marker>
  </defs>

  <!-- 화살표 먼저 -->
  <!-- 단계1 -> 단계2 -->
  <line x1="216" y1="128" x2="304" y2="128" stroke="#0A0A0A" stroke-width="1.5" marker-end="url(#arrow-b)"/>
  <!-- 단계2 -> 단계3 -->
  <line x1="488" y1="128" x2="560" y2="128" stroke="#0A0A0A" stroke-width="1.5" marker-end="url(#arrow-b)"/>
  <!-- 단계3 -> 출력 -->
  <line x1="688" y1="160" x2="688" y2="232" stroke="#7C3AED" stroke-width="2" marker-end="url(#arrow-v)"/>
  <!-- 쿨다운 제약 화살표 -->
  <line x1="688" y1="128" x2="688" y2="100" stroke="#E11D48" stroke-width="1.5" stroke-dasharray="4 2" marker-end="url(#arrow-r)"/>

  <!-- 단계 1: 현재 CPU 관측 (amber) -->
  <rect x="40" y="88" width="176" height="80" rx="6" fill="#FFFBEB" stroke="#D97706" stroke-width="1.5"/>
  <text x="128" y="116" text-anchor="middle" font-size="13" font-weight="600" fill="#B45309">현재 CPU 관측</text>
  <text x="128" y="136" text-anchor="middle" font-size="11" fill="#D97706">metrics-server API에서</text>
  <text x="128" y="152" text-anchor="middle" font-size="11" fill="#D97706">각 Pod CPU 합산</text>

  <!-- 단계 2: rawDesired 계산 (emerald) -->
  <rect x="304" y="72" width="184" height="112" rx="6" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="396" y="100" text-anchor="middle" font-size="13" font-weight="600" fill="#047857">rawDesired 계산</text>
  <text x="396" y="122" text-anchor="middle" font-size="11" fill="#059669" font-family="'Geist Mono', monospace">ceil(</text>
  <text x="396" y="140" text-anchor="middle" font-size="11" fill="#059669" font-family="'Geist Mono', monospace">  currentReplicas</text>
  <text x="396" y="158" text-anchor="middle" font-size="11" fill="#059669" font-family="'Geist Mono', monospace">  × (현재CPU / targetCPU)</text>
  <text x="396" y="176" text-anchor="middle" font-size="11" fill="#059669" font-family="'Geist Mono', monospace">)</text>

  <!-- 단계 3: 범위 클램핑 (violet) -->
  <rect x="560" y="88" width="168" height="80" rx="6" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="644" y="116" text-anchor="middle" font-size="13" font-weight="600" fill="#6D28D9">범위 클램핑</text>
  <text x="644" y="136" text-anchor="middle" font-size="11" fill="#7C3AED">min ≤ desired ≤ max</text>
  <text x="644" y="154" text-anchor="middle" font-size="11" fill="#7C3AED">minReplicas / maxReplicas</text>

  <!-- 쿨다운 박스 (rose) -->
  <rect x="560" y="40" width="168" height="48" rx="6" fill="#FFF1F2" stroke="#E11D48" stroke-width="1.5"/>
  <text x="644" y="60" text-anchor="middle" font-size="11" font-weight="600" fill="#BE123C">쿨다운 제약</text>
  <text x="644" y="78" text-anchor="middle" font-size="11" fill="#E11D48">scale-up 3분 / scale-down 5분</text>

  <!-- 출력: desired replica (violet) -->
  <rect x="560" y="232" width="168" height="64" rx="6" fill="#F5F3FF" stroke="#7C3AED" stroke-width="2"/>
  <text x="644" y="260" text-anchor="middle" font-size="14" font-weight="700" fill="#6D28D9">desired replica</text>
  <text x="644" y="280" text-anchor="middle" font-size="11" fill="#7C3AED">Deployment 갱신 적용</text>

  <!-- 단계 번호 배지 -->
  <circle cx="56" cy="72" r="12" fill="#D97706"/>
  <text x="56" y="77" text-anchor="middle" font-size="11" font-weight="700" fill="white">1</text>

  <circle cx="320" cy="72" r="12" fill="#059669"/>
  <text x="320" y="77" text-anchor="middle" font-size="11" font-weight="700" fill="white">2</text>

  <circle cx="576" cy="88" r="12" fill="#7C3AED"/>
  <text x="576" y="93" text-anchor="middle" font-size="11" font-weight="700" fill="white">3</text>

  <!-- 화살표 라벨 -->
  <rect x="216" y="112" width="80" height="18" rx="3" fill="#FAFAFA"/>
  <text x="256" y="125" text-anchor="middle" font-size="11" fill="#27272A">합산 CPU 전달</text>

  <rect x="496" y="112" width="56" height="18" rx="3" fill="#FAFAFA"/>
  <text x="524" y="125" text-anchor="middle" font-size="11" fill="#27272A">rawDesired</text>

  <!-- 계산 예시 박스 -->
  <rect x="40" y="232" width="480" height="136" rx="6" fill="#F8FAFC" stroke="#D4D4D8" stroke-width="1"/>
  <text x="280" y="256" text-anchor="middle" font-size="12" font-weight="600" fill="#27272A">계산 예시 — targetCPU 60%, 현재 replica 3개</text>

  <text x="64" y="284" font-size="12" fill="#334155">시나리오 A (scale-up): 현재 CPU 90%</text>
  <text x="64" y="304" font-size="12" fill="#059669" font-family="'Geist Mono', monospace">  rawDesired = ceil(3 × 90/60) = ceil(4.5) = 5</text>

  <text x="64" y="328" font-size="12" fill="#334155">시나리오 B (scale-down): 현재 CPU 20%</text>
  <text x="64" y="348" font-size="12" fill="#7C3AED" font-family="'Geist Mono', monospace">  rawDesired = ceil(3 × 20/60) = ceil(1.0) = 1</text>

  <!-- 제목 -->
  <text x="400" y="416" text-anchor="middle" font-size="12" fill="#27272A">흐름도 — desired replica 계산 (CPU 관측 → rawDesired → 범위 클램핑)</text>
</svg>
