<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 336" role="img" aria-labelledby="t2 d2" font-family="Pretendard, ui-sans-serif, system-ui, -apple-system, sans-serif">
  <title id="t2">The container memory limit counts everything, not just the heap</title>
  <desc id="d2">A stacked bar shows total resident memory as heap plus code cache plus metaspace plus thread stacks plus direct buffers. The heap alone is well under its Xmx cap, but the native regions push the total past the cgroup limit line, so the pod is OOMKilled even though the heap has room.</desc>
  <rect x="0" y="0" width="800" height="336" fill="#FFFFFF"/>

  <text x="48" y="52" font-size="15" font-weight="700" fill="#334155">total RSS</text>

  <line x1="624" y1="72" x2="624" y2="248" stroke="#E11D48" stroke-width="2" stroke-dasharray="6 3"/>
  <text x="624" y="64" text-anchor="middle" font-size="14" font-weight="700" fill="#BE123C">cgroup limit</text>

  <rect x="48" y="88" width="336" height="72" rx="4" fill="#ECFDF5" stroke="#059669" stroke-width="1.6"/>
  <text x="216" y="122" text-anchor="middle" font-size="15" font-weight="700" fill="#047857">heap</text>
  <text x="216" y="144" text-anchor="middle" font-size="13" fill="#047857">60% of -Xmx</text>

  <rect x="384" y="88" width="104" height="72" rx="4" fill="#FFFBEB" stroke="#D97706" stroke-width="1.4"/>
  <text x="436" y="128" text-anchor="middle" font-size="13" font-weight="700" fill="#B45309">code cache</text>

  <rect x="488" y="88" width="96" height="72" rx="4" fill="#FFFBEB" stroke="#D97706" stroke-width="1.4"/>
  <text x="536" y="128" text-anchor="middle" font-size="13" font-weight="700" fill="#B45309">metaspace</text>

  <rect x="584" y="88" width="64" height="72" rx="4" fill="#FFFBEB" stroke="#D97706" stroke-width="1.4"/>
  <text x="616" y="124" text-anchor="middle" font-size="13" font-weight="700" fill="#B45309">stacks</text>

  <rect x="648" y="88" width="72" height="72" rx="4" fill="#FFF1F2" stroke="#E11D48" stroke-width="1.4"/>
  <text x="684" y="124" text-anchor="middle" font-size="13" font-weight="700" fill="#BE123C">direct</text>

  <text x="384" y="205" text-anchor="middle" font-size="14" font-weight="700" fill="#BE123C">native memory pushes past the limit</text>

  <rect x="500" y="272" width="220" height="48" rx="9" fill="#FFF1F2" stroke="#E11D48" stroke-width="1.6"/>
  <text x="610" y="302" text-anchor="middle" font-size="15" font-weight="700" fill="#BE123C">OOMKilled</text>
</svg>
