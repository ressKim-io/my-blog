  <text x="312" y="157" text-anchor="middle" font-size="14" font-weight="700" fill="#6D28D9">12B</text>

  <rect x="448" y="120" width="80" height="60" rx="7" fill="#ECFDF5" stroke="#059669" stroke-width="2"/>
