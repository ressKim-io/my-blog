<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" role="img" aria-labelledby="t5 d5" font-family="Pretendard, ui-sans-serif, system-ui, -apple-system, sans-serif">
  <title id="t5">Go syscall handoff</title>
  <desc id="d5">Before: goroutine G1 enters a blocking syscall and drags its OS thread M0 into the kernel, while the P still holds queued goroutines G2 and G3. After: the P detaches from the blocked M0 and moves to another thread M1, so G2 and G3 keep running. M0 stays blocked in the kernel with only G1. When the syscall returns, G1 must reacquire a P.</desc>
  <defs>
    <marker id="m5" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#475569"/>
    </marker>
    <marker id="m5a" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#D97706"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="800" height="460" fill="#FFFFFF"/>

  <text x="400" y="26" text-anchor="middle" font-size="12" fill="#64748B">one blocked goroutine costs one M — never the whole scheduler</text>

  <text x="208" y="56" text-anchor="middle" font-size="12.5" font-weight="700" fill="#334155">before — G1 enters a blocking syscall</text>
  <text x="592" y="56" text-anchor="middle" font-size="12.5" font-weight="700" fill="#334155">after — handoff</text>
  <line x1="400" y1="64" x2="400" y2="380" stroke="#E4E4E7" stroke-width="1"/>

  <!-- before -->
  <rect x="88" y="76" width="240" height="56" rx="9" fill="#ECFDF5" stroke="#059669" stroke-width="1.7"/>
  <text x="208" y="99" text-anchor="middle" font-size="12" font-weight="700" fill="#047857">P — runq: [G2] [G3]</text>
  <text x="208" y="118" text-anchor="middle" font-size="10.5" fill="#047857">attached to M0</text>

  <line x1="208" y1="132" x2="208" y2="164" stroke="#475569" stroke-width="1.5" marker-end="url(#m5)"/>

  <rect x="108" y="168" width="200" height="52" rx="8" fill="#F8FAFC" stroke="#475569" stroke-width="1.4"/>
  <text x="208" y="190" text-anchor="middle" font-size="12" font-weight="700" fill="#334155">M0 — running G1</text>
  <text x="208" y="208" text-anchor="middle" font-size="10.5" fill="#64748B">entersyscall</text>

  <!-- privilege boundary -->
  <line x1="48" y1="252" x2="752" y2="252" stroke="#D4D4D8" stroke-width="1.4" stroke-dasharray="7 5"/>
  <text x="52" y="244" font-size="10.5" fill="#64748B">user</text>
  <text x="52" y="268" font-size="10.5" fill="#64748B">kernel</text>

  <line x1="208" y1="220" x2="208" y2="280" stroke="#475569" stroke-width="1.5" marker-end="url(#m5)"/>
  <rect x="108" y="284" width="200" height="52" rx="8" fill="#F8FAFC" stroke="#475569" stroke-width="1.4"/>
  <text x="208" y="306" text-anchor="middle" font-size="12" fill="#334155">sys_read … blocked</text>
  <text x="208" y="324" text-anchor="middle" font-size="10.5" fill="#64748B">M0 is stuck here with G1</text>

  <!-- after -->
  <rect x="472" y="76" width="240" height="56" rx="9" fill="#ECFDF5" stroke="#059669" stroke-width="1.7"/>
  <text x="592" y="99" text-anchor="middle" font-size="12" font-weight="700" fill="#047857">P — runq: [G2] [G3]</text>
  <text x="592" y="118" text-anchor="middle" font-size="10.5" fill="#047857">keeps scheduling, untouched</text>

  <path d="M330,104 C380,88 420,88 468,104" fill="none" stroke="#D97706" stroke-width="1.8" marker-end="url(#m5a)"/>
  <text x="400" y="82" text-anchor="middle" font-size="11" font-weight="700" fill="#B45309">handoff — P moves to M1</text>

  <line x1="592" y1="132" x2="592" y2="164" stroke="#475569" stroke-width="1.5" marker-end="url(#m5)"/>

  <rect x="492" y="168" width="200" height="52" rx="8" fill="#F8FAFC" stroke="#475569" stroke-width="1.4"/>
  <text x="592" y="190" text-anchor="middle" font-size="12" font-weight="700" fill="#334155">M1 — picks up the P</text>
  <text x="592" y="208" text-anchor="middle" font-size="10.5" fill="#64748B">idle or newly created thread</text>

  <rect x="492" y="284" width="200" height="52" rx="8" fill="#FFFFFF" stroke="#475569" stroke-width="1.4" stroke-dasharray="6 4"/>
  <text x="592" y="306" text-anchor="middle" font-size="12" fill="#334155">M0 + G1 — still blocked</text>
  <text x="592" y="324" text-anchor="middle" font-size="10.5" fill="#64748B">wakes on syscall return</text>

  <rect x="48" y="396" width="704" height="44" rx="7" fill="#F8FAFC" stroke="#E4E4E7" stroke-width="1"/>
  <text x="400" y="414" text-anchor="middle" font-size="11" fill="#334155">on return, exitsyscall runs: G1 must reacquire a P to continue</text>
  <text x="400" y="431" text-anchor="middle" font-size="11" fill="#334155">(no free P → G1 goes to the global queue and M0 parks)</text>
</svg>
