<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-labelledby="t4 d4" font-family="Pretendard, ui-sans-serif, system-ui, -apple-system, sans-serif">
  <title id="t4">The indirect cost — user code runs below its warmed-up speed after returning</title>
  <desc id="d4">The curve is the effective speed of user code over time. Entering the kernel drains the pipeline and speed collapses. After returning, the CPU is cold: branch predictors were cleared and the pipeline is empty, so user code runs below the dashed warmed-up baseline until the predictors retrain. That red re-warm zone, not the kernel work itself, is where the real cost lives.</desc>
  <defs>
    <marker id="s4" markerWidth="9" markerHeight="9" refX="6.5" refY="2.8" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L6.5,2.8 L0,5.6 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="800" height="400" fill="#FFFFFF"/>

  <rect x="268" y="110" width="104" height="210" fill="#F1F5F9"/>
  <rect x="372" y="110" width="240" height="210" fill="#FFF1F2" opacity="0.75"/>

  <line x1="80" y1="60" x2="80" y2="320" stroke="#475569" stroke-width="1.5"/>
  <line x1="80" y1="320" x2="756" y2="320" stroke="#475569" stroke-width="1.5" marker-end="url(#s4)"/>
  <line x1="80" y1="110" x2="744" y2="110" stroke="#94A3B8" stroke-width="1.4" stroke-dasharray="6 4"/>

  <path d="M80,110 L236,110 C252,110 252,286 268,286 L372,286 C420,286 470,180 560,134 C616,114 668,110 744,110" fill="none" stroke="#7C3AED" stroke-width="2.4"/>

  <text x="92" y="52" font-size="13" font-weight="700" fill="#334155">effective speed of user code</text>
  <text x="752" y="344" text-anchor="end" font-size="13" fill="#334155">time</text>
  <text x="744" y="100" text-anchor="end" font-size="13" fill="#64748B">warmed-up baseline</text>
  <text x="320" y="240" text-anchor="middle" font-size="13" font-weight="700" fill="#334155">in the kernel</text>
  <text x="492" y="240" text-anchor="middle" font-size="15" font-weight="700" fill="#BE123C">re-warm zone</text>
  <text x="492" y="264" text-anchor="middle" font-size="13" fill="#BE123C">predictors retraining</text>
  <text x="676" y="150" text-anchor="middle" font-size="13" font-weight="700" fill="#047857">back to full speed</text>
</svg>
