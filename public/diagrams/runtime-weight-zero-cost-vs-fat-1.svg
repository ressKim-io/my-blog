<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-labelledby="t1 d1" font-family="Pretendard, ui-sans-serif, system-ui, -apple-system, sans-serif">
  <title id="t1">The language runtime layer — what can live between your code and the kernel</title>
  <desc id="d1">Between application code and the OS kernel sits the language runtime, a layer of managed code that runs with and beneath your program. Candidates for that layer include a garbage collector and allocator, an M:N user-level scheduler, a just-in-time compiler, reflection and runtime type information, exception unwinding, dynamic dispatch, and a class loader with a bytecode interpreter. How heavy a runtime is means simply how much of this middle layer you filled in.</desc>
  <rect x="0" y="0" width="800" height="400" fill="#FFFFFF"/>

  <rect x="32" y="48" width="480" height="60" rx="8" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.6"/>
  <text x="272" y="85" text-anchor="middle" font-size="15" font-weight="700" fill="#0E7490">application code</text>

  <rect x="32" y="124" width="480" height="184" rx="9" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.8"/>
  <text x="272" y="152" text-anchor="middle" font-size="15" font-weight="700" fill="#6D28D9">language runtime layer</text>

  <rect x="48" y="168" width="144" height="56" rx="6" fill="#FFFFFF" stroke="#7C3AED" stroke-width="1.2"/>
  <text x="120" y="201" text-anchor="middle" font-size="13" fill="#6D28D9">GC + allocator</text>
  <rect x="200" y="168" width="144" height="56" rx="6" fill="#FFFFFF" stroke="#7C3AED" stroke-width="1.2"/>
  <text x="272" y="201" text-anchor="middle" font-size="13" fill="#6D28D9">M:N scheduler</text>
  <rect x="352" y="168" width="144" height="56" rx="6" fill="#FFFFFF" stroke="#7C3AED" stroke-width="1.2"/>
  <text x="424" y="201" text-anchor="middle" font-size="13" fill="#6D28D9">JIT compiler</text>

  <rect x="48" y="236" width="144" height="56" rx="6" fill="#FFFFFF" stroke="#7C3AED" stroke-width="1.2"/>
  <text x="120" y="269" text-anchor="middle" font-size="13" fill="#6D28D9">reflection</text>
  <rect x="200" y="236" width="144" height="56" rx="6" fill="#FFFFFF" stroke="#7C3AED" stroke-width="1.2"/>
  <text x="272" y="269" text-anchor="middle" font-size="13" fill="#6D28D9">unwinding</text>
  <rect x="352" y="236" width="144" height="56" rx="6" fill="#FFFFFF" stroke="#7C3AED" stroke-width="1.2"/>
  <text x="424" y="269" text-anchor="middle" font-size="13" fill="#6D28D9">class loader</text>

  <rect x="32" y="324" width="480" height="56" rx="8" fill="#F8FAFC" stroke="#475569" stroke-width="1.6"/>
  <text x="272" y="358" text-anchor="middle" font-size="15" font-weight="700" fill="#334155">OS kernel</text>

  <rect x="544" y="124" width="224" height="184" rx="9" fill="#FAFAFA" stroke="#E4E4E7" stroke-width="1.4"/>
  <text x="656" y="156" text-anchor="middle" font-size="14" font-weight="700" fill="#334155">how much you filled in</text>
  <text x="656" y="196" text-anchor="middle" font-size="13" fill="#047857">Rust — nearly empty</text>
  <text x="656" y="230" text-anchor="middle" font-size="13" fill="#0E7490">Go — pragmatically filled</text>
  <text x="656" y="264" text-anchor="middle" font-size="13" fill="#BE123C">JVM — an entire VM</text>
</svg>
