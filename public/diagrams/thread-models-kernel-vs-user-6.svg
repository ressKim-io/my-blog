<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-labelledby="t6 d6" font-family="Pretendard, ui-sans-serif, system-ui, -apple-system, sans-serif">
  <title id="t6">Virtual thread lifecycle — mount, unmount to the heap, remount</title>
  <desc id="d6">A virtual thread must mount onto a carrier thread, an ordinary platform thread from a work-stealing pool sized to the core count, in order to run. When it blocks on I/O it unmounts: its stack state is saved into a Continuation object on the heap and the carrier is freed to pick up the next virtual thread immediately. When the I/O completes the virtual thread remounts on any available carrier. Pinning is when the unmount step fails and the carrier stays held.</desc>
  <defs>
    <marker id="m6" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="800" height="400" fill="#FFFFFF"/>

  <line x1="264" y1="106" x2="304" y2="106" stroke="#475569" stroke-width="1.6" marker-end="url(#m6)"/>
  <line x1="386" y1="146" x2="386" y2="216" stroke="#475569" stroke-width="1.6" marker-end="url(#m6)"/>
  <line x1="430" y1="216" x2="430" y2="146" stroke="#475569" stroke-width="1.6" marker-end="url(#m6)"/>
  <line x1="524" y1="106" x2="564" y2="106" stroke="#475569" stroke-width="1.6" marker-end="url(#m6)"/>

  <rect x="40" y="72" width="224" height="68" rx="8" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.6"/>
  <text x="152" y="102" text-anchor="middle" font-size="15" font-weight="700" fill="#0E7490">virtual thread VT1</text>
  <text x="152" y="126" text-anchor="middle" font-size="13" fill="#0E7490">hundreds of bytes</text>

  <text x="284" y="94" text-anchor="middle" font-size="13" font-weight="700" fill="#334155">1</text>
  <text x="284" y="130" text-anchor="middle" font-size="13" fill="#64748B">mount</text>

  <rect x="304" y="72" width="220" height="68" rx="8" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.8"/>
  <text x="414" y="102" text-anchor="middle" font-size="15" font-weight="700" fill="#6D28D9">carrier thread</text>
  <text x="414" y="126" text-anchor="middle" font-size="13" fill="#6D28D9">≈ core count</text>

  <text x="352" y="186" text-anchor="middle" font-size="13" font-weight="700" fill="#334155">2</text>
  <text x="352" y="206" text-anchor="middle" font-size="13" fill="#64748B">unmount</text>
  <text x="466" y="186" text-anchor="middle" font-size="13" font-weight="700" fill="#334155">3</text>
  <text x="466" y="206" text-anchor="middle" font-size="13" fill="#64748B">remount</text>

  <rect x="304" y="220" width="220" height="68" rx="8" fill="#ECFDF5" stroke="#059669" stroke-width="1.6"/>
  <text x="414" y="250" text-anchor="middle" font-size="15" font-weight="700" fill="#047857">heap — Continuation</text>
  <text x="414" y="274" text-anchor="middle" font-size="13" fill="#047857">saved stack state</text>

  <rect x="564" y="72" width="196" height="68" rx="8" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.6"/>
  <text x="662" y="102" text-anchor="middle" font-size="15" font-weight="700" fill="#0E7490">next VT</text>
  <text x="662" y="126" text-anchor="middle" font-size="13" fill="#0E7490">carrier never waits</text>

  <rect x="160" y="320" width="480" height="56" rx="9" fill="#FFF1F2" stroke="#E11D48" stroke-width="1.5"/>
  <text x="400" y="344" text-anchor="middle" font-size="14" font-weight="700" fill="#BE123C">pinning</text>
  <text x="400" y="366" text-anchor="middle" font-size="13" fill="#BE123C">step 2 fails — the carrier stays held</text>
</svg>
