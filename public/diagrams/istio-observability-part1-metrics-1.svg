<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 480" role="img" aria-labelledby="t1 d1" width="100%" height="auto" preserveAspectRatio="xMidYMid meet" style="max-width: 760px;">
  <title id="t1">Istio Service Dashboard 핵심 패널 구성</title>
  <desc id="d1">Grafana의 Istio Service Dashboard에서 reviews 서비스를 선택하면 Request Rate(150 req/s), Error Rate(0.5%), Request Duration P50/P90/P99, Incoming Requests by Source 4종 패널로 골든 시그널을 한눈에 확인</desc>

  <style><![CDATA[
    .label { font-family: 'Pretendard', sans-serif; font-size: 14px; font-weight: 600; }
    .meta  { font-family: 'Geist Mono', ui-monospace, Menlo, monospace; font-size: 11px; fill: #27272A; }
    .num   { font-family: 'Geist Mono', ui-monospace, Menlo, monospace; font-size: 22px; font-weight: 700; }
  ]]></style>

  <!-- Dashboard frame -->
  <rect x="32" y="32" width="696" height="416" rx="8" fill="#FAFAFA" stroke="#D4D4D8" stroke-width="1.5"/>
  <text x="48" y="60" class="meta" fill="#475569">Istio Service Dashboard — reviews.default.svc.cluster.local</text>

  <!-- Panel 1: Request Rate (backend / emerald) -->
  <rect x="56" y="84" width="320" height="120" rx="6" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="216" y="108" text-anchor="middle" class="label" fill="#047857">Request Rate</text>
  <text x="216" y="160" text-anchor="middle" class="num" fill="#047857">150 req/s</text>
  <text x="216" y="184" text-anchor="middle" class="meta">istio_requests_total — rate[5m]</text>

  <!-- Panel 2: Error Rate (security / rose) -->
  <rect x="392" y="84" width="320" height="120" rx="6" fill="#FFF1F2" stroke="#E11D48" stroke-width="1.5"/>
  <text x="552" y="108" text-anchor="middle" class="label" fill="#BE123C">Error Rate</text>
  <text x="552" y="160" text-anchor="middle" class="num" fill="#BE123C">0.5%</text>
  <text x="552" y="184" text-anchor="middle" class="meta">response_code=~"5.." 비율</text>

  <!-- Panel 3: Request Duration (cloud / amber) -->
  <rect x="56" y="216" width="320" height="200" rx="6" fill="#FFFBEB" stroke="#D97706" stroke-width="1.5"/>
  <text x="216" y="240" text-anchor="middle" class="label" fill="#B45309">Request Duration</text>
  <text x="80" y="280" class="meta">P50</text>
  <text x="352" y="280" text-anchor="end" class="meta">15 ms</text>
  <line x1="80" y1="294" x2="352" y2="294" stroke="#D4D4D8" stroke-width="1"/>
  <text x="80" y="324" class="meta">P90</text>
  <text x="352" y="324" text-anchor="end" class="meta">45 ms</text>
  <line x1="80" y1="338" x2="352" y2="338" stroke="#D4D4D8" stroke-width="1"/>
  <text x="80" y="368" class="meta">P99</text>
  <text x="352" y="368" text-anchor="end" class="meta">120 ms</text>
  <text x="216" y="404" text-anchor="middle" class="meta">istio_request_duration_milliseconds_bucket</text>

  <!-- Panel 4: Incoming Requests by Source (database / violet) - bar chart 모방 -->
  <rect x="392" y="216" width="320" height="200" rx="6" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="552" y="240" text-anchor="middle" class="label" fill="#6D28D9">Incoming Requests by Source</text>

  <text x="412" y="278" class="meta">frontend</text>
  <rect x="412" y="284" width="220" height="14" rx="2" fill="#7C3AED"/>
  <text x="688" y="295" text-anchor="end" class="meta">80%</text>

  <text x="412" y="320" class="meta">productpage</text>
  <rect x="412" y="326" width="42" height="14" rx="2" fill="#A78BFA"/>
  <text x="688" y="337" text-anchor="end" class="meta">15%</text>

  <text x="412" y="362" class="meta">other</text>
  <rect x="412" y="368" width="14" height="14" rx="2" fill="#C4B5FD"/>
  <text x="688" y="379" text-anchor="end" class="meta">5%</text>

  <text x="552" y="404" text-anchor="middle" class="meta">source_workload 라벨 기준 분포</text>
</svg>
