<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" width="100%" height="100%">
  <defs>
    <style>
      .title { font-family: system-ui, -apple-system, sans-serif; font-size: 18px; font-weight: 700; fill: #1e293b; }
      .header { font-family: system-ui, -apple-system, sans-serif; font-size: 16px; font-weight: 700; }
      .label { font-family: system-ui, -apple-system, sans-serif; font-size: 15px; font-weight: 700; fill: #334155; }
      .value { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 16px; font-weight: 700; }
      .box-slate { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 2.5; rx: 12; }
      .box-cyan { fill: #ecfeff; stroke: #0891b2; stroke-width: 2.5; rx: 12; }
      .box-green { fill: #ecfdf5; stroke: #059669; stroke-width: 2.5; rx: 12; }
      .box-amber { fill: #fffbeb; stroke: #d97706; stroke-width: 2.5; rx: 12; }
      .card { fill: #ffffff; stroke-width: 1.5; rx: 8; }
    </style>
  </defs>

  <rect width="800" height="340" fill="#ffffff" rx="12" />
  <text x="400" y="35" text-anchor="middle" class="title">Goroutine &amp; Stack Scaling vs Pod Count</text>

  <!-- Col 1: Pod 0 -->
  <rect x="30" y="65" width="230" height="200" class="box-slate" />
  <rect x="45" y="80" width="200" height="36" fill="#e2e8f0" rx="8" />
  <text x="145" y="104" text-anchor="middle" class="header">Pod 0 (IDLE)</text>

  <rect x="45" y="130" width="200" height="55" class="card" stroke="#cbd5e1" />
  <text x="145" y="163" text-anchor="middle" class="value" fill="#334155">251 Goroutines</text>

  <rect x="45" y="195" width="200" height="55" class="card" stroke="#64748b" fill="#f8fafc" />
  <text x="145" y="228" text-anchor="middle" class="label" fill="#334155">Stack: ≈ 15.4 KB / G</text>

  <!-- Col 2: Pod 30 -->
  <rect x="285" y="65" width="230" height="200" class="box-cyan" />
  <rect x="300" y="80" width="200" height="36" fill="#cffafe" rx="8" />
  <text x="400" y="104" text-anchor="middle" class="header" fill="#0891b2">Pod 30 (+30)</text>

  <rect x="300" y="130" width="200" height="55" class="card" stroke="#0891b2" />
  <text x="400" y="163" text-anchor="middle" class="value" fill="#0891b2">382 Goroutines</text>

  <rect x="300" y="195" width="200" height="55" class="card" stroke="#0891b2" fill="#ecfeff" />
  <text x="400" y="228" text-anchor="middle" class="label" fill="#0891b2">Stack: ≈ 16.1 KB / G</text>

  <!-- Col 3: Pod 50 -->
  <rect x="540" y="65" width="230" height="200" class="box-green" />
  <rect x="555" y="80" width="200" height="36" fill="#d1fae5" rx="8" />
  <text x="655" y="104" text-anchor="middle" class="header" fill="#065f46">Pod 50 (+50)</text>

  <rect x="555" y="130" width="200" height="55" class="card" stroke="#059669" />
  <text x="655" y="163" text-anchor="middle" class="value" fill="#059669">471 Goroutines</text>

  <rect x="555" y="195" width="200" height="55" class="card" stroke="#059669" fill="#ecfdf5" />
  <text x="655" y="228" text-anchor="middle" class="label" fill="#059669">Stack: ≈ 15.8 KB / G</text>

  <!-- Bottom Insight Bar -->
  <rect x="30" y="280" width="740" height="44" class="box-amber" />
  <text x="400" y="308" text-anchor="middle" class="header" fill="#b45309">Linear Scaling (≈ 4.4 Gs/Pod) | Stack Stabilizes at ≈ 15.8 KB</text>
</svg>
