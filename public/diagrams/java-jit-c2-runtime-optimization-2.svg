<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 424" role="img" aria-labelledby="t2 d2" font-family="Pretendard, ui-sans-serif, system-ui, -apple-system, sans-serif">
  <title id="t2">The five tiers of HotSpot tiered compilation</title>
  <desc id="d2">Level 0 is the interpreter, levels 1 through 3 are the C1 compiler with increasing amounts of profiling, and level 4 is the C2 compiler with the deepest optimization. The standard path climbs from level 0 to level 3 once the invocation count passes 200, then to level 4 once it passes 5000.</desc>
  <defs>
    <marker id="m2v" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#7C3AED"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="800" height="424" fill="#FFFFFF"/>

  <path d="M504,348 H560 V132 H514" fill="none" stroke="#7C3AED" stroke-width="1.8" marker-end="url(#m2v)"/>
  <path d="M504,116 H664 V60 H514" fill="none" stroke="#7C3AED" stroke-width="1.8" marker-end="url(#m2v)"/>

  <rect x="64" y="32" width="440" height="56" rx="8" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.8"/>
  <text x="88" y="66" font-size="15" font-weight="700" fill="#6D28D9">L4</text>
  <text x="152" y="66" font-size="14" fill="#6D28D9">C2 · deep optimization</text>

  <rect x="64" y="104" width="440" height="56" rx="8" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.8"/>
  <text x="88" y="138" font-size="15" font-weight="700" fill="#0E7490">L3</text>
  <text x="152" y="138" font-size="14" fill="#0E7490">C1 · full profile</text>

  <rect x="64" y="176" width="440" height="56" rx="8" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.2" stroke-dasharray="5 3"/>
  <text x="88" y="210" font-size="15" font-weight="700" fill="#0E7490">L2</text>
  <text x="152" y="210" font-size="14" fill="#0E7490">C1 · counters only</text>

  <rect x="64" y="248" width="440" height="56" rx="8" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.2" stroke-dasharray="5 3"/>
  <text x="88" y="282" font-size="15" font-weight="700" fill="#0E7490">L1</text>
  <text x="152" y="282" font-size="14" fill="#0E7490">C1 · no profile</text>

  <rect x="64" y="320" width="440" height="56" rx="8" fill="#F8FAFC" stroke="#475569" stroke-width="1.6"/>
  <text x="88" y="354" font-size="15" font-weight="700" fill="#334155">L0</text>
  <text x="152" y="354" font-size="14" fill="#334155">interpreter</text>

  <text x="576" y="244" font-size="14" font-weight="700" fill="#6D28D9" font-family="ui-monospace, monospace">i &gt; 200</text>
  <text x="680" y="96" font-size="14" font-weight="700" fill="#6D28D9" font-family="ui-monospace, monospace">i &gt; 5000</text>
</svg>
