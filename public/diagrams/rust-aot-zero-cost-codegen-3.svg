<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-labelledby="t3 d3" font-family="Pretendard, ui-sans-serif, system-ui, -apple-system, sans-serif">
  <title id="t3">What a crate ships in its rlib — opaque object code versus serialized MIR</title>
  <desc id="d3">A compiled crate archive holds two kinds of things. Plain non-generic functions without the inline attribute ship as object code, opaque to downstream crates, so a call to them stays a CALL at the boundary and cannot be inlined. Generic functions and inline-annotated functions ship as serialized MIR, so the downstream crate recompiles the body on its own side and inlines it.</desc>
  <defs>
    <marker id="a3r" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#E11D48"/>
    </marker>
    <marker id="a3g" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#059669"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="800" height="400" fill="#FFFFFF"/>

  <line x1="368" y1="150" x2="490" y2="140" stroke="#E11D48" stroke-width="1.6" marker-end="url(#a3r)"/>
  <line x1="368" y1="278" x2="490" y2="290" stroke="#059669" stroke-width="1.6" marker-end="url(#a3g)"/>

  <rect x="32" y="56" width="336" height="288" rx="9" fill="#F8FAFC" stroke="#475569" stroke-width="1.6"/>
  <text x="200" y="86" text-anchor="middle" font-size="15" font-weight="700" fill="#334155" font-family="ui-monospace, monospace">libA.rlib</text>

  <rect x="52" y="104" width="296" height="96" rx="7" fill="#FFF1F2" stroke="#E11D48" stroke-width="1.5"/>
  <text x="200" y="136" text-anchor="middle" font-size="15" font-weight="700" fill="#BE123C">object code</text>
  <text x="200" y="162" text-anchor="middle" font-size="13" fill="#BE123C">opaque</text>
  <text x="200" y="184" text-anchor="middle" font-size="13" fill="#BE123C">plain functions</text>

  <rect x="52" y="232" width="296" height="96" rx="7" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="200" y="264" text-anchor="middle" font-size="15" font-weight="700" fill="#047857">serialized MIR</text>
  <text x="200" y="290" text-anchor="middle" font-size="13" fill="#047857">generics</text>
  <text x="200" y="312" text-anchor="middle" font-size="13" fill="#047857" font-family="ui-monospace, monospace">#[inline]</text>

  <text x="632" y="86" text-anchor="middle" font-size="15" font-weight="700" fill="#334155">crate B</text>

  <rect x="496" y="104" width="272" height="96" rx="9" fill="#FFF1F2" stroke="#E11D48" stroke-width="1.6"/>
  <text x="632" y="140" text-anchor="middle" font-size="15" font-weight="700" fill="#BE123C" font-family="ui-monospace, monospace">call</text>
  <text x="632" y="168" text-anchor="middle" font-size="13" fill="#BE123C">no inlining possible</text>

  <rect x="496" y="232" width="272" height="96" rx="9" fill="#ECFDF5" stroke="#059669" stroke-width="1.6"/>
  <text x="632" y="268" text-anchor="middle" font-size="15" font-weight="700" fill="#047857">inlined</text>
  <text x="632" y="296" text-anchor="middle" font-size="13" fill="#047857">recompiled on this side</text>
</svg>
