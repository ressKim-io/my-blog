<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 720" role="img" aria-labelledby="t1 d1" width="100%" height="auto" preserveAspectRatio="xMidYMid meet" style="max-width: 800px;">
  <title id="t1">activateDefaultTyping 유무에 따른 Redis 역직렬화 결과</title>
  <desc id="d1">activateDefaultTyping이 없으면 JSON에 타입 정보가 빠져 역직렬화 시 LinkedHashMap으로 폴백되며 ClassCastException이 발생하지만, 설정하면 @class 타입 힌트가 추가되어 원본 타입이 정확히 복원</desc>

  <defs>
    <marker id="arr1" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#0A0A0A"/>
    </marker>
    <marker id="arr-r" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#E11D48"/>
    </marker>
  </defs>

  <style><![CDATA[
    .label   { font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif; font-size: 14px; font-weight: 700; }
    .stage   { font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif; font-size: 12px; font-weight: 600; fill: #0A0A0A; }
    .meta    { font-family: 'Geist Mono', ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 11px; fill: #27272A; }
    .item    { font-family: 'Geist Mono', ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px; fill: #0A0A0A; }
    .err     { font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif; font-size: 12px; font-weight: 600; fill: #BE123C; }
    .ok      { font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif; font-size: 12px; font-weight: 600; fill: #047857; }
    .arrow   { stroke: #0A0A0A; stroke-width: 1.5; fill: none; marker-end: url(#arr1); }
    .arrow-r { stroke: #E11D48; stroke-width: 1.5; fill: none; marker-end: url(#arr-r); }
  ]]></style>

  <!-- Top section: missing -->
  <rect x="24" y="24" width="752" height="328" rx="8" fill="#FFF1F2" stroke="#E11D48" stroke-width="1.5"/>
  <text x="400" y="52" text-anchor="middle" class="label" fill="#BE123C">activateDefaultTyping 미설정</text>

  <text x="48" y="84" class="stage">[직렬화]</text>
  <text x="120" y="84" class="item">ReservationSessionCache</text>
  <line x1="200" y1="92" x2="200" y2="116" class="arrow"/>

  <rect x="48" y="120" width="704" height="56" rx="6" fill="#FAFAFA" stroke="#E11D48" stroke-width="1.5"/>
  <text x="64" y="142" class="stage">Redis 저장</text>
  <text x="64" y="162" class="item">{"sessionId":"abc","seatId":42}</text>
  <text x="736" y="162" text-anchor="end" class="err">타입 정보 없음</text>

  <line x1="200" y1="176" x2="200" y2="200" class="arrow-r"/>

  <text x="48" y="216" class="stage">[역직렬화]</text>
  <text x="120" y="216" class="err">대상 타입을 모름 → LinkedHashMap {sessionId=abc, seatId=42}</text>

  <line x1="200" y1="228" x2="200" y2="252" class="arrow-r"/>

  <rect x="48" y="256" width="704" height="56" rx="6" fill="#FFF1F2" stroke="#E11D48" stroke-width="1.5"/>
  <text x="64" y="280" class="item" fill="#BE123C">clazz.cast()</text>
  <text x="736" y="280" text-anchor="end" class="err">→ ClassCastException ✗</text>
  <text x="64" y="300" class="meta">JSON 객체 → LinkedHashMap (Jackson 기본 폴백)</text>

  <!-- Bottom section: configured -->
  <rect x="24" y="376" width="752" height="328" rx="8" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="400" y="404" text-anchor="middle" class="label" fill="#047857">activateDefaultTyping 설정</text>

  <text x="48" y="436" class="stage">[직렬화]</text>
  <text x="120" y="436" class="item">ReservationSessionCache</text>
  <line x1="200" y1="444" x2="200" y2="468" class="arrow"/>

  <rect x="48" y="472" width="704" height="92" rx="6" fill="#FAFAFA" stroke="#059669" stroke-width="1.5"/>
  <text x="64" y="494" class="stage">Redis 저장</text>
  <text x="64" y="514" class="item">{</text>
  <text x="80" y="534" class="item">"@class": "com.goti...ReservationSessionCache",</text>
  <text x="80" y="554" class="item">"sessionId": "abc", "seatId": 42</text>
  <text x="64" y="574" class="item">}</text>
  <text x="736" y="494" text-anchor="end" class="ok">@class 타입 힌트 포함</text>

  <line x1="200" y1="588" x2="200" y2="612" class="arrow"/>

  <text x="48" y="628" class="stage">[역직렬화]</text>
  <text x="120" y="628" class="ok">@class 로 타입 결정 → ReservationSessionCache {sessionId=abc, seatId=42}</text>

  <line x1="200" y1="640" x2="200" y2="664" class="arrow"/>

  <text x="48" y="684" class="item">clazz.cast()</text>
  <text x="736" y="684" text-anchor="end" class="ok">→ 성공 ✓</text>
</svg>
