<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" width="100%" height="100%">
  <defs>
    <style>
      .bg { fill: #F8FAFC; }
      .title { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 18px; font-weight: 700; fill: #0F172A; }
      .subtitle { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 14px; font-weight: 500; fill: #475569; }
      .box-kernel { fill: #FEF2F2; stroke: #EF4444; stroke-width: 2; rx: 8; }
      .box-hw { fill: #EFF6FF; stroke: #3B82F6; stroke-width: 2; rx: 8; }
      .box-res { fill: #FEFCE8; stroke: #EAB308; stroke-width: 2; rx: 8; }
      .box-cost { fill: #F0FDF4; stroke: #10B981; stroke-width: 2; rx: 8; }
      .box-inner { fill: #FFFFFF; stroke: #CBD5E1; stroke-width: 1.5; rx: 6; }
      .txt-header { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 15px; font-weight: 700; fill: #1E293B; text-anchor: middle; }
      .txt-sub { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 13px; font-weight: 600; fill: #64748B; text-anchor: middle; }
      .txt-body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 13px; font-weight: 500; fill: #334155; text-anchor: middle; }
      .txt-red { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 14px; font-weight: 700; fill: #EF4444; text-anchor: middle; }
      .txt-blue { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 14px; font-weight: 700; fill: #3B82F6; text-anchor: middle; }
      .txt-yellow { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 14px; font-weight: 700; fill: #CA8A04; text-anchor: middle; }
      .txt-green { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 14px; font-weight: 700; fill: #10B981; text-anchor: middle; }
      .arrow { stroke: #64748B; stroke-width: 2; marker-end: url(#arrowhead); fill: none; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748B"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="460" class="bg" rx="12"/>

  <!-- Title Section -->
  <text x="40" y="42" class="title">The Law of Conservation of Infrastructure Physics &amp; Cost</text>
  <text x="40" y="66" class="subtitle">Where Does Kernel &amp; Virtualization Tax Go When Eliminated by Cloud Optimizations?</text>

  <!-- Left Column: Kernel Software Tax (Source of Tax) -->
  <rect x="40" y="96" width="240" height="324" class="box-kernel"/>
  <text x="160" y="132" class="txt-header">Kernel Software Tax</text>
  <text x="160" y="152" class="txt-red">Raw Physical Bottlenecks</text>

  <rect x="56" y="170" width="208" height="64" class="box-inner"/>
  <text x="160" y="196" class="txt-sub">iptables O(N) Traversal</text>
  <text x="160" y="218" class="txt-body">conntrack Global Spinlocks</text>

  <rect x="56" y="246" width="208" height="64" class="box-inner"/>
  <text x="160" y="272" class="txt-sub">VM-Exit &amp; VMCS Flush</text>
  <text x="160" y="294" class="txt-body">500ns Mode Switch + LLC Miss</text>

  <rect x="56" y="322" width="208" height="76" class="box-inner"/>
  <text x="160" y="348" class="txt-sub">PLEG Goroutine Wakeups</text>
  <text x="160" y="370" class="txt-body">CFS Runqueue Preemption</text>
  <text x="160" y="388" class="txt-red">Lock Holder Preemption (LHP)</text>

  <!-- Arrows branching out -->
  <path d="M 280 202 L 320 162" class="arrow"/>
  <path d="M 280 258 L 320 258" class="arrow"/>
  <path d="M 280 360 L 320 360" class="arrow"/>

  <!-- Right Top Box: Hardware Offloading Tax -->
  <rect x="320" y="96" width="440" height="100" class="box-hw"/>
  <text x="540" y="128" class="txt-header">1. Converted to Hardware Offloading Tax (ASIC / FPGA / PCIe)</text>
  <rect x="336" y="142" width="408" height="42" class="box-inner"/>
  <text x="540" y="168" class="txt-blue">AWS Nitro Card / GCP Andromeda / SR-IOV IOMMU Passthrough</text>

  <!-- Right Middle Box: Memory & IP Reservation Tax -->
  <rect x="320" y="212" width="440" height="100" class="box-res"/>
  <text x="540" y="244" class="txt-header">2. Converted to Resource Reservation Tax (RAM / ENI Blocks)</text>
  <rect x="336" y="258" width="408" height="42" class="box-inner"/>
  <text x="540" y="284" class="txt-yellow">kube-reserved Poll Tax + VPC CNI Prefix Delegation (/28 IP Depletion)</text>

  <!-- Right Bottom Box: Dollar & Policy Override Tax -->
  <rect x="320" y="328" width="440" height="92" class="box-cost"/>
  <text x="540" y="360" class="txt-header">3. Converted to Monetary &amp; Policy Tax ($0.10/hr + CRD Lock-in)</text>
  <rect x="336" y="372" width="408" height="36" class="box-inner"/>
  <text x="540" y="396" class="txt-green">Managed Control Plane Fee + CSP Security Override &amp; CRD Enforcements</text>
</svg>
