<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" role="img" aria-labelledby="t7 d7" font-family="Pretendard, ui-sans-serif, system-ui, -apple-system, sans-serif">
  <title id="t7">Reads share one zero page; the first write splits off a private frame</title>
  <desc id="d7">On the left, three anonymous pages that have only been read all map read-only to the single system-wide zero page, so no real frames exist. On the right, the first write to one of them triggers copy-on-write: that page gets its own private frame and RSS finally grows, while the untouched pages keep sharing the zero page.</desc>
  <defs>
    <marker id="k7z" markerWidth="9" markerHeight="9" refX="6.5" refY="2.8" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L6.5,2.8 L0,5.6 Z" fill="#B45309"/>
    </marker>
    <marker id="k7w" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#E11D48"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="800" height="360" fill="#FFFFFF"/>

  <line x1="400" y1="32" x2="400" y2="328" stroke="#E4E4E7" stroke-width="1.2"/>

  <text x="200" y="52" text-anchor="middle" font-size="15" font-weight="700" fill="#0E7490">read only</text>

  <rect x="56" y="80" width="96" height="40" rx="5" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.4"/>
  <rect x="56" y="152" width="96" height="40" rx="5" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.4"/>
  <rect x="56" y="224" width="96" height="40" rx="5" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.4"/>
  <text x="104" y="300" text-anchor="middle" font-size="13" fill="#0E7490">3 pages</text>

  <line x1="152" y1="100" x2="216" y2="160" stroke="#B45309" stroke-width="1.5" marker-end="url(#k7z)"/>
  <line x1="152" y1="172" x2="216" y2="172" stroke="#B45309" stroke-width="1.5" marker-end="url(#k7z)"/>
  <line x1="152" y1="244" x2="216" y2="184" stroke="#B45309" stroke-width="1.5" marker-end="url(#k7z)"/>

  <rect x="220" y="140" width="136" height="72" rx="9" fill="#FFFBEB" stroke="#D97706" stroke-width="1.8"/>
  <text x="288" y="170" text-anchor="middle" font-size="14" font-weight="700" fill="#B45309">zero page</text>
  <text x="288" y="194" text-anchor="middle" font-size="13" fill="#B45309">1 frame · RO</text>

  <text x="600" y="52" text-anchor="middle" font-size="15" font-weight="700" fill="#BE123C">first write</text>

  <rect x="456" y="80" width="96" height="40" rx="5" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.4"/>
  <rect x="456" y="152" width="96" height="40" rx="5" fill="#FFF1F2" stroke="#E11D48" stroke-width="1.8"/>
  <rect x="456" y="224" width="96" height="40" rx="5" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.4"/>

  <line x1="552" y1="100" x2="616" y2="92" stroke="#B45309" stroke-width="1.5" marker-end="url(#k7z)"/>
  <line x1="552" y1="244" x2="616" y2="112" stroke="#B45309" stroke-width="1.5" marker-end="url(#k7z)"/>

  <rect x="620" y="72" width="132" height="60" rx="9" fill="#FFFBEB" stroke="#D97706" stroke-width="1.6"/>
  <text x="686" y="108" text-anchor="middle" font-size="13" font-weight="700" fill="#B45309">zero page</text>

  <line x1="552" y1="172" x2="616" y2="212" stroke="#E11D48" stroke-width="2" marker-end="url(#k7w)"/>
  <text x="566" y="204" font-size="13" fill="#BE123C">COW</text>

  <rect x="620" y="196" width="132" height="72" rx="9" fill="#ECFDF5" stroke="#059669" stroke-width="1.8"/>
  <text x="686" y="226" text-anchor="middle" font-size="14" font-weight="700" fill="#047857">private frame</text>
  <text x="686" y="250" text-anchor="middle" font-size="13" fill="#047857">RSS +4KB</text>
</svg>
