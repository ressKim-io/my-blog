<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" role="img" aria-labelledby="t1 d1" font-family="Pretendard, ui-sans-serif, system-ui, -apple-system, sans-serif">
  <title id="t1">G1 keeps the generations but scatters them across equal-sized regions</title>
  <desc id="d1">On the left, the classic generational layout: the heap is two large contiguous blocks, young and old. On the right, G1: the same heap is cut into thousands of equally sized regions, and each region is given a role that can change over time, so eden, survivor, old, humongous and free cells sit intermixed across the grid. Two humongous cells are drawn adjacent because an object larger than one region needs a contiguous run. A young generation in G1 is therefore not a place but a set: whichever regions currently hold the eden and survivor roles. Because the unit of collection is one small region rather than a whole generation, the collector can pick a subset that fits inside its pause target, and it picks the ones holding the most garbage first.</desc>
  <rect x="0" y="0" width="800" height="300" fill="#FFFFFF"/>

  <text x="170" y="46" text-anchor="middle" font-size="16" font-weight="700" fill="#334155">classic: contiguous</text>
  <text x="565" y="46" text-anchor="middle" font-size="16" font-weight="700" fill="#334155">G1: equal-sized regions</text>

  <rect x="50" y="80" width="100" height="150" rx="8" fill="#ECFDF5" stroke="#059669" stroke-width="2.2"/>
  <text x="100" y="161" text-anchor="middle" font-size="15" font-weight="700" fill="#047857">young</text>
  <rect x="160" y="80" width="160" height="150" rx="8" fill="#F5F3FF" stroke="#7C3AED" stroke-width="2.2"/>
  <text x="240" y="161" text-anchor="middle" font-size="15" font-weight="700" fill="#6D28D9">old</text>

  <g font-size="15" font-weight="700" text-anchor="middle">
    <rect x="400" y="80" width="66" height="66" rx="6" fill="#ECFDF5" stroke="#059669" stroke-width="1.8"/><text x="433" y="121" fill="#047857">E</text>
    <rect x="472" y="80" width="66" height="66" rx="6" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.8"/><text x="505" y="121" fill="#6D28D9">O</text>
    <rect x="544" y="80" width="66" height="66" rx="6" fill="#F8FAFC" stroke="#475569" stroke-width="1.8"/><text x="577" y="121" fill="#334155">F</text>
    <rect x="616" y="80" width="66" height="66" rx="6" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.8"/><text x="649" y="121" fill="#0E7490">S</text>
    <rect x="688" y="80" width="66" height="66" rx="6" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.8"/><text x="721" y="121" fill="#6D28D9">O</text>

    <rect x="400" y="152" width="66" height="66" rx="6" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.8"/><text x="433" y="193" fill="#6D28D9">O</text>
    <rect x="472" y="152" width="66" height="66" rx="6" fill="#F8FAFC" stroke="#475569" stroke-width="1.8"/><text x="505" y="193" fill="#334155">F</text>
    <rect x="544" y="152" width="66" height="66" rx="6" fill="#ECFDF5" stroke="#059669" stroke-width="1.8"/><text x="577" y="193" fill="#047857">E</text>
    <rect x="616" y="152" width="138" height="66" rx="6" fill="#FFFBEB" stroke="#D97706" stroke-width="2.6"/><text x="685" y="193" fill="#B45309">H   H</text>
  </g>

  <text x="565" y="262" text-anchor="middle" font-size="14" font-weight="700" fill="#334155">same size, roles reassigned over time</text>
</svg>
