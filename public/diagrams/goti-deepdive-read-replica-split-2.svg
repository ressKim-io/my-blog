<svg role="img" aria-labelledby="title-2 desc-2"
     viewBox="0 0 800 520" width="100%" height="auto"
     xmlns="http://www.w3.org/2000/svg"
     style="font-family: 'Pretendard', system-ui, sans-serif;">
  <title id="title-2">Read Replica 쿼리 라우팅 구조도</title>
  <desc id="desc-2">Go 서비스가 쿼리 종류에 따라 Primary(쓰기·락·즉시일관성)와 Replica(일반 읽기)로 분기하고, Primary에서 Replica로 비동기 복제가 흐르는 구조</desc>

  <!-- 배경 -->
  <rect x="0" y="0" width="800" height="520" fill="#FAFAFA"/>

  <!-- 제목 -->
  <text x="400" y="36" text-anchor="middle" font-size="15" font-weight="600" fill="#0A0A0A">구조도 — Read Replica 쿼리 라우팅</text>

  <!-- ── Go 서비스 박스 ── -->
  <rect x="48" y="72" width="192" height="176" rx="8" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="144" y="96" text-anchor="middle" font-size="13" font-weight="600" fill="#047857">Go 서비스</text>
  <text x="144" y="114" text-anchor="middle" font-size="11" fill="#27272A">(ticketing / stadium / user 등)</text>

  <!-- writePool 박스 -->
  <rect x="72" y="128" width="144" height="44" rx="6" fill="#FFF1F2" stroke="#E11D48" stroke-width="1.2"/>
  <text x="144" y="147" text-anchor="middle" font-size="12" font-weight="600" fill="#BE123C">writePool</text>
  <text x="144" y="163" text-anchor="middle" font-size="11" fill="#27272A">쓰기 / 락 / 즉시 읽기</text>

  <!-- readPool 박스 -->
  <rect x="72" y="184" width="144" height="44" rx="6" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.2"/>
  <text x="144" y="203" text-anchor="middle" font-size="12" font-weight="600" fill="#0E7490">readPool</text>
  <text x="144" y="219" text-anchor="middle" font-size="11" fill="#27272A">일반 SELECT (복제 지연 허용)</text>

  <!-- ── Primary DB 박스 ── -->
  <rect x="304" y="72" width="192" height="96" rx="8" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="400" y="100" text-anchor="middle" font-size="13" font-weight="600" fill="#6D28D9">Primary (Writer)</text>
  <text x="400" y="118" text-anchor="middle" font-size="11" fill="#27272A">goti-prod-postgres</text>
  <text x="400" y="135" text-anchor="middle" font-size="11" fill="#27272A">RDS t3.large · max_conn 300</text>
  <text x="400" y="152" text-anchor="middle" font-size="11" fill="#27272A">쓰기 + 읽기 모두 처리</text>

  <!-- ── Replica DB 박스 ── -->
  <rect x="304" y="256" width="192" height="96" rx="8" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.5"/>
  <text x="400" y="284" text-anchor="middle" font-size="13" font-weight="600" fill="#0E7490">Replica (Reader)</text>
  <text x="400" y="302" text-anchor="middle" font-size="11" fill="#27272A">goti-prod-postgres-ro-1</text>
  <text x="400" y="319" text-anchor="middle" font-size="11" fill="#27272A">RDS t3.large · max_conn 300</text>
  <text x="400" y="336" text-anchor="middle" font-size="11" fill="#27272A">읽기 전용</text>

  <!-- writePool → Primary 화살표 -->
  <line x1="216" y1="150" x2="304" y2="120" stroke="#E11D48" stroke-width="1.5" marker-end="url(#arrow-red2)"/>
  <rect x="228" y="119" width="60" height="18" rx="3" fill="#FAFAFA"/>
  <text x="258" y="131" text-anchor="middle" font-size="10" fill="#BE123C">쓰기 / 락</text>

  <!-- readPool → Replica 화살표 -->
  <line x1="216" y1="206" x2="304" y2="290" stroke="#0891B2" stroke-width="1.5" marker-end="url(#arrow-blue2)"/>
  <rect x="218" y="240" width="64" height="18" rx="3" fill="#FAFAFA"/>
  <text x="250" y="252" text-anchor="middle" font-size="10" fill="#0E7490">읽기 (SELECT)</text>

  <!-- Primary → Replica 비동기 복제 화살표 -->
  <line x1="400" y1="168" x2="400" y2="256" stroke="#7C3AED" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arrow-violet2)"/>
  <rect x="410" y="196" width="88" height="18" rx="3" fill="#FAFAFA"/>
  <text x="454" y="208" text-anchor="middle" font-size="10" fill="#6D28D9">비동기 복제 (WAL 스트림)</text>

  <!-- ── 라우팅 규칙 패널 ── -->
  <rect x="540" y="72" width="224" height="280" rx="8" fill="#FFFBEB" stroke="#D97706" stroke-width="1.2"/>
  <text x="652" y="98" text-anchor="middle" font-size="13" font-weight="600" fill="#B45309">쿼리 라우팅 규칙</text>

  <!-- Primary 필수 항목 -->
  <text x="556" y="122" font-size="12" font-weight="600" fill="#BE123C">Primary 필수</text>
  <text x="564" y="140" font-size="11" fill="#0A0A0A">• INSERT / UPDATE / DELETE</text>
  <text x="564" y="157" font-size="11" fill="#0A0A0A">• SELECT ... FOR UPDATE</text>
  <text x="564" y="174" font-size="11" fill="#0A0A0A">• BEGIN 트랜잭션 전체</text>
  <text x="564" y="191" font-size="11" fill="#0A0A0A">• 쓰기 직후 즉시 읽기</text>
  <text x="564" y="208" font-size="11" fill="#0A0A0A">  (read-your-write)</text>

  <!-- 구분선 -->
  <line x1="556" y1="220" x2="748" y2="220" stroke="#D4D4D8" stroke-width="1"/>

  <!-- Replica 허용 항목 -->
  <text x="556" y="238" font-size="12" font-weight="600" fill="#0E7490">Replica 허용</text>
  <text x="564" y="256" font-size="11" fill="#0A0A0A">• 좌석 등급/섹션/가격 조회</text>
  <text x="564" y="273" font-size="11" fill="#0A0A0A">• 경기 일정/게임 메타 조회</text>
  <text x="564" y="290" font-size="11" fill="#0A0A0A">• 마이페이지 주문 내역</text>
  <text x="564" y="307" font-size="11" fill="#0A0A0A">• 좌석 현재 상태 (락 없음)</text>
  <text x="564" y="324" font-size="11" fill="#B45309">  → 트래픽의 약 75% 분리 가능</text>

  <!-- ── 복제 지연 경고 박스 ── -->
  <rect x="304" y="376" width="192" height="96" rx="8" fill="#FFF1F2" stroke="#E11D48" stroke-width="1.2" stroke-dasharray="4 2"/>
  <text x="400" y="401" text-anchor="middle" font-size="12" font-weight="600" fill="#BE123C">복제 지연 (Replication Lag)</text>
  <text x="400" y="419" text-anchor="middle" font-size="11" fill="#0A0A0A">Primary 쓰기 완료 후</text>
  <text x="400" y="436" text-anchor="middle" font-size="11" fill="#0A0A0A">Replica 반영까지 0~수초 지연</text>
  <text x="400" y="453" text-anchor="middle" font-size="11" fill="#BE123C">→ 이 구간에 Replica 읽으면</text>
  <text x="400" y="470" text-anchor="middle" font-size="11" fill="#BE123C">   이전 값 반환될 수 있음</text>

  <!-- Replica → 지연 박스 점선 -->
  <line x1="400" y1="352" x2="400" y2="376" stroke="#E11D48" stroke-width="1" stroke-dasharray="3 2"/>

  <!-- 범례 -->
  <rect x="48" y="400" width="224" height="100" rx="6" fill="#F8FAFC" stroke="#D4D4D8" stroke-width="1"/>
  <text x="160" y="422" text-anchor="middle" font-size="12" font-weight="600" fill="#334155">범례</text>
  <line x1="64" y1="438" x2="96" y2="438" stroke="#E11D48" stroke-width="1.5" marker-end="url(#arrow-red2)"/>
  <text x="104" y="442" font-size="11" fill="#0A0A0A">쓰기 경로 (Primary)</text>
  <line x1="64" y1="458" x2="96" y2="458" stroke="#0891B2" stroke-width="1.5" marker-end="url(#arrow-blue2)"/>
  <text x="104" y="462" font-size="11" fill="#0A0A0A">읽기 경로 (Replica)</text>
  <line x1="64" y1="478" x2="96" y2="478" stroke="#7C3AED" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arrow-violet2)"/>
  <text x="104" y="482" font-size="11" fill="#0A0A0A">비동기 복제 스트림</text>

  <!-- 마커 정의 -->
  <defs>
    <marker id="arrow-red2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#E11D48"/>
    </marker>
    <marker id="arrow-blue2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#0891B2"/>
    </marker>
    <marker id="arrow-violet2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7C3AED"/>
    </marker>
  </defs>
</svg>
