<svg role="img" aria-labelledby="title-2 desc-2"
     viewBox="0 0 800 560" width="100%" height="auto"
     xmlns="http://www.w3.org/2000/svg"
     style="font-family: 'Pretendard', system-ui, sans-serif;">
  <title id="title-2">Lua 원자 실행 vs WATCH/MULTI/EXEC 낙관적 트랜잭션 타임라인 비교</title>
  <desc id="desc-2">왼쪽은 Lua EVALSHA가 블록 전체를 단일 명령으로 실행해 중간 개입이 불가능한 타임라인, 오른쪽은 WATCH/MULTI/EXEC에서 키 변경 감지 시 EXEC가 nil을 반환하고 클라이언트가 재시도하는 타임라인</desc>

  <!-- 배경 -->
  <rect width="800" height="560" fill="#FAFAFA"/>

  <!-- 제목 -->
  <text x="400" y="36" text-anchor="middle" font-size="15" font-weight="600" fill="#0A0A0A">타임라인 비교 — Lua 원자 실행 vs WATCH/MULTI/EXEC</text>

  <!-- ===== 시간 축 공통 ===== -->
  <line x1="60" y1="60" x2="60" y2="500" stroke="#D4D4D8" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="60" y="56" text-anchor="middle" font-size="11" fill="#27272A">시작</text>
  <line x1="60" y1="500" x2="780" y2="500" stroke="#D4D4D8" stroke-width="1"/>
  <text x="420" y="520" text-anchor="middle" font-size="12" fill="#27272A">시간 흐름 →</text>

  <!-- ===== 왼쪽 패널: Lua EVALSHA ===== -->
  <!-- 패널 배경 -->
  <rect x="60" y="70" width="340" height="400" rx="6" fill="#ECFDF5" stroke="#059669" stroke-width="1.5" fill-opacity="0.3"/>
  <text x="230" y="92" text-anchor="middle" font-size="14" font-weight="700" fill="#047857">Lua EVALSHA</text>

  <!-- 클라이언트 A 라인 -->
  <text x="78" y="120" font-size="11" fill="#0E7490" font-weight="600">클라이언트 A</text>
  <line x1="68" y1="130" x2="390" y2="130" stroke="#D4D4D8" stroke-width="1"/>

  <!-- 클라이언트 B 라인 -->
  <text x="78" y="200" font-size="11" fill="#0E7490" font-weight="600">클라이언트 B</text>
  <line x1="68" y1="210" x2="390" y2="210" stroke="#D4D4D8" stroke-width="1"/>

  <!-- Redis 서버 라인 -->
  <text x="78" y="280" font-size="11" fill="#047857" font-weight="600">Redis (단일 스레드)</text>
  <line x1="68" y1="290" x2="390" y2="290" stroke="#D4D4D8" stroke-width="1"/>

  <!-- 클라이언트 A: EVALSHA 전송 -->
  <rect x="90" y="120" width="10" height="10" rx="2" fill="#059669"/>
  <line x1="95" y1="130" x2="150" y2="290" stroke="#059669" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="110" y="215" font-size="10" fill="#047857">EVALSHA</text>
  <text x="110" y="228" font-size="10" fill="#047857">hold.lua</text>

  <!-- Redis: Lua 블록 실행 (채워진 바) -->
  <rect x="150" y="280" width="140" height="20" rx="3" fill="#059669"/>
  <text x="220" y="294" text-anchor="middle" font-size="10" fill="#FAFAFA">Lua 블록 통째 실행 (중단 불가)</text>

  <!-- 클라이언트 B: 대기 표시 -->
  <rect x="150" y="200" width="140" height="20" rx="3" fill="#D4D4D8"/>
  <text x="220" y="214" text-anchor="middle" font-size="10" fill="#334155">대기 (큐에서 차단됨)</text>

  <!-- 응답 A -->
  <line x1="290" y1="290" x2="310" y2="130" stroke="#059669" stroke-width="1.5" stroke-dasharray="4 2" marker-end="url(#arrow-green)"/>
  <text x="318" y="215" font-size="10" fill="#047857">OK</text>

  <!-- 클라이언트 B 실행 -->
  <rect x="295" y="280" width="90" height="20" rx="3" fill="#059669" fill-opacity="0.5"/>
  <text x="340" y="294" text-anchor="middle" font-size="10" fill="#047857">B 명령 실행</text>
  <line x1="310" y1="210" x2="295" y2="290" stroke="#0891B2" stroke-width="1.5" marker-end="url(#arrow-green-2)"/>

  <!-- 개입 불가 표시 -->
  <rect x="148" y="270" width="144" height="44" rx="4" fill="none" stroke="#E11D48" stroke-width="1.5" stroke-dasharray="4 2"/>
  <text x="220" y="334" text-anchor="middle" font-size="10" fill="#BE123C">끼어들 수 없는 구간</text>

  <!-- 체크마크 -->
  <text x="230" y="390" text-anchor="middle" font-size="13" fill="#047857">✓ race 조건 원천 차단</text>
  <text x="230" y="410" text-anchor="middle" font-size="13" fill="#047857">✓ 재시도 로직 불필요</text>

  <!-- ===== 오른쪽 패널: WATCH/MULTI/EXEC ===== -->
  <!-- 패널 배경 -->
  <rect x="420" y="70" width="340" height="400" rx="6" fill="#FFF1F2" stroke="#E11D48" stroke-width="1.5" fill-opacity="0.4"/>
  <text x="590" y="92" text-anchor="middle" font-size="14" font-weight="700" fill="#BE123C">WATCH / MULTI / EXEC</text>

  <!-- 클라이언트 C 라인 -->
  <text x="438" y="120" font-size="11" fill="#BE123C" font-weight="600">클라이언트 C</text>
  <line x1="428" y1="130" x2="750" y2="130" stroke="#D4D4D8" stroke-width="1"/>

  <!-- 클라이언트 D 라인 -->
  <text x="438" y="200" font-size="11" fill="#BE123C" font-weight="600">클라이언트 D</text>
  <line x1="428" y1="210" x2="750" y2="210" stroke="#D4D4D8" stroke-width="1"/>

  <!-- Redis 서버 라인 -->
  <text x="438" y="280" font-size="11" fill="#BE123C" font-weight="600">Redis (단일 스레드)</text>
  <line x1="428" y1="290" x2="750" y2="290" stroke="#D4D4D8" stroke-width="1"/>

  <!-- C: WATCH 전송 -->
  <line x1="448" y1="130" x2="480" y2="290" stroke="#E11D48" stroke-width="1.5" marker-end="url(#arrow-rose)"/>
  <text x="452" y="215" font-size="10" fill="#BE123C">WATCH</text>
  <text x="452" y="228" font-size="10" fill="#BE123C">seat:1:A</text>

  <!-- Redis: WATCH 등록 -->
  <rect x="480" y="283" width="60" height="14" rx="3" fill="#FFF1F2" stroke="#E11D48" stroke-width="1"/>
  <text x="510" y="293" text-anchor="middle" font-size="9" fill="#BE123C">WATCH 등록</text>

  <!-- D: 중간에 HSET 수행 (충돌!) -->
  <line x1="548" y1="210" x2="560" y2="290" stroke="#E11D48" stroke-width="1.5" marker-end="url(#arrow-rose)"/>
  <text x="552" y="255" font-size="10" fill="#BE123C">HSET!</text>
  <rect x="560" y="283" width="60" height="14" rx="3" fill="#E11D48"/>
  <text x="590" y="293" text-anchor="middle" font-size="9" fill="#FAFAFA">키 변경됨</text>

  <!-- C: MULTI/EXEC -->
  <line x1="630" y1="130" x2="640" y2="290" stroke="#E11D48" stroke-width="1.5" marker-end="url(#arrow-rose)"/>
  <text x="632" y="215" font-size="10" fill="#BE123C">MULTI/</text>
  <text x="632" y="228" font-size="10" fill="#BE123C">EXEC</text>

  <!-- Redis: nil 반환 (충돌 감지) -->
  <rect x="640" y="283" width="60" height="14" rx="3" fill="#E11D48"/>
  <text x="670" y="293" text-anchor="middle" font-size="9" fill="#FAFAFA">nil 반환</text>

  <!-- nil 응답 → C -->
  <line x1="670" y1="283" x2="698" y2="130" stroke="#E11D48" stroke-width="1.5" stroke-dasharray="4 2" marker-end="url(#arrow-rose-2)"/>
  <text x="706" y="215" font-size="10" fill="#BE123C">nil</text>
  <text x="706" y="228" font-size="10" fill="#BE123C">(충돌)</text>

  <!-- 재시도 루프 -->
  <path d="M 748 130 Q 760 80 720 70 Q 680 62 650 80 Q 620 96 630 130"
        fill="none" stroke="#E11D48" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arrow-rose)"/>
  <text x="720" y="68" font-size="10" fill="#BE123C">재시도</text>

  <!-- 경고 -->
  <text x="590" y="390" text-anchor="middle" font-size="13" fill="#BE123C">△ 충돌 빈도 높을수록 재시도 증가</text>
  <text x="590" y="410" text-anchor="middle" font-size="13" fill="#BE123C">△ 낙관적 — 충돌 적은 상황에 적합</text>

  <!-- ===== 화살표 마커 ===== -->
  <defs>
    <marker id="arrow-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#059669"/>
    </marker>
    <marker id="arrow-green-2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#0891B2"/>
    </marker>
    <marker id="arrow-rose" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#E11D48"/>
    </marker>
    <marker id="arrow-rose-2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#E11D48"/>
    </marker>
  </defs>

  <!-- ===== 범례 ===== -->
  <rect x="60" y="510" width="720" height="36" rx="4" fill="#F8FAFC" stroke="#D4D4D8" stroke-width="1"/>
  <rect x="76" y="522" width="12" height="12" rx="2" fill="#ECFDF5" stroke="#059669" stroke-width="1"/>
  <text x="94" y="533" font-size="11" fill="#334155">Lua — 원자 실행 (중단 불가)</text>
  <rect x="276" y="522" width="12" height="12" rx="2" fill="#FFF1F2" stroke="#E11D48" stroke-width="1"/>
  <text x="294" y="533" font-size="11" fill="#334155">WATCH/MULTI/EXEC — 낙관적 (충돌 시 재시도)</text>
  <rect x="570" y="522" width="12" height="12" rx="2" fill="#E11D48"/>
  <text x="588" y="533" font-size="11" fill="#334155">충돌/nil 반환</text>
</svg>
