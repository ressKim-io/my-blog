<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" width="100%" height="100%">
  <defs>
    <style>
      .bg { fill: #FAFAFA; }
      .title { font-family: 'Pretendard', -apple-system, sans-serif; font-size: 18px; font-weight: 700; fill: #0A0A0A; }
      .subtitle { font-family: 'Pretendard', -apple-system, sans-serif; font-size: 14px; font-weight: 500; fill: #475569; }
      .box-green { fill: #ECFDF5; stroke: #059669; stroke-width: 2; rx: 8; }
      .box-amber { fill: #FFFBEB; stroke: #D97706; stroke-width: 2; rx: 8; }
      .box-red { fill: #FFF1F2; stroke: #E11D48; stroke-width: 2; rx: 8; }
      .box-cyan { fill: #ECFEFF; stroke: #0891B2; stroke-width: 2; rx: 8; }
      .txt-header { font-family: 'Pretendard', -apple-system, sans-serif; font-size: 16px; font-weight: 700; fill: #0A0A0A; text-anchor: middle; }
      .txt-body { font-family: 'Geist Mono', monospace; font-size: 14px; font-weight: 500; fill: #27272A; text-anchor: middle; }
      .txt-green { font-family: 'Geist Mono', monospace; font-size: 14px; font-weight: 700; fill: #059669; text-anchor: middle; }
      .txt-amber { font-family: 'Geist Mono', monospace; font-size: 14px; font-weight: 700; fill: #D97706; text-anchor: middle; }
      .txt-red { font-family: 'Geist Mono', monospace; font-size: 14px; font-weight: 700; fill: #E11D48; text-anchor: middle; }
      .txt-cyan { font-family: 'Geist Mono', monospace; font-size: 14px; font-weight: 700; fill: #0891B2; text-anchor: middle; }
      .arrow { stroke: #0A0A0A; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 8 5 L 0 9 z" fill="#0A0A0A" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="480" class="bg" rx="12"/>

  <!-- Title Section -->
  <text x="40" y="42" class="title">APF 429 Retry-After AIMD Congestion Control Cycle</text>
  <text x="40" y="66" class="subtitle">dropped_requests_tracker.go Exponential Backoff vs Linear Decay</text>

  <!-- Top-Left Box: Normal State -->
  <rect x="40" y="96" width="340" height="150" class="box-green"/>
  <text x="210" y="140" class="txt-header">1. Normal State</text>
  <text x="210" y="174" class="txt-body">Queue Stable &amp; Served</text>
  <text x="210" y="208" class="txt-green">Retry-After = 1s</text>

  <!-- Top-Right Box: History Window Check -->
  <rect x="420" y="96" width="340" height="150" class="box-amber"/>
  <text x="590" y="140" class="txt-header">2. History Window Check</text>
  <text x="590" y="174" class="txt-body">Window: [now - retryAfter, now)</text>
  <text x="590" y="208" class="txt-amber">Sum(droppedRequests)</text>

  <!-- Bottom-Right Box: Exponential Increase -->
  <rect x="420" y="284" width="340" height="150" class="box-red"/>
  <text x="590" y="328" class="txt-header">3. Exponential Backoff</text>
  <text x="590" y="362" class="txt-body">dropped &gt;= 3 * retryAfter</text>
  <text x="590" y="396" class="txt-red">retryAfter *= 2 (up to 32s)</text>

  <!-- Bottom-Left Box: Linear Decay -->
  <rect x="40" y="284" width="340" height="150" class="box-cyan"/>
  <text x="210" y="328" class="txt-header">4. Linear Decay</text>
  <text x="210" y="362" class="txt-body">dropped &lt; retryAfter</text>
  <text x="210" y="396" class="txt-cyan">retryAfter-- (down to 1s)</text>

  <!-- Arrows between the 4 boxes -->
  <path d="M 380 171 L 420 171" class="arrow"/>
  <path d="M 590 246 L 590 284" class="arrow"/>
  <path d="M 420 359 L 380 359" class="arrow"/>
  <path d="M 210 284 L 210 246" class="arrow"/>
</svg>
