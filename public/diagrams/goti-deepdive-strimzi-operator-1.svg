<svg role="img" aria-labelledby="title-1 desc-1" viewBox="0 0 800 560" xmlns="http://www.w3.org/2000/svg" width="100%" height="auto">
  <title id="title-1">Strimzi Operator Reconciliation Loop — Desired State vs Actual State 수렴</title>
  <desc id="desc-1">Strimzi Operator가 주기적으로 Desired State(CR 명세)와 Actual State(실제 K8s 리소스)를 비교하고, 차이가 있으면 Create/Update/Delete 조치를 취해 수렴하는 컨트롤 루프를 보여줍니다</desc>
  <style>
    text { font-family: 'Pretendard', system-ui, sans-serif; }
    .title-text { font-size: 13px; font-weight: 600; }
    .sub-text { font-size: 11px; fill: #27272A; }
    .arrow-label { font-size: 11px; fill: #334155; }
    .state-desired { fill: #ECFDF5; stroke: #059669; }
    .state-actual { fill: #F5F3FF; stroke: #7C3AED; }
    .action-box { fill: #FFFBEB; stroke: #D97706; }
    .operator-box { fill: #ECFDF5; stroke: #059669; stroke-width: 2; }
  </style>

  <rect width="800" height="560" fill="#FAFAFA"/>

  <!-- 다이어그램 제목 -->
  <text x="400" y="32" text-anchor="middle" font-size="14" font-weight="700" fill="#0A0A0A">구조도 — Strimzi Operator Reconciliation Loop</text>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#0A0A0A"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#059669"/>
    </marker>
    <marker id="arr-amber" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#D97706"/>
    </marker>
    <marker id="arr-purple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7C3AED"/>
    </marker>
  </defs>

  <!-- ━━━ Operator 핵심 박스 (중앙) ━━━ -->
  <rect x="296" y="200" width="208" height="100" rx="8" class="operator-box"/>
  <text x="400" y="232" text-anchor="middle" font-size="14" font-weight="700" fill="#047857">Strimzi Operator</text>
  <text x="400" y="252" text-anchor="middle" class="sub-text">Watch → Compare → Act</text>
  <text x="400" y="272" text-anchor="middle" class="sub-text">Reconciliation Loop</text>
  <text x="400" y="290" text-anchor="middle" class="sub-text">(주기적 + 이벤트 트리거)</text>

  <!-- ━━━ Desired State 박스 (왼쪽 상단) ━━━ -->
  <rect x="56" y="80" width="200" height="100" rx="6" class="state-desired"/>
  <text x="156" y="108" text-anchor="middle" class="title-text" fill="#047857">Desired State</text>
  <text x="156" y="128" text-anchor="middle" class="sub-text">Kafka CR 명세</text>
  <text x="156" y="146" text-anchor="middle" class="sub-text">replicas, config, storage</text>
  <text x="156" y="164" text-anchor="middle" class="sub-text">KafkaTopic / KafkaUser CR</text>

  <!-- ━━━ Actual State 박스 (오른쪽 상단) ━━━ -->
  <rect x="544" y="80" width="200" height="100" rx="6" class="state-actual"/>
  <text x="644" y="108" text-anchor="middle" class="title-text" fill="#6D28D9">Actual State</text>
  <text x="644" y="128" text-anchor="middle" class="sub-text">실제 K8s 리소스</text>
  <text x="644" y="146" text-anchor="middle" class="sub-text">StatefulSet / Pod 상태</text>
  <text x="644" y="164" text-anchor="middle" class="sub-text">현재 토픽·사용자 목록</text>

  <!-- 화살표: Desired State → Operator (read) -->
  <line x1="256" y1="140" x2="296" y2="230" stroke="#059669" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <rect x="232" y="176" width="60" height="16" fill="#FAFAFA"/>
  <text x="262" y="188" text-anchor="middle" class="arrow-label" fill="#047857">CR 읽기</text>

  <!-- 화살표: Actual State → Operator (observe) -->
  <line x1="544" y1="140" x2="504" y2="230" stroke="#7C3AED" stroke-width="1.5" marker-end="url(#arr-purple)"/>
  <rect x="508" y="176" width="60" height="16" fill="#FAFAFA"/>
  <text x="538" y="188" text-anchor="middle" class="arrow-label" fill="#6D28D9">상태 조회</text>

  <!-- ━━━ 비교 결과 분기 박스 ━━━ -->
  <rect x="296" y="336" width="208" height="64" rx="6" fill="#F8FAFC" stroke="#D4D4D8" stroke-width="1.5"/>
  <text x="400" y="360" text-anchor="middle" class="title-text" fill="#334155">상태 비교 결과</text>
  <text x="400" y="380" text-anchor="middle" class="sub-text">Desired ≠ Actual → 조치 필요</text>
  <text x="400" y="396" text-anchor="middle" class="sub-text">Desired = Actual → 아무것도 안 함</text>

  <!-- 화살표: Operator → 비교 결과 -->
  <line x1="400" y1="300" x2="400" y2="336" stroke="#0A0A0A" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ━━━ 조치 박스 3개 (하단) ━━━ -->
  <!-- Create -->
  <rect x="80" y="440" width="160" height="72" rx="6" class="action-box"/>
  <text x="160" y="464" text-anchor="middle" class="title-text" fill="#B45309">Create</text>
  <text x="160" y="484" text-anchor="middle" class="sub-text">신규 StatefulSet</text>
  <text x="160" y="500" text-anchor="middle" class="sub-text">토픽·사용자 신규 생성</text>

  <!-- Update -->
  <rect x="320" y="440" width="160" height="72" rx="6" class="action-box"/>
  <text x="400" y="464" text-anchor="middle" class="title-text" fill="#B45309">Update / RollingUpdate</text>
  <text x="400" y="484" text-anchor="middle" class="sub-text">설정 변경 → 브로커</text>
  <text x="400" y="500" text-anchor="middle" class="sub-text">순차 재시작 (안전하게)</text>

  <!-- Delete -->
  <rect x="560" y="440" width="160" height="72" rx="6" class="action-box"/>
  <text x="640" y="464" text-anchor="middle" class="title-text" fill="#B45309">Delete</text>
  <text x="640" y="484" text-anchor="middle" class="sub-text">CR 삭제 → 실제 리소스</text>
  <text x="640" y="500" text-anchor="middle" class="sub-text">Cascading Delete</text>

  <!-- 화살표: 비교 결과 → Create -->
  <line x1="340" y1="400" x2="200" y2="440" stroke="#D97706" stroke-width="1.5" marker-end="url(#arr-amber)"/>

  <!-- 화살표: 비교 결과 → Update -->
  <line x1="400" y1="400" x2="400" y2="440" stroke="#D97706" stroke-width="1.5" marker-end="url(#arr-amber)"/>

  <!-- 화살표: 비교 결과 → Delete -->
  <line x1="460" y1="400" x2="600" y2="440" stroke="#D97706" stroke-width="1.5" marker-end="url(#arr-amber)"/>

  <!-- 피드백 루프 화살표: 조치 결과 → Actual State (점선 루프) -->
  <path d="M 720 440 Q 760 280 644 180" stroke="#7C3AED" stroke-width="1.5" stroke-dasharray="5 3" fill="none" marker-end="url(#arr-purple)"/>
  <rect x="724" y="296" width="60" height="16" fill="#FAFAFA"/>
  <text x="754" y="308" text-anchor="middle" class="arrow-label" fill="#6D28D9">상태 반영</text>

  <!-- 루프 재시작 화살표 (점선): Desired/Actual → 지속적 watch -->
  <rect x="360" y="56" width="80" height="16" fill="#FAFAFA"/>
  <text x="400" y="68" text-anchor="middle" font-size="11" fill="#059669">지속적 watch</text>
  <path d="M 156 80 Q 156 48 400 48 Q 644 48 644 80" stroke="#059669" stroke-width="1.5" stroke-dasharray="5 3" fill="none"/>

  <!-- 범례 -->
  <rect x="56" y="536" width="688" height="20" rx="2" fill="#F8FAFC"/>
  <line x1="72" y1="548" x2="100" y2="548" stroke="#059669" stroke-width="1.5"/>
  <text x="108" y="552" class="sub-text" fill="#047857">Desired 읽기</text>
  <line x1="192" y1="548" x2="220" y2="548" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="228" y="552" class="sub-text" fill="#6D28D9">Actual 조회</text>
  <line x1="312" y1="548" x2="340" y2="548" stroke="#D97706" stroke-width="1.5"/>
  <text x="348" y="552" class="sub-text" fill="#B45309">조치 실행</text>
  <line x1="432" y1="548" x2="460" y2="548" stroke="#7C3AED" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text x="468" y="552" class="sub-text" fill="#6D28D9">피드백 루프 (점선)</text>
  <line x1="600" y1="548" x2="628" y2="548" stroke="#059669" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text x="636" y="552" class="sub-text" fill="#047857">지속적 watch</text>
</svg>
