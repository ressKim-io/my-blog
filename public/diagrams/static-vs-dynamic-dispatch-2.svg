<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 430" font-family="Pretendard, ui-sans-serif, system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="ar" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#475569"/>
    </marker>
    <marker id="arG" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#059669"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="780" height="430" fill="#FFFFFF"/>

  <text x="390" y="28" text-anchor="middle" font-size="12" fill="#64748B">The real cost of dynamic dispatch isn't the indirect call — it's that inlining stops</text>

  <!-- STATIC column -->
  <text x="200" y="62" text-anchor="middle" font-size="13.5" font-weight="700" fill="#047857">static dispatch</text>
  <rect x="56" y="74" width="288" height="48" rx="8" fill="#ECFDF5" stroke="#059669" stroke-width="1.6"/>
  <text x="200" y="103" text-anchor="middle" font-size="12" font-family="'Geist Mono', ui-monospace, monospace" fill="#047857">call process_FileSink  (target fixed)</text>

  <line x1="200" y1="122" x2="200" y2="150" stroke="#059669" stroke-width="1.6" marker-end="url(#arG)"/>
  <text x="200" y="143" text-anchor="middle" font-size="11" fill="#047857">inline</text>

  <rect x="56" y="152" width="288" height="60" rx="8" fill="#ECFDF5" stroke="#059669" stroke-width="1.6"/>
  <text x="200" y="178" text-anchor="middle" font-size="12" font-weight="700" fill="#047857">call boundary disappears</text>
  <text x="200" y="197" text-anchor="middle" font-size="11" fill="#475569">optimizations flow across</text>

  <line x1="200" y1="212" x2="200" y2="240" stroke="#059669" stroke-width="1.6" marker-end="url(#arG)"/>

  <rect x="56" y="242" width="288" height="78" rx="8" fill="#F0FDF4" stroke="#059669" stroke-width="1.6"/>
  <text x="200" y="268" text-anchor="middle" font-size="12.5" font-weight="700" fill="#047857">noalias · GVN · LICM · vectorize</text>
  <text x="200" y="290" text-anchor="middle" font-size="11" fill="#475569">hot loop turns into SIMD</text>
  <text x="200" y="308" text-anchor="middle" font-size="11" fill="#475569">— "the rest of the optimizer opens up"</text>

  <!-- DYNAMIC column -->
  <text x="580" y="62" text-anchor="middle" font-size="13.5" font-weight="700" fill="#BE123C">dynamic dispatch</text>
  <rect x="436" y="74" width="288" height="48" rx="8" fill="#F8FAFC" stroke="#475569" stroke-width="1.6"/>
  <text x="580" y="103" text-anchor="middle" font-size="12" font-family="'Geist Mono', ui-monospace, monospace" fill="#334155">call rax  (vtable method, opaque)</text>

  <line x1="580" y1="122" x2="580" y2="150" stroke="#475569" stroke-width="1.6" marker-end="url(#ar)"/>

  <!-- barrier -->
  <rect x="436" y="152" width="288" height="44" rx="8" fill="#FFF1F2" stroke="#E11D48" stroke-width="1.8"/>
  <text x="580" y="179" text-anchor="middle" font-size="12.5" font-weight="700" fill="#BE123C">✕ optimization barrier — inline blocked</text>

  <line x1="580" y1="196" x2="580" y2="224" stroke="#475569" stroke-width="1.6" marker-end="url(#ar)"/>

  <rect x="436" y="226" width="288" height="94" rx="8" fill="#FEF2F2" stroke="#FB7185" stroke-width="1.5"/>
  <text x="580" y="252" text-anchor="middle" font-size="12" fill="#9F1239">compiler can't see the callee</text>
  <text x="580" y="274" text-anchor="middle" font-size="11.5" fill="#9F1239">→ GVN / LICM / vectorize stop here</text>
  <text x="580" y="296" text-anchor="middle" font-size="11.5" font-weight="700" fill="#BE123C">hot loop can't be vectorized</text>
  <text x="580" y="313" text-anchor="middle" font-size="10.5" fill="#9F1239">(each element may be a different type)</text>

  <!-- footer -->
  <rect x="150" y="356" width="480" height="56" rx="9" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
  <text x="390" y="380" text-anchor="middle" font-size="11.5" fill="#475569">Indirect calls are well predicted and cheap. Losing inlining — and every</text>
  <text x="390" y="398" text-anchor="middle" font-size="11.5" fill="#475569">optimization it unlocks — is what actually costs you in a hot loop.</text>
</svg>
