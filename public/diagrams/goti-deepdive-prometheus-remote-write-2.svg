<svg role="img" aria-labelledby="title-2 desc-2"
  viewBox="0 0 800 520" width="100%" height="auto"
  xmlns="http://www.w3.org/2000/svg"
  font-family="'Pretendard', system-ui, sans-serif">

  <title id="title-2">Prometheus Remote Write 내부 흐름 — snappy 압축 protobuf push</title>
  <desc id="desc-2">메트릭 수집 → WAL 기록 → 직렬화(protobuf) → snappy 압축 → HTTP POST → Mimir 수신 → 분산 저장까지의 5단계 흐름과 각 단계의 재시도 큐 구조</desc>

  <rect width="800" height="520" fill="#FAFAFA"/>

  <!-- 제목 -->
  <text x="400" y="36" text-anchor="middle" font-size="15" font-weight="600" fill="#0A0A0A">Remote Write 내부 흐름 — snappy 압축 · protobuf · 재시도 큐</text>

  <!-- ── 단계 박스 (세로 흐름) ── -->

  <!-- 1. 메트릭 수집/생성 -->
  <rect x="80" y="64" width="200" height="56" rx="6" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.5"/>
  <text x="180" y="87" text-anchor="middle" font-size="13" font-weight="600" fill="#0E7490">메트릭 생성</text>
  <text x="180" y="105" text-anchor="middle" font-size="11" fill="#27272A">scrape or 직접 계측</text>

  <!-- 2. WAL (Write-Ahead Log) -->
  <rect x="80" y="160" width="200" height="64" rx="6" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="180" y="186" text-anchor="middle" font-size="13" font-weight="600" fill="#6D28D9">WAL (Write-Ahead Log)</text>
  <text x="180" y="203" text-anchor="middle" font-size="11" fill="#27272A">로컬 내구성 보장</text>
  <text x="180" y="218" text-anchor="middle" font-size="11" fill="#27272A">전송 실패 시 재시도 기준점</text>

  <!-- 3. 직렬화 + 압축 -->
  <rect x="80" y="272" width="200" height="72" rx="6" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="180" y="296" text-anchor="middle" font-size="13" font-weight="600" fill="#6D28D9">직렬화 + 압축</text>
  <text x="180" y="313" text-anchor="middle" font-size="11" fill="#27272A">protobuf 직렬화</text>
  <text x="180" y="329" text-anchor="middle" font-size="11" fill="#27272A">snappy 압축 (~4–6× 절감)</text>

  <!-- 4. HTTP POST 전송 -->
  <rect x="80" y="392" width="200" height="64" rx="6" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="180" y="415" text-anchor="middle" font-size="13" font-weight="600" fill="#047857">HTTP POST</text>
  <text x="180" y="433" text-anchor="middle" font-size="11" fill="#27272A">Content-Encoding: snappy</text>
  <text x="180" y="449" text-anchor="middle" font-size="11" fill="#27272A">/api/v1/push</text>

  <!-- 화살표: 1→2 -->
  <line x1="180" y1="120" x2="180" y2="160" stroke="#0A0A0A" stroke-width="1.4" marker-end="url(#arr2-dark)"/>
  <!-- 화살표: 2→3 -->
  <line x1="180" y1="224" x2="180" y2="272" stroke="#0A0A0A" stroke-width="1.4" marker-end="url(#arr2-dark)"/>
  <!-- 화살표: 3→4 -->
  <line x1="180" y1="344" x2="180" y2="392" stroke="#0A0A0A" stroke-width="1.4" marker-end="url(#arr2-dark)"/>

  <!-- ── 재시도 큐 사이드박스 ── -->
  <rect x="328" y="160" width="180" height="64" rx="6" fill="#FFFBEB" stroke="#D97706" stroke-width="1.5"/>
  <text x="418" y="183" text-anchor="middle" font-size="12" font-weight="600" fill="#B45309">재시도 큐</text>
  <text x="418" y="200" text-anchor="middle" font-size="11" fill="#27272A">max_shards / capacity</text>
  <text x="418" y="216" text-anchor="middle" font-size="11" fill="#27272A">전송 실패 시 WAL 재읽기</text>

  <!-- WAL → 재시도 큐 연결 (점선) -->
  <line x1="280" y1="192" x2="328" y2="192" stroke="#D97706" stroke-width="1.3" stroke-dasharray="4 2"/>
  <text x="304" y="186" text-anchor="middle" font-size="10" fill="#B45309">fail</text>

  <!-- 재시도 큐 → 직렬화 단계 (점선, 아래로) -->
  <line x1="418" y1="224" x2="418" y2="296" stroke="#D97706" stroke-width="1.3" stroke-dasharray="4 2"/>
  <line x1="418" y1="296" x2="280" y2="296" stroke="#D97706" stroke-width="1.3" stroke-dasharray="4 2" marker-end="url(#arr2-amber)"/>
  <text x="370" y="312" text-anchor="middle" font-size="10" fill="#B45309">retry</text>

  <!-- ── 오른쪽: Mimir 수신 ── -->
  <rect x="560" y="64" width="200" height="432" rx="8" fill="#F8FAFC" stroke="#D4D4D8" stroke-width="1.2"/>
  <text x="660" y="90" text-anchor="middle" font-size="13" font-weight="600" fill="#334155">Grafana Mimir</text>

  <!-- Distributor -->
  <rect x="584" y="104" width="152" height="52" rx="6" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="660" y="127" text-anchor="middle" font-size="12" font-weight="600" fill="#047857">Distributor</text>
  <text x="660" y="144" text-anchor="middle" font-size="11" fill="#27272A">요청 수신 · 라벨 검증</text>

  <!-- Ingester -->
  <rect x="584" y="200" width="152" height="52" rx="6" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="660" y="223" text-anchor="middle" font-size="12" font-weight="600" fill="#047857">Ingester</text>
  <text x="660" y="240" text-anchor="middle" font-size="11" fill="#27272A">인메모리 청크 버퍼</text>

  <!-- Compactor / Store Gateway -->
  <rect x="584" y="296" width="152" height="64" rx="6" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="660" y="320" text-anchor="middle" font-size="12" font-weight="600" fill="#6D28D9">Compactor</text>
  <text x="660" y="337" text-anchor="middle" font-size="11" fill="#27272A">블록 압축 · 병합</text>
  <text x="660" y="352" text-anchor="middle" font-size="11" fill="#27272A">장기 오브젝트 스토리지 이동</text>

  <!-- Object Storage -->
  <rect x="584" y="408" width="152" height="52" rx="6" fill="#FFFBEB" stroke="#D97706" stroke-width="1.5"/>
  <text x="660" y="431" text-anchor="middle" font-size="12" font-weight="600" fill="#B45309">Object Storage</text>
  <text x="660" y="448" text-anchor="middle" font-size="11" fill="#27272A">S3 · GCS · Azure Blob</text>

  <!-- Mimir 내부 화살표 -->
  <line x1="660" y1="156" x2="660" y2="200" stroke="#0A0A0A" stroke-width="1.3" marker-end="url(#arr2-dark)"/>
  <line x1="660" y1="252" x2="660" y2="296" stroke="#0A0A0A" stroke-width="1.3" marker-end="url(#arr2-dark)"/>
  <line x1="660" y1="360" x2="660" y2="408" stroke="#0A0A0A" stroke-width="1.3" marker-end="url(#arr2-dark)"/>

  <!-- HTTP POST → Mimir Distributor -->
  <line x1="280" y1="424" x2="560" y2="130" stroke="#7C3AED" stroke-width="1.8" marker-end="url(#arr2-purple)"/>
  <rect x="365" y="248" width="96" height="16" rx="3" fill="#FAFAFA"/>
  <text x="413" y="260" text-anchor="middle" font-size="10" fill="#6D28D9">snappy POST</text>

  <!-- 화살표 마커 정의 -->
  <defs>
    <marker id="arr2-dark" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#0A0A0A"/>
    </marker>
    <marker id="arr2-purple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7C3AED"/>
    </marker>
    <marker id="arr2-amber" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#D97706"/>
    </marker>
  </defs>
</svg>
