<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-labelledby="t2 d2" font-family="Pretendard, ui-sans-serif, system-ui, -apple-system, sans-serif">
  <title id="t2">Three ways to measure the same JVM, three different rankings</title>
  <desc id="d2">A grouped bar chart for Serial, Parallel, G1 and ZGC collectors, all idle on JDK 25 with a 512 MiB maximum heap inside a container. Each collector has three bars. The grey bar is reserved virtual address space, where ZGC towers at 9.35 GiB while the others sit near 1.9 GiB. The blue bar is memory the JVM committed, where G1 leads at 83.0 MiB and ZGC trails at 42.4 MiB. The red bar is memory.current, what the kernel actually charges the cgroup, and here the order flips again: ZGC is highest at 77.9 MiB while G1 is only 52.0 MiB. For G1 the blue bar exceeds the red one, meaning it committed pages it has not touched; for ZGC the red bar exceeds the blue one, meaning the kernel is charging for memory that Native Memory Tracking does not report, which turns out to be the memfd-backed heap counted as shmem.</desc>
  <rect x="0" y="0" width="800" height="400" fill="#FFFFFF"/>

  <line x1="80" y1="295" x2="760" y2="295" stroke="#475569" stroke-width="2"/>

  <rect x="100" y="255" width="26" height="40" fill="#E2E8F0" stroke="#94A3B8" stroke-width="1.5"/>
  <rect x="130" y="214" width="26" height="81" fill="#0891B2"/>
  <rect x="160" y="212" width="26" height="83" fill="#E11D48"/>

  <rect x="260" y="255" width="26" height="40" fill="#E2E8F0" stroke="#94A3B8" stroke-width="1.5"/>
  <rect x="290" y="174" width="26" height="121" fill="#0891B2"/>
  <rect x="320" y="208" width="26" height="87" fill="#E11D48"/>

  <rect x="420" y="254" width="26" height="41" fill="#E2E8F0" stroke="#94A3B8" stroke-width="1.5"/>
  <rect x="450" y="129" width="26" height="166" fill="#0891B2"/>
  <rect x="480" y="191" width="26" height="104" fill="#E11D48"/>

  <rect x="580" y="95" width="26" height="200" fill="#E2E8F0" stroke="#94A3B8" stroke-width="1.5"/>
  <rect x="610" y="210" width="26" height="85" fill="#0891B2"/>
  <rect x="640" y="139" width="26" height="156" fill="#E11D48"/>

  <text x="143" y="317" text-anchor="middle" font-size="14" font-weight="700" fill="#475569">Serial</text>
  <text x="303" y="317" text-anchor="middle" font-size="14" font-weight="700" fill="#475569">Parallel</text>
  <text x="463" y="317" text-anchor="middle" font-size="14" font-weight="700" fill="#0E7490">G1</text>
  <text x="623" y="317" text-anchor="middle" font-size="14" font-weight="700" fill="#BE123C">ZGC</text>

  <text x="463" y="120" text-anchor="middle" font-size="14" font-weight="700" fill="#0E7490">83.0</text>
  <text x="493" y="182" text-anchor="middle" font-size="14" font-weight="700" fill="#BE123C">52.0</text>
  <text x="593" y="86" text-anchor="middle" font-size="14" font-weight="700" fill="#64748B">9.35 GiB</text>
  <text x="653" y="130" text-anchor="middle" font-size="14" font-weight="700" fill="#BE123C">77.9</text>

  <rect x="100" y="345" width="16" height="16" fill="#E2E8F0" stroke="#94A3B8" stroke-width="1.5"/>
  <text x="124" y="359" font-size="14" font-weight="700" fill="#475569">reserved</text>
  <rect x="240" y="345" width="16" height="16" fill="#0891B2"/>
  <text x="264" y="359" font-size="14" font-weight="700" fill="#0E7490">committed</text>
  <rect x="400" y="345" width="16" height="16" fill="#E11D48"/>
  <text x="424" y="359" font-size="14" font-weight="700" fill="#BE123C">memory.current — what the kernel charges</text>
</svg>
