<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 470" role="img" aria-labelledby="t1 d1" font-family="Pretendard, ui-sans-serif, system-ui, -apple-system, sans-serif">
  <title id="t1">x86-64 protection rings vs ARM exception levels</title>
  <desc id="d1">Two privilege ladders side by side. On x86-64, apps run in Ring 3 and the kernel in Ring 0, with Ring 1 and 2 rarely used and virtualization added as a separate VMX mode. On ARM AArch64, EL0 runs apps, EL1 the kernel, EL2 the hypervisor and EL3 the secure monitor, all built into one ladder.</desc>
  <defs>
    <marker id="arL" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="800" height="470" fill="#FFFFFF"/>

  <text x="400" y="26" text-anchor="middle" font-size="12" fill="#64748B">two privilege ladders, same idea — apps at the top, hardware ownership at the bottom</text>

  <!-- column headers -->
  <text x="228" y="56" text-anchor="middle" font-size="13" font-weight="700" fill="#334155">x86-64 — Protection Rings (CPL)</text>
  <text x="588" y="56" text-anchor="middle" font-size="13" font-weight="700" fill="#334155">ARM AArch64 — Exception Levels</text>

  <!-- privilege axis -->
  <line x1="44" y1="80" x2="44" y2="356" stroke="#94A3B8" stroke-width="1.4" marker-end="url(#arL)"/>
  <text x="36" y="88" text-anchor="end" font-size="10.5" fill="#64748B" transform="rotate(-90 36 88)"> </text>
  <text x="52" y="86" font-size="10" fill="#64748B">less</text>
  <text x="52" y="98" font-size="10" fill="#64748B">privilege</text>
  <text x="52" y="338" font-size="10" fill="#64748B">more</text>
  <text x="52" y="350" font-size="10" fill="#64748B">privilege</text>

  <!-- x86 ladder -->
  <rect x="96" y="72" width="264" height="60" rx="9" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.6"/>
  <text x="228" y="97" text-anchor="middle" font-size="13" font-weight="700" fill="#0E7490">Ring 3 — User</text>
  <text x="228" y="116" text-anchor="middle" font-size="10.5" fill="#334155">Rust / Go / Java apps run here</text>

  <rect x="96" y="146" width="264" height="52" rx="9" fill="#FFFFFF" stroke="#D4D4D8" stroke-width="1.3" stroke-dasharray="5 4"/>
  <text x="228" y="168" text-anchor="middle" font-size="12" fill="#94A3B8">Ring 2 / Ring 1</text>
  <text x="228" y="186" text-anchor="middle" font-size="10.5" fill="#94A3B8">(practically unused)</text>

  <rect x="96" y="212" width="264" height="60" rx="9" fill="#ECFDF5" stroke="#059669" stroke-width="1.7"/>
  <text x="228" y="237" text-anchor="middle" font-size="13" font-weight="700" fill="#047857">Ring 0 — Kernel</text>
  <text x="228" y="256" text-anchor="middle" font-size="10.5" fill="#047857">Linux kernel, owns the hardware</text>

  <rect x="96" y="292" width="264" height="64" rx="9" fill="#FFFBEB" stroke="#D97706" stroke-width="1.4" stroke-dasharray="6 4"/>
  <text x="228" y="315" text-anchor="middle" font-size="12" font-weight="700" fill="#B45309">Virtualization: VMX root / non-root</text>
  <text x="228" y="333" text-anchor="middle" font-size="10.5" fill="#B45309">a separate axis, bolted on later</text>
  <text x="228" y="347" text-anchor="middle" font-size="10.5" fill="#B45309">(not part of the ring ladder)</text>

  <!-- ARM ladder -->
  <rect x="456" y="72" width="264" height="60" rx="9" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.6"/>
  <text x="588" y="97" text-anchor="middle" font-size="13" font-weight="700" fill="#0E7490">EL0 — User</text>
  <text x="588" y="116" text-anchor="middle" font-size="10.5" fill="#334155">Rust / Go / Java apps run here</text>

  <rect x="456" y="146" width="264" height="52" rx="9" fill="#ECFDF5" stroke="#059669" stroke-width="1.7"/>
  <text x="588" y="168" text-anchor="middle" font-size="13" font-weight="700" fill="#047857">EL1 — OS kernel</text>
  <text x="588" y="186" text-anchor="middle" font-size="10.5" fill="#047857">Linux kernel</text>

  <rect x="456" y="212" width="264" height="60" rx="9" fill="#FFFBEB" stroke="#D97706" stroke-width="1.5"/>
  <text x="588" y="237" text-anchor="middle" font-size="13" font-weight="700" fill="#B45309">EL2 — Hypervisor</text>
  <text x="588" y="256" text-anchor="middle" font-size="10.5" fill="#B45309">built into the ladder from day one</text>

  <rect x="456" y="292" width="264" height="64" rx="9" fill="#F8FAFC" stroke="#475569" stroke-width="1.4"/>
  <text x="588" y="317" text-anchor="middle" font-size="13" font-weight="700" fill="#334155">EL3 — Secure monitor</text>
  <text x="588" y="336" text-anchor="middle" font-size="10.5" fill="#64748B">firmware / TrustZone</text>

  <!-- correspondence arrows -->
  <line x1="360" y1="100" x2="456" y2="100" stroke="#94A3B8" stroke-width="1.4" stroke-dasharray="5 4"/>
  <text x="408" y="92" text-anchor="middle" font-size="10" fill="#64748B">same role</text>
  <line x1="360" y1="240" x2="456" y2="174" stroke="#94A3B8" stroke-width="1.4" stroke-dasharray="5 4"/>
  <text x="404" y="222" text-anchor="middle" font-size="10" fill="#64748B">kernel lives here</text>

  <!-- legend -->
  <rect x="96" y="388" width="624" height="56" rx="7" fill="#F8FAFC" stroke="#E4E4E7" stroke-width="1"/>
  <text x="408" y="410" text-anchor="middle" font-size="11.5" fill="#334155">In practice x86 uses only two of its four rings (0 and 3).</text>
  <text x="408" y="428" text-anchor="middle" font-size="11.5" fill="#334155">ARM designed hypervisor (EL2) and secure world (EL3) into the privilege ladder itself.</text>
</svg>
