<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" role="img" aria-labelledby="t1 d1" font-family="Pretendard, ui-sans-serif, system-ui, -apple-system, sans-serif">
  <title id="t1">Two privilege ladders — x86 protection rings and ARM exception levels</title>
  <desc id="d1">x86-64 defines four protection rings but practically uses only two: Ring 3 for applications and Ring 0 for the kernel, with virtualization bolted on later as a separate VMX axis. ARM AArch64 uses all four exception levels: EL0 for applications, EL1 for the kernel, EL2 for the hypervisor and EL3 for the secure monitor, so virtualization and the secure world sit inside the privilege ladder itself.</desc>
  <defs>
    <marker id="p1" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#94A3B8"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="800" height="450" fill="#FFFFFF"/>

  <line x1="60" y1="96" x2="60" y2="330" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#p1)"/>
  <text transform="rotate(-90 24 120)" x="24" y="120" text-anchor="middle" font-size="13" fill="#64748B">less privilege</text>
  <text transform="rotate(-90 24 300)" x="24" y="300" text-anchor="middle" font-size="13" fill="#64748B">more privilege</text>

  <text x="260" y="44" text-anchor="middle" font-size="15" font-weight="700" fill="#334155">x86-64 — rings</text>
  <text x="600" y="44" text-anchor="middle" font-size="15" font-weight="700" fill="#334155">ARM — exception levels</text>

  <rect x="120" y="80" width="280" height="76" rx="8" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.6"/>
  <text x="260" y="125" text-anchor="middle" font-size="15" font-weight="700" fill="#0E7490">Ring 3 — User</text>

  <rect x="120" y="172" width="280" height="64" rx="8" fill="#F8FAFC" stroke="#94A3B8" stroke-width="1.4" stroke-dasharray="5 3"/>
  <text x="260" y="210" text-anchor="middle" font-size="14" fill="#64748B">Ring 2 · Ring 1 — unused</text>

  <rect x="120" y="252" width="280" height="76" rx="8" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.8"/>
  <text x="260" y="297" text-anchor="middle" font-size="15" font-weight="700" fill="#6D28D9">Ring 0 — Kernel</text>

  <rect x="120" y="352" width="280" height="72" rx="8" fill="#F8FAFC" stroke="#475569" stroke-width="1.4" stroke-dasharray="5 3"/>
  <text x="260" y="380" text-anchor="middle" font-size="13" font-weight="700" fill="#334155">VMX root / non-root</text>
  <text x="260" y="404" text-anchor="middle" font-size="13" fill="#334155">a separate axis</text>

  <rect x="460" y="80" width="280" height="64" rx="8" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.6"/>
  <text x="600" y="118" text-anchor="middle" font-size="15" font-weight="700" fill="#0E7490">EL0 — User</text>

  <rect x="460" y="160" width="280" height="64" rx="8" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.8"/>
  <text x="600" y="198" text-anchor="middle" font-size="15" font-weight="700" fill="#6D28D9">EL1 — Kernel</text>

  <rect x="460" y="240" width="280" height="64" rx="8" fill="#FFFBEB" stroke="#D97706" stroke-width="1.6"/>
  <text x="600" y="278" text-anchor="middle" font-size="15" font-weight="700" fill="#B45309">EL2 — Hypervisor</text>

  <rect x="460" y="320" width="280" height="64" rx="8" fill="#FFF1F2" stroke="#E11D48" stroke-width="1.6"/>
  <text x="600" y="358" text-anchor="middle" font-size="15" font-weight="700" fill="#BE123C">EL3 — Secure monitor</text>
</svg>
