<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" role="img" aria-labelledby="t1 d1" width="100%" height="auto" preserveAspectRatio="xMidYMid meet" style="max-width: 800px;">
  <title id="t1">JWT RSA 키 Pod별 불일치로 검증 실패</title>
  <desc id="d1">auth-service Pod A는 시작 시 KeyPair A를 생성하고 Private Key A로 JWT 서명, Pod B는 별도 KeyPair B를 생성. 사용자 브라우저는 Pod A가 발급한 JWT를 저장한 뒤 다음 요청이 LoadBalancer에 의해 Pod B로 라우팅되면 Pod B는 Public Key B로 검증을 시도해 서명 불일치로 실패</desc>

  <defs>
    <marker id="arr1" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#0A0A0A"/>
    </marker>
    <marker id="arrf" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#BE123C"/>
    </marker>
  </defs>

  <style><![CDATA[
    .label { font-family: 'Pretendard', sans-serif; font-size: 13px; font-weight: 600; }
    .meta  { font-family: 'Geist Mono', ui-monospace, Menlo, monospace; font-size: 11px; fill: #27272A; }
    .arrlbl { font-family: 'Pretendard', sans-serif; font-size: 11px; }
    .arrow { stroke: #0A0A0A; stroke-width: 1.5; fill: none; marker-end: url(#arr1); }
    .fail { stroke: #BE123C; stroke-width: 1.5; stroke-dasharray: 5 3; fill: none; marker-end: url(#arrf); }
  ]]></style>

  <!-- Pod A (backend / emerald) -->
  <rect x="40" y="40" width="240" height="100" rx="6" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="160" y="68" text-anchor="middle" class="label" fill="#047857">auth-service Pod A</text>
  <text x="160" y="92" text-anchor="middle" class="meta">KeyPair A (시작 시 생성)</text>
  <text x="160" y="112" text-anchor="middle" class="meta">Private Key A — 서명</text>
  <text x="160" y="130" text-anchor="middle" class="meta">Public Key A — 검증</text>

  <!-- arrow Pod A -> Browser (JWT 발급) -->
  <path d="M 280 90 H 360 V 200" class="arrow"/>
  <text x="372" y="120" class="arrlbl">JWT 발급 (Private A 서명)</text>

  <!-- Browser (external / slate) -->
  <rect x="280" y="200" width="240" height="80" rx="6" fill="#F8FAFC" stroke="#475569" stroke-width="1.5"/>
  <text x="400" y="226" text-anchor="middle" class="label" fill="#334155">사용자 브라우저</text>
  <text x="400" y="248" text-anchor="middle" class="meta">JWT 저장 (Private A로 서명됨)</text>
  <text x="400" y="266" text-anchor="middle" class="meta">→ 다음 요청 시 JWT 동봉</text>

  <!-- arrow Browser -> Pod B (LoadBalancer 라우팅) -->
  <path d="M 520 240 H 600 V 140" class="fail"/>
  <text x="616" y="200" class="arrlbl" fill="#BE123C">LB가 Pod B로 라우팅 (50%)</text>

  <!-- Pod B (security / rose) -->
  <rect x="520" y="40" width="240" height="100" rx="6" fill="#FFF1F2" stroke="#E11D48" stroke-width="1.5"/>
  <text x="640" y="68" text-anchor="middle" class="label" fill="#BE123C">auth-service Pod B</text>
  <text x="640" y="92" text-anchor="middle" class="meta">KeyPair B (시작 시 생성)</text>
  <text x="640" y="112" text-anchor="middle" class="meta">Private Key B — 다른 키</text>
  <text x="640" y="130" text-anchor="middle" class="meta" fill="#BE123C">Public Key B로 검증 → 실패</text>

  <!-- 결과 박스 -->
  <rect x="160" y="332" width="480" height="100" rx="6" fill="#FFF1F2" stroke="#E11D48" stroke-width="1.5"/>
  <text x="400" y="360" text-anchor="middle" class="label" fill="#BE123C">결과 — 50% 확률로 검증 실패</text>
  <text x="400" y="384" text-anchor="middle" class="meta">같은 Pod으로 요청이 가면 성공, 다른 Pod으로 가면 실패</text>
  <text x="400" y="406" text-anchor="middle" class="meta">개발 환경(Pod 1개)에서는 드러나지 않다가 HPA로 Pod 2개 이상이 되면 발현</text>
</svg>
