<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 470" font-family="Pretendard, ui-sans-serif, system-ui, -apple-system, sans-serif">
  <rect x="0" y="0" width="660" height="470" fill="#FFFFFF"/>

  <!-- edges -->
  <g stroke="#CBD5E1" stroke-width="1.4" fill="none">
    <line x1="330" y1="70" x2="135" y2="120"/>
    <line x1="330" y1="70" x2="330" y2="120"/>
    <line x1="330" y1="70" x2="525" y2="120"/>
    <line x1="135" y1="160" x2="100" y2="210"/>
    <line x1="135" y1="160" x2="235" y2="210"/>
    <line x1="100" y1="248" x2="105" y2="300"/>
    <line x1="105" y1="336" x2="115" y2="388"/>
  </g>

  <!-- continuation markers -->
  <text x="330" y="198" text-anchor="middle" font-size="16" fill="#CBD5E1">···</text>
  <text x="525" y="198" text-anchor="middle" font-size="16" fill="#CBD5E1">···</text>
  <text x="235" y="288" text-anchor="middle" font-size="16" fill="#CBD5E1">···</text>

  <!-- backbone -->
  <rect x="255" y="30" width="150" height="40" rx="8" fill="#FFFBEB" stroke="#D97706" stroke-width="1.5"/>
  <text x="330" y="55" text-anchor="middle" font-size="13" font-weight="700" fill="#B45309">Backbone / Core</text>

  <!-- regional IDC -->
  <rect x="70" y="120" width="130" height="40" rx="8" fill="#FFFBEB" stroke="#D97706" stroke-width="1.5"/>
  <text x="135" y="145" text-anchor="middle" font-size="12.5" fill="#B45309">Seoul IDC</text>
  <rect x="265" y="120" width="130" height="40" rx="8" fill="#FFFBEB" stroke="#D97706" stroke-width="1.5"/>
  <text x="330" y="145" text-anchor="middle" font-size="12.5" fill="#B45309">Busan IDC</text>
  <rect x="460" y="120" width="130" height="40" rx="8" fill="#FFFBEB" stroke="#D97706" stroke-width="1.5"/>
  <text x="525" y="145" text-anchor="middle" font-size="12.5" fill="#B45309">Gwangju IDC</text>

  <!-- local offices -->
  <rect x="40" y="210" width="120" height="38" rx="7" fill="#F8FAFC" stroke="#475569" stroke-width="1.4"/>
  <text x="100" y="234" text-anchor="middle" font-size="12" fill="#334155">Gangnam Office</text>
  <rect x="175" y="210" width="120" height="38" rx="7" fill="#F8FAFC" stroke="#475569" stroke-width="1.4"/>
  <text x="235" y="234" text-anchor="middle" font-size="12" fill="#334155">Seocho Office</text>

  <!-- local cable -->
  <rect x="40" y="300" width="130" height="36" rx="7" fill="#F8FAFC" stroke="#475569" stroke-width="1.4"/>
  <text x="105" y="323" text-anchor="middle" font-size="12" fill="#334155">Local cable / FTTH</text>

  <!-- home -->
  <rect x="40" y="388" width="150" height="44" rx="8" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.6"/>
  <text x="115" y="415" text-anchor="middle" font-size="12.5" font-weight="600" fill="#0E7490">Home router → PC</text>

  <text x="210" y="416" font-size="12.5" font-weight="600" fill="#0891B2">◀ You are here — network edge (leaf)</text>
</svg>
