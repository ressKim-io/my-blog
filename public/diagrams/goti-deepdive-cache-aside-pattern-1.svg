<svg role="img" aria-labelledby="title-1 desc-1" viewBox="0 0 800 520" width="100%" height="auto" xmlns="http://www.w3.org/2000/svg">
  <title id="title-1">Cache-Aside 읽기·쓰기 흐름도</title>
  <desc id="desc-1">애플리케이션이 캐시를 먼저 조회하고, 캐시 미스 시 DB에서 읽어 캐시에 적재하는 읽기 흐름과, 쓰기 시 DB에 저장 후 캐시를 무효화하는 쓰기 흐름을 나란히 보여줍니다</desc>

  <style>
    text { font-family: 'Pretendard', system-ui, sans-serif; }
    .title-text { font-size: 14px; font-weight: 600; }
    .sub-text { font-size: 12px; }
    .meta-text { font-size: 11px; fill: #27272A; }
    .label-text { font-size: 11px; }
  </style>

  <!-- 배경 -->
  <rect width="800" height="520" fill="#FAFAFA"/>

  <!-- 헤더 -->
  <text x="400" y="32" text-anchor="middle" font-size="15" font-weight="700" fill="#0A0A0A">흐름도 — Cache-Aside 읽기 / 쓰기 경로</text>

  <!-- ====== 왼쪽: 읽기 흐름 ====== -->
  <text x="200" y="64" text-anchor="middle" font-size="13" font-weight="600" fill="#047857">읽기 (Cache-Aside Read)</text>

  <!-- 화살표 먼저 -->
  <!-- App → Cache -->
  <line x1="200" y1="120" x2="200" y2="155" stroke="#0A0A0A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- Cache → App (HIT) -->
  <line x1="170" y1="197" x2="80" y2="197" stroke="#059669" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <!-- Cache → DB (MISS) -->
  <line x1="200" y1="215" x2="200" y2="255" stroke="#D97706" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arrow-amber)"/>
  <!-- DB → App (읽기 결과) -->
  <line x1="170" y1="285" x2="80" y2="285" stroke="#0891B2" stroke-width="1.5" marker-end="url(#arrow-cyan)"/>
  <!-- App → Cache (적재) -->
  <line x1="230" y1="285" x2="290" y2="210" stroke="#059669" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- 박스 위에 얹기 -->
  <!-- Application -->
  <rect x="120" y="80" width="160" height="44" rx="6" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="200" y="97" text-anchor="middle" class="title-text" fill="#047857">Application</text>
  <text x="200" y="114" text-anchor="middle" class="meta-text">(API / Service)</text>

  <!-- Redis Cache -->
  <rect x="120" y="155" width="160" height="44" rx="6" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="200" y="172" text-anchor="middle" class="title-text" fill="#6D28D9">Redis Cache</text>
  <text x="200" y="189" text-anchor="middle" class="meta-text">TTL 2s ~ 5m</text>

  <!-- RDS / DB -->
  <rect x="120" y="255" width="160" height="44" rx="6" fill="#FFFBEB" stroke="#D97706" stroke-width="1.5"/>
  <text x="200" y="272" text-anchor="middle" class="title-text" fill="#B45309">RDS (PostgreSQL)</text>
  <text x="200" y="289" text-anchor="middle" class="meta-text">Source of Truth</text>

  <!-- 화살표 라벨 -->
  <rect x="204" y="127" width="60" height="16" rx="2" fill="#FAFAFA"/>
  <text x="234" y="139" text-anchor="middle" class="label-text" fill="#0A0A0A">1. GET</text>

  <rect x="96" y="185" width="64" height="16" rx="2" fill="#FAFAFA"/>
  <text x="128" y="197" text-anchor="middle" class="label-text" fill="#047857">2a. HIT → 반환</text>

  <rect x="204" y="226" width="72" height="16" rx="2" fill="#FAFAFA"/>
  <text x="240" y="238" text-anchor="middle" class="label-text" fill="#B45309">2b. MISS</text>

  <rect x="84" y="273" width="76" height="16" rx="2" fill="#FAFAFA"/>
  <text x="122" y="285" text-anchor="middle" class="label-text" fill="#0E7490">3. DB 조회 결과</text>

  <rect x="232" y="240" width="72" height="16" rx="2" fill="#FAFAFA"/>
  <text x="268" y="252" text-anchor="middle" class="label-text" fill="#047857">4. SET + TTL</text>

  <!-- MISS 경로 표시 박스 -->
  <rect x="36" y="330" width="328" height="44" rx="6" fill="#F0FDF4" stroke="#059669" stroke-width="1" stroke-dasharray="4 2"/>
  <text x="200" y="350" text-anchor="middle" font-size="11" fill="#047857">캐시 미스 경로: DB 조회 → 캐시 적재 → 응답</text>
  <text x="200" y="366" text-anchor="middle" font-size="11" fill="#047857">다음 요청부터 캐시에서 직접 응답</text>

  <!-- ====== 구분선 ====== -->
  <line x1="400" y1="56" x2="400" y2="410" stroke="#D4D4D8" stroke-width="1" stroke-dasharray="6 3"/>

  <!-- ====== 오른쪽: 쓰기 흐름 ====== -->
  <text x="600" y="64" text-anchor="middle" font-size="13" font-weight="600" fill="#047857">쓰기 (Write + Cache Invalidation)</text>

  <!-- 화살표 먼저 -->
  <!-- App → DB (쓰기) -->
  <line x1="600" y1="120" x2="600" y2="155" stroke="#0A0A0A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- DB → App (ack) -->
  <line x1="570" y1="197" x2="480" y2="197" stroke="#0891B2" stroke-width="1.5" marker-end="url(#arrow-cyan)"/>
  <!-- App → Cache (invalidate) -->
  <line x1="600" y1="120" x2="600" y2="255" stroke="#E11D48" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#arrow-rose)"/>

  <!-- 박스 위에 얹기 -->
  <!-- Application -->
  <rect x="520" y="80" width="160" height="44" rx="6" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="600" y="97" text-anchor="middle" class="title-text" fill="#047857">Application</text>
  <text x="600" y="114" text-anchor="middle" class="meta-text">(API / Service)</text>

  <!-- RDS / DB -->
  <rect x="520" y="155" width="160" height="44" rx="6" fill="#FFFBEB" stroke="#D97706" stroke-width="1.5"/>
  <text x="600" y="172" text-anchor="middle" class="title-text" fill="#B45309">RDS (PostgreSQL)</text>
  <text x="600" y="189" text-anchor="middle" class="meta-text">Source of Truth</text>

  <!-- Redis Cache -->
  <rect x="520" y="255" width="160" height="44" rx="6" fill="#FFF1F2" stroke="#E11D48" stroke-width="1.5"/>
  <text x="600" y="272" text-anchor="middle" class="title-text" fill="#BE123C">Redis Cache</text>
  <text x="600" y="289" text-anchor="middle" class="meta-text">DEL (무효화)</text>

  <!-- 화살표 라벨 -->
  <rect x="604" y="127" width="68" height="16" rx="2" fill="#FAFAFA"/>
  <text x="638" y="139" text-anchor="middle" class="label-text" fill="#0A0A0A">1. DB Write</text>

  <rect x="484" y="185" width="68" height="16" rx="2" fill="#FAFAFA"/>
  <text x="518" y="197" text-anchor="middle" class="label-text" fill="#0E7490">2. Write OK</text>

  <rect x="604" y="184" width="68" height="16" rx="2" fill="#FAFAFA"/>
  <text x="638" y="196" text-anchor="middle" class="label-text" fill="#BE123C">3. DEL key</text>

  <!-- 설명 박스 -->
  <rect x="436" y="330" width="328" height="44" rx="6" fill="#FFF1F2" stroke="#E11D48" stroke-width="1" stroke-dasharray="4 2"/>
  <text x="600" y="350" text-anchor="middle" font-size="11" fill="#BE123C">쓰기 후 캐시 키 삭제(무효화)</text>
  <text x="600" y="366" text-anchor="middle" font-size="11" fill="#BE123C">다음 읽기에서 DB 재조회 후 캐시 재적재</text>

  <!-- ====== 하단 범례 ====== -->
  <rect x="200" y="420" width="400" height="80" rx="6" fill="#F8FAFC" stroke="#D4D4D8" stroke-width="1"/>
  <text x="400" y="440" text-anchor="middle" font-size="12" font-weight="600" fill="#0A0A0A">범례</text>
  <line x1="224" y1="458" x2="264" y2="458" stroke="#0A0A0A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="270" y="462" font-size="11" fill="#0A0A0A">정상 흐름</text>
  <line x1="340" y1="458" x2="380" y2="458" stroke="#D97706" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arrow-amber)"/>
  <text x="386" y="462" font-size="11" fill="#B45309">캐시 미스</text>
  <line x1="460" y1="458" x2="500" y2="458" stroke="#E11D48" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#arrow-rose)"/>
  <text x="506" y="462" font-size="11" fill="#BE123C">캐시 무효화</text>
  <line x1="224" y1="482" x2="264" y2="482" stroke="#059669" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="270" y="486" font-size="11" fill="#047857">캐시 HIT / 적재</text>
  <line x1="380" y1="482" x2="420" y2="482" stroke="#0891B2" stroke-width="1.5" marker-end="url(#arrow-cyan)"/>
  <text x="426" y="486" font-size="11" fill="#0E7490">DB 응답</text>

  <!-- 화살표 마커 정의 -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#0A0A0A"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#059669"/>
    </marker>
    <marker id="arrow-amber" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#D97706"/>
    </marker>
    <marker id="arrow-cyan" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#0891B2"/>
    </marker>
    <marker id="arrow-rose" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#E11D48"/>
    </marker>
  </defs>
</svg>
