<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 420" font-family="Pretendard, ui-sans-serif, system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="ar" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="760" height="420" fill="#FFFFFF"/>

  <text x="380" y="28" text-anchor="middle" font-size="12" fill="#64748B">&amp;dyn Sink is a fat pointer (16 bytes) — one word to the data, one to the vtable</text>

  <!-- fat pointer -->
  <text x="160" y="70" text-anchor="middle" font-size="12" font-weight="700" fill="#334155">&amp;dyn Sink  (fat pointer)</text>
  <rect x="64" y="82" width="192" height="52" rx="8" fill="#F8FAFC" stroke="#475569" stroke-width="1.6"/>
  <line x1="160" y1="82" x2="160" y2="134" stroke="#475569" stroke-width="1.3"/>
  <text x="112" y="113" text-anchor="middle" font-size="11.5" font-family="'Geist Mono', ui-monospace, monospace" fill="#334155">data ptr</text>
  <text x="208" y="113" text-anchor="middle" font-size="11.5" font-family="'Geist Mono', ui-monospace, monospace" fill="#334155">vtable ptr</text>

  <!-- data object -->
  <path d="M112,134 L112,210 L150,210" fill="none" stroke="#475569" stroke-width="1.5" marker-end="url(#ar)"/>
  <rect x="156" y="182" width="180" height="56" rx="8" fill="#ECFDF5" stroke="#059669" stroke-width="1.6"/>
  <text x="246" y="208" text-anchor="middle" font-size="13" font-weight="700" fill="#047857">actual object</text>
  <text x="246" y="226" text-anchor="middle" font-size="11" fill="#475569">e.g. FileSink fields</text>

  <!-- vtable -->
  <path d="M208,134 C208,150 470,150 470,168" fill="none" stroke="#475569" stroke-width="1.5" marker-end="url(#ar)"/>
  <rect x="380" y="170" width="300" height="206" rx="9" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.7"/>
  <text x="530" y="194" text-anchor="middle" font-size="13" font-weight="700" fill="#6D28D9">vtable</text>
  <text x="530" y="212" text-anchor="middle" font-size="10.5" fill="#94A3B8">static · read-only · one per (type, trait)</text>
  <line x1="396" y1="222" x2="664" y2="222" stroke="#DDD6FE" stroke-width="1"/>
  <text x="412" y="244" font-size="11.5" font-family="'Geist Mono', ui-monospace, monospace" fill="#6D28D9">drop_in_place ptr</text>
  <text x="640" y="244" text-anchor="end" font-size="10.5" fill="#94A3B8">destructor</text>
  <text x="412" y="270" font-size="11.5" font-family="'Geist Mono', ui-monospace, monospace" fill="#6D28D9">size</text>
  <text x="412" y="296" font-size="11.5" font-family="'Geist Mono', ui-monospace, monospace" fill="#6D28D9">align</text>
  <text x="412" y="322" font-size="11.5" font-family="'Geist Mono', ui-monospace, monospace" fill="#6D28D9">method_0 ptr</text>
  <text x="412" y="348" font-size="11.5" font-family="'Geist Mono', ui-monospace, monospace" fill="#6D28D9">method_1 ptr</text>
  <text x="640" y="335" text-anchor="end" font-size="10.5" fill="#94A3B8">trait methods</text>

  <!-- call sequence note -->
  <rect x="64" y="290" width="280" height="86" rx="9" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
  <text x="204" y="312" text-anchor="middle" font-size="11.5" font-weight="700" fill="#475569">a dynamic call = double indirection</text>
  <text x="80" y="334" font-size="11" font-family="'Geist Mono', ui-monospace, monospace" fill="#64748B">mov rax, [rdi+8]   ; vtable ptr</text>
  <text x="80" y="352" font-size="11" font-family="'Geist Mono', ui-monospace, monospace" fill="#64748B">mov rax, [rax+24]  ; method ptr</text>
  <text x="80" y="370" font-size="11" font-family="'Geist Mono', ui-monospace, monospace" fill="#64748B">call rax           ; indirect</text>
</svg>
