<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 376" role="img" aria-labelledby="t8 d8" font-family="Pretendard, ui-sans-serif, system-ui, -apple-system, sans-serif">
  <title id="t8">Time to safepoint is set by the slowest thread</title>
  <desc id="d8">Once the JVM requests a safepoint, each thread stops at its next poll. Threads one and two hit a poll quickly. Thread three is inside a long counted loop whose polls the JIT removed for speed, so it keeps running while the others sit idle. The gap between the request and the last arrival is the time to safepoint, and every thread waits through it.</desc>
  <defs>
    <marker id="m7k" markerWidth="9" markerHeight="9" refX="6.5" refY="2.8" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L6.5,2.8 L0,5.6 Z" fill="#334155"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="800" height="376" fill="#FFFFFF"/>

  <line x1="176" y1="48" x2="176" y2="312" stroke="#7C3AED" stroke-width="1.6" stroke-dasharray="5 3"/>
  <text x="176" y="38" text-anchor="middle" font-size="13" font-weight="700" fill="#6D28D9">safepoint requested</text>

  <line x1="624" y1="72" x2="624" y2="312" stroke="#E11D48" stroke-width="1.4" stroke-dasharray="5 3"/>

  <text x="80" y="102" font-size="14" font-weight="700" fill="#334155">T1</text>
  <line x1="128" y1="96" x2="304" y2="96" stroke="#334155" stroke-width="2"/>
  <line x1="208" y1="86" x2="208" y2="106" stroke="#0891B2" stroke-width="2"/>
  <line x1="248" y1="86" x2="248" y2="106" stroke="#0891B2" stroke-width="2"/>
  <circle cx="304" cy="96" r="7" fill="#E11D48"/>
  <text x="324" y="101" font-size="13" fill="#BE123C">stopped</text>
  <text x="208" y="76" text-anchor="middle" font-size="13" fill="#0E7490">poll</text>

  <text x="80" y="174" font-size="14" font-weight="700" fill="#334155">T2</text>
  <line x1="128" y1="168" x2="424" y2="168" stroke="#334155" stroke-width="2"/>
  <line x1="224" y1="158" x2="224" y2="178" stroke="#0891B2" stroke-width="2"/>
  <line x1="312" y1="158" x2="312" y2="178" stroke="#0891B2" stroke-width="2"/>
  <line x1="384" y1="158" x2="384" y2="178" stroke="#0891B2" stroke-width="2"/>
  <circle cx="424" cy="168" r="7" fill="#E11D48"/>
  <text x="444" y="173" font-size="13" fill="#BE123C">stopped</text>

  <text x="80" y="246" font-size="14" font-weight="700" fill="#334155">T3</text>
  <line x1="128" y1="240" x2="168" y2="240" stroke="#334155" stroke-width="2"/>
  <rect x="168" y="222" width="456" height="36" rx="5" fill="#FFFBEB" stroke="#D97706" stroke-width="1.6"/>
  <text x="396" y="245" text-anchor="middle" font-size="13" font-weight="700" fill="#B45309">counted loop · polls removed</text>
  <circle cx="624" cy="240" r="7" fill="#E11D48"/>
  <text x="644" y="245" font-size="13" fill="#BE123C">last</text>

  <line x1="176" y1="296" x2="624" y2="296" stroke="#334155" stroke-width="1.4" marker-end="url(#m7k)"/>
  <line x1="176" y1="288" x2="176" y2="304" stroke="#334155" stroke-width="1.4"/>
  <text x="400" y="286" text-anchor="middle" font-size="15" font-weight="700" fill="#BE123C">TTSP</text>
  <text x="400" y="330" text-anchor="middle" font-size="13" fill="#334155">every thread waits through it</text>
</svg>
