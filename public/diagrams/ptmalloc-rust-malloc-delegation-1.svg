<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" role="img" aria-labelledby="t1 d1" font-family="Pretendard, ui-sans-serif, system-ui, -apple-system, sans-serif">
  <title id="t1">malloc amortizes one kernel round trip over many small objects</title>
  <desc id="d1">On the left every small object is requested straight from the kernel, so each allocation pays one system call plus a page fault. On the right malloc takes a single large chunk from the kernel once and slices it for every object, keeping freed pieces in a free list, so the kernel cost is paid once and reused.</desc>
  <defs>
    <marker id="a1r" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#E11D48"/>
    </marker>
    <marker id="a1c" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#0891B2"/>
    </marker>
    <marker id="a1a" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#B45309"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="800" height="420" fill="#FFFFFF"/>

  <text x="200" y="44" text-anchor="middle" font-size="15" font-weight="700" fill="#334155">direct to kernel</text>
  <text x="600" y="44" text-anchor="middle" font-size="15" font-weight="700" fill="#334155">through malloc</text>
  <line x1="400" y1="24" x2="400" y2="404" stroke="#E4E4E7" stroke-width="1.2"/>

  <line x1="104" y1="120" x2="104" y2="290" stroke="#E11D48" stroke-width="1.8" marker-end="url(#a1r)"/>
  <line x1="200" y1="120" x2="200" y2="290" stroke="#E11D48" stroke-width="1.8" marker-end="url(#a1r)"/>
  <line x1="296" y1="120" x2="296" y2="290" stroke="#E11D48" stroke-width="1.8" marker-end="url(#a1r)"/>

  <rect x="60" y="72" width="88" height="48" rx="8" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.6"/>
  <rect x="156" y="72" width="88" height="48" rx="8" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.6"/>
  <rect x="252" y="72" width="88" height="48" rx="8" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.6"/>
  <text x="200" y="102" text-anchor="middle" font-size="14" font-weight="700" fill="#0E7490">obj × N</text>

  <rect x="48" y="296" width="304" height="60" rx="9" fill="#FFFBEB" stroke="#D97706" stroke-width="1.8"/>
  <text x="200" y="332" text-anchor="middle" font-size="15" font-weight="700" fill="#B45309">kernel</text>
  <text x="200" y="392" text-anchor="middle" font-size="14" font-weight="700" fill="#BE123C">N × (syscall + fault)</text>

  <line x1="504" y1="120" x2="504" y2="154" stroke="#0891B2" stroke-width="1.8" marker-end="url(#a1c)"/>
  <line x1="600" y1="120" x2="600" y2="154" stroke="#0891B2" stroke-width="1.8" marker-end="url(#a1c)"/>
  <line x1="696" y1="120" x2="696" y2="154" stroke="#0891B2" stroke-width="1.8" marker-end="url(#a1c)"/>
  <line x1="600" y1="224" x2="600" y2="290" stroke="#B45309" stroke-width="2.2" marker-end="url(#a1a)"/>

  <rect x="460" y="72" width="88" height="48" rx="8" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.6"/>
  <rect x="556" y="72" width="88" height="48" rx="8" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.6"/>
  <rect x="652" y="72" width="88" height="48" rx="8" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.6"/>
  <text x="600" y="102" text-anchor="middle" font-size="14" font-weight="700" fill="#0E7490">obj × N</text>

  <rect x="448" y="160" width="304" height="64" rx="9" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.8"/>
  <text x="600" y="199" text-anchor="middle" font-size="15" font-weight="700" fill="#6D28D9">malloc · free list</text>
  <text x="616" y="262" font-size="13" fill="#B45309">1 big chunk</text>

  <rect x="448" y="296" width="304" height="60" rx="9" fill="#FFFBEB" stroke="#D97706" stroke-width="1.8"/>
  <text x="600" y="332" text-anchor="middle" font-size="15" font-weight="700" fill="#B45309">kernel</text>
  <text x="600" y="392" text-anchor="middle" font-size="14" font-weight="700" fill="#047857">1 × (syscall + fault)</text>
</svg>
