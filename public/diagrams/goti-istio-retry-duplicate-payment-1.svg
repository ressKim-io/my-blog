<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 460" role="img" aria-labelledby="t1 d1" width="100%" height="auto" preserveAspectRatio="xMidYMid meet" style="max-width: 720px;">
  <title id="t1">결제 정상 흐름 — retry 없이 4단계 commit</title>
  <desc id="d1">Client가 payment.initPayment()를 호출하면 @Transactional 범위에서 ticketingOrderClient.confirmPayment(), orderClient.orderDetail(), 결제 정보 DB 저장, commit 4단계가 순차로 진행되어 200 OK 반환</desc>

  <defs>
    <marker id="arr1" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#0A0A0A"/>
    </marker>
  </defs>

  <style><![CDATA[
    .label { font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif; font-size: 14px; font-weight: 600; }
    .meta  { font-family: 'Geist Mono', ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 11px; fill: #27272A; }
    .item  { font-family: 'Geist Mono', ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px; fill: #0A0A0A; }
    .ok    { font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif; font-size: 11px; font-weight: 600; fill: #047857; }
    .arrow { stroke: #0A0A0A; stroke-width: 1.5; fill: none; marker-end: url(#arr1); }
  ]]></style>

  <!-- Client -->
  <rect x="40" y="32" width="160" height="56" rx="6" fill="#F8FAFC" stroke="#475569" stroke-width="1.5"/>
  <text x="120" y="64" text-anchor="middle" class="label" fill="#334155">Client</text>

  <line x1="200" y1="60" x2="240" y2="60" class="arrow"/>

  <!-- payment.initPayment() @Transactional outer box -->
  <rect x="240" y="20" width="448" height="416" rx="8" fill="#ECFDF5" stroke="#059669" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="464" y="48" text-anchor="middle" class="label" fill="#047857">payment.initPayment() @Transactional</text>

  <!-- Step 1 -->
  <rect x="264" y="72" width="400" height="76" rx="6" fill="#FAFAFA" stroke="#0891B2" stroke-width="1.5"/>
  <text x="284" y="96" class="item" fill="#0E7490">1. ticketingOrderClient.confirmPayment()</text>
  <text x="304" y="118" class="item">→ ticketing: 주문 상태를 PAID로 변경</text>
  <text x="304" y="138" class="ok">→ 200 OK</text>

  <line x1="464" y1="148" x2="464" y2="172" class="arrow"/>

  <!-- Step 2 -->
  <rect x="264" y="172" width="400" height="60" rx="6" fill="#FAFAFA" stroke="#0891B2" stroke-width="1.5"/>
  <text x="284" y="196" class="item" fill="#0E7490">2. orderClient.orderDetail()</text>
  <text x="304" y="220" class="ok">→ 주문 상세 조회 / 200 OK</text>

  <line x1="464" y1="232" x2="464" y2="256" class="arrow"/>

  <!-- Step 3 -->
  <rect x="264" y="256" width="400" height="56" rx="6" fill="#FAFAFA" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="284" y="288" class="item" fill="#6D28D9">3. 결제 정보 DB 저장</text>

  <line x1="464" y1="312" x2="464" y2="336" class="arrow"/>

  <!-- Step 4 commit -->
  <rect x="264" y="336" width="400" height="76" rx="6" fill="#FAFAFA" stroke="#059669" stroke-width="1.5"/>
  <text x="284" y="360" class="item" fill="#047857">4. commit</text>
  <text x="304" y="382" class="ok">→ 200 OK</text>
</svg>
