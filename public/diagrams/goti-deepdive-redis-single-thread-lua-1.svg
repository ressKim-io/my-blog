<svg role="img" aria-labelledby="title-1 desc-1"
     viewBox="0 0 800 480" width="100%" height="auto"
     xmlns="http://www.w3.org/2000/svg"
     style="font-family: 'Pretendard', system-ui, sans-serif;">
  <title id="title-1">Redis 단일 스레드 명령 직렬화 구조도</title>
  <desc id="desc-1">여러 클라이언트가 보내는 명령이 소켓 버퍼를 거쳐 Redis 이벤트 루프 큐에 순서대로 쌓이고, 단일 스레드가 하나씩 원자적으로 처리하는 구조</desc>

  <!-- 배경 -->
  <rect width="800" height="480" fill="#FAFAFA"/>

  <!-- 제목 -->
  <text x="400" y="36" text-anchor="middle" font-size="15" font-weight="600" fill="#0A0A0A">구조도 — Redis 단일 스레드 명령 직렬화</text>

  <!-- ===== 클라이언트 영역 ===== -->
  <!-- Client 1 -->
  <rect x="40" y="80" width="130" height="52" rx="6"
        fill="#ECFEFF" stroke="#0891B2" stroke-width="1.5"/>
  <text x="105" y="101" text-anchor="middle" font-size="13" font-weight="600" fill="#0E7490">클라이언트 1</text>
  <text x="105" y="120" text-anchor="middle" font-size="11" fill="#27272A">HSET seat:1:A</text>

  <!-- Client 2 -->
  <rect x="40" y="168" width="130" height="52" rx="6"
        fill="#ECFEFF" stroke="#0891B2" stroke-width="1.5"/>
  <text x="105" y="189" text-anchor="middle" font-size="13" font-weight="600" fill="#0E7490">클라이언트 2</text>
  <text x="105" y="208" text-anchor="middle" font-size="11" fill="#27272A">EVALSHA hold.lua</text>

  <!-- Client 3 -->
  <rect x="40" y="256" width="130" height="52" rx="6"
        fill="#ECFEFF" stroke="#0891B2" stroke-width="1.5"/>
  <text x="105" y="277" text-anchor="middle" font-size="13" font-weight="600" fill="#0E7490">클라이언트 3</text>
  <text x="105" y="296" text-anchor="middle" font-size="11" fill="#27272A">HGET order:42</text>

  <!-- Client 4 -->
  <rect x="40" y="344" width="130" height="52" rx="6"
        fill="#ECFEFF" stroke="#0891B2" stroke-width="1.5"/>
  <text x="105" y="365" text-anchor="middle" font-size="13" font-weight="600" fill="#0E7490">클라이언트 4</text>
  <text x="105" y="384" text-anchor="middle" font-size="11" fill="#27272A">XADD outbox:stream</text>

  <!-- ===== 소켓 버퍼 ===== -->
  <rect x="220" y="80" width="120" height="316" rx="6"
        fill="#FFFBEB" stroke="#D97706" stroke-width="1.5"/>
  <text x="280" y="107" text-anchor="middle" font-size="13" font-weight="600" fill="#B45309">소켓 버퍼</text>
  <text x="280" y="126" text-anchor="middle" font-size="11" fill="#27272A">(TCP recv buffer)</text>

  <!-- 버퍼 항목 -->
  <rect x="234" y="140" width="92" height="30" rx="4" fill="#FFFBEB" stroke="#D97706" stroke-width="1"/>
  <text x="280" y="160" text-anchor="middle" font-size="11" fill="#B45309">cmd①</text>

  <rect x="234" y="178" width="92" height="30" rx="4" fill="#FFFBEB" stroke="#D97706" stroke-width="1"/>
  <text x="280" y="198" text-anchor="middle" font-size="11" fill="#B45309">cmd②</text>

  <rect x="234" y="216" width="92" height="30" rx="4" fill="#FFFBEB" stroke="#D97706" stroke-width="1"/>
  <text x="280" y="236" text-anchor="middle" font-size="11" fill="#B45309">cmd③</text>

  <rect x="234" y="254" width="92" height="30" rx="4" fill="#FFFBEB" stroke="#D97706" stroke-width="1"/>
  <text x="280" y="274" text-anchor="middle" font-size="11" fill="#B45309">cmd④</text>

  <text x="280" y="320" text-anchor="middle" font-size="20" fill="#B45309">⋮</text>

  <!-- ===== 이벤트 루프 (ae_event_loop) ===== -->
  <rect x="390" y="80" width="160" height="316" rx="6"
        fill="#ECFDF5" stroke="#059669" stroke-width="2"/>
  <text x="470" y="107" text-anchor="middle" font-size="13" font-weight="600" fill="#047857">이벤트 루프</text>
  <text x="470" y="124" text-anchor="middle" font-size="11" fill="#27272A">ae_event_loop</text>

  <!-- FIFO Queue 화살표 -->
  <text x="470" y="155" text-anchor="middle" font-size="11" fill="#047857">▼ FIFO 순서 ▼</text>

  <rect x="406" y="168" width="128" height="30" rx="4" fill="#ECFDF5" stroke="#059669" stroke-width="1"/>
  <text x="470" y="188" text-anchor="middle" font-size="11" fill="#047857">① HSET seat:1:A</text>

  <rect x="406" y="206" width="128" height="30" rx="4" fill="#ECFDF5" stroke="#059669" stroke-width="1"/>
  <text x="470" y="226" text-anchor="middle" font-size="11" fill="#047857">② EVALSHA hold.lua</text>

  <rect x="406" y="244" width="128" height="30" rx="4" fill="#ECFDF5" stroke="#059669" stroke-width="1"/>
  <text x="470" y="264" text-anchor="middle" font-size="11" fill="#047857">③ HGET order:42</text>

  <rect x="406" y="282" width="128" height="30" rx="4" fill="#ECFDF5" stroke="#059669" stroke-width="1"/>
  <text x="470" y="302" text-anchor="middle" font-size="11" fill="#047857">④ XADD outbox:stream</text>

  <text x="470" y="338" text-anchor="middle" font-size="20" fill="#047857">⋮</text>

  <!-- ===== 단일 스레드 실행기 ===== -->
  <rect x="600" y="168" width="158" height="104" rx="6"
        fill="#F5F3FF" stroke="#7C3AED" stroke-width="2"/>
  <text x="679" y="193" text-anchor="middle" font-size="13" font-weight="600" fill="#6D28D9">단일 스레드</text>
  <text x="679" y="211" text-anchor="middle" font-size="11" fill="#27272A">한 번에 명령 1개</text>
  <text x="679" y="229" text-anchor="middle" font-size="11" fill="#27272A">인터리빙 없음</text>
  <text x="679" y="250" text-anchor="middle" font-size="11" fill="#6D28D9">✓ Lock 불필요</text>
  <text x="679" y="264" text-anchor="middle" font-size="11" fill="#6D28D9">✓ 경쟁 조건 없음</text>

  <!-- ===== 화살표 ===== -->
  <!-- 클라이언트 → 소켓 버퍼 -->
  <line x1="170" y1="106" x2="218" y2="156" stroke="#0891B2" stroke-width="1.5" marker-end="url(#arrow-cyan)"/>
  <line x1="170" y1="194" x2="218" y2="194" stroke="#0891B2" stroke-width="1.5" marker-end="url(#arrow-cyan)"/>
  <line x1="170" y1="282" x2="218" y2="250" stroke="#0891B2" stroke-width="1.5" marker-end="url(#arrow-cyan)"/>
  <line x1="170" y1="370" x2="218" y2="284" stroke="#0891B2" stroke-width="1.5" marker-end="url(#arrow-cyan)"/>

  <!-- 소켓 버퍼 → 이벤트 루프 -->
  <line x1="340" y1="238" x2="388" y2="238" stroke="#D97706" stroke-width="1.5" marker-end="url(#arrow-amber)"/>
  <text x="364" y="231" text-anchor="middle" font-size="10" fill="#B45309">epoll</text>

  <!-- 이벤트 루프 → 단일 스레드 -->
  <line x1="550" y1="238" x2="598" y2="220" stroke="#7C3AED" stroke-width="2" marker-end="url(#arrow-violet)"/>

  <!-- ===== 화살표 마커 ===== -->
  <defs>
    <marker id="arrow-cyan" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#0891B2"/>
    </marker>
    <marker id="arrow-amber" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#D97706"/>
    </marker>
    <marker id="arrow-violet" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7C3AED"/>
    </marker>
  </defs>

  <!-- ===== 범례 ===== -->
  <rect x="40" y="430" width="720" height="36" rx="4" fill="#F8FAFC" stroke="#D4D4D8" stroke-width="1"/>
  <rect x="56" y="442" width="12" height="12" rx="2" fill="#ECFEFF" stroke="#0891B2" stroke-width="1"/>
  <text x="74" y="453" font-size="11" fill="#334155">클라이언트</text>
  <rect x="156" y="442" width="12" height="12" rx="2" fill="#FFFBEB" stroke="#D97706" stroke-width="1"/>
  <text x="174" y="453" font-size="11" fill="#334155">소켓 버퍼</text>
  <rect x="256" y="442" width="12" height="12" rx="2" fill="#ECFDF5" stroke="#059669" stroke-width="1"/>
  <text x="274" y="453" font-size="11" fill="#334155">이벤트 루프 (FIFO 큐)</text>
  <rect x="426" y="442" width="12" height="12" rx="2" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1"/>
  <text x="444" y="453" font-size="11" fill="#334155">단일 스레드 실행기</text>
</svg>
