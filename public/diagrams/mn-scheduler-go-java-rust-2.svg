<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-labelledby="t5 d5" font-family="Pretendard, ui-sans-serif, system-ui, -apple-system, sans-serif">
  <title id="t5">Syscall handoff — the P detaches from a blocked M and keeps scheduling elsewhere</title>
  <desc id="d5">When goroutine G1 enters a blocking system call, the OS thread M0 running it is stuck inside the kernel. Rather than stalling the whole scheduler, the runtime hands the logical processor P over to another OS thread M1, which immediately resumes scheduling the waiting goroutines G2 and G3. M0 stays blocked with G1 and wakes when the syscall returns, at which point G1 must reacquire a P to continue.</desc>
  <defs>
    <marker id="m5" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#475569"/>
    </marker>
    <marker id="m5g" markerWidth="12" markerHeight="12" refX="8" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L9,4 L0,8 Z" fill="#059669"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="800" height="400" fill="#FFFFFF"/>

  <line x1="180" y1="144" x2="180" y2="172" stroke="#475569" stroke-width="1.6" marker-end="url(#m5)"/>
  <line x1="180" y1="228" x2="180" y2="256" stroke="#475569" stroke-width="1.6" marker-end="url(#m5)"/>
  <line x1="580" y1="144" x2="580" y2="172" stroke="#475569" stroke-width="1.6" marker-end="url(#m5)"/>
  <line x1="332" y1="180" x2="428" y2="180" stroke="#059669" stroke-width="2.2" marker-end="url(#m5g)"/>
  <text x="380" y="168" text-anchor="middle" font-size="14" font-weight="700" fill="#047857">handoff</text>

  <text x="180" y="48" text-anchor="middle" font-size="15" font-weight="700" fill="#BE123C">before</text>
  <text x="580" y="48" text-anchor="middle" font-size="15" font-weight="700" fill="#047857">after</text>

  <rect x="40" y="72" width="280" height="72" rx="8" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.6"/>
  <text x="180" y="102" text-anchor="middle" font-size="15" font-weight="700" fill="#0E7490">P</text>
  <text x="180" y="126" text-anchor="middle" font-size="13" fill="#0E7490" font-family="ui-monospace, monospace">runq: [G2] [G3]</text>

  <rect x="40" y="176" width="280" height="52" rx="8" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.6"/>
  <text x="180" y="208" text-anchor="middle" font-size="15" font-weight="700" fill="#6D28D9">M0 — running G1</text>

  <rect x="40" y="260" width="280" height="72" rx="8" fill="#FFF1F2" stroke="#E11D48" stroke-width="1.6"/>
  <text x="180" y="290" text-anchor="middle" font-size="14" font-weight="700" fill="#BE123C" font-family="ui-monospace, monospace">sys_read</text>
  <text x="180" y="314" text-anchor="middle" font-size="13" fill="#BE123C">blocked in the kernel</text>

  <rect x="440" y="72" width="280" height="72" rx="8" fill="#ECFDF5" stroke="#059669" stroke-width="1.8"/>
  <text x="580" y="102" text-anchor="middle" font-size="15" font-weight="700" fill="#047857">P — keeps scheduling</text>
  <text x="580" y="126" text-anchor="middle" font-size="13" fill="#047857" font-family="ui-monospace, monospace">runq: [G2] [G3]</text>

  <rect x="440" y="176" width="280" height="52" rx="8" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.6"/>
  <text x="580" y="208" text-anchor="middle" font-size="15" font-weight="700" fill="#6D28D9">M1 — picks up the P</text>

  <rect x="440" y="260" width="280" height="72" rx="8" fill="#FFF1F2" stroke="#E11D48" stroke-width="1.4" stroke-dasharray="5 3"/>
  <text x="580" y="290" text-anchor="middle" font-size="14" font-weight="700" fill="#BE123C">M0 + G1 — still blocked</text>
  <text x="580" y="314" text-anchor="middle" font-size="13" fill="#BE123C">wakes on syscall return</text>
</svg>
