<svg role="img" aria-labelledby="title-1 desc-1" viewBox="0 0 800 480" width="100%" height="auto"
  xmlns="http://www.w3.org/2000/svg" font-family="'Pretendard', system-ui, sans-serif">
  <title id="title-1">3-Signal 상관 드릴다운 흐름도</title>
  <desc id="desc-1">Grafana에서 메트릭 스파이크를 발견하고 Exemplar를 클릭해 Tempo trace로, 다시 trace_id로 Loki 로그까지 드릴다운하는 3-signal 상관 흐름</desc>

  <!-- 배경 -->
  <rect width="800" height="480" fill="#FAFAFA" rx="4"/>

  <!-- 제목 -->
  <text x="400" y="30" text-anchor="middle" font-size="15" font-weight="600" fill="#0A0A0A">3-Signal 상관 드릴다운 — Exemplar 클릭 흐름</text>

  <!-- ======================== STEP 1: 메트릭 스파이크 ======================== -->
  <!-- Grafana 패널 박스 -->
  <rect x="40" y="60" width="200" height="100" rx="6" fill="#FFFBEB" stroke="#D97706" stroke-width="1.5"/>
  <text x="140" y="82" text-anchor="middle" font-size="13" font-weight="600" fill="#B45309">Grafana</text>
  <text x="140" y="99" text-anchor="middle" font-size="11" fill="#27272A">메트릭 패널 (PromQL)</text>
  <!-- 스파이크 모양 간단 표현 -->
  <polyline points="60,140 80,140 90,100 100,140 120,140 130,105 145,140 200,140" fill="none" stroke="#D97706" stroke-width="1.5"/>
  <!-- Exemplar 점 -->
  <circle cx="130" cy="105" r="5" fill="#7C3AED" stroke="#6D28D9" stroke-width="1.2"/>
  <text x="155" y="100" font-size="10" fill="#6D28D9">Exemplar</text>

  <!-- 화살표 1: Grafana → Tempo -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#0A0A0A"/>
    </marker>
    <marker id="arr-accent" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7C3AED"/>
    </marker>
  </defs>

  <line x1="241" y1="110" x2="289" y2="110" stroke="#7C3AED" stroke-width="2" marker-end="url(#arr-accent)"/>
  <!-- 라벨 배경 -->
  <rect x="248" y="95" width="36" height="14" fill="#FAFAFA"/>
  <text x="266" y="106" text-anchor="middle" font-size="10" fill="#6D28D9">클릭</text>

  <!-- ======================== STEP 2: Tempo Trace ======================== -->
  <rect x="290" y="60" width="220" height="180" rx="6" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="400" y="82" text-anchor="middle" font-size="13" font-weight="600" fill="#047857">Grafana Tempo</text>
  <text x="400" y="98" text-anchor="middle" font-size="11" fill="#27272A">trace_id: abc123…</text>

  <!-- 워터폴 바 -->
  <rect x="308" y="110" width="184" height="18" rx="3" fill="#059669"/>
  <text x="400" y="123" text-anchor="middle" font-size="10" fill="#FAFAFA">goti-gateway  [root]  42ms</text>

  <rect x="332" y="134" width="140" height="16" rx="3" fill="#059669" opacity="0.75"/>
  <text x="402" y="146" text-anchor="middle" font-size="10" fill="#FAFAFA">ticketing-svc  28ms</text>

  <rect x="356" y="155" width="90" height="16" rx="3" fill="#E11D48"/>
  <text x="401" y="167" text-anchor="middle" font-size="10" fill="#FAFAFA">DB query  21ms ★</text>

  <rect x="332" y="177" width="60" height="16" rx="3" fill="#059669" opacity="0.6"/>
  <text x="362" y="189" text-anchor="middle" font-size="10" fill="#FAFAFA">payment  8ms</text>

  <text x="308" y="218" font-size="10" fill="#475569">★ 병목 span (rose 강조)</text>

  <!-- trace_id 라벨 -->
  <text x="400" y="236" text-anchor="middle" font-size="11" fill="#27272A">span.trace_id → Loki 쿼리</text>

  <!-- 화살표 2: Tempo → Loki -->
  <line x1="511" y1="160" x2="559" y2="160" stroke="#0891B2" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="518" y="146" width="36" height="14" fill="#FAFAFA"/>
  <text x="536" y="157" text-anchor="middle" font-size="10" fill="#0E7490">trace_id</text>

  <!-- ======================== STEP 3: Loki 로그 ======================== -->
  <rect x="560" y="60" width="200" height="180" rx="6" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.5"/>
  <text x="660" y="82" text-anchor="middle" font-size="13" font-weight="600" fill="#0E7490">Grafana Loki</text>
  <text x="660" y="98" text-anchor="middle" font-size="11" fill="#27272A">LogQL 드릴다운</text>

  <!-- 로그 라인들 -->
  <rect x="572" y="107" width="176" height="14" rx="2" fill="#F8FAFC" stroke="#E4E4E7"/>
  <text x="660" y="118" text-anchor="middle" font-size="9" fill="#334155">INFO  goti-gateway  req=POST /tickets</text>

  <rect x="572" y="125" width="176" height="14" rx="2" fill="#F8FAFC" stroke="#E4E4E7"/>
  <text x="660" y="136" text-anchor="middle" font-size="9" fill="#334155">INFO  ticketing-svc  seat_lock=ok</text>

  <rect x="572" y="143" width="176" height="14" rx="2" fill="#FFF1F2" stroke="#E11D48"/>
  <text x="660" y="154" text-anchor="middle" font-size="9" fill="#BE123C">WARN  DB slow query  21ms seats_lock</text>

  <rect x="572" y="161" width="176" height="14" rx="2" fill="#F8FAFC" stroke="#E4E4E7"/>
  <text x="660" y="172" text-anchor="middle" font-size="9" fill="#334155">INFO  payment-svc  charge=ok</text>

  <text x="660" y="200" text-anchor="middle" font-size="10" fill="#475569">trace_id 필터 → 관련 로그만 표시</text>
  <text x="660" y="216" text-anchor="middle" font-size="10" fill="#475569">{trace_id="abc123"}</text>

  <!-- ======================== Exemplar 설명 박스 ======================== -->
  <rect x="40" y="270" width="720" height="72" rx="6" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1"/>
  <text x="400" y="291" text-anchor="middle" font-size="13" font-weight="600" fill="#6D28D9">Exemplar — 메트릭 데이터점에 내장된 trace_id 포인터</text>
  <text x="400" y="311" text-anchor="middle" font-size="11" fill="#27272A">Prometheus Exemplar 형식: &lt;metric&gt; {traceID="abc123"} &lt;value&gt; &lt;timestamp&gt;</text>
  <text x="400" y="329" text-anchor="middle" font-size="11" fill="#27272A">Grafana가 Exemplar 점 클릭 시 traceID로 Tempo datasource를 자동 쿼리</text>

  <!-- ======================== 하단 흐름 요약 ======================== -->
  <rect x="40" y="358" width="720" height="100" rx="6" fill="#F8FAFC" stroke="#D4D4D8" stroke-width="1"/>
  <text x="400" y="378" text-anchor="middle" font-size="12" font-weight="600" fill="#0A0A0A">3-Signal 드릴다운 요약</text>

  <!-- Step 박스들 -->
  <rect x="60" y="388" width="130" height="52" rx="4" fill="#FFFBEB" stroke="#D97706"/>
  <text x="125" y="408" text-anchor="middle" font-size="11" font-weight="600" fill="#B45309">① 메트릭</text>
  <text x="125" y="424" text-anchor="middle" font-size="10" fill="#27272A">레이턴시 스파이크</text>
  <text x="125" y="437" text-anchor="middle" font-size="10" fill="#27272A">Exemplar 점 클릭</text>

  <text x="210" y="418" text-anchor="middle" font-size="14" fill="#7C3AED">→</text>

  <rect x="224" y="388" width="130" height="52" rx="4" fill="#ECFDF5" stroke="#059669"/>
  <text x="289" y="408" text-anchor="middle" font-size="11" font-weight="600" fill="#047857">② 트레이스</text>
  <text x="289" y="424" text-anchor="middle" font-size="10" fill="#27272A">Tempo 워터폴 뷰</text>
  <text x="289" y="437" text-anchor="middle" font-size="10" fill="#27272A">병목 span 특정</text>

  <text x="374" y="418" text-anchor="middle" font-size="14" fill="#7C3AED">→</text>

  <rect x="388" y="388" width="130" height="52" rx="4" fill="#ECFEFF" stroke="#0891B2"/>
  <text x="453" y="408" text-anchor="middle" font-size="11" font-weight="600" fill="#0E7490">③ 로그</text>
  <text x="453" y="424" text-anchor="middle" font-size="10" fill="#27272A">Loki trace_id 필터</text>
  <text x="453" y="437" text-anchor="middle" font-size="10" fill="#27272A">해당 요청 로그만</text>

  <text x="538" y="418" text-anchor="middle" font-size="14" fill="#7C3AED">→</text>

  <rect x="552" y="388" width="180" height="52" rx="4" fill="#F5F3FF" stroke="#7C3AED"/>
  <text x="642" y="408" text-anchor="middle" font-size="11" font-weight="600" fill="#6D28D9">④ 근본 원인 특정</text>
  <text x="642" y="424" text-anchor="middle" font-size="10" fill="#27272A">코드 라인·쿼리까지</text>
  <text x="642" y="437" text-anchor="middle" font-size="10" fill="#27272A">단일 Grafana UI</text>

  <!-- 범례 -->
  <rect x="600" y="267" width="160" height="72" rx="4" fill="#FAFAFA" stroke="#D4D4D8"/>
  <text x="680" y="283" text-anchor="middle" font-size="11" font-weight="600" fill="#0A0A0A">범례</text>
  <rect x="612" y="291" width="12" height="12" rx="2" fill="#FFFBEB" stroke="#D97706"/>
  <text x="630" y="301" font-size="10" fill="#27272A">메트릭 (Mimir)</text>
  <rect x="612" y="308" width="12" height="12" rx="2" fill="#ECFDF5" stroke="#059669"/>
  <text x="630" y="318" font-size="10" fill="#27272A">트레이스 (Tempo)</text>
  <rect x="612" y="325" width="12" height="12" rx="2" fill="#ECFEFF" stroke="#0891B2"/>
  <text x="630" y="335" font-size="10" fill="#27272A">로그 (Loki)</text>
</svg>
