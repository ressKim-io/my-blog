<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" role="img" aria-labelledby="t3 d3" width="100%" height="auto" preserveAspectRatio="xMidYMid meet" style="max-width: 800px;">
  <title id="t3">argocd 네임스페이스 NetworkPolicy Egress 비교</title>
  <desc id="d3">default-deny-all이 적용된 argocd 네임스페이스에서 application-controller는 K8s API egress가 명시적으로 허용되어 정상 동작, repo-server는 GitHub용 443 egress가 K8s API 포트와 겹쳐 우연히 동작, argocd-server는 Ingress 8080만 열려 있고 Egress 규칙이 없어 K8s API 접근이 차단되어 informer가 무한 대기</desc>

  <defs>
    <marker id="arr3" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#047857"/>
    </marker>
    <marker id="arr3b" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#BE123C"/>
    </marker>
  </defs>

  <style><![CDATA[
    .label { font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif; font-size: 14px; font-weight: 600; }
    .meta  { font-family: 'Geist Mono', ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 11px; fill: #27272A; }
    .arrlbl { font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif; font-size: 11px; }
    .ok    { stroke: #047857; stroke-width: 1.5; fill: none; marker-end: url(#arr3); }
    .bad   { stroke: #BE123C; stroke-width: 1.5; fill: none; stroke-dasharray: 5 3; marker-end: url(#arr3b); }
  ]]></style>

  <!-- Namespace boundary -->
  <rect x="24" y="56" width="488" height="408" rx="8" fill="#F8FAFC" stroke="#475569" stroke-width="1.5" stroke-dasharray="6 3"/>
  <text x="40" y="80" class="meta" fill="#334155">namespace: argocd · default-deny-all (Ingress/Egress 차단)</text>

  <!-- application-controller (backend / emerald) -->
  <rect x="56" y="104" width="248" height="80" rx="6" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="180" y="130" text-anchor="middle" class="label" fill="#047857">application-controller</text>
  <text x="180" y="152" text-anchor="middle" class="meta">allow-controller-k8s-api</text>
  <text x="180" y="170" text-anchor="middle" class="meta">egress: 443 / 6443 ✓</text>

  <!-- argocd-server (security / rose - 차단 -->
  <rect x="56" y="208" width="248" height="80" rx="6" fill="#FFF1F2" stroke="#E11D48" stroke-width="1.5"/>
  <text x="180" y="234" text-anchor="middle" class="label" fill="#BE123C">argocd-server</text>
  <text x="180" y="256" text-anchor="middle" class="meta">allow-argocd-server</text>
  <text x="180" y="274" text-anchor="middle" class="meta">ingress: 8080 / egress: 없음</text>

  <!-- repo-server (cloud / amber) -->
  <rect x="56" y="312" width="248" height="80" rx="6" fill="#FFFBEB" stroke="#D97706" stroke-width="1.5"/>
  <text x="180" y="338" text-anchor="middle" class="label" fill="#B45309">repo-server</text>
  <text x="180" y="360" text-anchor="middle" class="meta">allow-repo-server-github</text>
  <text x="180" y="378" text-anchor="middle" class="meta">egress: 443 (GitHub) — 우연히 겹침</text>

  <!-- arrows -->
  <line x1="304" y1="144" x2="572" y2="144" class="ok"/>
  <text x="438" y="136" text-anchor="middle" class="arrlbl" fill="#047857">egress 허용 ✓</text>

  <line x1="304" y1="248" x2="572" y2="248" class="bad"/>
  <text x="438" y="240" text-anchor="middle" class="arrlbl" fill="#BE123C">차단 — informer 무한 대기</text>

  <line x1="304" y1="352" x2="572" y2="352" class="ok"/>
  <text x="438" y="344" text-anchor="middle" class="arrlbl" fill="#047857">443 egress (GitHub용 포트가 K8s API와 동일)</text>

  <!-- Targets (right) -->
  <rect x="572" y="112" width="200" height="64" rx="6" fill="#FFFBEB" stroke="#D97706" stroke-width="1.5"/>
  <text x="672" y="138" text-anchor="middle" class="label" fill="#B45309">K8s API server</text>
  <text x="672" y="158" text-anchor="middle" class="meta">10.96.0.1:443</text>

  <rect x="572" y="216" width="200" height="64" rx="6" fill="#FFFBEB" stroke="#D97706" stroke-width="1.5" stroke-dasharray="4 2"/>
  <text x="672" y="242" text-anchor="middle" class="label" fill="#B45309">K8s API server</text>
  <text x="672" y="262" text-anchor="middle" class="meta">접근 차단 ✕</text>

  <rect x="572" y="320" width="200" height="64" rx="6" fill="#F8FAFC" stroke="#475569" stroke-width="1.5"/>
  <text x="672" y="346" text-anchor="middle" class="label" fill="#334155">GitHub + K8s API</text>
  <text x="672" y="366" text-anchor="middle" class="meta">443 (둘 다 허용)</text>
</svg>
