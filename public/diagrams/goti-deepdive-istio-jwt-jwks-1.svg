<svg role="img" aria-labelledby="title-1 desc-1" viewBox="0 0 800 520" width="100%" height="auto"
  xmlns="http://www.w3.org/2000/svg" font-family="'Pretendard', system-ui, sans-serif">
  <title id="title-1">Istio JWT 검증 흐름도</title>
  <desc id="desc-1">클라이언트가 Bearer JWT를 담아 요청을 보내면 Envoy sidecar가 RequestAuthentication을 참조해 인라인 JWKS로 서명을 검증하고, 실패 시 401을 반환하며 성공 시 Authorization Policy를 거쳐 업스트림 서비스로 요청을 전달하는 흐름</desc>

  <style>
    .label { font-size: 13px; fill: #0A0A0A; }
    .sublabel { font-size: 11px; fill: #27272A; }
    .arrow-label { font-size: 11px; fill: #0A0A0A; }
  </style>

  <!-- 화살표 마커 -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#0A0A0A"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#E11D48"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#059669"/>
    </marker>
  </defs>

  <!-- 배경 -->
  <rect width="800" height="520" fill="#FAFAFA"/>

  <!-- 타이틀 -->
  <text x="400" y="36" text-anchor="middle" font-size="15px" font-weight="600" fill="#0A0A0A">흐름도 — Istio JWT 검증 경로</text>

  <!-- Client -->
  <rect x="40" y="80" width="120" height="64" rx="6" fill="#F8FAFC" stroke="#475569" stroke-width="1.5"/>
  <text x="100" y="107" text-anchor="middle" class="label" font-weight="600">클라이언트</text>
  <text x="100" y="124" text-anchor="middle" class="sublabel">Bearer JWT 요청</text>

  <!-- Envoy Sidecar -->
  <rect x="240" y="60" width="200" height="104" rx="6" fill="#FFF1F2" stroke="#E11D48" stroke-width="1.5"/>
  <text x="340" y="87" text-anchor="middle" class="label" font-weight="600">Envoy Sidecar</text>
  <text x="340" y="104" text-anchor="middle" class="sublabel">(대상 파드 옆)</text>
  <!-- RequestAuthentication 박스 -->
  <rect x="260" y="112" width="160" height="36" rx="4" fill="#FFF1F2" stroke="#E11D48" stroke-width="1"/>
  <text x="340" y="130" text-anchor="middle" class="sublabel" font-weight="600">RequestAuthentication</text>
  <text x="340" y="143" text-anchor="middle" class="sublabel">inline jwks / RS256 검증</text>

  <!-- Authorization Policy -->
  <rect x="520" y="60" width="180" height="64" rx="6" fill="#FFF1F2" stroke="#E11D48" stroke-width="1.5"/>
  <text x="610" y="87" text-anchor="middle" class="label" font-weight="600">Authorization Policy</text>
  <text x="610" y="104" text-anchor="middle" class="sublabel">requestPrincipal / 클레임 RBAC</text>

  <!-- Upstream Service -->
  <rect x="590" y="200" width="160" height="64" rx="6" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="670" y="227" text-anchor="middle" class="label" font-weight="600">업스트림 서비스</text>
  <text x="670" y="244" text-anchor="middle" class="sublabel">파드 내 애플리케이션</text>

  <!-- 401 응답 박스 -->
  <rect x="240" y="230" width="180" height="48" rx="6" fill="#FFF1F2" stroke="#E11D48" stroke-width="1.5" stroke-dasharray="4 2"/>
  <text x="330" y="253" text-anchor="middle" class="label" font-weight="600" fill="#E11D48">401 Unauthorized</text>
  <text x="330" y="268" text-anchor="middle" class="sublabel">서명 불일치 / 만료 / kid 없음</text>

  <!-- JWKS 박스 -->
  <rect x="40" y="340" width="200" height="88" rx="6" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="140" y="364" text-anchor="middle" class="label" font-weight="600" fill="#6D28D9">JWKS (인라인)</text>
  <text x="140" y="381" text-anchor="middle" class="sublabel">{"keys":[{</text>
  <text x="140" y="396" text-anchor="middle" class="sublabel">"kid":"goti-jwt-key-1",</text>
  <text x="140" y="411" text-anchor="middle" class="sublabel">"alg":"RS256","kty":"RSA"}]}</text>

  <!-- user-service JWT 발급 박스 -->
  <rect x="280" y="340" width="200" height="88" rx="6" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="380" y="364" text-anchor="middle" class="label" font-weight="600">user-service</text>
  <text x="380" y="381" text-anchor="middle" class="sublabel">RS256 private key로</text>
  <text x="380" y="396" text-anchor="middle" class="sublabel">JWT 서명 발급</text>
  <text x="380" y="411" text-anchor="middle" class="sublabel">kid: "goti-jwt-key-1"</text>

  <!-- JWT 구조 박스 -->
  <rect x="520" y="340" width="220" height="88" rx="6" fill="#FFFBEB" stroke="#D97706" stroke-width="1.5"/>
  <text x="630" y="364" text-anchor="middle" class="label" font-weight="600" fill="#B45309">JWT 구조</text>
  <text x="630" y="381" text-anchor="middle" class="sublabel">Header: alg=RS256, kid=...</text>
  <text x="630" y="396" text-anchor="middle" class="sublabel">Payload: iss, sub, exp</text>
  <text x="630" y="411" text-anchor="middle" class="sublabel">Signature: RSA 서명값</text>

  <!-- 화살표: 클라이언트 → Envoy -->
  <line x1="160" y1="112" x2="238" y2="112" stroke="#0A0A0A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="165" y="96" width="70" height="14" fill="#FAFAFA"/>
  <text x="199" y="107" text-anchor="middle" class="arrow-label">HTTP + Bearer</text>

  <!-- 화살표: Envoy → 401 (실패) -->
  <line x1="330" y1="164" x2="330" y2="228" stroke="#E11D48" stroke-width="1.5" stroke-dasharray="4 2" marker-end="url(#arrow-red)"/>
  <rect x="334" y="190" width="72" height="14" fill="#FAFAFA"/>
  <text x="370" y="201" text-anchor="middle" class="arrow-label" fill="#E11D48">검증 실패</text>

  <!-- 화살표: Envoy → AuthPolicy (성공) -->
  <line x1="440" y1="100" x2="518" y2="100" stroke="#059669" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <rect x="443" y="84" width="72" height="14" fill="#FAFAFA"/>
  <text x="479" y="95" text-anchor="middle" class="arrow-label" fill="#059669">검증 성공</text>

  <!-- 화살표: AuthPolicy → Upstream -->
  <line x1="610" y1="124" x2="655" y2="198" stroke="#059669" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <rect x="616" y="150" width="56" height="14" fill="#FAFAFA"/>
  <text x="644" y="161" text-anchor="middle" class="arrow-label" fill="#059669">허가 통과</text>

  <!-- 화살표: JWKS → Envoy (참조) -->
  <line x1="200" y1="368" x2="265" y2="160" stroke="#7C3AED" stroke-width="1.5" stroke-dasharray="4 2" marker-end="url(#arrow)"/>
  <rect x="175" y="256" width="80" height="14" fill="#FAFAFA"/>
  <text x="215" y="267" text-anchor="middle" class="arrow-label" fill="#6D28D9">공개키 참조</text>

  <!-- 화살표: user-service → 클라이언트 (JWT 발급) -->
  <line x1="330" y1="340" x2="110" y2="144" stroke="#059669" stroke-width="1.5" stroke-dasharray="4 2" marker-end="url(#arrow-green)"/>
  <rect x="160" y="232" width="80" height="14" fill="#FAFAFA"/>
  <text x="200" y="243" text-anchor="middle" class="arrow-label" fill="#059669">JWT 발급</text>

  <!-- 범례 -->
  <rect x="40" y="460" width="720" height="44" rx="4" fill="#F8FAFC" stroke="#E4E4E7"/>
  <rect x="60" y="474" width="12" height="3" fill="#E11D48"/>
  <text x="78" y="484" class="sublabel" fill="#E11D48">Security/Auth</text>
  <rect x="160" y="474" width="12" height="3" fill="#059669"/>
  <text x="178" y="484" class="sublabel" fill="#047857">Backend</text>
  <rect x="250" y="474" width="12" height="3" fill="#7C3AED"/>
  <text x="268" y="484" class="sublabel" fill="#6D28D9">Database/Storage</text>
  <rect x="390" y="474" width="12" height="3" fill="#D97706"/>
  <text x="408" y="484" class="sublabel" fill="#B45309">Cloud/Infra</text>
  <line x1="492" y1="477" x2="512" y2="477" stroke="#0A0A0A" stroke-width="1.5"/>
  <text x="520" y="484" class="sublabel">실선: 정상 흐름</text>
  <line x1="610" y1="477" x2="630" y2="477" stroke="#0A0A0A" stroke-width="1.5" stroke-dasharray="4 2"/>
  <text x="638" y="484" class="sublabel">점선: 참조/비동기</text>
</svg>
