<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" role="img" aria-labelledby="t3 d3" font-family="Pretendard, ui-sans-serif, system-ui, -apple-system, sans-serif">
  <title id="t3">The syscall entry and return path — every step burns cycles, in both directions</title>
  <desc id="d3">Entering the kernel runs a staircase of steps: swapgs, the KPTI page table swap, a stack switch, saving and sanitizing registers, and speculation mitigations. Only then does do_syscall_64 do the real work. Returning walks the same staircase back, ending in sysret. The red boxes are the security mitigation tax, and they appear on both the entry side and the return side.</desc>
  <defs>
    <marker id="s3" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="800" height="520" fill="#FFFFFF"/>

  <line x1="200" y1="80" x2="200" y2="116" stroke="#475569" stroke-width="1.6" marker-end="url(#s3)"/>
  <line x1="200" y1="388" x2="290" y2="418" stroke="#475569" stroke-width="1.6" marker-end="url(#s3)"/>
  <line x1="510" y1="418" x2="600" y2="392" stroke="#475569" stroke-width="1.6" marker-end="url(#s3)"/>
  <line x1="600" y1="116" x2="600" y2="80" stroke="#475569" stroke-width="1.6" marker-end="url(#s3)"/>
  <line x1="32" y1="98" x2="768" y2="98" stroke="#94A3B8" stroke-width="1.3" stroke-dasharray="6 4"/>

  <rect x="200" y="32" width="400" height="48" rx="8" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.6"/>
  <text x="400" y="62" text-anchor="middle" font-size="15" font-weight="700" fill="#0E7490">User code — Ring 3</text>

  <text x="120" y="93" text-anchor="middle" font-size="13" font-weight="700" fill="#64748B">CPL 3 → 0</text>
  <text x="690" y="93" text-anchor="middle" font-size="13" font-weight="700" fill="#64748B">CPL 0 → 3</text>

  <rect x="60" y="120" width="280" height="44" rx="6" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.4"/>
  <text x="200" y="148" text-anchor="middle" font-size="14" fill="#6D28D9" font-family="ui-monospace, monospace">[1] swapgs</text>
  <rect x="60" y="176" width="280" height="44" rx="6" fill="#FFF1F2" stroke="#E11D48" stroke-width="1.6"/>
  <text x="200" y="204" text-anchor="middle" font-size="14" font-weight="700" fill="#BE123C">[2] KPTI CR3 swap</text>
  <rect x="60" y="232" width="280" height="44" rx="6" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.4"/>
  <text x="200" y="260" text-anchor="middle" font-size="14" fill="#6D28D9">[3] switch stacks</text>
  <rect x="60" y="288" width="280" height="44" rx="6" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.4"/>
  <text x="200" y="316" text-anchor="middle" font-size="14" fill="#6D28D9">[4] save registers</text>
  <rect x="60" y="344" width="280" height="44" rx="6" fill="#FFF1F2" stroke="#E11D48" stroke-width="1.6"/>
  <text x="200" y="372" text-anchor="middle" font-size="14" font-weight="700" fill="#BE123C">[5] speculation barriers</text>

  <rect x="460" y="120" width="280" height="44" rx="6" fill="#F8FAFC" stroke="#475569" stroke-width="1.4"/>
  <text x="600" y="148" text-anchor="middle" font-size="14" fill="#334155" font-family="ui-monospace, monospace">sysret</text>
  <rect x="460" y="176" width="280" height="44" rx="6" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.4"/>
  <text x="600" y="204" text-anchor="middle" font-size="14" fill="#6D28D9" font-family="ui-monospace, monospace">[1'] swapgs</text>
  <rect x="460" y="232" width="280" height="44" rx="6" fill="#FFF1F2" stroke="#E11D48" stroke-width="1.6"/>
  <text x="600" y="260" text-anchor="middle" font-size="14" font-weight="700" fill="#BE123C">[2'] KPTI CR3 swap</text>
  <rect x="460" y="288" width="280" height="44" rx="6" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.4"/>
  <text x="600" y="316" text-anchor="middle" font-size="14" fill="#6D28D9">[4'] restore registers</text>
  <rect x="460" y="344" width="280" height="44" rx="6" fill="#FFF1F2" stroke="#E11D48" stroke-width="1.6"/>
  <text x="600" y="372" text-anchor="middle" font-size="14" font-weight="700" fill="#BE123C">[5'] IBRS exit</text>

  <rect x="290" y="418" width="220" height="60" rx="9" fill="#ECFDF5" stroke="#059669" stroke-width="1.8"/>
  <text x="400" y="454" text-anchor="middle" font-size="15" font-weight="700" fill="#047857" font-family="ui-monospace, monospace">do_syscall_64</text>

  <rect x="316" y="490" width="168" height="22" rx="4" fill="#FFF1F2" stroke="#E11D48" stroke-width="1.2"/>
  <text x="400" y="506" text-anchor="middle" font-size="13" font-weight="700" fill="#BE123C">red = mitigation tax</text>
</svg>
