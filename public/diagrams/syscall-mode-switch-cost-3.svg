<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 640" role="img" aria-labelledby="t1 d1" font-family="Pretendard, ui-sans-serif, system-ui, -apple-system, sans-serif">
  <title id="t1">syscall entry and return path</title>
  <desc id="d1">A user process executes syscall, crosses the privilege boundary, walks down five kernel entry steps including the KPTI CR3 swap and speculation mitigations, reaches do_syscall_64, then walks back up the same steps in reverse before sysret returns to user code.</desc>
  <defs>
    <marker id="ar" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="800" height="640" fill="#FFFFFF"/>

  <text x="400" y="26" text-anchor="middle" font-size="12" fill="#64748B">syscall entry &amp; return path — every step burns cycles, in both directions</text>

  <!-- user code box -->
  <rect x="250" y="44" width="300" height="72" rx="9" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.6"/>
  <text x="400" y="66" text-anchor="middle" font-size="14" font-weight="700" fill="#0E7490">User code (Ring 3)</text>
  <text x="400" y="86" text-anchor="middle" font-size="11" fill="#334155">rax = syscall nr · args in rdi rsi rdx r10 r8 r9</text>
  <text x="400" y="104" text-anchor="middle" font-size="11.5" font-weight="700" fill="#0E7490">executes syscall … resumes after sysret</text>

  <!-- privilege boundary -->
  <line x1="32" y1="140" x2="768" y2="140" stroke="#D4D4D8" stroke-width="1.4" stroke-dasharray="7 5"/>
  <text x="766" y="132" text-anchor="end" font-size="11" fill="#64748B">privilege boundary — CPL 3 → 0 (and back)</text>
  <text x="36" y="162" font-size="11" font-weight="700" fill="#475569">KERNEL (Ring 0)</text>

  <!-- entry column (left, top to bottom) -->
  <rect x="48" y="176" width="310" height="46" rx="8" fill="#F8FAFC" stroke="#475569" stroke-width="1.4"/>
  <text x="203" y="195" text-anchor="middle" font-size="12.5" font-weight="700" fill="#334155">[1] swapgs</text>
  <text x="203" y="212" text-anchor="middle" font-size="10.5" fill="#64748B">GS base: user TLS → kernel per-CPU</text>

  <rect x="48" y="236" width="310" height="46" rx="8" fill="#FFF1F2" stroke="#E11D48" stroke-width="1.7"/>
  <text x="203" y="255" text-anchor="middle" font-size="12.5" font-weight="700" fill="#BE123C">[2] SWITCH_TO_KERNEL_CR3 — KPTI</text>
  <text x="203" y="272" text-anchor="middle" font-size="10.5" fill="#BE123C">page-table root swap → TLB pressure</text>

  <rect x="48" y="296" width="310" height="46" rx="8" fill="#F8FAFC" stroke="#475569" stroke-width="1.4"/>
  <text x="203" y="315" text-anchor="middle" font-size="12.5" font-weight="700" fill="#334155">[3] switch stacks</text>
  <text x="203" y="332" text-anchor="middle" font-size="10.5" fill="#64748B">save user rsp → load kernel stack</text>

  <rect x="48" y="356" width="310" height="46" rx="8" fill="#F8FAFC" stroke="#475569" stroke-width="1.4"/>
  <text x="203" y="375" text-anchor="middle" font-size="12.5" font-weight="700" fill="#334155">[4] save + sanitize registers</text>
  <text x="203" y="392" text-anchor="middle" font-size="10.5" fill="#64748B">push user regs, zero some (info leak)</text>

  <rect x="48" y="416" width="310" height="46" rx="8" fill="#FFF1F2" stroke="#E11D48" stroke-width="1.7"/>
  <text x="203" y="435" text-anchor="middle" font-size="12.5" font-weight="700" fill="#BE123C">[5] speculation mitigations</text>
  <text x="203" y="452" text-anchor="middle" font-size="10.5" fill="#BE123C">IBRS on · untrain RSB · clear BHB</text>

  <!-- do_syscall_64 -->
  <rect x="250" y="500" width="300" height="56" rx="9" fill="#ECFDF5" stroke="#059669" stroke-width="1.7"/>
  <text x="400" y="523" text-anchor="middle" font-size="14" font-weight="700" fill="#047857">do_syscall_64()</text>
  <text x="400" y="541" text-anchor="middle" font-size="11" fill="#047857">the actual work: read / write / mmap …</text>

  <!-- return column (right, bottom to top) -->
  <rect x="442" y="416" width="310" height="46" rx="8" fill="#FFF1F2" stroke="#E11D48" stroke-width="1.7"/>
  <text x="597" y="435" text-anchor="middle" font-size="12.5" font-weight="700" fill="#BE123C">[5'] IBRS_EXIT</text>
  <text x="597" y="452" text-anchor="middle" font-size="10.5" fill="#BE123C">mitigation toggles off</text>

  <rect x="442" y="356" width="310" height="46" rx="8" fill="#F8FAFC" stroke="#475569" stroke-width="1.4"/>
  <text x="597" y="375" text-anchor="middle" font-size="12.5" font-weight="700" fill="#334155">[4'] restore user registers</text>

  <rect x="442" y="296" width="310" height="46" rx="8" fill="#FFF1F2" stroke="#E11D48" stroke-width="1.7"/>
  <text x="597" y="315" text-anchor="middle" font-size="12.5" font-weight="700" fill="#BE123C">[2'] SWITCH_TO_USER_CR3 — KPTI</text>
  <text x="597" y="332" text-anchor="middle" font-size="10.5" fill="#BE123C">swap back to user page table</text>

  <rect x="442" y="236" width="310" height="46" rx="8" fill="#F8FAFC" stroke="#475569" stroke-width="1.4"/>
  <text x="597" y="255" text-anchor="middle" font-size="12.5" font-weight="700" fill="#334155">[1'] swapgs</text>

  <rect x="442" y="176" width="310" height="46" rx="8" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.6"/>
  <text x="597" y="195" text-anchor="middle" font-size="12.5" font-weight="700" fill="#0E7490">sysret — CPL 0 → 3</text>
  <text x="597" y="212" text-anchor="middle" font-size="10.5" fill="#334155">RIP ← rcx, resume user code</text>

  <!-- arrows -->
  <line x1="310" y1="116" x2="215" y2="172" stroke="#475569" stroke-width="1.6" marker-end="url(#ar)"/>
  <line x1="203" y1="222" x2="203" y2="232" stroke="#475569" stroke-width="1.6" marker-end="url(#ar)"/>
  <line x1="203" y1="282" x2="203" y2="292" stroke="#475569" stroke-width="1.6" marker-end="url(#ar)"/>
  <line x1="203" y1="342" x2="203" y2="352" stroke="#475569" stroke-width="1.6" marker-end="url(#ar)"/>
  <line x1="203" y1="402" x2="203" y2="412" stroke="#475569" stroke-width="1.6" marker-end="url(#ar)"/>
  <line x1="230" y1="462" x2="292" y2="498" stroke="#475569" stroke-width="1.6" marker-end="url(#ar)"/>
  <line x1="508" y1="498" x2="570" y2="464" stroke="#475569" stroke-width="1.6" marker-end="url(#ar)"/>
  <line x1="597" y1="414" x2="597" y2="404" stroke="#475569" stroke-width="1.6" marker-end="url(#ar)"/>
  <line x1="597" y1="354" x2="597" y2="344" stroke="#475569" stroke-width="1.6" marker-end="url(#ar)"/>
  <line x1="597" y1="294" x2="597" y2="284" stroke="#475569" stroke-width="1.6" marker-end="url(#ar)"/>
  <line x1="597" y1="234" x2="597" y2="224" stroke="#475569" stroke-width="1.6" marker-end="url(#ar)"/>
  <line x1="585" y1="172" x2="492" y2="118" stroke="#475569" stroke-width="1.6" marker-end="url(#ar)"/>

  <!-- legend -->
  <rect x="48" y="584" width="704" height="36" rx="7" fill="#FFF1F2" stroke="#FECDD3" stroke-width="1"/>
  <text x="400" y="601" text-anchor="middle" font-size="11.5" fill="#BE123C">Red = security-mitigation tax (KPTI CR3 swap · speculation barriers)</text>
  <text x="400" y="615" text-anchor="middle" font-size="10.5" fill="#BE123C">collected on every single crossing, in both directions</text>
</svg>
