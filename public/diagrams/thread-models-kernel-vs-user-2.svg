<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" role="img" aria-labelledby="t2 d2" font-family="Pretendard, ui-sans-serif, system-ui, -apple-system, sans-serif">
  <title id="t2">M to N model with a user-level scheduler</title>
  <desc id="d2">Millions of cheap tasks sit on top of a user-level scheduler such as the Go runtime, the JVM with Loom, or tokio. The scheduler multiplexes them onto a handful of OS threads, roughly one per core. Tasks blocked on I/O are parked aside without holding any OS thread. The kernel scheduler below only ever sees the few OS threads.</desc>
  <defs>
    <marker id="m2" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#475569"/>
    </marker>
    <marker id="m2v" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#7C3AED"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="800" height="480" fill="#FFFFFF"/>

  <text x="400" y="26" text-anchor="middle" font-size="12" fill="#64748B">M:N — separate the unit of concurrency from the unit of kernel scheduling</text>

  <text x="330" y="60" text-anchor="middle" font-size="11.5" font-weight="700" fill="#0E7490">millions of cheap tasks (goroutine · virtual thread · async task)</text>
  <g>
    <rect x="150" y="72" width="26" height="26" rx="5" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.3"/>
    <rect x="186" y="72" width="26" height="26" rx="5" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.3"/>
    <rect x="222" y="72" width="26" height="26" rx="5" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.3"/>
    <rect x="258" y="72" width="26" height="26" rx="5" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.3"/>
    <rect x="294" y="72" width="26" height="26" rx="5" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.3"/>
    <rect x="330" y="72" width="26" height="26" rx="5" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.3"/>
    <rect x="366" y="72" width="26" height="26" rx="5" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.3"/>
    <rect x="402" y="72" width="26" height="26" rx="5" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.3"/>
    <rect x="438" y="72" width="26" height="26" rx="5" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.3"/>
    <text x="500" y="90" font-size="12" fill="#0E7490">… ×1,000,000 (2KB-ish each)</text>
  </g>

  <line x1="240" y1="102" x2="270" y2="160" stroke="#475569" stroke-width="1.4" marker-end="url(#m2)"/>
  <line x1="330" y1="102" x2="335" y2="160" stroke="#475569" stroke-width="1.4" marker-end="url(#m2)"/>
  <line x1="420" y1="102" x2="400 " y2="160" stroke="#475569" stroke-width="1.4" marker-end="url(#m2)"/>

  <rect x="150" y="164" width="400" height="66" rx="9" fill="#ECFDF5" stroke="#059669" stroke-width="1.8"/>
  <text x="350" y="191" text-anchor="middle" font-size="13.5" font-weight="700" fill="#047857">user-level scheduler</text>
  <text x="350" y="212" text-anchor="middle" font-size="11" fill="#047857">Go runtime · JVM (Loom) · tokio — schedules without entering the kernel</text>

  <rect x="596" y="164" width="160" height="66" rx="9" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.6"/>
  <text x="676" y="188" text-anchor="middle" font-size="12" font-weight="700" fill="#6D28D9">parked tasks</text>
  <text x="676" y="206" text-anchor="middle" font-size="10" fill="#6D28D9">blocked on I/O —</text>
  <text x="676" y="220" text-anchor="middle" font-size="10" fill="#6D28D9">no OS thread held</text>
  <line x1="550" y1="197" x2="592" y2="197" stroke="#7C3AED" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#m2v)"/>

  <line x1="250" y1="230" x2="230" y2="284" stroke="#475569" stroke-width="1.4" marker-end="url(#m2)"/>
  <line x1="350" y1="230" x2="350" y2="284" stroke="#475569" stroke-width="1.4" marker-end="url(#m2)"/>
  <line x1="450" y1="230" x2="470" y2="284" stroke="#475569" stroke-width="1.4" marker-end="url(#m2)"/>

  <rect x="160" y="288" width="140" height="52" rx="8" fill="#F8FAFC" stroke="#475569" stroke-width="1.4"/>
  <text x="230" y="312" text-anchor="middle" font-size="12" font-weight="700" fill="#334155">M1 — OS thread</text>
  <rect x="280" y="288" width="140" height="52" rx="8" fill="#F8FAFC" stroke="#475569" stroke-width="1.4"/>
  <text x="350" y="312" text-anchor="middle" font-size="12" font-weight="700" fill="#334155">M2 — OS thread</text>
  <rect x="400" y="288" width="140" height="52" rx="8" fill="#F8FAFC" stroke="#475569" stroke-width="1.4"/>
  <text x="470" y="312" text-anchor="middle" font-size="12" font-weight="700" fill="#334155">M3 — OS thread</text>
  <text x="350" y="332" text-anchor="middle" font-size="10" fill="#64748B">≈ core count</text>

  <line x1="350" y1="340" x2="350" y2="376" stroke="#475569" stroke-width="1.4" marker-end="url(#m2)"/>
  <rect x="230" y="380" width="240" height="48" rx="8" fill="#F8FAFC" stroke="#475569" stroke-width="1.4"/>
  <text x="350" y="401" text-anchor="middle" font-size="12" fill="#334155">kernel scheduler → CPU cores</text>
  <text x="350" y="419" text-anchor="middle" font-size="10" fill="#64748B">sees only M1–M3</text>

  <rect x="48" y="444" width="704" height="28" rx="7" fill="#F8FAFC" stroke="#E4E4E7" stroke-width="1"/>
  <text x="400" y="462" text-anchor="middle" font-size="11" fill="#334155">task switches happen entirely in user space — no kernel entry, no context switch</text>
</svg>
