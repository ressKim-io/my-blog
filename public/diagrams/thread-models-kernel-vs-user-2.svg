<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" role="img" aria-labelledby="t2 d2" font-family="Pretendard, ui-sans-serif, system-ui, -apple-system, sans-serif">
  <title id="t2">The M:N model — a user-level scheduler between cheap tasks and few OS threads</title>
  <desc id="d2">The M-to-N model separates the unit of concurrency from the unit of kernel scheduling. Millions of cheap tasks — goroutines, virtual threads, async tasks — sit above a user-level scheduler that dispatches them onto a small number of OS threads, roughly one per core. Task switches happen entirely in user space with no kernel entry. Tasks blocked on I/O are parked and hold no OS thread at all, and the kernel scheduler only ever sees the few OS threads.</desc>
  <defs>
    <marker id="m2" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="800" height="440" fill="#FFFFFF"/>

  <line x1="300" y1="118" x2="300" y2="152" stroke="#475569" stroke-width="1.6" marker-end="url(#m2)"/>
  <line x1="300" y1="230" x2="300" y2="264" stroke="#475569" stroke-width="1.6" marker-end="url(#m2)"/>
  <line x1="300" y1="330" x2="300" y2="364" stroke="#475569" stroke-width="1.6" marker-end="url(#m2)"/>
  <line x1="500" y1="190" x2="600" y2="190" stroke="#94A3B8" stroke-width="1.4" stroke-dasharray="5 3" marker-end="url(#m2)"/>

  <text x="300" y="44" text-anchor="middle" font-size="15" font-weight="700" fill="#0E7490">millions of cheap tasks</text>
  <rect x="32" y="60" width="536" height="58" rx="8" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.6"/>
  <rect x="48" y="76" width="48" height="26" rx="4" fill="#FFFFFF" stroke="#0891B2" stroke-width="1"/>
  <rect x="104" y="76" width="48" height="26" rx="4" fill="#FFFFFF" stroke="#0891B2" stroke-width="1"/>
  <rect x="160" y="76" width="48" height="26" rx="4" fill="#FFFFFF" stroke="#0891B2" stroke-width="1"/>
  <rect x="216" y="76" width="48" height="26" rx="4" fill="#FFFFFF" stroke="#0891B2" stroke-width="1"/>
  <rect x="272" y="76" width="48" height="26" rx="4" fill="#FFFFFF" stroke="#0891B2" stroke-width="1"/>
  <rect x="328" y="76" width="48" height="26" rx="4" fill="#FFFFFF" stroke="#0891B2" stroke-width="1"/>
  <rect x="384" y="76" width="48" height="26" rx="4" fill="#FFFFFF" stroke="#0891B2" stroke-width="1"/>
  <text x="500" y="96" text-anchor="middle" font-size="13" fill="#0E7490">… ×1,000,000</text>

  <rect x="32" y="152" width="536" height="78" rx="9" fill="#ECFDF5" stroke="#059669" stroke-width="1.8"/>
  <text x="300" y="184" text-anchor="middle" font-size="15" font-weight="700" fill="#047857">user-level scheduler</text>
  <text x="300" y="209" text-anchor="middle" font-size="13" fill="#047857">Go runtime · JVM Loom · tokio</text>

  <rect x="600" y="152" width="168" height="78" rx="9" fill="#FFFBEB" stroke="#D97706" stroke-width="1.5"/>
  <text x="684" y="184" text-anchor="middle" font-size="14" font-weight="700" fill="#B45309">parked tasks</text>
  <text x="684" y="209" text-anchor="middle" font-size="13" fill="#B45309">no OS thread held</text>

  <text x="620" y="292" text-anchor="middle" font-size="13" font-weight="700" fill="#64748B">≈ core count</text>
  <rect x="72" y="264" width="140" height="66" rx="8" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.6"/>
  <text x="142" y="304" text-anchor="middle" font-size="15" font-weight="700" fill="#6D28D9">M1</text>
  <rect x="230" y="264" width="140" height="66" rx="8" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.6"/>
  <text x="300" y="304" text-anchor="middle" font-size="15" font-weight="700" fill="#6D28D9">M2</text>
  <rect x="388" y="264" width="140" height="66" rx="8" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.6"/>
  <text x="458" y="304" text-anchor="middle" font-size="15" font-weight="700" fill="#6D28D9">M3</text>

  <rect x="72" y="364" width="456" height="56" rx="8" fill="#F8FAFC" stroke="#475569" stroke-width="1.6"/>
  <text x="300" y="398" text-anchor="middle" font-size="15" font-weight="700" fill="#334155">kernel scheduler — sees only M1–M3</text>
</svg>
