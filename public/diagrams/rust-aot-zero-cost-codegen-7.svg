<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" role="img" aria-labelledby="t7 d7" font-family="Pretendard, ui-sans-serif, system-ui, -apple-system, sans-serif">
  <title id="t7">x86 bakes the vector width into the code; ARM SVE leaves it as a symbol</title>
  <desc id="d7">On x86 the vector width is part of the machine code, so an AVX2 build and an AVX-512 build are different binaries and one must be chosen at build time, or both shipped with runtime dispatch. ARM's Scalable Vector Extension is vector length agnostic: the width stays a symbol called vscale and the hardware resolves it at run time, so one binary adapts without a rebuild.</desc>
  <rect x="0" y="0" width="800" height="320" fill="#FFFFFF"/>

  <line x1="400" y1="24" x2="400" y2="296" stroke="#E4E4E7" stroke-width="1.2"/>

  <text x="200" y="48" text-anchor="middle" font-size="15" font-weight="700" fill="#BE123C">x86 — width baked in</text>
  <text x="600" y="48" text-anchor="middle" font-size="15" font-weight="700" fill="#047857">ARM SVE — width agnostic</text>

  <rect x="32" y="88" width="152" height="80" rx="8" fill="#FFF1F2" stroke="#E11D48" stroke-width="1.6"/>
  <text x="108" y="120" text-anchor="middle" font-size="15" font-weight="700" fill="#BE123C">AVX2</text>
  <text x="108" y="146" text-anchor="middle" font-size="13" fill="#BE123C">256-bit</text>

  <rect x="216" y="88" width="152" height="80" rx="8" fill="#FFF1F2" stroke="#E11D48" stroke-width="1.6"/>
  <text x="292" y="120" text-anchor="middle" font-size="15" font-weight="700" fill="#BE123C">AVX-512</text>
  <text x="292" y="146" text-anchor="middle" font-size="13" fill="#BE123C">512-bit</text>

  <rect x="32" y="200" width="336" height="88" rx="9" fill="#FFF1F2" stroke="#E11D48" stroke-width="1.4" stroke-dasharray="5 3"/>
  <text x="200" y="232" text-anchor="middle" font-size="13" fill="#BE123C">two different binaries</text>
  <text x="200" y="258" text-anchor="middle" font-size="14" font-weight="700" fill="#BE123C">pick one at build time</text>

  <rect x="432" y="88" width="336" height="80" rx="8" fill="#ECFDF5" stroke="#059669" stroke-width="1.8"/>
  <text x="600" y="120" text-anchor="middle" font-size="15" font-weight="700" fill="#047857">one binary</text>
  <text x="600" y="146" text-anchor="middle" font-size="13" fill="#047857" font-family="ui-monospace, monospace">width = vscale</text>

  <rect x="432" y="200" width="336" height="88" rx="9" fill="#ECFDF5" stroke="#059669" stroke-width="1.4" stroke-dasharray="5 3"/>
  <text x="600" y="232" text-anchor="middle" font-size="13" fill="#047857">the hardware resolves it</text>
  <text x="600" y="258" text-anchor="middle" font-size="14" font-weight="700" fill="#047857">at run time, no rebuild</text>
</svg>
