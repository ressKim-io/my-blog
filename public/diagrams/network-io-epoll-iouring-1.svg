<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 440" font-family="Pretendard, ui-sans-serif, system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="ar" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#475569"/>
    </marker>
    <marker id="arV" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#7C3AED"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="780" height="440" fill="#FFFFFF"/>

  <text x="390" y="26" text-anchor="middle" font-size="12" fill="#64748B">epoll doesn't scan fds — each fd puts itself on the ready list the moment it becomes ready</text>

  <!-- epoll_wait (app) -->
  <rect x="280" y="48" width="220" height="42" rx="8" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.6"/>
  <text x="390" y="74" text-anchor="middle" font-size="12.5" font-weight="700" fill="#0E7490">epoll_wait → takes only ready fds</text>

  <!-- struct eventpoll -->
  <rect x="120" y="112" width="540" height="170" rx="10" fill="#FAFAF9" stroke="#475569" stroke-width="1.6"/>
  <text x="140" y="134" font-size="12" font-weight="700" fill="#334155">struct eventpoll</text>

  <!-- interest list RB-tree -->
  <rect x="142" y="146" width="250" height="118" rx="8" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="267" y="168" text-anchor="middle" font-size="12" font-weight="700" fill="#6D28D9">interest list (RB-tree)</text>
  <text x="267" y="187" text-anchor="middle" font-size="10.5" fill="#6D28D9">all registered fds · add/del O(log n)</text>
  <text x="267" y="216" text-anchor="middle" font-size="11" font-family="'Geist Mono', ui-monospace, monospace" fill="#475569">epitem  epitem  epitem</text>
  <text x="267" y="236" text-anchor="middle" font-size="11" font-family="'Geist Mono', ui-monospace, monospace" fill="#475569">epitem  epitem  …</text>

  <!-- ready list -->
  <rect x="408" y="146" width="232" height="118" rx="8" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="524" y="168" text-anchor="middle" font-size="12" font-weight="700" fill="#047857">ready list (rdllist)</text>
  <text x="524" y="187" text-anchor="middle" font-size="10.5" fill="#047857">only the fds ready right now</text>
  <text x="524" y="220" text-anchor="middle" font-size="11" font-family="'Geist Mono', ui-monospace, monospace" fill="#475569">epitem ⇄ epitem</text>

  <line x1="408" y1="56" x2="408" y2="56" stroke="#059669" stroke-width="0"/>
  <path d="M460,146 L420,92 L420,90" fill="none" stroke="#059669" stroke-width="1.6" marker-end="url(#ar)"/>

  <!-- callback arrow from socket wait queue -->
  <path d="M267,316 L267,266" fill="none" stroke="#7C3AED" stroke-width="1.8" marker-end="url(#arV)"/>
  <text x="277" y="296" font-size="10.5" font-weight="700" fill="#6D28D9">ep_poll_callback</text>
  <path d="M300,300 C420,300 510,290 510,266" fill="none" stroke="#7C3AED" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#arV)"/>
  <text x="430" y="296" font-size="10" fill="#6D28D9">moves fd → ready list</text>

  <!-- socket wait queue -->
  <rect x="140" y="318" width="320" height="58" rx="9" fill="#F8FAFC" stroke="#475569" stroke-width="1.6"/>
  <text x="300" y="342" text-anchor="middle" font-size="12" font-weight="700" fill="#334155">socket wait queue</text>
  <text x="300" y="361" text-anchor="middle" font-size="10.5" fill="#64748B">callback registered at epoll_ctl(ADD)</text>

  <!-- packet arrival -->
  <rect x="500" y="318" width="160" height="58" rx="9" fill="#FFFBEB" stroke="#D97706" stroke-width="1.6"/>
  <text x="580" y="342" text-anchor="middle" font-size="12" font-weight="700" fill="#B45309">packet arrives</text>
  <text x="580" y="361" text-anchor="middle" font-size="10.5" fill="#92400E">net stack → wake_up</text>
  <line x1="500" y1="347" x2="462" y2="347" stroke="#475569" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- footer -->
  <rect x="150" y="398" width="480" height="34" rx="8" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="1"/>
  <text x="390" y="419" text-anchor="middle" font-size="11" fill="#047857">Work scales with the number of events, not the number of watched fds → hundreds of thousands of connections.</text>
</svg>
