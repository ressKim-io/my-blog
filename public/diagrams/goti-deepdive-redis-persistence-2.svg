<svg role="img" aria-labelledby="title-2 desc-2"
  viewBox="0 0 800 540"
  width="100%" height="auto"
  xmlns="http://www.w3.org/2000/svg"
  font-family="'Pretendard', system-ui, sans-serif">

  <title id="title-2">RDB 스냅샷 vs AOF 로그 — 구조 및 재기동 복구 비교</title>
  <desc id="desc-2">RDB는 특정 시점의 전체 메모리를 이진 파일로 덤프하고, AOF는 모든 쓰기 명령을 텍스트 로그로 이어붙인다. 재기동 시 RDB는 파일 하나를 로드하고, AOF는 명령을 순서대로 재실행해 상태를 복원한다</desc>

  <!-- 배경 -->
  <rect width="800" height="540" fill="#FAFAFA" rx="4"/>

  <!-- 제목 -->
  <text x="400" y="36" text-anchor="middle" font-size="15" font-weight="700" fill="#0A0A0A">RDB 스냅샷 vs AOF 로그</text>

  <!-- 중앙 구분선 -->
  <line x1="400" y1="52" x2="400" y2="490" stroke="#D4D4D8" stroke-width="1.5" stroke-dasharray="6 3"/>

  <!-- ── RDB (왼쪽) ── -->
  <text x="200" y="68" text-anchor="middle" font-size="14" font-weight="700" fill="#059669">RDB 스냅샷</text>

  <!-- RDB: Redis 메모리 -->
  <rect x="60" y="84" width="280" height="48" rx="6" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="200" y="105" text-anchor="middle" font-size="13" font-weight="600" fill="#047857">Redis 메모리</text>
  <text x="200" y="122" text-anchor="middle" font-size="11" fill="#047857">seat / hold / inv / order ...</text>

  <!-- RDB: fork 화살표 -->
  <line x1="200" y1="132" x2="200" y2="154" stroke="#059669" stroke-width="1.5" marker-end="url(#arrow-g)"/>
  <text x="240" y="148" font-size="10" fill="#059669">fork()</text>

  <!-- RDB: child process -->
  <rect x="60" y="154" width="280" height="40" rx="6" fill="#ECFDF5" stroke="#059669" stroke-width="1.5" stroke-dasharray="4 2"/>
  <text x="200" y="170" text-anchor="middle" font-size="12" fill="#047857">child process</text>
  <text x="200" y="186" text-anchor="middle" font-size="10" fill="#047857">CoW — 스냅샷 시점 메모리 읽기</text>

  <!-- RDB: 저장 화살표 -->
  <line x1="200" y1="194" x2="200" y2="222" stroke="#059669" stroke-width="1.5" marker-end="url(#arrow-g)"/>
  <text x="240" y="214" font-size="10" fill="#059669">원자적 교체</text>

  <!-- RDB: dump.rdb 파일 -->
  <rect x="80" y="222" width="240" height="52" rx="6" fill="#F8FAFC" stroke="#475569" stroke-width="1.5"/>
  <text x="200" y="245" text-anchor="middle" font-size="12" font-weight="600" fill="#334155">dump.rdb</text>
  <text x="200" y="263" text-anchor="middle" font-size="10" fill="#475569">이진 스냅샷 — 특정 시점 전체 상태</text>

  <!-- RDB: 복구 화살표 -->
  <line x1="200" y1="274" x2="200" y2="302" stroke="#475569" stroke-width="1.5" stroke-dasharray="4 2" marker-end="url(#arrow-s)"/>

  <!-- RDB: 복구 박스 -->
  <rect x="80" y="302" width="240" height="40" rx="6" fill="#F8FAFC" stroke="#475569" stroke-width="1.5"/>
  <text x="200" y="322" text-anchor="middle" font-size="12" fill="#334155">재기동 시: RDB 파일 로드</text>
  <text x="200" y="338" text-anchor="middle" font-size="10" fill="#475569">파일 크기에 비례, 수 초~수십 초</text>

  <!-- RDB: 특징 목록 -->
  <text x="60" y="368" font-size="11" font-weight="600" fill="#0A0A0A">특징</text>
  <text x="72" y="386" font-size="11" fill="#27272A">• 주기(분 단위) 스냅샷 — 유실 가능</text>
  <text x="72" y="402" font-size="11" fill="#27272A">• 파일 크기 작음 — 전송/백업 용이</text>
  <text x="72" y="418" font-size="11" fill="#27272A">• 재기동 빠름 (파일 1개 로드)</text>
  <text x="72" y="434" font-size="11" fill="#27272A">• BGSAVE·SAVE·save 설정으로 트리거</text>

  <!-- ── AOF (오른쪽) ── -->
  <text x="600" y="68" text-anchor="middle" font-size="14" font-weight="700" fill="#7C3AED">AOF 로그</text>

  <!-- AOF: Redis 메모리 -->
  <rect x="460" y="84" width="280" height="48" rx="6" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="600" y="105" text-anchor="middle" font-size="13" font-weight="600" fill="#6D28D9">Redis 메모리</text>
  <text x="600" y="122" text-anchor="middle" font-size="11" fill="#6D28D9">쓰기 명령 수신 시 AOF 버퍼 기록</text>

  <!-- AOF: 버퍼 화살표 -->
  <line x1="600" y1="132" x2="600" y2="154" stroke="#7C3AED" stroke-width="1.5" marker-end="url(#arrow-v)"/>
  <text x="648" y="148" font-size="10" fill="#7C3AED">append</text>

  <!-- AOF: AOF 버퍼 -->
  <rect x="460" y="154" width="280" height="40" rx="6" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5" stroke-dasharray="4 2"/>
  <text x="600" y="174" text-anchor="middle" font-size="12" fill="#6D28D9">AOF 버퍼 (in-memory)</text>
  <text x="600" y="188" text-anchor="middle" font-size="10" fill="#6D28D9">appendfsync 주기에 따라 fsync</text>

  <!-- AOF: fsync 화살표 -->
  <line x1="600" y1="194" x2="600" y2="222" stroke="#7C3AED" stroke-width="1.5" marker-end="url(#arrow-v)"/>
  <text x="648" y="214" font-size="10" fill="#7C3AED">fsync</text>

  <!-- AOF: appendonly.aof 파일 -->
  <rect x="480" y="222" width="240" height="52" rx="6" fill="#F8FAFC" stroke="#475569" stroke-width="1.5"/>
  <text x="600" y="245" text-anchor="middle" font-size="12" font-weight="600" fill="#334155">appendonly.aof</text>
  <text x="600" y="263" text-anchor="middle" font-size="10" fill="#475569">명령 텍스트 — 순서대로 이어붙임</text>

  <!-- AOF 파일 내부 예시 (텍스트) -->
  <rect x="490" y="278" width="220" height="46" rx="4" fill="#18181B"/>
  <text x="502" y="295" font-size="9" fill="#A3A3A3" font-family="'Geist Mono', monospace">*3</text>
  <text x="502" y="308" font-size="9" fill="#A3A3A3" font-family="'Geist Mono', monospace">$4 HSET seat:{101}:A1 status held</text>
  <text x="502" y="318" font-size="9" fill="#A3A3A3" font-family="'Geist Mono', monospace">... (명령 순서대로 누적)</text>

  <!-- AOF: 복구 화살표 -->
  <line x1="600" y1="324" x2="600" y2="352" stroke="#475569" stroke-width="1.5" stroke-dasharray="4 2" marker-end="url(#arrow-s)"/>

  <!-- AOF: 복구 박스 -->
  <rect x="480" y="352" width="240" height="40" rx="6" fill="#F8FAFC" stroke="#475569" stroke-width="1.5"/>
  <text x="600" y="372" text-anchor="middle" font-size="12" fill="#334155">재기동 시: 명령 재실행</text>
  <text x="600" y="388" text-anchor="middle" font-size="10" fill="#475569">명령 수 비례, RDB보다 느릴 수 있음</text>

  <!-- AOF: 특징 목록 -->
  <text x="460" y="416" font-size="11" font-weight="600" fill="#0A0A0A">특징</text>
  <text x="472" y="434" font-size="11" fill="#27272A">• everysec 기준 최대 1초 유실</text>
  <text x="472" y="450" font-size="11" fill="#27272A">• 파일 증가 → AOFREWRITE 압축</text>
  <text x="472" y="466" font-size="11" fill="#27272A">• 재기동 시 명령 재실행 (느릴 수 있음)</text>

  <!-- 하단: RDB+AOF 혼용 박스 -->
  <rect x="120" y="486" width="560" height="36" rx="6" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.5"/>
  <text x="400" y="504" text-anchor="middle" font-size="12" font-weight="600" fill="#0E7490">혼용 모드 (권장)</text>
  <text x="400" y="518" text-anchor="middle" font-size="10" fill="#0E7490">RDB + AOF 동시 활성화 — 재기동 시 AOF 우선 로드 (더 최신 상태)</text>

  <!-- 화살표 마커 정의 -->
  <defs>
    <marker id="arrow-g" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#059669"/>
    </marker>
    <marker id="arrow-v" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7C3AED"/>
    </marker>
    <marker id="arrow-s" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#475569"/>
    </marker>
  </defs>

</svg>
