<svg role="img" aria-labelledby="title-1 desc-1" viewBox="0 0 800 540" xmlns="http://www.w3.org/2000/svg" width="100%" height="auto" style="font-family: 'Pretendard', system-ui, sans-serif;">
  <title id="title-1">구조화 로깅 파싱 흐름 — logfmt 메시지가 Loki에서 필드로 추출되는 과정</title>
  <desc id="desc-1">애플리케이션이 logfmt 형식으로 출력한 로그 한 줄이 JSON 전송 포맷에 실려 OTel Collector를 거쳐 Loki에 저장되고, LogQL | logfmt 파서로 action·orderId·status 필드가 추출되어 Grafana 필터에서 사용되는 전체 흐름을 5단계로 보여줍니다</desc>

  <!-- 배경 -->
  <rect width="800" height="540" fill="#FAFAFA" rx="4"/>

  <!-- 제목 -->
  <text x="400" y="36" text-anchor="middle" font-size="15" font-weight="700" fill="#0A0A0A">흐름도 — logfmt 로그의 Loki 파싱 경로</text>

  <!-- ===== STEP 1: 애플리케이션 로그 출력 ===== -->
  <!-- 박스 -->
  <rect x="40" y="64" width="200" height="72" rx="6" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="140" y="86" text-anchor="middle" font-size="13" font-weight="700" fill="#047857">애플리케이션</text>
  <text x="140" y="103" text-anchor="middle" font-size="11" fill="#27272A">(Spring Boot / Go slog)</text>
  <text x="140" y="120" text-anchor="middle" font-size="11" fill="#27272A">logfmt 메시지 출력</text>

  <!-- 로그 샘플 박스 -->
  <rect x="40" y="152" width="200" height="80" rx="4" fill="#F0FDF4" stroke="#059669" stroke-width="1"/>
  <text x="52" y="172" font-size="11" fill="#047857" font-family="'Geist Mono', monospace">action=PAYMENT_CREATE</text>
  <text x="52" y="188" font-size="11" fill="#047857" font-family="'Geist Mono', monospace">orderId=ORD-4821</text>
  <text x="52" y="204" font-size="11" fill="#047857" font-family="'Geist Mono', monospace">amount=150000</text>
  <text x="52" y="220" font-size="11" fill="#047857" font-family="'Geist Mono', monospace">status=SUCCESS</text>

  <!-- ===== 화살표 1 → 2 ===== -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#0A0A0A"/>
    </marker>
  </defs>
  <line x1="244" y1="192" x2="288" y2="192" stroke="#0A0A0A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="252" y="178" width="28" height="14" fill="#FAFAFA"/>
  <text x="266" y="189" text-anchor="middle" font-size="10" fill="#27272A">JSON</text>

  <!-- ===== STEP 2: JSON 전송 포맷 (Structured Logging) ===== -->
  <rect x="288" y="152" width="200" height="110" rx="6" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.5"/>
  <text x="388" y="173" text-anchor="middle" font-size="13" font-weight="700" fill="#0E7490">JSON 전송 포맷</text>
  <text x="388" y="190" text-anchor="middle" font-size="11" fill="#27272A">(Spring Structured Logging)</text>
  <text x="300" y="210" font-size="10" fill="#0E7490" font-family="'Geist Mono', monospace">{ "@timestamp": "...",</text>
  <text x="300" y="225" font-size="10" fill="#0E7490" font-family="'Geist Mono', monospace">  "level": "INFO",</text>
  <text x="300" y="240" font-size="10" fill="#0E7490" font-family="'Geist Mono', monospace">  "message": "action=...",</text>
  <text x="300" y="255" font-size="10" fill="#0E7490" font-family="'Geist Mono', monospace">  "trace_id": "abc123" }</text>

  <!-- 분리 설명 레이블 -->
  <text x="388" y="278" text-anchor="middle" font-size="10" fill="#6D28D9">전송 포맷(JSON) + body(logfmt) 분리</text>

  <!-- ===== 화살표 2 → 3 ===== -->
  <line x1="492" y1="207" x2="536" y2="207" stroke="#0A0A0A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="498" y="192" width="32" height="16" fill="#FAFAFA"/>
  <text x="514" y="204" text-anchor="middle" font-size="10" fill="#27272A">OTLP</text>

  <!-- ===== STEP 3: OTel Collector / Alloy ===== -->
  <rect x="536" y="152" width="200" height="72" rx="6" fill="#FFFBEB" stroke="#D97706" stroke-width="1.5"/>
  <text x="636" y="174" text-anchor="middle" font-size="13" font-weight="700" fill="#B45309">OTel Collector / Alloy</text>
  <text x="636" y="192" text-anchor="middle" font-size="11" fill="#27272A">trace_id → Loki 레이블</text>
  <text x="636" y="209" text-anchor="middle" font-size="11" fill="#27272A">service.name 자동 추출</text>

  <!-- ===== 화살표 3 → 4 (아래로) ===== -->
  <line x1="636" y1="228" x2="636" y2="288" stroke="#0A0A0A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== STEP 4: Loki 저장 ===== -->
  <rect x="536" y="288" width="200" height="80" rx="6" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="636" y="310" text-anchor="middle" font-size="13" font-weight="700" fill="#6D28D9">Loki</text>
  <text x="636" y="328" text-anchor="middle" font-size="11" fill="#27272A">레이블 인덱싱</text>
  <text x="548" y="348" font-size="10" fill="#6D28D9" font-family="'Geist Mono', monospace">{service="payment", level="info"}</text>
  <text x="568" y="362" font-size="10" fill="#27272A" font-family="'Geist Mono', monospace">→ 압축 청크 저장</text>

  <!-- ===== 화살표 4 → 5 (왼쪽으로) ===== -->
  <line x1="532" y1="328" x2="492" y2="328" stroke="#0A0A0A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== STEP 5: LogQL 파서 + 필터 ===== -->
  <rect x="288" y="296" width="200" height="96" rx="6" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="388" y="318" text-anchor="middle" font-size="13" font-weight="700" fill="#6D28D9">LogQL | logfmt</text>
  <text x="388" y="336" text-anchor="middle" font-size="11" fill="#27272A">message body → 필드 추출</text>
  <text x="300" y="356" font-size="10" fill="#6D28D9" font-family="'Geist Mono', monospace">action    = PAYMENT_CREATE</text>
  <text x="300" y="370" font-size="10" fill="#6D28D9" font-family="'Geist Mono', monospace">orderId   = ORD-4821</text>
  <text x="300" y="384" font-size="10" fill="#6D28D9" font-family="'Geist Mono', monospace">status    = SUCCESS</text>

  <!-- ===== 화살표 5 → Grafana (왼쪽으로) ===== -->
  <line x1="284" y1="344" x2="244" y2="344" stroke="#0A0A0A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== Grafana 필터 ===== -->
  <rect x="40" y="296" width="200" height="96" rx="6" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.5"/>
  <text x="140" y="318" text-anchor="middle" font-size="13" font-weight="700" fill="#0E7490">Grafana 대시보드</text>
  <text x="140" y="336" text-anchor="middle" font-size="11" fill="#27272A">action 기반 필터·집계</text>
  <text x="52" y="356" font-size="10" fill="#0E7490" font-family="'Geist Mono', monospace">| action="PAYMENT_CREATE"</text>
  <text x="52" y="370" font-size="10" fill="#0E7490" font-family="'Geist Mono', monospace">| status="SUCCESS"</text>
  <text x="52" y="386" font-size="10" fill="#0E7490" font-family="'Geist Mono', monospace">→ count_over_time([5m])</text>

  <!-- ===== 단계 번호 ===== -->
  <circle cx="52" cy="80" r="12" fill="#059669"/>
  <text x="52" y="85" text-anchor="middle" font-size="11" font-weight="700" fill="#FAFAFA">1</text>

  <circle cx="300" cy="168" r="12" fill="#0891B2"/>
  <text x="300" y="173" text-anchor="middle" font-size="11" font-weight="700" fill="#FAFAFA">2</text>

  <circle cx="548" cy="168" r="12" fill="#D97706"/>
  <text x="548" y="173" text-anchor="middle" font-size="11" font-weight="700" fill="#FAFAFA">3</text>

  <circle cx="548" cy="304" r="12" fill="#7C3AED"/>
  <text x="548" y="309" text-anchor="middle" font-size="11" font-weight="700" fill="#FAFAFA">4</text>

  <circle cx="300" cy="312" r="12" fill="#7C3AED"/>
  <text x="300" y="317" text-anchor="middle" font-size="11" font-weight="700" fill="#FAFAFA">5</text>

  <circle cx="52" cy="312" r="12" fill="#0891B2"/>
  <text x="52" y="317" text-anchor="middle" font-size="11" font-weight="700" fill="#FAFAFA">6</text>

  <!-- ===== 하단 범례 ===== -->
  <rect x="40" y="422" width="720" height="88" rx="4" fill="#F8FAFC" stroke="#E4E4E7" stroke-width="1"/>
  <text x="400" y="442" text-anchor="middle" font-size="11" font-weight="700" fill="#0A0A0A">핵심 개념</text>

  <rect x="60" y="454" width="12" height="12" fill="#ECFDF5" stroke="#059669" stroke-width="1"/>
  <text x="78" y="464" font-size="10" fill="#27272A">App — logfmt 메시지 출력</text>

  <rect x="60" y="472" width="12" height="12" fill="#ECFEFF" stroke="#0891B2" stroke-width="1"/>
  <text x="78" y="482" font-size="10" fill="#27272A">JSON 전송 포맷 (전송용)</text>

  <rect x="220" y="454" width="12" height="12" fill="#FFFBEB" stroke="#D97706" stroke-width="1"/>
  <text x="238" y="464" font-size="10" fill="#27272A">OTel Collector (변환·전달)</text>

  <rect x="220" y="472" width="12" height="12" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1"/>
  <text x="238" y="482" font-size="10" fill="#27272A">Loki / LogQL (저장·파싱)</text>

  <text x="420" y="462" font-size="10" fill="#27272A">전송 포맷(JSON)과 메시지 body(logfmt)는 분리된 두 레이어입니다</text>
  <text x="420" y="478" font-size="10" fill="#27272A">| logfmt 파서가 body의 key=value를 런타임에 필드로 추출합니다</text>
  <text x="420" y="494" font-size="10" fill="#27272A">trace_id는 MDC에서 JSON 필드로 자동 포함됩니다</text>
</svg>
