<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 720" role="img" aria-labelledby="t1 d1" width="100%" height="auto" preserveAspectRatio="xMidYMid meet" style="max-width: 800px;">
  <title id="t1">정상 상태 — GCP primary 다중 클라우드 DB 토폴로지</title>
  <desc id="d1">GCP asia-northeast3에서는 goti-* Go 서비스가 PgBouncer-RW와 PgBouncer-RO 두 개 별도 Deployment로 분기. RW는 GCE VM의 goti-pg-primary로, RO는 primary와 streaming standby 양쪽으로 라우팅. AWS ap-northeast-2는 pglogical subscriber RDS를 read_only로 운영하며 GCP primary가 TLS verify-full로 publication 송신</desc>

  <defs>
    <marker id="arr1" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#0A0A0A"/>
    </marker>
  </defs>

  <style><![CDATA[
    .label { font-family: 'Pretendard', sans-serif; font-size: 13px; font-weight: 600; }
    .meta  { font-family: 'Geist Mono', ui-monospace, Menlo, monospace; font-size: 11px; fill: #27272A; }
    .arrlbl { font-family: 'Pretendard', sans-serif; font-size: 11px; fill: #27272A; }
    .arrow { stroke: #0A0A0A; stroke-width: 1.5; fill: none; marker-end: url(#arr1); }
  ]]></style>

  <!-- GCP container (cloud / amber) -->
  <rect x="32" y="40" width="736" height="320" rx="8" fill="#FFFBEB" stroke="#D97706" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="48" y="64" class="meta" fill="#B45309">GCP · asia-northeast3 (Primary 활성)</text>

  <!-- goti-* Go services (backend / emerald) -->
  <rect x="56" y="80" width="240" height="64" rx="6" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="176" y="104" text-anchor="middle" class="label" fill="#047857">goti-* Go 서비스</text>
  <text x="176" y="124" text-anchor="middle" class="meta">RW endpoint / RO endpoint</text>

  <line x1="296" y1="100" x2="328" y2="100" class="arrow"/>
  <text x="312" y="92" text-anchor="middle" class="arrlbl">writes</text>
  <line x1="296" y1="124" x2="328" y2="180" class="arrow"/>
  <text x="320" y="148" class="arrlbl">reads</text>

  <!-- PgBouncer-RW (cloud / amber) -->
  <rect x="328" y="80" width="200" height="64" rx="6" fill="#FFFBEB" stroke="#D97706" stroke-width="1.5"/>
  <text x="428" y="104" text-anchor="middle" class="label" fill="#B45309">PgBouncer-RW</text>
  <text x="428" y="124" text-anchor="middle" class="meta">deployment · RW pool</text>

  <!-- PgBouncer-RO (cloud / amber) -->
  <rect x="328" y="180" width="200" height="64" rx="6" fill="#FFFBEB" stroke="#D97706" stroke-width="1.5"/>
  <text x="428" y="204" text-anchor="middle" class="label" fill="#B45309">PgBouncer-RO</text>
  <text x="428" y="224" text-anchor="middle" class="meta">deployment · RO pool</text>

  <!-- arrows from PgBouncer to DB -->
  <line x1="528" y1="112" x2="560" y2="112" class="arrow"/>
  <line x1="528" y1="200" x2="560" y2="112" class="arrow"/>
  <line x1="528" y1="220" x2="560" y2="280" class="arrow"/>

  <!-- goti-pg-primary (database / violet) -->
  <rect x="560" y="80" width="184" height="80" rx="6" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="652" y="104" text-anchor="middle" class="label" fill="#6D28D9">goti-pg-primary</text>
  <text x="652" y="124" text-anchor="middle" class="meta">GCE VM · PG16</text>
  <text x="652" y="144" text-anchor="middle" class="meta">+ pglogical</text>

  <!-- goti-pg-standby (database / violet) -->
  <rect x="560" y="248" width="184" height="80" rx="6" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="652" y="272" text-anchor="middle" class="label" fill="#6D28D9">goti-pg-standby</text>
  <text x="652" y="292" text-anchor="middle" class="meta">streaming replica</text>
  <text x="652" y="312" text-anchor="middle" class="meta">PhaseB</text>

  <!-- arrow primary -> AWS subscriber (publication) -->
  <path d="M 652 160 V 392 H 488 V 432" class="arrow"/>
  <text x="660" y="384" class="arrlbl">pglogical publication / TLS verify-full · public IP allowlist</text>

  <!-- AWS container (cloud / amber) -->
  <rect x="32" y="432" width="736" height="240" rx="8" fill="#FFFBEB" stroke="#D97706" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="48" y="456" class="meta" fill="#B45309">AWS · ap-northeast-2 (Phase B 시연일)</text>

  <!-- goti-* AWS (backend / emerald) -->
  <rect x="56" y="472" width="240" height="64" rx="6" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="176" y="496" text-anchor="middle" class="label" fill="#047857">goti-* (EKS)</text>
  <text x="176" y="516" text-anchor="middle" class="meta">RO only</text>

  <line x1="296" y1="504" x2="328" y2="504" class="arrow"/>

  <!-- PgBouncer-RO AWS (cloud / amber) -->
  <rect x="328" y="472" width="200" height="64" rx="6" fill="#FFFBEB" stroke="#D97706" stroke-width="1.5"/>
  <text x="428" y="496" text-anchor="middle" class="label" fill="#B45309">PgBouncer-RO</text>
  <text x="428" y="516" text-anchor="middle" class="meta">deployment</text>

  <line x1="528" y1="504" x2="560" y2="504" class="arrow"/>

  <!-- AWS RDS (database / violet) -->
  <rect x="560" y="472" width="184" height="100" rx="6" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="652" y="496" text-anchor="middle" class="label" fill="#6D28D9">AWS RDS</text>
  <text x="652" y="516" text-anchor="middle" class="meta">pglogical subscriber</text>
  <text x="652" y="536" text-anchor="middle" class="meta">read_only = on</text>
  <text x="652" y="556" text-anchor="middle" class="meta">(failover 시 off)</text>
</svg>
