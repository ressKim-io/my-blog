<svg role="img" aria-labelledby="title-2 desc-2" viewBox="0 0 800 480" width="100%" height="auto" xmlns="http://www.w3.org/2000/svg">
  <title id="title-2">TTL Stale Window와 Cache Stampede 시간축 다이어그램</title>
  <desc id="desc-2">캐시 키의 생성·TTL 만료·stale window 구간을 시간축으로 보여주고, 만료 직후 다수 요청이 동시에 DB를 조회하는 cache stampede 패턴과 그 대응 방법을 함께 표시합니다</desc>

  <style>
    text { font-family: 'Pretendard', system-ui, sans-serif; }
    .title-text { font-size: 14px; font-weight: 600; }
    .sub-text { font-size: 12px; }
    .meta-text { font-size: 11px; fill: #27272A; }
    .label-text { font-size: 11px; }
    .axis-text { font-size: 11px; fill: #475569; }
  </style>

  <rect width="800" height="480" fill="#FAFAFA"/>

  <!-- 헤더 -->
  <text x="400" y="32" text-anchor="middle" font-size="15" font-weight="700" fill="#0A0A0A">시간축 — TTL Stale Window와 Cache Stampede</text>

  <!-- ====== 시간축 ====== -->
  <line x1="60" y1="80" x2="760" y2="80" stroke="#0A0A0A" stroke-width="2" marker-end="url(#arrow-dark)"/>
  <text x="764" y="84" font-size="12" fill="#0A0A0A">시간</text>

  <!-- 시간 눈금 -->
  <line x1="120" y1="75" x2="120" y2="85" stroke="#0A0A0A" stroke-width="1.5"/>
  <text x="120" y="100" text-anchor="middle" class="axis-text">t=0</text>

  <line x1="360" y1="75" x2="360" y2="85" stroke="#0A0A0A" stroke-width="1.5"/>
  <text x="360" y="100" text-anchor="middle" class="axis-text">t=TTL</text>

  <line x1="560" y1="75" x2="560" y2="85" stroke="#E11D48" stroke-width="2"/>
  <text x="560" y="100" text-anchor="middle" class="axis-text" fill="#BE123C">만료</text>

  <line x1="680" y1="75" x2="680" y2="85" stroke="#0A0A0A" stroke-width="1.5"/>
  <text x="680" y="100" text-anchor="middle" class="axis-text">t=TTL+재적재</text>

  <!-- ====== 캐시 상태 바 ====== -->
  <!-- 유효 구간 -->
  <rect x="120" y="115" width="440" height="40" rx="4" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="340" y="130" text-anchor="middle" font-size="12" font-weight="600" fill="#047857">캐시 유효 (HIT)</text>
  <text x="340" y="147" text-anchor="middle" class="meta-text">모든 요청이 Redis에서 즉시 응답</text>

  <!-- stale window / 만료 후 -->
  <rect x="560" y="115" width="120" height="40" rx="4" fill="#FFF1F2" stroke="#E11D48" stroke-width="2"/>
  <text x="620" y="130" text-anchor="middle" font-size="12" font-weight="600" fill="#BE123C">Stale Window</text>
  <text x="620" y="147" text-anchor="middle" class="meta-text">캐시 없음 → DB 직접</text>

  <!-- 재적재 후 -->
  <rect x="680" y="115" width="80" height="40" rx="4" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="720" y="135" text-anchor="middle" font-size="12" font-weight="600" fill="#047857">재적재</text>

  <!-- TTL 구간 표시 화살표 -->
  <line x1="120" y1="170" x2="560" y2="170" stroke="#059669" stroke-width="1.5" marker-end="url(#arrow-green)" marker-start="url(#arrow-green-rev)"/>
  <text x="340" y="185" text-anchor="middle" class="label-text" fill="#047857">TTL 2s (좌석 상태) / 5m (메타)</text>

  <!-- ====== Cache Stampede 구간 ====== -->
  <text x="400" y="215" text-anchor="middle" font-size="13" font-weight="600" fill="#BE123C">Cache Stampede — TTL 만료 직후 동시 MISS</text>

  <!-- 요청 3개 동시에 DB 조회 -->
  <!-- 요청 선 -->
  <line x1="570" y1="230" x2="570" y2="330" stroke="#E11D48" stroke-width="1.5" marker-end="url(#arrow-rose)"/>
  <line x1="590" y1="230" x2="590" y2="330" stroke="#E11D48" stroke-width="1.5" marker-end="url(#arrow-rose)"/>
  <line x1="610" y1="230" x2="610" y2="330" stroke="#E11D48" stroke-width="1.5" marker-end="url(#arrow-rose)"/>
  <line x1="630" y1="230" x2="630" y2="330" stroke="#E11D48" stroke-width="1.5" marker-end="url(#arrow-rose)"/>
  <line x1="650" y1="230" x2="650" y2="330" stroke="#E11D48" stroke-width="1.5" marker-end="url(#arrow-rose)"/>

  <!-- 요청 라벨 -->
  <text x="610" y="245" text-anchor="middle" font-size="11" fill="#BE123C">N개 요청</text>
  <text x="610" y="258" text-anchor="middle" font-size="11" fill="#BE123C">동시 MISS</text>

  <!-- DB 박스 -->
  <rect x="520" y="330" width="180" height="44" rx="6" fill="#FFFBEB" stroke="#D97706" stroke-width="2"/>
  <text x="610" y="348" text-anchor="middle" class="title-text" fill="#B45309">RDS (PostgreSQL)</text>
  <text x="610" y="365" text-anchor="middle" class="meta-text">N개 쿼리 동시 수신 → 부하 급증</text>

  <!-- ====== 대응 패턴 ====== -->
  <text x="200" y="215" text-anchor="middle" font-size="13" font-weight="600" fill="#047857">대응 패턴</text>

  <!-- 대응 1: Probabilistic Early Expiration -->
  <rect x="40" y="228" width="320" height="60" rx="6" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="200" y="248" text-anchor="middle" font-size="12" font-weight="600" fill="#6D28D9">Probabilistic Early Expiration</text>
  <text x="200" y="264" text-anchor="middle" class="meta-text">만료 전 일부 요청이 확률적으로 먼저</text>
  <text x="200" y="278" text-anchor="middle" class="meta-text">재적재 — 동시 폭발 분산</text>

  <!-- 대응 2: SETNX 뮤텍스 -->
  <rect x="40" y="304" width="320" height="60" rx="6" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="200" y="324" text-anchor="middle" font-size="12" font-weight="600" fill="#6D28D9">SETNX 재적재 뮤텍스</text>
  <text x="200" y="340" text-anchor="middle" class="meta-text">SETNX lock:key — 첫 요청만 DB 조회</text>
  <text x="200" y="354" text-anchor="middle" class="meta-text">나머지는 잠시 대기 후 캐시에서 읽기</text>

  <!-- ====== 하단 TTL self-healing 설명 ====== -->
  <rect x="40" y="400" width="720" height="60" rx="6" fill="#F0FDF4" stroke="#059669" stroke-width="1" stroke-dasharray="4 2"/>
  <text x="400" y="422" text-anchor="middle" font-size="12" font-weight="600" fill="#047857">TTL Self-Healing</text>
  <text x="400" y="440" text-anchor="middle" font-size="11" fill="#047857">Redis 장애나 캐시 누락이 발생해도 TTL 만료 후 다음 읽기에서 자동 재적재됩니다</text>
  <text x="400" y="456" text-anchor="middle" font-size="11" fill="#047857">별도 캐시 워밍(warming) 없이 캐시 상태가 자가 회복되는 것이 Cache-Aside의 핵심 특성입니다</text>

  <!-- 마커 정의 -->
  <defs>
    <marker id="arrow-dark" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#0A0A0A"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#059669"/>
    </marker>
    <marker id="arrow-green-rev" markerWidth="8" markerHeight="8" refX="2" refY="3" orient="auto-start-reverse">
      <path d="M0,0 L0,6 L8,3 z" fill="#059669"/>
    </marker>
    <marker id="arrow-rose" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#E11D48"/>
    </marker>
  </defs>
</svg>
