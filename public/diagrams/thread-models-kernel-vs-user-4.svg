<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" role="img" aria-labelledby="t4 d4" font-family="Pretendard, ui-sans-serif, system-ui, -apple-system, sans-serif">
  <title id="t4">Go GMP scheduler structure</title>
  <desc id="d4">Three P logical processors each own a local run queue of goroutines and attach to an M OS thread running on a core. When a P's queue is empty it steals half of another P's queue. A global run queue holds overflow goroutines and the netpoller parks goroutines waiting on network I/O without holding any M.</desc>
  <defs>
    <marker id="m4" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#475569"/>
    </marker>
    <marker id="m4r" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#BE123C"/>
    </marker>
    <marker id="m4v" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#7C3AED"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="800" height="520" fill="#FFFFFF"/>

  <text x="400" y="26" text-anchor="middle" font-size="12" fill="#64748B">GMP — G needs a P, P needs an M; max running goroutines = GOMAXPROCS</text>

  <!-- P boxes -->
  <rect x="48" y="56" width="200" height="84" rx="9" fill="#ECFDF5" stroke="#059669" stroke-width="1.7"/>
  <text x="148" y="78" text-anchor="middle" font-size="12.5" font-weight="700" fill="#047857">P0 — local runq</text>
  <rect x="70" y="92" width="30" height="30" rx="6" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.3"/>
  <text x="85" y="112" text-anchor="middle" font-size="11" fill="#0E7490">G</text>
  <rect x="110" y="92" width="30" height="30" rx="6" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.3"/>
  <text x="125" y="112" text-anchor="middle" font-size="11" fill="#0E7490">G</text>
  <rect x="150" y="92" width="30" height="30" rx="6" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.3"/>
  <text x="165" y="112" text-anchor="middle" font-size="11" fill="#0E7490">G</text>
  <rect x="190" y="92" width="30" height="30" rx="6" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.3"/>
  <text x="205" y="112" text-anchor="middle" font-size="11" fill="#0E7490">G</text>

  <rect x="300" y="56" width="200" height="84" rx="9" fill="#ECFDF5" stroke="#059669" stroke-width="1.7"/>
  <text x="400" y="78" text-anchor="middle" font-size="12.5" font-weight="700" fill="#047857">P1 — local runq</text>
  <rect x="340" y="92" width="30" height="30" rx="6" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.3"/>
  <text x="355" y="112" text-anchor="middle" font-size="11" fill="#0E7490">G</text>
  <rect x="380" y="92" width="30" height="30" rx="6" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.3"/>
  <text x="395" y="112" text-anchor="middle" font-size="11" fill="#0E7490">G</text>

  <rect x="552" y="56" width="200" height="84" rx="9" fill="#ECFDF5" stroke="#059669" stroke-width="1.7"/>
  <text x="652" y="78" text-anchor="middle" font-size="12.5" font-weight="700" fill="#047857">P2 — local runq</text>
  <text x="652" y="112" text-anchor="middle" font-size="11" fill="#64748B">(empty)</text>

  <!-- work stealing -->
  <path d="M556,120 C440,158 320,158 232,128" fill="none" stroke="#BE123C" stroke-width="1.6" stroke-dasharray="6 4" marker-end="url(#m4r)"/>
  <text x="400" y="168" text-anchor="middle" font-size="11" font-weight="700" fill="#BE123C">runq empty → steal half from a random P (work stealing)</text>

  <!-- M boxes -->
  <line x1="148" y1="140" x2="148" y2="196" stroke="#475569" stroke-width="1.5" marker-end="url(#m4)"/>
  <line x1="400" y1="140" x2="400" y2="196" stroke="#475569" stroke-width="1.5" marker-end="url(#m4)"/>
  <line x1="652" y1="140" x2="652" y2="196" stroke="#475569" stroke-width="1.5" marker-end="url(#m4)"/>

  <rect x="78" y="200" width="140" height="48" rx="8" fill="#F8FAFC" stroke="#475569" stroke-width="1.4"/>
  <text x="148" y="228" text-anchor="middle" font-size="12" font-weight="700" fill="#334155">M0 — OS thread</text>
  <rect x="330" y="200" width="140" height="48" rx="8" fill="#F8FAFC" stroke="#475569" stroke-width="1.4"/>
  <text x="400" y="228" text-anchor="middle" font-size="12" font-weight="700" fill="#334155">M1 — OS thread</text>
  <rect x="582" y="200" width="140" height="48" rx="8" fill="#F8FAFC" stroke="#475569" stroke-width="1.4"/>
  <text x="652" y="228" text-anchor="middle" font-size="12" font-weight="700" fill="#334155">M2 — OS thread</text>

  <line x1="148" y1="248" x2="148" y2="284" stroke="#475569" stroke-width="1.5" marker-end="url(#m4)"/>
  <line x1="400" y1="248" x2="400" y2="284" stroke="#475569" stroke-width="1.5" marker-end="url(#m4)"/>
  <line x1="652" y1="248" x2="652" y2="284" stroke="#475569" stroke-width="1.5" marker-end="url(#m4)"/>

  <rect x="93" y="288" width="110" height="40" rx="8" fill="#F8FAFC" stroke="#D4D4D8" stroke-width="1.3"/>
  <text x="148" y="313" text-anchor="middle" font-size="11.5" fill="#334155">core 0</text>
  <rect x="345" y="288" width="110" height="40" rx="8" fill="#F8FAFC" stroke="#D4D4D8" stroke-width="1.3"/>
  <text x="400" y="313" text-anchor="middle" font-size="11.5" fill="#334155">core 1</text>
  <rect x="597" y="288" width="110" height="40" rx="8" fill="#F8FAFC" stroke="#D4D4D8" stroke-width="1.3"/>
  <text x="652" y="313" text-anchor="middle" font-size="11.5" fill="#334155">core 2</text>

  <!-- global runq / netpoller -->
  <rect x="48" y="376" width="330" height="66" rx="9" fill="#F8FAFC" stroke="#475569" stroke-width="1.5"/>
  <text x="213" y="402" text-anchor="middle" font-size="12.5" font-weight="700" fill="#334155">global run queue</text>
  <text x="213" y="422" text-anchor="middle" font-size="10.5" fill="#64748B">overflow goroutines — Ps check it periodically</text>
  <line x1="213" y1="372" x2="180" y2="146" stroke="#475569" stroke-width="1.3" stroke-dasharray="5 3" marker-end="url(#m4)"/>

  <rect x="422" y="376" width="330" height="66" rx="9" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.6"/>
  <text x="587" y="402" text-anchor="middle" font-size="12.5" font-weight="700" fill="#6D28D9">netpoller (epoll)</text>
  <text x="587" y="422" text-anchor="middle" font-size="10.5" fill="#6D28D9">I/O-parked goroutines — hold no M at all</text>
  <line x1="587" y1="372" x2="620" y2="146" stroke="#7C3AED" stroke-width="1.3" stroke-dasharray="5 3" marker-end="url(#m4v)"/>

  <rect x="48" y="470" width="704" height="28" rx="7" fill="#F8FAFC" stroke="#E4E4E7" stroke-width="1"/>
  <text x="400" y="488" text-anchor="middle" font-size="11" fill="#334155">most scheduling is lock-free inside one P's queue — stealing and the global queue are the slow paths</text>
</svg>
