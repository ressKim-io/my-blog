<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 408" role="img" aria-labelledby="t3 d3" font-family="Pretendard, ui-sans-serif, system-ui, -apple-system, sans-serif">
  <title id="t3">A four-level page table walk on x86-64</title>
  <desc id="d3">A 48-bit virtual address is split into four 9-bit table indexes and a 12-bit page offset. The CR3 register points at the top table; each 9-bit index selects the next table down — PML4, PDPT, PD, PT — until the final entry, the PTE, yields the physical frame number. One translation therefore costs four memory accesses.</desc>
  <defs>
    <marker id="k3a" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#6D28D9"/>
    </marker>
    <marker id="k3b" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#B45309"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="800" height="408" fill="#FFFFFF"/>

  <text x="72" y="52" font-size="14" font-weight="700" fill="#334155">virtual address · 48 bit</text>

  <rect x="72" y="64" width="132" height="44" rx="4" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.4"/>
  <text x="138" y="92" text-anchor="middle" font-size="13" fill="#0E7490">PML4 · 9b</text>
  <rect x="204" y="64" width="132" height="44" rx="4" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.4"/>
  <text x="270" y="92" text-anchor="middle" font-size="13" fill="#0E7490">PDPT · 9b</text>
  <rect x="336" y="64" width="132" height="44" rx="4" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.4"/>
  <text x="402" y="92" text-anchor="middle" font-size="13" fill="#0E7490">PD · 9b</text>
  <rect x="468" y="64" width="132" height="44" rx="4" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.4"/>
  <text x="534" y="92" text-anchor="middle" font-size="13" fill="#0E7490">PT · 9b</text>
  <rect x="600" y="64" width="132" height="44" rx="4" fill="#F8FAFC" stroke="#475569" stroke-width="1.4"/>
  <text x="666" y="92" text-anchor="middle" font-size="13" fill="#334155">offset · 12b</text>

  <line x1="138" y1="108" x2="138" y2="172" stroke="#0891B2" stroke-width="1.3" stroke-dasharray="4 3"/>
  <line x1="270" y1="108" x2="270" y2="172" stroke="#0891B2" stroke-width="1.3" stroke-dasharray="4 3"/>
  <line x1="402" y1="108" x2="402" y2="172" stroke="#0891B2" stroke-width="1.3" stroke-dasharray="4 3"/>
  <line x1="534" y1="108" x2="534" y2="172" stroke="#0891B2" stroke-width="1.3" stroke-dasharray="4 3"/>
  <line x1="666" y1="108" x2="666" y2="300" stroke="#475569" stroke-width="1.3" stroke-dasharray="4 3"/>

  <rect x="32" y="188" width="80" height="56" rx="8" fill="#F8FAFC" stroke="#475569" stroke-width="1.6"/>
  <text x="72" y="222" text-anchor="middle" font-size="14" font-weight="700" fill="#334155" font-family="ui-monospace, monospace">CR3</text>

  <line x1="112" y1="216" x2="130" y2="216" stroke="#6D28D9" stroke-width="1.8" marker-end="url(#k3a)"/>

  <rect x="134" y="172" width="96" height="88" rx="8" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.8"/>
  <text x="182" y="222" text-anchor="middle" font-size="14" font-weight="700" fill="#6D28D9">PML4</text>
  <line x1="230" y1="216" x2="262" y2="216" stroke="#6D28D9" stroke-width="1.8" marker-end="url(#k3a)"/>

  <rect x="266" y="172" width="96" height="88" rx="8" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.8"/>
  <text x="314" y="222" text-anchor="middle" font-size="14" font-weight="700" fill="#6D28D9">PDPT</text>
  <line x1="362" y1="216" x2="394" y2="216" stroke="#6D28D9" stroke-width="1.8" marker-end="url(#k3a)"/>

  <rect x="398" y="172" width="96" height="88" rx="8" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.8"/>
  <text x="446" y="222" text-anchor="middle" font-size="14" font-weight="700" fill="#6D28D9">PD</text>
  <line x1="494" y1="216" x2="526" y2="216" stroke="#6D28D9" stroke-width="1.8" marker-end="url(#k3a)"/>

  <rect x="530" y="172" width="96" height="88" rx="8" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.8"/>
  <text x="578" y="214" text-anchor="middle" font-size="14" font-weight="700" fill="#6D28D9">PT</text>
  <text x="578" y="240" text-anchor="middle" font-size="13" fill="#6D28D9">PTE</text>

  <line x1="578" y1="260" x2="578" y2="296" stroke="#B45309" stroke-width="1.8" marker-end="url(#k3b)"/>

  <rect x="446" y="300" width="286" height="56" rx="8" fill="#FFFBEB" stroke="#D97706" stroke-width="1.8"/>
  <text x="589" y="334" text-anchor="middle" font-size="14" font-weight="700" fill="#B45309">frame (PFN) + offset</text>

  <rect x="32" y="300" width="288" height="56" rx="8" fill="#FFF1F2" stroke="#E11D48" stroke-width="1.6" stroke-dasharray="5 3"/>
  <text x="176" y="334" text-anchor="middle" font-size="14" font-weight="700" fill="#BE123C">4 memory accesses</text>
</svg>
