<svg role="img" aria-labelledby="title-1 desc-1" viewBox="0 0 800 640" width="100%" height="auto" xmlns="http://www.w3.org/2000/svg">
  <title id="title-1">Prometheus Server Mode vs Agent Mode 구조 비교</title>
  <desc id="desc-1">왼쪽 Server Mode는 Scrape 후 로컬 TSDB(WAL·Head Block·Compaction)를 거쳐 remote_write로 Mimir에 전송하는 구조이고, 오른쪽 Agent Mode는 TSDB를 제거하고 Scrape 후 WAL 버퍼만 두고 즉시 remote_write하는 단순한 구조를 보여줍니다</desc>
  <style>
    text { font-family: 'Pretendard', system-ui, sans-serif; }
    .title-label { font-size: 14px; font-weight: 600; }
    .body-label { font-size: 12px; }
    .sub-label { font-size: 11px; fill: #374151; }
    .badge-label { font-size: 11px; fill: #BE123C; font-weight: 600; }
    .header-label { font-size: 16px; font-weight: 700; }
    .section-bg-left { fill: #FFF7ED; }
    .section-bg-right { fill: #F0FDF4; }
    .box-scrape { fill: #ECFEFF; stroke: #0891B2; stroke-width: 1.5; }
    .box-tsdb { fill: #FFF1F2; stroke: #E11D48; stroke-width: 1.5; }
    .box-wal-agent { fill: #ECFDF5; stroke: #059669; stroke-width: 1.5; }
    .box-remote { fill: #F5F3FF; stroke: #7C3AED; stroke-width: 1.5; }
    .box-mimir { fill: #FFFBEB; stroke: #D97706; stroke-width: 2; }
    .box-query { fill: #F8FAFC; stroke: #475569; stroke-width: 1.5; }
    .divider { stroke: #D4D4D8; stroke-width: 1; stroke-dasharray: 6 3; }
    .arrow-main { stroke: #0A0A0A; stroke-width: 1.5; fill: none; }
    .arrow-remove { stroke: #E11D48; stroke-width: 1.5; fill: none; stroke-dasharray: 4 2; }
    .badge-removed { fill: #FFF1F2; stroke: #E11D48; stroke-width: 1.2; rx: 3; }
  </style>

  <!-- 섹션 배경 -->
  <rect x="20" y="60" width="360" height="560" rx="8" class="section-bg-left" stroke="#E4E4E7" stroke-width="1"/>
  <rect x="420" y="60" width="360" height="560" rx="8" class="section-bg-right" stroke="#E4E4E7" stroke-width="1"/>

  <!-- 섹션 헤더 -->
  <text x="200" y="92" text-anchor="middle" class="header-label" fill="#D97706">Server Mode</text>
  <text x="200" y="112" text-anchor="middle" class="sub-label">(기존 — 로컬 TSDB 보유)</text>

  <text x="600" y="92" text-anchor="middle" class="header-label" fill="#059669">Agent Mode</text>
  <text x="600" y="112" text-anchor="middle" class="sub-label">(전환 후 — TSDB 제거)</text>

  <!-- ============ LEFT: Server Mode ============ -->

  <!-- Scrape 대상 -->
  <rect x="60" y="136" width="280" height="52" rx="6" class="box-scrape"/>
  <text x="200" y="158" text-anchor="middle" class="title-label" fill="#0E7490">Scrape 대상</text>
  <text x="200" y="176" text-anchor="middle" class="sub-label">App / Istio Envoy / kubelet</text>

  <!-- 화살표: Scrape → Prometheus -->
  <line x1="200" y1="188" x2="200" y2="216" class="arrow-main" marker-end="url(#arrow-dark)"/>
  <text x="212" y="206" class="sub-label">scrape</text>

  <!-- Prometheus 박스 (Server Mode) -->
  <rect x="60" y="216" width="280" height="220" rx="6" fill="#FFFBEB" stroke="#D97706" stroke-width="1.5"/>
  <text x="200" y="238" text-anchor="middle" class="title-label" fill="#B45309">Prometheus (Server Mode)</text>

  <!-- WAL -->
  <rect x="80" y="248" width="240" height="44" rx="4" fill="#FFF1F2" stroke="#E11D48" stroke-width="1"/>
  <text x="200" y="268" text-anchor="middle" class="body-label" fill="#BE123C">WAL (Write-Ahead Log)</text>
  <text x="200" y="284" text-anchor="middle" class="sub-label">최신 미압축 샘플 버퍼</text>

  <!-- Head Block -->
  <rect x="80" y="300" width="110" height="44" rx="4" fill="#FFF1F2" stroke="#E11D48" stroke-width="1"/>
  <text x="135" y="320" text-anchor="middle" class="body-label" fill="#BE123C">Head Block</text>
  <text x="135" y="336" text-anchor="middle" class="sub-label">메모리 인덱스</text>

  <!-- Compaction -->
  <rect x="200" y="300" width="120" height="44" rx="4" fill="#FFF1F2" stroke="#E11D48" stroke-width="1"/>
  <text x="260" y="320" text-anchor="middle" class="body-label" fill="#BE123C">Compaction</text>
  <text x="260" y="336" text-anchor="middle" class="sub-label">블록 병합·압축</text>

  <!-- TSDB On-disk Blocks -->
  <rect x="80" y="352" width="240" height="44" rx="4" fill="#FFF1F2" stroke="#E11D48" stroke-width="1.2"/>
  <text x="200" y="372" text-anchor="middle" class="body-label" fill="#BE123C">TSDB On-disk Blocks</text>
  <text x="200" y="388" text-anchor="middle" class="sub-label">로컬 PVC 저장 (2h+)</text>

  <!-- 화살표: Server Mode → remote_write -->
  <line x1="200" y1="436" x2="200" y2="472" class="arrow-main" marker-end="url(#arrow-dark)"/>
  <text x="212" y="460" class="sub-label">remote_write</text>

  <!-- Query API 박스 -->
  <rect x="60" y="448" width="120" height="36" rx="4" class="box-query"/>
  <text x="120" y="462" text-anchor="middle" class="body-label" fill="#475569">Query API</text>
  <text x="120" y="476" text-anchor="middle" class="sub-label">사실상 미사용</text>

  <!-- remote_write 박스 -->
  <rect x="200" y="448" width="140" height="36" rx="4" class="box-remote"/>
  <text x="270" y="462" text-anchor="middle" class="body-label" fill="#6D28D9">remote_write</text>
  <text x="270" y="476" text-anchor="middle" class="sub-label">Mimir로 전송</text>

  <!-- Mimir (left) -->
  <rect x="80" y="496" width="240" height="44" rx="6" class="box-mimir"/>
  <text x="200" y="516" text-anchor="middle" class="title-label" fill="#B45309">Mimir</text>
  <text x="200" y="534" text-anchor="middle" class="sub-label">장기 저장·쿼리 백엔드</text>

  <!-- Grafana (left) -->
  <rect x="80" y="548" width="240" height="44" rx="6" fill="#F8FAFC" stroke="#475569" stroke-width="1.5"/>
  <text x="200" y="568" text-anchor="middle" class="title-label" fill="#334155">Grafana</text>
  <text x="200" y="584" text-anchor="middle" class="sub-label">Mimir만 조회</text>

  <!-- 메모리 뱃지 -->
  <rect x="60" y="600" width="140" height="28" rx="4" fill="#FFF1F2" stroke="#E11D48" stroke-width="1.2"/>
  <text x="130" y="619" text-anchor="middle" class="badge-label">메모리 실측 3,981 Mi</text>

  <!-- ============ RIGHT: Agent Mode ============ -->

  <!-- Scrape 대상 -->
  <rect x="460" y="136" width="280" height="52" rx="6" class="box-scrape"/>
  <text x="600" y="158" text-anchor="middle" class="title-label" fill="#0E7490">Scrape 대상</text>
  <text x="600" y="176" text-anchor="middle" class="sub-label">App / Istio Envoy / kubelet</text>

  <!-- 화살표: Scrape → Agent -->
  <line x1="600" y1="188" x2="600" y2="216" class="arrow-main" marker-end="url(#arrow-dark)"/>
  <text x="612" y="206" class="sub-label">scrape</text>

  <!-- Prometheus 박스 (Agent Mode) -->
  <rect x="460" y="216" width="280" height="180" rx="6" fill="#F0FDF4" stroke="#059669" stroke-width="1.5"/>
  <text x="600" y="238" text-anchor="middle" class="title-label" fill="#047857">Prometheus (Agent Mode)</text>
  <text x="600" y="256" text-anchor="middle" class="sub-label">--enable-feature=agent</text>

  <!-- WAL (에이전트) -->
  <rect x="480" y="268" width="240" height="44" rx="4" class="box-wal-agent"/>
  <text x="600" y="288" text-anchor="middle" class="body-label" fill="#047857">WAL (경량 버퍼)</text>
  <text x="600" y="304" text-anchor="middle" class="sub-label">전송 재시도용 최소 버퍼만 유지</text>

  <!-- 제거된 항목들 -->
  <rect x="480" y="320" width="240" height="52" rx="4" fill="#F9FAFB" stroke="#D4D4D8" stroke-width="1" stroke-dasharray="4 2"/>
  <text x="600" y="342" text-anchor="middle" class="sub-label" fill="#9CA3AF">Head Block / Compaction</text>
  <text x="600" y="358" text-anchor="middle" class="sub-label" fill="#9CA3AF">TSDB On-disk Blocks</text>
  <text x="600" y="374" text-anchor="middle" style="font-size:11px; fill:#E11D48; font-weight:600;">— 제거됨 —</text>

  <!-- 화살표: Agent → remote_write -->
  <line x1="600" y1="396" x2="600" y2="448" class="arrow-main" marker-end="url(#arrow-dark)"/>
  <text x="612" y="428" class="sub-label">remote_write</text>

  <!-- remote_write 박스 (agent) -->
  <rect x="480" y="448" width="240" height="36" rx="4" class="box-remote"/>
  <text x="600" y="462" text-anchor="middle" class="body-label" fill="#6D28D9">remote_write only</text>
  <text x="600" y="476" text-anchor="middle" class="sub-label">쿼리 API 비활성화</text>

  <!-- Mimir (right) -->
  <rect x="480" y="496" width="240" height="44" rx="6" class="box-mimir"/>
  <text x="600" y="516" text-anchor="middle" class="title-label" fill="#B45309">Mimir</text>
  <text x="600" y="534" text-anchor="middle" class="sub-label">장기 저장·쿼리 백엔드</text>

  <!-- Grafana (right) -->
  <rect x="480" y="548" width="240" height="44" rx="6" fill="#F8FAFC" stroke="#475569" stroke-width="1.5"/>
  <text x="600" y="568" text-anchor="middle" class="title-label" fill="#334155">Grafana</text>
  <text x="600" y="584" text-anchor="middle" class="sub-label">Mimir만 조회 (동일)</text>

  <!-- 메모리 뱃지 개선 -->
  <rect x="460" y="600" width="140" height="28" rx="4" fill="#ECFDF5" stroke="#059669" stroke-width="1.2"/>
  <text x="530" y="619" text-anchor="middle" style="font-size:11px; fill:#047857; font-weight:600;">메모리 ~1.2 Gi (예상)</text>

  <!-- 중앙 구분선 -->
  <line x1="400" y1="60" x2="400" y2="620" class="divider"/>

  <!-- arrowhead defs -->
  <defs>
    <marker id="arrow-dark" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#0A0A0A"/>
    </marker>
  </defs>
</svg>
