<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 470" width="100%" height="100%">
  <defs>
    <style>
      .bg { fill: #FAFAFA; }
      .title { font-family: 'Pretendard', system-ui, sans-serif; font-size: 18px; font-weight: 700; fill: #0A0A0A; }
      .subtitle { font-family: 'Pretendard', system-ui, sans-serif; font-size: 14px; font-weight: 500; fill: #475569; }
      .box-bad { fill: #FFF1F2; stroke: #E11D48; stroke-width: 2; rx: 8; }
      .box-good { fill: #ECFDF5; stroke: #059669; stroke-width: 2; rx: 8; }
      .step-bad { fill: #FFFFFF; stroke: #FDA4AF; stroke-width: 1.5; rx: 6; }
      .step-good { fill: #FFFFFF; stroke: #6EE7B7; stroke-width: 1.5; rx: 6; }
      .note { fill: #F5F3FF; stroke: #7C3AED; stroke-width: 2; rx: 8; }
      .h-bad { font-family: 'Pretendard', system-ui, sans-serif; font-size: 15px; font-weight: 700; fill: #BE123C; text-anchor: middle; }
      .h-good { font-family: 'Pretendard', system-ui, sans-serif; font-size: 15px; font-weight: 700; fill: #047857; text-anchor: middle; }
      .body { font-family: 'Pretendard', system-ui, sans-serif; font-size: 14px; font-weight: 500; fill: #334155; text-anchor: middle; }
      .mono { font-family: 'Geist Mono', ui-monospace, monospace; font-size: 13px; font-weight: 500; fill: #334155; text-anchor: middle; }
      .result-bad { font-family: 'Pretendard', system-ui, sans-serif; font-size: 15px; font-weight: 700; fill: #BE123C; text-anchor: middle; }
      .result-good { font-family: 'Pretendard', system-ui, sans-serif; font-size: 15px; font-weight: 700; fill: #047857; text-anchor: middle; }
      .h-note { font-family: 'Pretendard', system-ui, sans-serif; font-size: 14px; font-weight: 600; fill: #6D28D9; text-anchor: middle; }
      .flow { stroke: #64748B; stroke-width: 2; marker-end: url(#ah2); fill: none; }
    </style>
    <marker id="ah2" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748B"/>
    </marker>
  </defs>

  <rect width="820" height="470" class="bg" rx="12"/>

  <text x="40" y="40" class="title">Lock Holder Preemption: the Collapse and the Mitigation</text>
  <text x="40" y="64" class="subtitle">Same workload, kernel spinlock contention, 3 guests over 2x oversubscription</text>

  <!-- LEFT: nopvspin -->
  <rect x="40" y="92" width="350" height="330" class="box-bad"/>
  <text x="215" y="122" class="h-bad">nopvspin — mitigation off</text>

  <rect x="66" y="142" width="298" height="52" class="step-bad"/>
  <text x="215" y="174" class="body">Holder vCPU preempted mid-lock</text>

  <rect x="66" y="216" width="298" height="52" class="step-bad"/>
  <text x="215" y="248" class="body">Waiter spins, never yields the pCPU</text>

  <rect x="66" y="290" width="298" height="52" class="step-bad"/>
  <text x="215" y="322" class="body">Per-guest spread reaches 22.9x</text>

  <text x="215" y="386" class="result-bad">Retention 2.50% — 28.6x collapse</text>

  <line x1="215" y1="196" x2="215" y2="212" class="flow"/>
  <line x1="215" y1="270" x2="215" y2="286" class="flow"/>

  <!-- RIGHT: pv-qspinlock -->
  <rect x="430" y="92" width="350" height="330" class="box-good"/>
  <text x="605" y="122" class="h-good">pv-qspinlock — kernel default</text>

  <rect x="456" y="142" width="298" height="52" class="step-good"/>
  <text x="605" y="174" class="mono">spin up to SPIN_THRESHOLD (1&lt;&lt;15)</text>

  <rect x="456" y="216" width="298" height="52" class="step-good"/>
  <text x="605" y="248" class="mono">pv_wait() -&gt; safe_halt() -&gt; VM exit</text>

  <rect x="456" y="290" width="298" height="52" class="step-good"/>
  <text x="605" y="322" class="mono">holder kicks via KVM_HC_KICK_CPU</text>

  <text x="605" y="386" class="result-good">Retention 71.5% — fairness preserved</text>

  <line x1="605" y1="196" x2="605" y2="212" class="flow"/>
  <line x1="605" y1="270" x2="605" y2="286" class="flow"/>

  <!-- note -->
  <rect x="40" y="404" width="740" height="46" class="note"/>
  <text x="410" y="434" class="h-note">In both cases the guest reports itself healthy: cpu_efficiency 0.9994, run_delay_ratio 0.0005</text>
</svg>
