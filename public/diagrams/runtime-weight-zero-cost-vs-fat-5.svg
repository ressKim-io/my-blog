<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" role="img" aria-labelledby="t5 d5" font-family="Pretendard, ui-sans-serif, system-ui, -apple-system, sans-serif">
  <title id="t5">Go's integrated runtime versus Rust's assembled one, and the Waker seam</title>
  <desc id="d5">Both solve the same problem: millions of I/O tasks on a few OS threads. Go builds the answer in — goroutines are stackful coroutines scheduled by the GMP scheduler and netpoller that ship inside every binary, and the architecture cannot be swapped. Rust leaves the runtime empty and assembles it in user land from libraries: compiler-generated Future state machines, an Executor such as tokio, and a Reactor such as mio, joined by the Waker. That Waker is the only seam, and it is what lets the entire runtime be replaced.</desc>
  <defs>
    <marker id="w5" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="800" height="420" fill="#FFFFFF"/>

  <line x1="400" y1="24" x2="400" y2="396" stroke="#E4E4E7" stroke-width="1.2"/>
  <line x1="190" y1="136" x2="190" y2="164" stroke="#475569" stroke-width="1.6" marker-end="url(#w5)"/>
  <line x1="190" y1="276" x2="190" y2="304" stroke="#475569" stroke-width="1.6" marker-end="url(#w5)"/>
  <line x1="510" y1="136" x2="510" y2="164" stroke="#475569" stroke-width="1.6" marker-end="url(#w5)"/>
  <line x1="690" y1="136" x2="690" y2="164" stroke="#475569" stroke-width="1.6" marker-end="url(#w5)"/>
  <line x1="510" y1="256" x2="510" y2="304" stroke="#475569" stroke-width="1.6" marker-end="url(#w5)"/>
  <line x1="690" y1="256" x2="690" y2="304" stroke="#475569" stroke-width="1.6" marker-end="url(#w5)"/>

  <text x="190" y="44" text-anchor="middle" font-size="15" font-weight="700" fill="#0E7490">Go — integrated</text>
  <text x="600" y="44" text-anchor="middle" font-size="15" font-weight="700" fill="#047857">Rust — assembled</text>

  <rect x="40" y="68" width="300" height="68" rx="8" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.6"/>
  <text x="190" y="98" text-anchor="middle" font-size="15" font-weight="700" fill="#0E7490">goroutines</text>
  <text x="190" y="122" text-anchor="middle" font-size="13" fill="#0E7490">stackful — own stack each</text>

  <rect x="40" y="168" width="300" height="108" rx="8" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.8"/>
  <text x="190" y="198" text-anchor="middle" font-size="15" font-weight="700" fill="#6D28D9">Go runtime — built in</text>
  <text x="190" y="226" text-anchor="middle" font-size="13" fill="#6D28D9">GMP scheduler</text>
  <text x="190" y="252" text-anchor="middle" font-size="13" fill="#6D28D9">netpoller (epoll)</text>

  <rect x="40" y="308" width="300" height="56" rx="8" fill="#F8FAFC" stroke="#475569" stroke-width="1.5"/>
  <text x="190" y="342" text-anchor="middle" font-size="14" font-weight="700" fill="#334155">OS threads ≈ cores</text>

  <rect x="450" y="68" width="300" height="68" rx="8" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.6"/>
  <text x="600" y="98" text-anchor="middle" font-size="15" font-weight="700" fill="#0E7490">async tasks — Futures</text>
  <text x="600" y="122" text-anchor="middle" font-size="13" fill="#0E7490">stackless state machines</text>

  <rect x="450" y="168" width="120" height="88" rx="8" fill="#ECFDF5" stroke="#059669" stroke-width="1.6"/>
  <text x="510" y="200" text-anchor="middle" font-size="14" font-weight="700" fill="#047857">Executor</text>
  <text x="510" y="226" text-anchor="middle" font-size="13" fill="#047857">tokio</text>

  <rect x="630" y="168" width="120" height="88" rx="8" fill="#ECFDF5" stroke="#059669" stroke-width="1.6"/>
  <text x="690" y="200" text-anchor="middle" font-size="14" font-weight="700" fill="#047857">Reactor</text>
  <text x="690" y="226" text-anchor="middle" font-size="13" fill="#047857">mio</text>

  <rect x="566" y="190" width="68" height="44" rx="6" fill="#FFFBEB" stroke="#D97706" stroke-width="1.8"/>
  <text x="600" y="217" text-anchor="middle" font-size="13" font-weight="700" fill="#B45309">Waker</text>
  <text x="600" y="284" text-anchor="middle" font-size="13" font-weight="700" fill="#B45309">the only seam</text>

  <rect x="450" y="308" width="300" height="56" rx="8" fill="#F8FAFC" stroke="#475569" stroke-width="1.5"/>
  <text x="600" y="342" text-anchor="middle" font-size="14" font-weight="700" fill="#334155">OS threads ≈ cores</text>
</svg>
