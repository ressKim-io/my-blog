<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" role="img" aria-labelledby="t5 d5" font-family="Pretendard, ui-sans-serif, system-ui, -apple-system, sans-serif">
  <title id="t5">Baked into the runtime (Go) vs assembled from libraries (Rust)</title>
  <desc id="d5">Left: Go runs stackful goroutines on a GMP scheduler and netpoller built into the language runtime, shipped in every binary, with no way to swap the architecture. Right: Rust compiles async tasks into stackless state machines and assembles an executor such as tokio with a reactor such as mio in user land. The Waker interface is the only seam, so the whole runtime can be replaced, for example by glommio with thread-per-core and io_uring.</desc>
  <defs>
    <marker id="m5" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#475569"/>
    </marker>
    <marker id="m5v" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#7C3AED"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="800" height="440" fill="#FFFFFF"/>

  <text x="400" y="26" text-anchor="middle" font-size="12" fill="#64748B">same problem — millions of I/O tasks on a few threads</text>

  <line x1="400" y1="44" x2="400" y2="416" stroke="#D4D4D8" stroke-width="1.2" stroke-dasharray="5 4"/>

  <text x="208" y="60" text-anchor="middle" font-size="12.5" font-weight="700" fill="#047857">Go — integrated</text>
  <text x="600" y="60" text-anchor="middle" font-size="12.5" font-weight="700" fill="#6D28D9">Rust — assembled</text>

  <rect x="80" y="80" width="256" height="48" rx="8" fill="#F8FAFC" stroke="#475569" stroke-width="1.4"/>
  <text x="208" y="100" text-anchor="middle" font-size="11.5" font-weight="700" fill="#334155">goroutines</text>
  <text x="208" y="117" text-anchor="middle" font-size="10.5" fill="#334155">stackful coroutines — own stack each</text>

  <line x1="208" y1="128" x2="208" y2="152" stroke="#475569" stroke-width="1.5" marker-end="url(#m5)"/>

  <rect x="80" y="156" width="256" height="104" rx="8" fill="#ECFDF5" stroke="#059669" stroke-width="1.6"/>
  <text x="208" y="180" text-anchor="middle" font-size="12" font-weight="700" fill="#047857">Go runtime — built in</text>
  <text x="208" y="204" text-anchor="middle" font-size="10.5" fill="#047857">GMP scheduler</text>
  <text x="208" y="222" text-anchor="middle" font-size="10.5" fill="#047857">netpoller (epoll)</text>
  <text x="208" y="246" text-anchor="middle" font-size="10" fill="#64748B">ships in every binary</text>

  <line x1="208" y1="260" x2="208" y2="284" stroke="#475569" stroke-width="1.5" marker-end="url(#m5)"/>

  <rect x="80" y="288" width="256" height="44" rx="8" fill="#F8FAFC" stroke="#475569" stroke-width="1.4"/>
  <text x="208" y="315" text-anchor="middle" font-size="11.5" fill="#334155">OS threads (M) ≈ cores</text>

  <rect x="80" y="360" width="256" height="56" rx="8" fill="#ECFDF5" stroke="#A7F3D0" stroke-width="1.2"/>
  <text x="208" y="382" text-anchor="middle" font-size="10.5" fill="#047857">no assembly, no choice —</text>
  <text x="208" y="399" text-anchor="middle" font-size="10.5" fill="#047857">the architecture cannot be swapped</text>

  <rect x="456" y="80" width="288" height="48" rx="8" fill="#F8FAFC" stroke="#475569" stroke-width="1.4"/>
  <text x="600" y="100" text-anchor="middle" font-size="11.5" font-weight="700" fill="#334155">async tasks = Futures</text>
  <text x="600" y="117" text-anchor="middle" font-size="10.5" fill="#334155">stackless state machines (compiler-made)</text>

  <line x1="516" y1="128" x2="516" y2="152" stroke="#475569" stroke-width="1.5" marker-end="url(#m5)"/>

  <rect x="456" y="156" width="120" height="104" rx="8" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.6"/>
  <text x="516" y="180" text-anchor="middle" font-size="12" font-weight="700" fill="#6D28D9">Executor</text>
  <text x="516" y="198" text-anchor="middle" font-size="10.5" fill="#6D28D9">(tokio)</text>
  <text x="516" y="222" text-anchor="middle" font-size="10.5" fill="#6D28D9">worker pool</text>
  <text x="516" y="240" text-anchor="middle" font-size="10.5" fill="#6D28D9">work stealing</text>

  <rect x="624" y="156" width="120" height="104" rx="8" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.6"/>
  <text x="684" y="180" text-anchor="middle" font-size="12" font-weight="700" fill="#0E7490">Reactor</text>
  <text x="684" y="198" text-anchor="middle" font-size="10.5" fill="#0E7490">(mio)</text>
  <text x="684" y="222" text-anchor="middle" font-size="10.5" fill="#0E7490">epoll events</text>

  <text x="600" y="188" text-anchor="middle" font-size="10.5" font-weight="700" fill="#6D28D9">Waker</text>
  <line x1="582" y1="202" x2="618" y2="202" stroke="#7C3AED" stroke-width="1.5" marker-end="url(#m5v)"/>
  <line x1="618" y1="216" x2="582" y2="216" stroke="#7C3AED" stroke-width="1.5" marker-end="url(#m5v)"/>
  <text x="600" y="238" text-anchor="middle" font-size="9.5" fill="#64748B">the only seam</text>

  <line x1="516" y1="260" x2="516" y2="284" stroke="#475569" stroke-width="1.5" marker-end="url(#m5)"/>

  <rect x="456" y="288" width="288" height="44" rx="8" fill="#F8FAFC" stroke="#475569" stroke-width="1.4"/>
  <text x="600" y="315" text-anchor="middle" font-size="11.5" fill="#334155">OS worker threads ≈ cores</text>

  <rect x="456" y="360" width="288" height="56" rx="8" fill="#F5F3FF" stroke="#DDD6FE" stroke-width="1.2"/>
  <text x="600" y="382" text-anchor="middle" font-size="10.5" fill="#6D28D9">the Waker seam → swap the whole runtime</text>
  <text x="600" y="399" text-anchor="middle" font-size="10.5" fill="#6D28D9">e.g. glommio: thread-per-core + io_uring</text>
</svg>
