<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" width="100%" height="100%">
  <defs>
    <style>
      .bg { fill: #F8FAFC; }
      .title { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 18px; font-weight: 700; fill: #0F172A; }
      .subtitle { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 14px; font-weight: 500; fill: #475569; }
      .box-legacy { fill: #FEF2F2; stroke: #EF4444; stroke-width: 2; rx: 8; }
      .box-ebpf { fill: #F0FDF4; stroke: #10B981; stroke-width: 2; rx: 8; }
      .box-inner { fill: #FFFFFF; stroke: #CBD5E1; stroke-width: 1.5; rx: 6; }
      .txt-header { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 16px; font-weight: 700; fill: #1E293B; text-anchor: middle; }
      .txt-sub { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 13px; font-weight: 600; fill: #64748B; text-anchor: middle; }
      .txt-body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 14px; font-weight: 500; fill: #334155; text-anchor: middle; }
      .txt-red { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 14px; font-weight: 700; fill: #EF4444; text-anchor: middle; }
      .txt-green { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 14px; font-weight: 700; fill: #10B981; text-anchor: middle; }
      .arrow { stroke: #64748B; stroke-width: 2; marker-end: url(#arrowhead); fill: none; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748B"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="480" class="bg" rx="12"/>

  <!-- Title Section -->
  <text x="40" y="42" class="title">Kubernetes Service Routing: kube-proxy (iptables) vs Cilium eBPF Socket LB</text>
  <text x="40" y="66" class="subtitle">cgroup v2 Connect Hook Bypassing O(N) Netfilter Chains &amp; Conntrack Tables</text>

  <!-- Left Column: Legacy kube-proxy Path -->
  <rect x="40" y="96" width="340" height="350" class="box-legacy"/>
  <text x="210" y="132" class="txt-header">kube-proxy (iptables / conntrack)</text>
  <text x="210" y="154" class="txt-red">O(N) Linear Traversal &amp; NAT Overhead</text>

  <rect x="64" y="174" width="292" height="54" class="box-inner"/>
  <text x="210" y="198" class="txt-header">1. Pod connect(ClusterIP)</text>
  <text x="210" y="218" class="txt-sub">Socket enters Linux TCP/IP Stack</text>

  <path d="M 210 228 L 210 248" class="arrow"/>

  <rect x="64" y="248" width="292" height="64" class="box-inner"/>
  <text x="210" y="272" class="txt-header">2. Netfilter / iptables Chains</text>
  <text x="210" y="294" class="txt-sub">KUBE-SERVICES → KUBE-SVC-* (5,000+ rules)</text>

  <path d="M 210 312 L 210 332" class="arrow"/>

  <rect x="64" y="332" width="292" height="92" class="box-inner"/>
  <text x="210" y="356" class="txt-header">3. nf_conntrack NAT Lookup</text>
  <text x="210" y="378" class="txt-body">Stateful Tracking &amp; Lock Contention</text>
  <text x="210" y="402" class="txt-red">Result: High Latency &amp; Memory Footprint</text>

  <!-- Right Column: Cilium eBPF Socket LB Path -->
  <rect x="420" y="96" width="340" height="350" class="box-ebpf"/>
  <text x="590" y="132" class="txt-header">Cilium eBPF Socket LB (sockops)</text>
  <text x="590" y="154" class="txt-green">In-Place Translation at cgroup v2 Hook</text>

  <rect x="444" y="174" width="292" height="54" class="box-inner"/>
  <text x="590" y="198" class="txt-header">1. Pod connect(ClusterIP)</text>
  <text x="590" y="218" class="txt-sub">BPF_CGROUP_INET4_CONNECT Triggered</text>

  <path d="M 590 228 L 590 248" class="arrow"/>

  <rect x="444" y="248" width="292" height="64" class="box-inner"/>
  <text x="590" y="272" class="txt-header">2. __sock4_xlate_fwd (bpf_sock.c)</text>
  <text x="590" y="294" class="txt-sub">O(1) Map Lookup &amp; In-Place IP/Port Rewrite</text>

  <path d="M 590 312 L 590 332" class="arrow"/>

  <rect x="444" y="332" width="292" height="92" class="box-inner"/>
  <text x="590" y="356" class="txt-header">3. Direct Socket Transmission</text>
  <text x="590" y="378" class="txt-body">sk_msg_redirect_hash / redirect_ep</text>
  <text x="590" y="402" class="txt-green">Measured: 89 rules / 94.4 Gbps Throughput</text>
</svg>
