<svg role="img" aria-labelledby="title-2 desc-2" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" width="100%" height="auto" style="font-family: 'Pretendard', system-ui, sans-serif;">
  <title id="title-2">goroutine 다중화 — 적은 OS 스레드에 다수 goroutine 매핑</title>
  <desc id="desc-2">수천 개의 goroutine이 단 몇 개의 OS 스레드에 다중화되는 구조. channel 통신과 syscall 발생 시 goroutine이 블록되고 다른 goroutine이 M을 이어받는 흐름을 보여줌</desc>

  <style>
    .title-text { font-size: 15px; font-weight: 600; fill: #0A0A0A; }
    .subtitle   { font-size: 12px; fill: #475569; }
    .label-main { font-size: 13px; font-weight: 600; fill: #0A0A0A; }
    .label-sub  { font-size: 11px; fill: #27272A; }
    .label-tiny { font-size: 10px; fill: #475569; }
    .badge      { font-size: 10px; font-weight: 600; }
    .legend-text { font-size: 11px; fill: #334155; }
  </style>

  <rect x="0" y="0" width="800" height="520" fill="#FAFAFA"/>

  <!-- 제목 -->
  <text x="400" y="32" text-anchor="middle" class="title-text">goroutine 다중화 — N:M 스레드 모델</text>
  <text x="400" y="50" text-anchor="middle" class="subtitle">수천 개의 goroutine을 적은 수의 OS 스레드에 효율적으로 매핑</text>

  <!-- ── 왼쪽: Java / OS Thread-per-Request ── -->
  <rect x="48" y="66" width="304" height="340" rx="8" fill="#FFF1F2" stroke="#E11D48" stroke-width="1.5"/>
  <text x="200" y="90" text-anchor="middle" class="label-main" fill="#BE123C">Java — 1스레드 : 1요청</text>
  <text x="200" y="108" text-anchor="middle" class="label-tiny">(전통적 Thread-per-Request 모델)</text>

  <!-- Java 스레드 박스 8개 (각 MB 단위) -->
  <rect x="64" y="120" width="120" height="32" rx="4" fill="#ECFEFF" stroke="#0891B2" stroke-width="1"/>
  <text x="124" y="137" text-anchor="middle" class="label-sub">Thread-1 (~1MB)</text>
  <rect x="196" y="120" width="120" height="32" rx="4" fill="#ECFEFF" stroke="#0891B2" stroke-width="1"/>
  <text x="256" y="137" text-anchor="middle" class="label-sub">Thread-2 (~1MB)</text>
  <rect x="64" y="160" width="120" height="32" rx="4" fill="#ECFEFF" stroke="#0891B2" stroke-width="1"/>
  <text x="124" y="177" text-anchor="middle" class="label-sub">Thread-3 (~1MB)</text>
  <rect x="196" y="160" width="120" height="32" rx="4" fill="#ECFEFF" stroke="#0891B2" stroke-width="1"/>
  <text x="256" y="177" text-anchor="middle" class="label-sub">Thread-4 (~1MB)</text>
  <rect x="64" y="200" width="120" height="32" rx="4" fill="#ECFEFF" stroke="#0891B2" stroke-width="1"/>
  <text x="124" y="217" text-anchor="middle" class="label-sub">Thread-5 (~1MB)</text>
  <rect x="196" y="200" width="120" height="32" rx="4" fill="#ECFEFF" stroke="#0891B2" stroke-width="1"/>
  <text x="256" y="217" text-anchor="middle" class="label-sub">Thread-6 (~1MB)</text>
  <rect x="64" y="240" width="120" height="32" rx="4" fill="#ECFEFF" stroke="#0891B2" stroke-width="1"/>
  <text x="124" y="257" text-anchor="middle" class="label-sub">Thread-7 (~1MB)</text>
  <rect x="196" y="240" width="120" height="32" rx="4" fill="#ECFEFF" stroke="#0891B2" stroke-width="1"/>
  <text x="256" y="257" text-anchor="middle" class="label-sub">Thread-8 (~1MB)</text>
  <!-- 점점이 -->
  <text x="200" y="286" text-anchor="middle" class="label-sub" fill="#BE123C">... (수백 개, 수백 MB)</text>

  <!-- 문제점 표시 -->
  <rect x="64" y="300" width="272" height="56" rx="4" fill="#FFF1F2" stroke="#E11D48" stroke-width="1" stroke-dasharray="4 2"/>
  <text x="200" y="318" text-anchor="middle" class="label-sub" fill="#BE123C">스택 1MB × 스레드 수 = 수백 MB</text>
  <text x="200" y="334" text-anchor="middle" class="label-tiny" fill="#BE123C">OS 컨텍스트 스위칭: 마이크로초 단위 비용</text>
  <text x="200" y="350" text-anchor="middle" class="label-tiny" fill="#BE123C">스레드 수가 늘수록 스케줄링 오버헤드 증가</text>

  <!-- ── 오른쪽: Go goroutine ── -->
  <rect x="448" y="66" width="304" height="340" rx="8" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="600" y="90" text-anchor="middle" class="label-main" fill="#047857">Go — N goroutine : M OS thread</text>
  <text x="600" y="108" text-anchor="middle" class="label-tiny">(GMP 스케줄러 다중화)</text>

  <!-- goroutine 박스 다수 (작게) -->
  <rect x="464" y="120" width="56" height="24" rx="3" fill="#ECFDF5" stroke="#059669" stroke-width="1"/>
  <text x="492" y="136" text-anchor="middle" class="badge" fill="#047857">G1 2KB</text>
  <rect x="528" y="120" width="56" height="24" rx="3" fill="#ECFDF5" stroke="#059669" stroke-width="1"/>
  <text x="556" y="136" text-anchor="middle" class="badge" fill="#047857">G2 2KB</text>
  <rect x="592" y="120" width="56" height="24" rx="3" fill="#ECFDF5" stroke="#059669" stroke-width="1"/>
  <text x="620" y="136" text-anchor="middle" class="badge" fill="#047857">G3 2KB</text>
  <rect x="656" y="120" width="80" height="24" rx="3" fill="#ECFDF5" stroke="#059669" stroke-width="1"/>
  <text x="696" y="136" text-anchor="middle" class="badge" fill="#047857">G4 2KB</text>

  <rect x="464" y="152" width="56" height="24" rx="3" fill="#ECFDF5" stroke="#059669" stroke-width="1"/>
  <text x="492" y="168" text-anchor="middle" class="badge" fill="#047857">G5 2KB</text>
  <rect x="528" y="152" width="56" height="24" rx="3" fill="#ECFDF5" stroke="#059669" stroke-width="1"/>
  <text x="556" y="168" text-anchor="middle" class="badge" fill="#047857">G6 2KB</text>
  <rect x="592" y="152" width="56" height="24" rx="3" fill="#ECFDF5" stroke="#059669" stroke-width="1"/>
  <text x="620" y="168" text-anchor="middle" class="badge" fill="#047857">G7 2KB</text>
  <rect x="656" y="152" width="80" height="24" rx="3" fill="#ECFDF5" stroke="#059669" stroke-width="1"/>
  <text x="696" y="168" text-anchor="middle" class="badge" fill="#047857">G8 2KB</text>

  <rect x="464" y="184" width="56" height="24" rx="3" fill="#ECFDF5" stroke="#059669" stroke-width="1"/>
  <text x="492" y="200" text-anchor="middle" class="badge" fill="#047857">G9 2KB</text>
  <rect x="528" y="184" width="56" height="24" rx="3" fill="#ECFDF5" stroke="#059669" stroke-width="1"/>
  <text x="556" y="200" text-anchor="middle" class="badge" fill="#047857">G10 2KB</text>
  <rect x="592" y="184" width="60" height="24" rx="3" fill="#ECFDF5" stroke="#059669" stroke-width="1"/>
  <text x="622" y="200" text-anchor="middle" class="badge" fill="#047857">G11 2KB</text>
  <rect x="660" y="184" width="76" height="24" rx="3" fill="#ECFDF5" stroke="#059669" stroke-width="1"/>
  <text x="698" y="200" text-anchor="middle" class="badge" fill="#047857">G12 2KB</text>

  <text x="600" y="226" text-anchor="middle" class="label-sub" fill="#047857">... (수천 개, 수 MB 합산)</text>

  <!-- Go OS 스레드 (적은 수) -->
  <rect x="472" y="244" width="100" height="32" rx="4" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.5"/>
  <text x="522" y="264" text-anchor="middle" class="label-sub" fill="#0E7490">M0 (OS Thread)</text>
  <rect x="588" y="244" width="100" height="32" rx="4" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.5"/>
  <text x="638" y="264" text-anchor="middle" class="label-sub" fill="#0E7490">M1 (OS Thread)</text>
  <text x="600" y="300" text-anchor="middle" class="label-tiny" fill="#0E7490">CPU 코어 수 == GOMAXPROCS == P 개수</text>

  <!-- 이점 표시 -->
  <rect x="464" y="308" width="272" height="56" rx="4" fill="#ECFDF5" stroke="#059669" stroke-width="1"/>
  <text x="600" y="326" text-anchor="middle" class="label-sub" fill="#047857">스택 2KB → 동일 메모리에 500배 이상 goroutine</text>
  <text x="600" y="342" text-anchor="middle" class="label-tiny" fill="#047857">goroutine 전환: 런타임 내 컨텍스트 스위칭 (수 나노초)</text>
  <text x="600" y="358" text-anchor="middle" class="label-tiny" fill="#047857">channel 블록 시 G만 대기 → M은 다른 G 즉시 실행</text>

  <!-- ── channel 블록 흐름 ── -->
  <rect x="48" y="432" width="704" height="68" rx="8" fill="#F8FAFC" stroke="#475569" stroke-width="1.5"/>
  <text x="400" y="452" text-anchor="middle" class="label-main" fill="#334155">channel recv 블록 시 goroutine 전환 흐름</text>
  <text x="400" y="470" text-anchor="middle" class="label-tiny">G1이 channel recv로 블록 → 런타임이 G1을 대기 상태로 전환 → M이 P 큐에서 G2를 꺼내 즉시 실행</text>
  <text x="400" y="486" text-anchor="middle" class="label-tiny">OS 커널 컨텍스트 스위칭 없음 — 런타임 레벨에서만 처리 (수 나노초)</text>

  <defs>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#059669"/>
    </marker>
  </defs>
</svg>
