<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-labelledby="t5 d5" font-family="Pretendard, ui-sans-serif, system-ui, -apple-system, sans-serif">
  <title id="t5">Cost Conservation Law: Shifted Responsibility</title>
  <desc id="d5">Avoiding runtime tuning shifts complexity and memory management responsibility to the engineer.</desc>
  <rect x="0" y="0" width="800" height="400" fill="#FFFFFF"/>

  <!-- Top: Cost Conservation -->
  <rect x="50" y="30" width="700" height="65" rx="10" fill="#F8FAFC" stroke="#475569" stroke-width="2"/>
  <text x="400" y="58" text-anchor="middle" font-size="18" font-weight="700" fill="#0A0A0A">Cost Conservation Law</text>
  <text x="400" y="80" text-anchor="middle" font-size="14" fill="#64748B">Complexity avoided in runtime tuning is shifted to engineer management contracts</text>

  <!-- Left: System Avoided Costs -->
  <rect x="50" y="125" width="330" height="240" rx="12" fill="#ECFEFF" stroke="#0891B2" stroke-width="2.5"/>
  <text x="215" y="162" text-anchor="middle" font-size="17" font-weight="700" fill="#0E7490">System Complexity Avoided</text>
  <text x="215" y="185" text-anchor="middle" font-size="14" fill="#0E7490">(No Runtime Knobs in Binary)</text>

  <rect x="75" y="210" width="280" height="130" rx="8" fill="#FFFFFF" stroke="#0891B2" stroke-width="1.5"/>
  <text x="215" y="242" text-anchor="middle" font-size="15" font-weight="700" fill="#0E7490">Zero Dynamic Tuning</text>
  <text x="215" y="268" text-anchor="middle" font-size="13" fill="#27272A">No GOMEMLIMIT / GOGC calculations</text>
  <text x="215" y="290" text-anchor="middle" font-size="13" fill="#27272A">No OS Thread 1:1 stack allocations</text>
  <text x="215" y="312" text-anchor="middle" font-size="13" fill="#27272A">No polling &amp; repeated serialization</text>

  <!-- Arrow -->
  <line x1="380" y1="245" x2="420" y2="245" stroke="#E11D48" stroke-width="3"/>
  <polygon points="420,239 432,245 420,251" fill="#E11D48"/>
  <text x="406" y="230" text-anchor="middle" font-size="14" font-weight="700" fill="#BE123C">Shifted</text>

  <!-- Right: Engineer Responsibility -->
  <rect x="432" y="125" width="318" height="240" rx="12" fill="#FFF1F2" stroke="#E11D48" stroke-width="2.5"/>
  <text x="591" y="162" text-anchor="middle" font-size="17" font-weight="700" fill="#BE123C">Engineer Responsibility (The Bill)</text>
  <text x="591" y="185" text-anchor="middle" font-size="14" fill="#BE123C">(Strict Memory &amp; Cache Contracts)</text>

  <rect x="452" y="210" width="278" height="130" rx="8" fill="#FFFFFF" stroke="#E11D48" stroke-width="1.5"/>
  <text x="591" y="242" text-anchor="middle" font-size="15" font-weight="700" fill="#BE123C">Strict Immutability Contract</text>
  <text x="591" y="268" text-anchor="middle" font-size="13" fill="#27272A">Never mutate Informer pointers (Post 26)</text>
  <text x="591" y="290" text-anchor="middle" font-size="13" fill="#27272A">Manage sync.Pool lifecycles (Post 25)</text>
  <text x="591" y="312" text-anchor="middle" font-size="13" fill="#27272A">Monitor goroutine explosions (Post 24)</text>
</svg>
