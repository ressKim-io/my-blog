<svg xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title-2 desc-2"
     viewBox="0 0 800 560" width="100%" height="auto"
     style="font-family: 'Pretendard', system-ui, sans-serif;">
  <title id="title-2">go-ti 복제 배치 — GCP 내 streaming vs cross-cloud pglogical</title>
  <desc id="desc-2">GCE VM Primary에서 GCP Standby로는 streaming replication(물리)을, AWS RDS로는 pglogical(논리 복제)을 사용하는 go-ti 멀티클라우드 DB 복제 구조입니다</desc>

  <!-- Background -->
  <rect width="800" height="560" fill="#FAFAFA"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-size="15" font-weight="600" fill="#0A0A0A">go-ti 복제 배치 — GCP 내 Streaming / Cross-cloud pglogical</text>

  <!-- =================== GCP Region =================== -->
  <rect x="40" y="56" width="440" height="400" rx="10" fill="#FFFBEB" stroke="#D97706" stroke-width="1.5" stroke-dasharray="6 3"/>
  <text x="260" y="78" text-anchor="middle" font-size="12" font-weight="700" fill="#B45309">GCP (asia-northeast3)</text>

  <!-- GCE VM Primary -->
  <rect x="100" y="96" width="200" height="120" rx="8" fill="#FEF3C7" stroke="#D97706" stroke-width="2"/>
  <text x="200" y="118" text-anchor="middle" font-size="13" font-weight="700" fill="#92400E">GCE VM Primary</text>
  <text x="200" y="136" text-anchor="middle" font-size="11" fill="#B45309">e2-standard-2</text>
  <text x="200" y="152" text-anchor="middle" font-size="11" fill="#B45309">PostgreSQL 16.13</text>
  <text x="200" y="168" text-anchor="middle" font-size="11" fill="#B45309">pglogical 2.4.6</text>
  <text x="200" y="184" text-anchor="middle" font-size="11" fill="#B45309">34.64.74.209 (static)</text>
  <text x="200" y="200" text-anchor="middle" font-size="10" fill="#92400E">쓰기 + 읽기</text>

  <!-- Arrow: Primary → WAL -->
  <line x1="200" y1="216" x2="200" y2="256" stroke="#0A0A0A" stroke-width="1.5" marker-end="url(#arr-black2)"/>

  <!-- WAL box -->
  <rect x="130" y="256" width="140" height="40" rx="6" fill="#FFFBEB" stroke="#D97706" stroke-width="1.5"/>
  <text x="200" y="272" text-anchor="middle" font-size="12" font-weight="600" fill="#B45309">WAL Stream</text>
  <text x="200" y="288" text-anchor="middle" font-size="10" fill="#B45309">블록 바이트 / pg_wal/</text>

  <!-- Arrow: WAL → Standby (physical, down-right) -->
  <line x1="200" y1="296" x2="200" y2="336" stroke="#D97706" stroke-width="2" stroke-dasharray="5 2" marker-end="url(#arr-amber2)"/>
  <text x="208" y="322" font-size="11" fill="#B45309">streaming</text>

  <!-- GCE VM Standby -->
  <rect x="100" y="336" width="200" height="88" rx="8" fill="#FFFBEB" stroke="#D97706" stroke-width="1.5"/>
  <text x="200" y="358" text-anchor="middle" font-size="13" font-weight="600" fill="#B45309">GCE VM Standby</text>
  <text x="200" y="374" text-anchor="middle" font-size="11" fill="#B45309">PostgreSQL 16 (동일 버전)</text>
  <text x="200" y="390" text-anchor="middle" font-size="11" fill="#B45309">Hot Standby</text>
  <text x="200" y="406" text-anchor="middle" font-size="10" fill="#92400E">읽기 전용 — Phase B 활성</text>

  <!-- Physical label -->
  <rect x="330" y="310" width="120" height="44" rx="6" fill="#FEF3C7" stroke="#D97706" stroke-width="1"/>
  <text x="390" y="328" text-anchor="middle" font-size="11" font-weight="600" fill="#92400E">물리 복제</text>
  <text x="390" y="342" text-anchor="middle" font-size="10" fill="#B45309">같은 클러스터 내부</text>
  <text x="390" y="354" text-anchor="middle" font-size="10" fill="#B45309">단순 · 저지연</text>

  <!-- Connector line from WAL to label -->
  <line x1="270" y1="336" x2="330" y2="332" stroke="#D97706" stroke-width="1" stroke-dasharray="3 2"/>

  <!-- pglogical path from Primary (WAL) to border -->
  <!-- Arrow: WAL → logical decode -->
  <line x1="272" y1="276" x2="358" y2="276" stroke="#7C3AED" stroke-width="2" marker-end="url(#arr-violet2)"/>
  <rect x="278" y="262" width="76" height="14" rx="2" fill="#FAFAFA"/>
  <text x="316" y="273" text-anchor="middle" font-size="10" fill="#6D28D9">논리 디코딩</text>

  <!-- Logical decode box inside GCP -->
  <rect x="358" y="256" width="100" height="40" rx="6" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="408" y="272" text-anchor="middle" font-size="11" font-weight="600" fill="#6D28D9">replication</text>
  <text x="408" y="286" text-anchor="middle" font-size="11" fill="#6D28D9">slot + pub</text>

  <!-- Arrow: pub → cross-cloud boundary -->
  <line x1="458" y1="276" x2="510" y2="276" stroke="#7C3AED" stroke-width="2" stroke-dasharray="5 2" marker-end="url(#arr-violet2)"/>
  <rect x="463" y="263" width="42" height="14" rx="2" fill="#FAFAFA"/>
  <text x="484" y="274" text-anchor="middle" font-size="10" fill="#6D28D9">TLS</text>

  <!-- Logical label -->
  <rect x="330" y="180" width="120" height="60" rx="6" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1"/>
  <text x="390" y="198" text-anchor="middle" font-size="11" font-weight="600" fill="#4C1D95">논리 복제</text>
  <text x="390" y="212" text-anchor="middle" font-size="10" fill="#6D28D9">크로스 클라우드</text>
  <text x="390" y="226" text-anchor="middle" font-size="10" fill="#6D28D9">행 이벤트 스트림</text>
  <text x="390" y="240" text-anchor="middle" font-size="10" fill="#6D28D9">시퀀스·DDL 복제</text>

  <!-- Connector from WAL to logical label -->
  <line x1="270" y1="270" x2="330" y2="224" stroke="#7C3AED" stroke-width="1" stroke-dasharray="3 2"/>

  <!-- =================== AWS Region =================== -->
  <rect x="520" y="136" width="240" height="200" rx="10" fill="#ECFDF5" stroke="#059669" stroke-width="1.5" stroke-dasharray="6 3"/>
  <text x="640" y="160" text-anchor="middle" font-size="12" font-weight="700" fill="#047857">AWS (ap-northeast-2)</text>

  <!-- apply worker -->
  <rect x="560" y="176" width="160" height="40" rx="6" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="640" y="196" text-anchor="middle" font-size="12" font-weight="600" fill="#047857">apply worker</text>
  <text x="640" y="210" text-anchor="middle" font-size="10" fill="#047857">pglogical subscriber</text>

  <!-- Arrow apply → RDS -->
  <line x1="640" y1="216" x2="640" y2="248" stroke="#0A0A0A" stroke-width="1.5" marker-end="url(#arr-black2)"/>

  <!-- AWS RDS -->
  <rect x="540" y="248" width="200" height="72" rx="8" fill="#D1FAE5" stroke="#059669" stroke-width="2"/>
  <text x="640" y="270" text-anchor="middle" font-size="13" font-weight="700" fill="#047857">AWS RDS</text>
  <text x="640" y="286" text-anchor="middle" font-size="11" fill="#065F46">db.r6g.large · PG 16</text>
  <text x="640" y="302" text-anchor="middle" font-size="11" fill="#065F46">read_only = on</text>
  <text x="640" y="316" text-anchor="middle" font-size="10" fill="#047857">읽기 전용 (SELECT only)</text>

  <!-- Arrow from GCP border to apply worker -->
  <line x1="510" y1="276" x2="560" y2="216" stroke="#7C3AED" stroke-width="2" stroke-dasharray="5 2" marker-end="url(#arr-violet2)"/>

  <!-- cross-cloud bandwidth note -->
  <rect x="520" y="352" width="240" height="40" rx="6" fill="#F0FDF4" stroke="#059669" stroke-width="1"/>
  <text x="640" y="368" text-anchor="middle" font-size="11" fill="#047857">NAT IP 15.164.8.237/32 allowlist</text>
  <text x="640" y="384" text-anchor="middle" font-size="11" fill="#047857">cross-cloud lag &lt; 5s 목표</text>

  <!-- =================== Legend =================== -->
  <rect x="40" y="470" width="720" height="72" rx="6" fill="#F8FAFC" stroke="#E4E4E7" stroke-width="1"/>
  <text x="60" y="488" font-size="11" font-weight="700" fill="#0A0A0A">범례</text>
  <!-- amber line -->
  <line x1="60" y1="506" x2="110" y2="506" stroke="#D97706" stroke-width="2" stroke-dasharray="5 2"/>
  <text x="116" y="510" font-size="11" fill="#B45309">물리 복제 (streaming) — WAL 블록 그대로</text>
  <!-- violet line -->
  <line x1="60" y1="526" x2="110" y2="526" stroke="#7C3AED" stroke-width="2" stroke-dasharray="5 2"/>
  <text x="116" y="530" font-size="11" fill="#6D28D9">논리 복제 (pglogical) — 행 이벤트, cross-cloud</text>
  <!-- green note -->
  <text x="430" y="510" font-size="11" fill="#047857">AWS RDS: 쓰기 차단(default_transaction_read_only=on)</text>
  <text x="430" y="530" font-size="11" fill="#B45309">GCE Standby: Phase B 활성 예정 (물리 복제 경로)</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arr-black2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#0A0A0A"/>
    </marker>
    <marker id="arr-amber2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#D97706"/>
    </marker>
    <marker id="arr-violet2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7C3AED"/>
    </marker>
  </defs>
</svg>
