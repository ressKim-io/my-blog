<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-labelledby="t2 d2" font-family="Pretendard, ui-sans-serif, system-ui, -apple-system, sans-serif">
  <title id="t2">Arena, span and slot: three nested units of measure</title>
  <desc id="d2">The runtime reserves memory from the kernel in 64 megabyte arenas. An arena is cut into spans, each span being a run of contiguous 8 kilobyte pages, and every span serves exactly one size class. Inside a span the space is divided into identical slots, so a span for 24 byte objects holds nothing but 24 byte slots while a span for 512 byte objects holds only 512 byte slots.</desc>
  <rect x="0" y="0" width="800" height="400" fill="#FFFFFF"/>

  <rect x="48" y="56" width="704" height="272" rx="12" fill="#FFFBEB" stroke="#D97706" stroke-width="2"/>
  <text x="68" y="90" font-size="15" font-weight="700" fill="#B45309">arena · 64MB</text>
  <text x="732" y="90" text-anchor="end" font-size="13" fill="#B45309">mmap reserve</text>

  <rect x="72" y="112" width="400" height="192" rx="9" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.8"/>
  <text x="92" y="144" font-size="14" font-weight="700" fill="#6D28D9">span · 24B class</text>
  <rect x="88" y="160" width="120" height="36" rx="5" fill="#FFFFFF" stroke="#7C3AED" stroke-width="1.3" stroke-dasharray="5 3"/>
  <text x="148" y="184" text-anchor="middle" font-size="13" fill="#6D28D9">8KB page</text>
  <rect x="212" y="160" width="120" height="36" rx="5" fill="#FFFFFF" stroke="#7C3AED" stroke-width="1.3" stroke-dasharray="5 3"/>
  <rect x="336" y="160" width="120" height="36" rx="5" fill="#FFFFFF" stroke="#7C3AED" stroke-width="1.3" stroke-dasharray="5 3"/>

  <rect x="88" y="220" width="40" height="56" rx="5" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.5"/>
  <rect x="134" y="220" width="40" height="56" rx="5" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.5"/>
  <rect x="180" y="220" width="40" height="56" rx="5" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.5"/>
  <rect x="226" y="220" width="40" height="56" rx="5" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.5"/>
  <rect x="272" y="220" width="40" height="56" rx="5" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.5"/>
  <rect x="318" y="220" width="40" height="56" rx="5" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.5"/>
  <rect x="364" y="220" width="40" height="56" rx="5" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.5"/>
  <rect x="410" y="220" width="40" height="56" rx="5" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.5"/>

  <rect x="496" y="112" width="232" height="192" rx="9" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.8"/>
  <text x="516" y="144" font-size="14" font-weight="700" fill="#6D28D9">span · 512B class</text>
  <rect x="512" y="160" width="200" height="36" rx="5" fill="#FFFFFF" stroke="#7C3AED" stroke-width="1.3" stroke-dasharray="5 3"/>

  <rect x="512" y="220" width="44" height="56" rx="5" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.5"/>
  <rect x="564" y="220" width="44" height="56" rx="5" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.5"/>
  <rect x="616" y="220" width="44" height="56" rx="5" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.5"/>
  <rect x="668" y="220" width="44" height="56" rx="5" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.5"/>

  <text x="400" y="366" text-anchor="middle" font-size="14" font-weight="700" fill="#334155">one span = one size class</text>
</svg>
