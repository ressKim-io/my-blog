<svg role="img" aria-labelledby="title-2 desc-2" viewBox="0 0 800 480" width="100%" height="auto"
  xmlns="http://www.w3.org/2000/svg"
  style="font-family: 'Pretendard', system-ui, sans-serif;">
  <title id="title-2">at-least-once 재전송과 UUID PK 멱등 흡수 흐름도</title>
  <desc id="desc-2">네트워크 중단 후 Publisher가 동일 INSERT를 두 번 전송할 때, UUID PK를 가진 테이블에서 중복 이벤트가 충돌 해소 정책에 의해 조용히 skip되는 과정을 5단계로 표현</desc>

  <!-- 배경 -->
  <rect width="800" height="480" fill="#FAFAFA"/>

  <!-- 타이틀 -->
  <text x="400" y="32" text-anchor="middle" font-size="14" font-weight="700" fill="#0A0A0A">흐름도 — at-least-once 재전송과 UUID PK 멱등 흡수</text>

  <!-- 범례 -->
  <rect x="20" y="44" width="10" height="10" rx="2" fill="#ECFDF5" stroke="#059669"/>
  <text x="36" y="54" font-size="10" fill="#047857">Publisher (GCP VM)</text>
  <rect x="140" y="44" width="10" height="10" rx="2" fill="#FFFBEB" stroke="#D97706"/>
  <text x="156" y="54" font-size="10" fill="#B45309">Subscriber (AWS RDS)</text>
  <rect x="290" y="44" width="10" height="10" rx="2" fill="#ECFEFF" stroke="#0891B2"/>
  <text x="306" y="54" font-size="10" fill="#0E7490">복제 스트림</text>
  <rect x="400" y="44" width="10" height="10" rx="2" fill="#FFF1F2" stroke="#E11D48"/>
  <text x="416" y="54" font-size="10" fill="#BE123C">중복 이벤트 (무해)</text>

  <!-- 시간축 -->
  <line x1="60" y1="75" x2="60" y2="460" stroke="#D4D4D8" stroke-width="1.5"/>
  <text x="52" y="72" text-anchor="middle" font-size="10" fill="#27272A">t</text>
  <text x="52" y="460" text-anchor="middle" font-size="10" fill="#27272A">↓</text>

  <!-- Step 1: 최초 INSERT 전송 -->
  <rect x="80" y="80" width="280" height="50" rx="4" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="220" y="99" text-anchor="middle" font-size="12" font-weight="600" fill="#047857">① Publisher: INSERT 생성</text>
  <text x="220" y="116" text-anchor="middle" font-size="11" fill="#047857">orders (id=UUID-abc, status='paid')</text>

  <!-- 화살표: 최초 전송 -->
  <line x1="360" y1="105" x2="490" y2="105" stroke="#059669" stroke-width="1.5" marker-end="url(#arr-green2)"/>
  <rect x="380" y="93" width="90" height="18" fill="#FAFAFA"/>
  <text x="425" y="106" text-anchor="middle" font-size="10" fill="#27272A">복제 스트림 전송</text>

  <!-- Subscriber 적용 -->
  <rect x="490" y="80" width="270" height="50" rx="4" fill="#FFFBEB" stroke="#D97706" stroke-width="1.5"/>
  <text x="625" y="99" text-anchor="middle" font-size="12" font-weight="600" fill="#B45309">② Subscriber: INSERT 적용</text>
  <text x="625" y="116" text-anchor="middle" font-size="11" fill="#B45309">UUID-abc 행 삽입 → ACK(LSN=100)</text>

  <!-- ACK 화살표 -->
  <line x1="490" y1="140" x2="360" y2="140" stroke="#D4D4D8" stroke-width="1" stroke-dasharray="4 2" marker-end="url(#arr-gray2)"/>
  <rect x="390" y="128" width="60" height="18" fill="#FAFAFA"/>
  <text x="420" y="141" text-anchor="middle" font-size="10" fill="#27272A">ACK LSN</text>

  <!-- Step 3: 네트워크 중단 -->
  <rect x="80" y="168" width="680" height="46" rx="4" fill="#FFF1F2" stroke="#E11D48" stroke-width="1"/>
  <text x="420" y="190" text-anchor="middle" font-size="12" font-weight="600" fill="#BE123C">③ 네트워크 중단 — ACK가 Publisher에 미도달</text>
  <text x="420" y="206" text-anchor="middle" font-size="11" fill="#BE123C">Publisher는 LSN=100이 확인됐는지 모름 → 재시작 후 LSN=99부터 재전송</text>

  <!-- Step 4: 동일 INSERT 재전송 -->
  <rect x="80" y="232" width="280" height="50" rx="4" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="220" y="251" text-anchor="middle" font-size="12" font-weight="600" fill="#047857">④ Publisher: 동일 INSERT 재전송</text>
  <text x="220" y="268" text-anchor="middle" font-size="11" fill="#047857">orders (id=UUID-abc, status='paid')</text>

  <!-- 화살표: 재전송 (점선, rose) -->
  <line x1="360" y1="257" x2="490" y2="257" stroke="#E11D48" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arr-rose2)"/>
  <rect x="375" y="245" width="100" height="18" fill="#FAFAFA"/>
  <text x="425" y="258" text-anchor="middle" font-size="10" fill="#BE123C">중복 이벤트 (재전송)</text>

  <!-- Subscriber 충돌 감지 -->
  <rect x="490" y="232" width="270" height="50" rx="4" fill="#FFF1F2" stroke="#E11D48" stroke-width="1.5"/>
  <text x="625" y="251" text-anchor="middle" font-size="12" font-weight="600" fill="#BE123C">⑤ Subscriber: PK 충돌 감지</text>
  <text x="625" y="268" text-anchor="middle" font-size="11" fill="#BE123C">UUID-abc 이미 존재 → 충돌</text>

  <!-- 충돌 해소 설명 박스 -->
  <rect x="80" y="300" width="680" height="100" rx="6" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.5"/>
  <text x="400" y="322" text-anchor="middle" font-size="12" font-weight="700" fill="#0E7490">UUID PK가 멱등을 보장하는 원리</text>

  <rect x="110" y="334" width="190" height="52" rx="4" fill="#ECFDF5" stroke="#059669" stroke-width="1"/>
  <text x="205" y="352" text-anchor="middle" font-size="11" font-weight="600" fill="#047857">SEQUENCE PK (정수)</text>
  <text x="205" y="368" text-anchor="middle" font-size="10" fill="#047857">동일 id가 없으면</text>
  <text x="205" y="382" text-anchor="middle" font-size="10" fill="#047857">중복 INSERT 성공 → 데이터 오염</text>

  <text x="325" y="362" text-anchor="middle" font-size="18" fill="#27272A">vs</text>

  <rect x="360" y="334" width="370" height="52" rx="4" fill="#ECFEFF" stroke="#0891B2" stroke-width="1"/>
  <text x="545" y="352" text-anchor="middle" font-size="11" font-weight="600" fill="#0E7490">UUID PK</text>
  <text x="545" y="368" text-anchor="middle" font-size="10" fill="#0E7490">동일 UUID는 항상 같은 행을 가리킴</text>
  <text x="545" y="382" text-anchor="middle" font-size="10" fill="#0E7490">충돌 해소 정책(skip)이 중복을 조용히 흡수</text>

  <!-- 결론 박스 -->
  <rect x="80" y="416" width="680" height="44" rx="4" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="420" y="436" text-anchor="middle" font-size="12" font-weight="600" fill="#6D28D9">결론: 재전송이 일어나도 Subscriber 데이터는 한 번만 적용된 것과 동일한 상태</text>
  <text x="420" y="452" text-anchor="middle" font-size="11" fill="#6D28D9">→ at-least-once + 멱등 PK = effectively exactly-once 의미론</text>

  <defs>
    <marker id="arr-green2" viewBox="0 0 10 10" refX="9" refY="5"
      markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#059669"/>
    </marker>
    <marker id="arr-gray2" viewBox="0 0 10 10" refX="9" refY="5"
      markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#D4D4D8"/>
    </marker>
    <marker id="arr-rose2" viewBox="0 0 10 10" refX="9" refY="5"
      markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#E11D48"/>
    </marker>
  </defs>
</svg>
