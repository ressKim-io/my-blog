<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" role="img" aria-labelledby="t1 d1" width="100%" height="auto" preserveAspectRatio="xMidYMid meet" style="max-width: 800px;">
  <title id="t1">공유 ticketing pod 충돌 — A 세션 검증과 C 세션 방식 불일치</title>
  <desc id="d1">A Queue Pod는 Redis DB 0을 쓰고 ReservationSession을 발급하므로 goti-ticketing-dev의 검증을 통과. 하지만 C Queue Pod는 Redis DB 1과 QueueInterceptor·X-Queue-Token이라는 다른 세션 방식을 쓰기 때문에 같은 ticketing pod의 A 세션 검증에 의해 403/400 거부 — 공정 비교 가정이 깨진 지점</desc>

  <defs>
    <marker id="arr1" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#0A0A0A"/>
    </marker>
    <marker id="arr1r" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#BE123C"/>
    </marker>
  </defs>

  <style><![CDATA[
    .label { font-family: 'Pretendard', sans-serif; font-size: 13px; font-weight: 600; }
    .meta  { font-family: 'Geist Mono', ui-monospace, Menlo, monospace; font-size: 11px; fill: #27272A; }
    .arrlbl { font-family: 'Pretendard', sans-serif; font-size: 11px; }
    .arrow { stroke: #047857; stroke-width: 1.5; fill: none; marker-end: url(#arr1); }
    .blocked { stroke: #BE123C; stroke-width: 1.5; stroke-dasharray: 5 3; fill: none; marker-end: url(#arr1r); }
  ]]></style>

  <!-- A Queue Pod (backend / emerald) -->
  <rect x="40" y="80" width="240" height="100" rx="6" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="160" y="106" text-anchor="middle" class="label" fill="#047857">A Queue Pod</text>
  <text x="160" y="128" text-anchor="middle" class="meta">Redis DB 0</text>
  <text x="160" y="148" text-anchor="middle" class="meta">ReservationSession 발급</text>
  <text x="160" y="166" text-anchor="middle" class="meta" fill="#047857">→ ticketing 검증 통과</text>

  <!-- C Queue Pod (security / rose) -->
  <rect x="40" y="280" width="240" height="120" rx="6" fill="#FFF1F2" stroke="#E11D48" stroke-width="1.5"/>
  <text x="160" y="306" text-anchor="middle" class="label" fill="#BE123C">C Queue Pod</text>
  <text x="160" y="328" text-anchor="middle" class="meta">Redis DB 1</text>
  <text x="160" y="348" text-anchor="middle" class="meta">QueueInterceptor + X-Queue-Token</text>
  <text x="160" y="366" text-anchor="middle" class="meta">(다른 세션 방식)</text>
  <text x="160" y="386" text-anchor="middle" class="meta" fill="#BE123C">→ A 세션 검증에 의해 거부</text>

  <!-- arrows to ticketing -->
  <line x1="280" y1="130" x2="440" y2="190" class="arrow"/>
  <text x="358" y="148" text-anchor="middle" class="arrlbl" fill="#047857">통과 ✓</text>

  <line x1="280" y1="340" x2="440" y2="240" class="blocked"/>
  <text x="358" y="312" text-anchor="middle" class="arrlbl" fill="#BE123C">차단 — 403/400</text>

  <!-- ticketing-dev (cloud / amber) -->
  <rect x="440" y="160" width="320" height="120" rx="6" fill="#FFFBEB" stroke="#D97706" stroke-width="1.5"/>
  <text x="600" y="188" text-anchor="middle" class="label" fill="#B45309">goti-ticketing-dev (공유)</text>
  <text x="600" y="212" text-anchor="middle" class="meta">A POC PR #329 머지된 이미지</text>
  <text x="600" y="232" text-anchor="middle" class="meta">ReservationSession 검증 코드 포함</text>
  <text x="600" y="252" text-anchor="middle" class="meta">A 세션 없으면 403 / 만료 시 400</text>
  <text x="600" y="270" text-anchor="middle" class="meta">"http_req_failed: 39.74%"</text>

  <!-- bottom note -->
  <text x="400" y="448" text-anchor="middle" class="meta">"구현체만 교체하면 공정 비교가 된다"는 가정이 깨진 순간 — 구현체별 ticketing pod 분리 필요</text>
</svg>
