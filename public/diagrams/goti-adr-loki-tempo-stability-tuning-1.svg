<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 540" role="img" aria-labelledby="t1 d1" width="100%" height="auto" preserveAspectRatio="xMidYMid meet" style="max-width: 760px;">
  <title id="t1">Loki/Tempo OOM 악순환 사이클</title>
  <desc id="d1">Loki나 Tempo가 OOM으로 죽으면 Pod가 재시작되고, 재시작 직후 Kafka에 쌓인 backlog가 한꺼번에 유입되며 메모리가 급증해 또 OOM. 수동 개입 없이는 이 사이클이 무한 반복되는 구조</desc>

  <defs>
    <marker id="arr1" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#0A0A0A"/>
    </marker>
    <marker id="arr1r" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#BE123C"/>
    </marker>
  </defs>

  <style><![CDATA[
    .label { font-family: 'Pretendard', sans-serif; font-size: 13px; font-weight: 600; }
    .meta  { font-family: 'Geist Mono', ui-monospace, Menlo, monospace; font-size: 11px; fill: #27272A; }
    .arrlbl { font-family: 'Pretendard', sans-serif; font-size: 11px; fill: #27272A; }
    .arrow { stroke: #0A0A0A; stroke-width: 1.5; fill: none; marker-end: url(#arr1); }
    .loop  { stroke: #BE123C; stroke-width: 1.5; stroke-dasharray: 5 3; fill: none; marker-end: url(#arr1r); }
  ]]></style>

  <!-- Step 1: OOM 발생 (security / rose) -->
  <rect x="280" y="40" width="200" height="64" rx="6" fill="#FFF1F2" stroke="#E11D48" stroke-width="1.5"/>
  <text x="380" y="64" text-anchor="middle" class="label" fill="#BE123C">Loki / Tempo OOM</text>
  <text x="380" y="84" text-anchor="middle" class="meta">메모리 limit 초과 → Kill</text>

  <line x1="380" y1="104" x2="380" y2="148" class="arrow"/>

  <!-- Step 2: Pod Restart (cloud / amber) -->
  <rect x="280" y="148" width="200" height="64" rx="6" fill="#FFFBEB" stroke="#D97706" stroke-width="1.5"/>
  <text x="380" y="172" text-anchor="middle" class="label" fill="#B45309">Pod 재시작</text>
  <text x="380" y="192" text-anchor="middle" class="meta">CrashLoopBackOff</text>

  <line x1="380" y1="212" x2="380" y2="256" class="arrow"/>

  <!-- Step 3: Kafka backlog (database / violet) -->
  <rect x="280" y="256" width="200" height="64" rx="6" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="380" y="280" text-anchor="middle" class="label" fill="#6D28D9">Kafka backlog</text>
  <text x="380" y="300" text-anchor="middle" class="meta">한꺼번에 유입</text>

  <line x1="380" y1="320" x2="380" y2="364" class="arrow"/>

  <!-- Step 4: 메모리 급증 (security / rose) -->
  <rect x="280" y="364" width="200" height="80" rx="6" fill="#FFF1F2" stroke="#E11D48" stroke-width="1.5"/>
  <text x="380" y="388" text-anchor="middle" class="label" fill="#BE123C">메모리 급증</text>
  <text x="380" y="410" text-anchor="middle" class="meta">backlog 빠른 소비</text>
  <text x="380" y="428" text-anchor="middle" class="meta" fill="#BE123C">→ 또 OOM</text>

  <!-- loop arrow back to step 1 -->
  <path d="M 280 404 H 200 V 72 H 280" class="loop"/>
  <text x="190" y="240" text-anchor="end" class="arrlbl" fill="#BE123C">사이클 반복</text>

  <!-- bottom note -->
  <text x="380" y="492" text-anchor="middle" class="meta">SingleBinary 모드 + 기본 설정 → 수동 개입 없이는 복구 불가</text>
</svg>
