<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280" role="img" aria-labelledby="t6 d6" font-family="Pretendard, ui-sans-serif, system-ui, -apple-system, sans-serif">
  <title id="t6">The tiny allocator packs several small pointer-free objects into one 16-byte block</title>
  <desc id="d6">Objects smaller than sixteen bytes that hold no pointers are not given a slot each. The per-P cache carries a single sixteen byte block and an offset into it, and lays these small objects side by side inside that one block until it is full. Only pointer-free objects qualify, because the collector needs clear object boundaries to trace pointers.</desc>
  <defs>
    <marker id="g6d" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#334155"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="800" height="280" fill="#FFFFFF"/>

  <text x="124" y="60" text-anchor="middle" font-size="13" font-weight="700" fill="#0E7490">noscan · &lt; 16B</text>

  <rect x="64" y="76" width="120" height="40" rx="7" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.6"/>
  <text x="124" y="102" text-anchor="middle" font-size="13" font-weight="700" fill="#0E7490">1B</text>
  <rect x="64" y="128" width="120" height="40" rx="7" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.6"/>
  <text x="124" y="154" text-anchor="middle" font-size="13" font-weight="700" fill="#0E7490">4B</text>
  <rect x="64" y="180" width="120" height="40" rx="7" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.6"/>
  <text x="124" y="206" text-anchor="middle" font-size="13" font-weight="700" fill="#0E7490">2B</text>

  <line x1="192" y1="148" x2="320" y2="148" stroke="#334155" stroke-width="1.8" marker-end="url(#g6d)"/>
