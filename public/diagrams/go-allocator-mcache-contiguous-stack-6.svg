  <rect x="336" y="96" width="384" height="104" rx="10" fill="#F5F3FF" stroke="#7C3AED" stroke-width="2"/>
  <text x="528" y="132" text-anchor="middle" font-size="15" font-weight="700" fill="#6D28D9">tiny block · 16B</text>

  <rect x="352" y="148" width="24" height="36" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.4"/>
  <rect x="376" y="148" width="92" height="36" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.4"/>
