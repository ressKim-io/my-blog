<svg role="img" aria-labelledby="title-sc1 desc-sc1"
  viewBox="0 0 760 640" width="100%" height="auto"
  xmlns="http://www.w3.org/2000/svg"
  style="font-family: 'Pretendard', system-ui, sans-serif; background: #FAFAFA;">

  <title id="title-sc1">흐름도 — 중앙 레지스트리 검증 후 멀티 CSP 복제</title>
  <desc id="desc-sc1">CI 파이프라인이 이미지를 빌드해 Harbor에 push하고, Harbor가 취약점 스캔 후 ECR과 GAR로 복제하면 EKS와 GKE가 각 네이티브 레지스트리에서 pull하는 5단계 흐름</desc>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#0A0A0A"/>
    </marker>
    <marker id="arrow-accent" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7C3AED"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#059669"/>
    </marker>
  </defs>

  <!-- ① CI 파이프라인 -->
  <rect x="280" y="32" width="200" height="64" rx="8"
    fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="380" y="60" text-anchor="middle" font-size="14" font-weight="600" fill="#047857">CI 파이프라인</text>
  <text x="380" y="80" text-anchor="middle" font-size="12" fill="#047857">(GitHub Actions)</text>

  <!-- ① → ② 화살표 -->
  <line x1="380" y1="96" x2="380" y2="144" stroke="#0A0A0A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="296" y="108" width="168" height="20" rx="4" fill="#FAFAFA"/>
  <text x="380" y="122" text-anchor="middle" font-size="11" fill="#27272A">docker push</text>

  <!-- ② Harbor (중앙 레지스트리) -->
  <rect x="240" y="144" width="280" height="88" rx="8"
    fill="#F5F3FF" stroke="#7C3AED" stroke-width="2"/>
  <text x="380" y="172" text-anchor="middle" font-size="14" font-weight="600" fill="#6D28D9">Harbor</text>
  <text x="380" y="192" text-anchor="middle" font-size="12" fill="#6D28D9">중앙 레지스트리 (AWS EKS)</text>
  <text x="380" y="212" text-anchor="middle" font-size="11" fill="#27272A">취약점 스캔 · 서명 검증</text>

  <!-- 검증 완료 라벨 -->
  <rect x="300" y="224" width="160" height="20" rx="4" fill="#FAFAFA"/>
  <text x="380" y="238" text-anchor="middle" font-size="11" fill="#6D28D9">sha256:ccc... 검증 완료</text>

  <!-- ② → ③ ECR 화살표 (왼쪽) -->
  <line x1="290" y1="232" x2="170" y2="320" stroke="#7C3AED" stroke-width="2" marker-end="url(#arrow-accent)" stroke-dasharray="5 3"/>
  <rect x="172" y="264" width="76" height="20" rx="4" fill="#FAFAFA"/>
  <text x="210" y="278" text-anchor="middle" font-size="11" fill="#7C3AED">복제</text>

  <!-- ② → ③ GAR 화살표 (오른쪽) -->
  <line x1="470" y1="232" x2="590" y2="320" stroke="#7C3AED" stroke-width="2" marker-end="url(#arrow-accent)" stroke-dasharray="5 3"/>
  <rect x="512" y="264" width="76" height="20" rx="4" fill="#FAFAFA"/>
  <text x="550" y="278" text-anchor="middle" font-size="11" fill="#7C3AED">복제</text>

  <!-- ③ ECR -->
  <rect x="64" y="320" width="192" height="72" rx="8"
    fill="#FFFBEB" stroke="#D97706" stroke-width="1.5"/>
  <text x="160" y="350" text-anchor="middle" font-size="14" font-weight="600" fill="#B45309">ECR</text>
  <text x="160" y="368" text-anchor="middle" font-size="12" fill="#B45309">AWS ap-northeast-2</text>
  <text x="160" y="384" text-anchor="middle" font-size="11" fill="#27272A">sha256:ccc...</text>

  <!-- ③ GAR -->
  <rect x="504" y="320" width="192" height="72" rx="8"
    fill="#FFFBEB" stroke="#D97706" stroke-width="1.5"/>
  <text x="600" y="350" text-anchor="middle" font-size="14" font-weight="600" fill="#B45309">GAR</text>
  <text x="600" y="368" text-anchor="middle" font-size="12" fill="#B45309">GCP asia-northeast3</text>
  <text x="600" y="384" text-anchor="middle" font-size="11" fill="#27272A">sha256:ccc...</text>

  <!-- ③ ECR → ④ EKS 화살표 -->
  <line x1="160" y1="392" x2="160" y2="472" stroke="#059669" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <rect x="76" y="420" width="88" height="20" rx="4" fill="#FAFAFA"/>
  <text x="120" y="434" text-anchor="middle" font-size="11" fill="#047857">native pull</text>

  <!-- ③ GAR → ④ GKE 화살표 -->
  <line x1="600" y1="392" x2="600" y2="472" stroke="#059669" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <rect x="556" y="420" width="88" height="20" rx="4" fill="#FAFAFA"/>
  <text x="600" y="434" text-anchor="middle" font-size="11" fill="#047857">native pull</text>

  <!-- ④ EKS -->
  <rect x="64" y="472" width="192" height="72" rx="8"
    fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="160" y="502" text-anchor="middle" font-size="14" font-weight="600" fill="#047857">AWS EKS</text>
  <text x="160" y="520" text-anchor="middle" font-size="12" fill="#047857">컨테이너 실행</text>
  <text x="160" y="536" text-anchor="middle" font-size="11" fill="#27272A">sha256:ccc... 동일</text>

  <!-- ④ GKE -->
  <rect x="504" y="472" width="192" height="72" rx="8"
    fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="600" y="502" text-anchor="middle" font-size="14" font-weight="600" fill="#047857">GCP GKE</text>
  <text x="600" y="520" text-anchor="middle" font-size="12" fill="#047857">컨테이너 실행</text>
  <text x="600" y="536" text-anchor="middle" font-size="11" fill="#27272A">sha256:ccc... 동일</text>

  <!-- 동일 다이제스트 확인 화살표 (수평 점선) -->
  <line x1="256" y1="508" x2="504" y2="508" stroke="#D4D4D8" stroke-width="1" stroke-dasharray="4 2"/>
  <rect x="308" y="496" width="144" height="20" rx="4" fill="#FAFAFA"/>
  <text x="380" y="510" text-anchor="middle" font-size="11" fill="#475569">동일 다이제스트 보장</text>

  <!-- 범례 -->
  <rect x="32" y="592" width="696" height="36" rx="6" fill="#F8FAFC" stroke="#E4E4E7" stroke-width="1"/>
  <line x1="56" y1="610" x2="84" y2="610" stroke="#059669" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="92" y="614" font-size="11" fill="#334155">네이티브 pull</text>
  <line x1="200" y1="610" x2="228" y2="610" stroke="#7C3AED" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#arrow-accent)"/>
  <text x="236" y="614" font-size="11" fill="#334155">복제 (동일 다이제스트)</text>
  <rect x="400" y="601" width="14" height="14" rx="2" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="420" y="614" font-size="11" fill="#334155">중앙 레지스트리 (SSoT)</text>
  <rect x="570" y="601" width="14" height="14" rx="2" fill="#FFFBEB" stroke="#D97706" stroke-width="1.5"/>
  <text x="590" y="614" font-size="11" fill="#334155">CSP 네이티브</text>
</svg>
