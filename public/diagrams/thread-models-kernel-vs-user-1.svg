<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" role="img" aria-labelledby="t1 d1" font-family="Pretendard, ui-sans-serif, system-ui, -apple-system, sans-serif">
  <title id="t1">The 1:1 model — every app thread is one kernel task</title>
  <desc id="d1">In the one-to-one model each application thread maps to exactly one kernel task, represented by a task_struct. The kernel scheduler hands those tasks time slices on the available cores, so only as many threads truly run at once as there are cores. Each thread carries a bill: kernel memory for the task_struct, a reserved stack, a scheduler slot, and a context switch every time the kernel swaps it.</desc>
  <defs>
    <marker id="m1" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="800" height="420" fill="#FFFFFF"/>

  <line x1="140" y1="106" x2="140" y2="140" stroke="#475569" stroke-width="1.6" marker-end="url(#m1)"/>
  <line x1="300" y1="106" x2="300" y2="140" stroke="#475569" stroke-width="1.6" marker-end="url(#m1)"/>
  <line x1="460" y1="106" x2="460" y2="140" stroke="#475569" stroke-width="1.6" marker-end="url(#m1)"/>
  <line x1="300" y1="202" x2="300" y2="236" stroke="#475569" stroke-width="1.6" marker-end="url(#m1)"/>
  <line x1="300" y1="298" x2="300" y2="332" stroke="#475569" stroke-width="1.6" marker-end="url(#m1)"/>

  <text x="44" y="72" font-size="13" font-weight="700" fill="#64748B">app threads</text>
  <rect x="88" y="50" width="104" height="56" rx="7" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.6"/>
  <text x="140" y="85" text-anchor="middle" font-size="15" font-weight="700" fill="#0E7490">T1</text>
  <rect x="248" y="50" width="104" height="56" rx="7" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.6"/>
  <text x="300" y="85" text-anchor="middle" font-size="15" font-weight="700" fill="#0E7490">T2</text>
  <rect x="408" y="50" width="104" height="56" rx="7" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.6"/>
  <text x="460" y="85" text-anchor="middle" font-size="15" font-weight="700" fill="#0E7490">T3</text>

  <text x="44" y="176" font-size="13" font-weight="700" fill="#64748B">kernel tasks</text>
  <rect x="88" y="146" width="104" height="56" rx="7" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.6"/>
  <text x="140" y="180" text-anchor="middle" font-size="13" fill="#6D28D9" font-family="ui-monospace, monospace">task_struct</text>
  <rect x="248" y="146" width="104" height="56" rx="7" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.6"/>
  <text x="300" y="180" text-anchor="middle" font-size="13" fill="#6D28D9" font-family="ui-monospace, monospace">task_struct</text>
  <rect x="408" y="146" width="104" height="56" rx="7" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.6"/>
  <text x="460" y="180" text-anchor="middle" font-size="13" fill="#6D28D9" font-family="ui-monospace, monospace">task_struct</text>

  <rect x="88" y="240" width="424" height="58" rx="8" fill="#F8FAFC" stroke="#475569" stroke-width="1.6"/>
  <text x="300" y="266" text-anchor="middle" font-size="15" font-weight="700" fill="#334155">kernel scheduler</text>
  <text x="300" y="288" text-anchor="middle" font-size="13" fill="#334155">EEVDF — time slices</text>

  <rect x="128" y="332" width="152" height="56" rx="7" fill="#ECFDF5" stroke="#059669" stroke-width="1.6"/>
  <text x="204" y="367" text-anchor="middle" font-size="15" font-weight="700" fill="#047857">core 0</text>
  <rect x="320" y="332" width="152" height="56" rx="7" fill="#ECFDF5" stroke="#059669" stroke-width="1.6"/>
  <text x="396" y="367" text-anchor="middle" font-size="15" font-weight="700" fill="#047857">core 1</text>

  <rect x="560" y="146" width="208" height="152" rx="9" fill="#FFF1F2" stroke="#E11D48" stroke-width="1.5"/>
  <text x="664" y="180" text-anchor="middle" font-size="15" font-weight="700" fill="#BE123C">per-thread bill</text>
  <text x="664" y="212" text-anchor="middle" font-size="13" fill="#BE123C" font-family="ui-monospace, monospace">task_struct</text>
  <text x="664" y="240" text-anchor="middle" font-size="13" fill="#BE123C">reserved stack</text>
  <text x="664" y="268" text-anchor="middle" font-size="13" fill="#BE123C">context switch</text>
</svg>
