<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-labelledby="t6 d6" font-family="Pretendard, ui-sans-serif, system-ui, -apple-system, sans-serif">
  <title id="t6">ThinLTO's summary index versus fat LTO's single merged module</title>
  <desc id="d6">ThinLTO has each module emit a summary of metadata rather than body IR, reads that summary index at thin-link time to decide which function to import where, then runs backends in parallel importing only the chosen functions. Fat LTO instead merges the intermediate representation of every crate into one giant module and re-optimizes it as a whole, which gives the best code and the longest build.</desc>
  <defs>
    <marker id="a6" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="800" height="400" fill="#FFFFFF"/>

  <line x1="400" y1="24" x2="400" y2="376" stroke="#E4E4E7" stroke-width="1.2"/>

  <line x1="200" y1="140" x2="200" y2="164" stroke="#475569" stroke-width="1.5" marker-end="url(#a6)"/>
  <line x1="200" y1="220" x2="200" y2="244" stroke="#475569" stroke-width="1.5" marker-end="url(#a6)"/>
  <line x1="512" y1="132" x2="560" y2="164" stroke="#475569" stroke-width="1.5" marker-end="url(#a6)"/>
  <line x1="600" y1="132" x2="600" y2="164" stroke="#475569" stroke-width="1.5" marker-end="url(#a6)"/>
  <line x1="688" y1="132" x2="640" y2="164" stroke="#475569" stroke-width="1.5" marker-end="url(#a6)"/>
  <line x1="600" y1="236" x2="600" y2="260" stroke="#475569" stroke-width="1.5" marker-end="url(#a6)"/>

  <text x="200" y="46" text-anchor="middle" font-size="15" font-weight="700" fill="#047857" font-family="ui-monospace, monospace">lto = "thin"</text>

  <rect x="48" y="76" width="304" height="64" rx="8" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="200" y="115" text-anchor="middle" font-size="15" font-weight="700" fill="#047857">summaries</text>

  <rect x="48" y="164" width="304" height="56" rx="8" fill="#ECFDF5" stroke="#059669" stroke-width="1.8"/>
  <text x="200" y="199" text-anchor="middle" font-size="15" font-weight="700" fill="#047857">thin-link index</text>

  <rect x="48" y="244" width="304" height="64" rx="8" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="200" y="283" text-anchor="middle" font-size="15" font-weight="700" fill="#047857">parallel backends</text>

  <text x="200" y="344" text-anchor="middle" font-size="14" font-weight="700" fill="#047857">most of the win, parallelism kept</text>

  <text x="600" y="46" text-anchor="middle" font-size="15" font-weight="700" fill="#BE123C" font-family="ui-monospace, monospace">lto = true</text>

  <rect x="464" y="76" width="96" height="56" rx="6" fill="#FFFBEB" stroke="#D97706" stroke-width="1.4"/>
  <text x="512" y="110" text-anchor="middle" font-size="13" fill="#B45309">crate IR</text>
  <rect x="552" y="76" width="96" height="56" rx="6" fill="#FFFBEB" stroke="#D97706" stroke-width="1.4"/>
  <text x="600" y="110" text-anchor="middle" font-size="13" fill="#B45309">crate IR</text>
  <rect x="640" y="76" width="96" height="56" rx="6" fill="#FFFBEB" stroke="#D97706" stroke-width="1.4"/>
  <text x="688" y="110" text-anchor="middle" font-size="13" fill="#B45309">crate IR</text>

  <rect x="448" y="164" width="304" height="72" rx="8" fill="#FFF1F2" stroke="#E11D48" stroke-width="1.8"/>
  <text x="600" y="196" text-anchor="middle" font-size="15" font-weight="700" fill="#BE123C">one giant module</text>
  <text x="600" y="220" text-anchor="middle" font-size="13" fill="#BE123C">re-optimized whole</text>

  <rect x="448" y="260" width="304" height="64" rx="8" fill="#FFF1F2" stroke="#E11D48" stroke-width="1.5"/>
  <text x="600" y="288" text-anchor="middle" font-size="15" font-weight="700" fill="#BE123C">longest build</text>
  <text x="600" y="312" text-anchor="middle" font-size="13" fill="#BE123C">highest memory</text>
</svg>
