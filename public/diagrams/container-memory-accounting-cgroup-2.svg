<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430" role="img" aria-labelledby="t2 d2" font-family="Pretendard, ui-sans-serif, system-ui, -apple-system, sans-serif">
  <title id="t2">Over the limit: reclaim first, then SIGKILL</title>
  <desc id="d2">A flow beginning with an allocation that would push memory.current past memory.max. The path splits in two. The left branch is direct reclaim, where the kernel drops clean page cache and shrinks reclaimable slab; if that frees enough room the allocation succeeds, but the reclaim work is performed by the allocating thread itself, so the delay leaks into tail latency. The right branch applies when reclaim cannot free enough: the cgroup OOM killer sends SIGKILL, signal nine, which cannot be caught or ignored, so the process dies with exit code 137, computed as 128 plus 9, and Kubernetes records the reason as OOMKilled.</desc>
  <rect x="0" y="0" width="800" height="430" fill="#FFFFFF"/>

  <rect x="270" y="30" width="260" height="52" rx="7" fill="#FAFAFA" stroke="#475569" stroke-width="2"/>
  <text x="400" y="53" text-anchor="middle" font-size="15" font-weight="700" fill="#334155">allocation</text>
  <text x="400" y="72" text-anchor="middle" font-size="13" font-weight="600" fill="#475569">would exceed memory.max</text>

  <path d="M 360 82 L 210 120" stroke="#475569" stroke-width="2" fill="none" marker-end="url(#a2)"/>
  <path d="M 440 82 L 590 120" stroke="#475569" stroke-width="2" fill="none" marker-end="url(#a2)"/>

  <rect x="70" y="126" width="280" height="80" rx="7" fill="#ECFEFF" stroke="#0891B2" stroke-width="2.5"/>
  <text x="210" y="153" text-anchor="middle" font-size="15" font-weight="700" fill="#0E7490">direct reclaim</text>
  <text x="210" y="176" text-anchor="middle" font-size="13" font-weight="600" fill="#0E7490">drop clean page cache</text>
  <text x="210" y="196" text-anchor="middle" font-size="13" font-weight="600" fill="#0E7490">shrink slab</text>

  <path d="M 210 206 L 210 250" stroke="#0891B2" stroke-width="2" fill="none" marker-end="url(#a2)"/>
  <rect x="70" y="256" width="280" height="72" rx="7" fill="#ECFDF5" stroke="#059669" stroke-width="2.5"/>
  <text x="210" y="283" text-anchor="middle" font-size="15" font-weight="700" fill="#047857">allocation succeeds</text>
  <text x="210" y="308" text-anchor="middle" font-size="13" font-weight="600" fill="#047857">delay leaks into tail latency</text>

  <rect x="450" y="126" width="280" height="80" rx="7" fill="#FFF1F2" stroke="#E11D48" stroke-width="2.5"/>
  <text x="590" y="153" text-anchor="middle" font-size="15" font-weight="700" fill="#BE123C">reclaim not enough</text>
  <text x="590" y="176" text-anchor="middle" font-size="13" font-weight="600" fill="#BE123C">cgroup OOM killer</text>
  <text x="590" y="196" text-anchor="middle" font-size="13" font-weight="600" fill="#BE123C">SIGKILL — cannot be caught</text>

  <path d="M 590 206 L 590 250" stroke="#E11D48" stroke-width="2" fill="none" marker-end="url(#a2r)"/>
  <rect x="450" y="256" width="280" height="72" rx="7" fill="#E11D48"/>
  <text x="590" y="286" text-anchor="middle" font-size="20" font-weight="700" fill="#FFFFFF">exit 137</text>
  <text x="590" y="311" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">128 + 9 — OOMKilled</text>

  <text x="400" y="380" text-anchor="middle" font-size="15" font-weight="700" fill="#334155">no OutOfMemoryError · no shutdown hook · GC log stays clean</text>

  <defs>
    <marker id="a2" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M 0 0 L 9 4.5 L 0 9 z" fill="#475569"/>
    </marker>
    <marker id="a2r" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M 0 0 L 9 4.5 L 0 9 z" fill="#E11D48"/>
    </marker>
  </defs>
</svg>
