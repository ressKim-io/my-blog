<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 460" font-family="Pretendard, ui-sans-serif, system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="ar" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#475569"/>
    </marker>
    <marker id="arR" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#BE123C"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="760" height="460" fill="#FFFFFF"/>

  <text x="380" y="28" text-anchor="middle" font-size="12" fill="#64748B">A cache line in each core sits in one of four MESI states — writes are what cost</text>

  <!-- I : Invalid (top-left) -->
  <rect x="96" y="70" width="170" height="78" rx="9" fill="#F8FAFC" stroke="#475569" stroke-width="1.6"/>
  <text x="181" y="102" text-anchor="middle" font-size="16" font-weight="700" fill="#334155">I — Invalid</text>
  <text x="181" y="124" text-anchor="middle" font-size="11.5" fill="#64748B">empty slot, must refetch</text>

  <!-- S : Shared (top-right) -->
  <rect x="494" y="70" width="170" height="78" rx="9" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.6"/>
  <text x="579" y="102" text-anchor="middle" font-size="16" font-weight="700" fill="#0E7490">S — Shared</text>
  <text x="579" y="124" text-anchor="middle" font-size="11.5" fill="#64748B">read-only, others may hold it</text>

  <!-- E : Exclusive (bottom-left) -->
  <rect x="96" y="312" width="170" height="78" rx="9" fill="#ECFDF5" stroke="#059669" stroke-width="1.6"/>
  <text x="181" y="344" text-anchor="middle" font-size="16" font-weight="700" fill="#047857">E — Exclusive</text>
  <text x="181" y="366" text-anchor="middle" font-size="11.5" fill="#64748B">sole copy, clean</text>

  <!-- M : Modified (bottom-right) -->
  <rect x="494" y="312" width="170" height="78" rx="9" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.6"/>
  <text x="579" y="344" text-anchor="middle" font-size="16" font-weight="700" fill="#6D28D9">M — Modified</text>
  <text x="579" y="366" text-anchor="middle" font-size="11.5" fill="#64748B">sole copy, dirty</text>

  <!-- I -> S : read miss, others have it (top) -->
  <line x1="266" y1="100" x2="492" y2="100" stroke="#475569" stroke-width="1.6" marker-end="url(#ar)"/>
  <text x="379" y="84" text-anchor="middle" font-size="11.5" fill="#334155">read miss (others have it)</text>

  <!-- I -> E : read miss, sole copy (left column down) -->
  <line x1="181" y1="148" x2="181" y2="310" stroke="#475569" stroke-width="1.6" marker-end="url(#ar)"/>
  <text x="173" y="236" text-anchor="end" font-size="11.5" fill="#334155">read miss</text>
  <text x="173" y="252" text-anchor="end" font-size="11.5" fill="#334155">(sole copy)</text>

  <!-- E -> M : local write silent (bottom) -->
  <line x1="266" y1="351" x2="492" y2="351" stroke="#059669" stroke-width="1.8" marker-end="url(#ar)"/>
  <text x="379" y="372" text-anchor="middle" font-size="11.5" font-weight="700" fill="#047857">local write — silent (no bus traffic)</text>

  <!-- S -> M : local write via RFO (right column down) -->
  <line x1="579" y1="148" x2="579" y2="310" stroke="#BE123C" stroke-width="1.9" marker-end="url(#arR)"/>
  <text x="589" y="226" font-size="11.5" font-weight="700" fill="#BE123C">local write</text>
  <text x="589" y="242" font-size="11.5" fill="#BE123C">→ RFO: invalidate</text>
  <text x="589" y="258" font-size="11.5" fill="#BE123C">all sharers</text>

  <!-- remote RFO -> I (dashed, diagonal from M to I) -->
  <path d="M520,318 C400,250 320,210 252,150" fill="none" stroke="#BE123C" stroke-width="1.5" stroke-dasharray="6 4" marker-end="url(#arR)"/>
  <text x="384" y="232" text-anchor="middle" font-size="11" font-weight="700" fill="#BE123C">another core's RFO → I</text>
  <text x="384" y="247" text-anchor="middle" font-size="10.5" fill="#BE123C">(S, E, M all drop to Invalid)</text>

  <!-- legend -->
  <rect x="96" y="416" width="568" height="30" rx="7" fill="#FFF1F2" stroke="#FECDD3" stroke-width="1"/>
  <text x="380" y="435" text-anchor="middle" font-size="11.5" fill="#BE123C">Red = a write that broadcasts RFO and invalidates other cores — the expensive path</text>
</svg>
