<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" role="img" aria-labelledby="t2 d2" font-family="Pretendard, ui-sans-serif, system-ui, -apple-system, sans-serif">
  <title id="t2">What the syscall instruction does in hardware</title>
  <desc id="d2">The syscall instruction performs four register moves at once: it saves the return address from RIP into rcx, saves RFLAGS into r11, loads the kernel entry point from the IA32_LSTAR register into RIP, and switches the code and stack segments to kernel mode, dropping CPL from 3 to 0. The stack pointer is not switched.</desc>
  <defs>
    <marker id="arS" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#7C3AED"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="800" height="440" fill="#FFFFFF"/>

  <text x="400" y="26" text-anchor="middle" font-size="12" fill="#64748B">syscall = four register moves in one instruction — this is the whole "gate"</text>

  <!-- column headers -->
  <text x="168" y="58" text-anchor="middle" font-size="12.5" font-weight="700" fill="#0E7490">before — user mode (CPL 3)</text>
  <text x="632" y="58" text-anchor="middle" font-size="12.5" font-weight="700" fill="#BE123C">after — kernel mode (CPL 0)</text>

  <!-- left: before boxes -->
  <rect x="48" y="72" width="240" height="48" rx="8" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.5"/>
  <text x="168" y="92" text-anchor="middle" font-size="12" font-weight="700" fill="#0E7490">RIP</text>
  <text x="168" y="109" text-anchor="middle" font-size="10.5" fill="#334155">address of the next user instruction</text>

  <rect x="48" y="136" width="240" height="48" rx="8" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.5"/>
  <text x="168" y="156" text-anchor="middle" font-size="12" font-weight="700" fill="#0E7490">RFLAGS</text>
  <text x="168" y="173" text-anchor="middle" font-size="10.5" fill="#334155">CPU status flags</text>

  <rect x="48" y="200" width="240" height="104" rx="8" fill="#FFFBEB" stroke="#D97706" stroke-width="1.5"/>
  <text x="168" y="222" text-anchor="middle" font-size="12" font-weight="700" fill="#B45309">MSR bank (set by kernel at boot)</text>
  <text x="168" y="244" text-anchor="middle" font-size="10.5" fill="#B45309">IA32_LSTAR = kernel entry address</text>
  <text x="168" y="262" text-anchor="middle" font-size="10.5" fill="#B45309">IA32_STAR = kernel CS/SS values</text>
  <text x="168" y="280" text-anchor="middle" font-size="10.5" fill="#B45309">IA32_FMASK = flags to mask</text>

  <!-- center: instruction -->
  <rect x="336" y="150" width="128" height="104" rx="10" fill="#F5F3FF" stroke="#7C3AED" stroke-width="2"/>
  <text x="400" y="196" text-anchor="middle" font-size="17" font-weight="700" fill="#6D28D9">syscall</text>
  <text x="400" y="218" text-anchor="middle" font-size="10.5" fill="#6D28D9">one instruction</text>

  <!-- right: after boxes -->
  <rect x="512" y="72" width="240" height="48" rx="8" fill="#F8FAFC" stroke="#475569" stroke-width="1.5"/>
  <text x="632" y="92" text-anchor="middle" font-size="12" font-weight="700" fill="#334155">rcx ← old RIP</text>
  <text x="632" y="109" text-anchor="middle" font-size="10.5" fill="#64748B">return address, kept for sysret</text>

  <rect x="512" y="136" width="240" height="48" rx="8" fill="#F8FAFC" stroke="#475569" stroke-width="1.5"/>
  <text x="632" y="156" text-anchor="middle" font-size="12" font-weight="700" fill="#334155">r11 ← old RFLAGS</text>
  <text x="632" y="173" text-anchor="middle" font-size="10.5" fill="#64748B">then flags masked via IA32_FMASK</text>

  <rect x="512" y="200" width="240" height="48" rx="8" fill="#ECFDF5" stroke="#059669" stroke-width="1.6"/>
  <text x="632" y="220" text-anchor="middle" font-size="12" font-weight="700" fill="#047857">RIP ← IA32_LSTAR</text>
  <text x="632" y="237" text-anchor="middle" font-size="10.5" fill="#047857">execution jumps into kernel code</text>

  <rect x="512" y="264" width="240" height="48" rx="8" fill="#FFF1F2" stroke="#E11D48" stroke-width="1.7"/>
  <text x="632" y="284" text-anchor="middle" font-size="12" font-weight="700" fill="#BE123C">CS/SS ← kernel segments</text>
  <text x="632" y="301" text-anchor="middle" font-size="10.5" fill="#BE123C">CPL 3 → 0 — privilege switches here</text>

  <!-- arrows through center -->
  <line x1="288" y1="96" x2="508" y2="96" stroke="#7C3AED" stroke-width="1.5" marker-end="url(#arS)"/>
  <rect x="382" y="86" width="36" height="18" rx="4" fill="#FAFAFA"/>
  <text x="400" y="99" text-anchor="middle" font-size="11" font-weight="700" fill="#6D28D9">1</text>

  <line x1="288" y1="160" x2="508" y2="160" stroke="#7C3AED" stroke-width="1.5" marker-end="url(#arS)"/>
  <rect x="342" y="150" width="26" height="18" rx="4" fill="#FAFAFA"/>
  <text x="355" y="163" text-anchor="middle" font-size="11" font-weight="700" fill="#6D28D9">2</text>

  <line x1="288" y1="224" x2="508" y2="224" stroke="#7C3AED" stroke-width="1.5" marker-end="url(#arS)"/>
  <rect x="342" y="234" width="26" height="18" rx="4" fill="#FAFAFA"/>
  <text x="355" y="247" text-anchor="middle" font-size="11" font-weight="700" fill="#6D28D9">3</text>

  <line x1="288" y1="262" x2="508" y2="288" stroke="#7C3AED" stroke-width="1.5" marker-end="url(#arS)"/>
  <rect x="465" y="270" width="26" height="18" rx="4" fill="#FAFAFA"/>
  <text x="478" y="283" text-anchor="middle" font-size="11" font-weight="700" fill="#6D28D9">4</text>

  <!-- bottom note -->
  <rect x="48" y="344" width="704" height="52" rx="7" fill="#F8FAFC" stroke="#E4E4E7" stroke-width="1"/>
  <text x="400" y="366" text-anchor="middle" font-size="11.5" font-weight="700" fill="#334155">note: rsp is NOT switched — it still points at the user stack</text>
  <text x="400" y="384" text-anchor="middle" font-size="11" fill="#64748B">swapping stacks and page tables is the kernel's own job (the staircase in the next diagram)</text>
</svg>
