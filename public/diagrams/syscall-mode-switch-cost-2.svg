<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" role="img" aria-labelledby="t2 d2" font-family="Pretendard, ui-sans-serif, system-ui, -apple-system, sans-serif">
  <title id="t2">What the syscall instruction does — four register moves in one instruction</title>
  <desc id="d2">The syscall instruction saves the return address into rcx and the flags into r11, loads the kernel entry address from the IA32_LSTAR machine specific register into RIP, and swaps the code and stack segments so the privilege level goes from three to zero. The stack pointer rsp is not switched; it still points at the user stack.</desc>
  <defs>
    <marker id="s2" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="800" height="420" fill="#FFFFFF"/>

  <line x1="424" y1="140" x2="466" y2="106" stroke="#475569" stroke-width="1.5" marker-end="url(#s2)"/>
  <line x1="424" y1="148" x2="466" y2="146" stroke="#475569" stroke-width="1.5" marker-end="url(#s2)"/>
  <line x1="424" y1="156" x2="466" y2="186" stroke="#475569" stroke-width="1.5" marker-end="url(#s2)"/>
  <line x1="424" y1="164" x2="466" y2="226" stroke="#475569" stroke-width="1.5" marker-end="url(#s2)"/>
  <line x1="232" y1="148" x2="276" y2="148" stroke="#475569" stroke-width="1.5" marker-end="url(#s2)"/>
  <line x1="350" y1="248" x2="350" y2="182" stroke="#94A3B8" stroke-width="1.3" stroke-dasharray="4 3"/>

  <text x="132" y="60" text-anchor="middle" font-size="14" font-weight="700" fill="#0E7490">user mode — CPL 3</text>
  <rect x="32" y="76" width="200" height="132" rx="8" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.6"/>
  <rect x="48" y="98" width="168" height="36" rx="4" fill="#FFFFFF" stroke="#0891B2" stroke-width="1.1"/>
  <text x="132" y="122" text-anchor="middle" font-size="14" fill="#0E7490" font-family="ui-monospace, monospace">RIP</text>
  <rect x="48" y="150" width="168" height="36" rx="4" fill="#FFFFFF" stroke="#0891B2" stroke-width="1.1"/>
  <text x="132" y="174" text-anchor="middle" font-size="14" fill="#0E7490" font-family="ui-monospace, monospace">RFLAGS</text>

  <rect x="280" y="120" width="140" height="56" rx="10" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.8"/>
  <text x="350" y="156" text-anchor="middle" font-size="17" font-weight="700" fill="#6D28D9" font-family="ui-monospace, monospace">syscall</text>

  <text x="618" y="60" text-anchor="middle" font-size="14" font-weight="700" fill="#6D28D9">kernel mode — CPL 0</text>
  <rect x="468" y="76" width="300" height="176" rx="8" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.6"/>
  <circle cx="452" cy="106" r="11" fill="#475569"/>
  <text x="452" y="111" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">1</text>
  <rect x="484" y="88" width="268" height="36" rx="4" fill="#FFFFFF" stroke="#7C3AED" stroke-width="1.1"/>
  <text x="618" y="112" text-anchor="middle" font-size="14" fill="#6D28D9" font-family="ui-monospace, monospace">rcx ← old RIP</text>
  <circle cx="452" cy="146" r="11" fill="#475569"/>
  <text x="452" y="151" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">2</text>
  <rect x="484" y="128" width="268" height="36" rx="4" fill="#FFFFFF" stroke="#7C3AED" stroke-width="1.1"/>
  <text x="618" y="152" text-anchor="middle" font-size="14" fill="#6D28D9" font-family="ui-monospace, monospace">r11 ← old RFLAGS</text>
  <circle cx="452" cy="186" r="11" fill="#475569"/>
  <text x="452" y="191" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">3</text>
  <rect x="484" y="168" width="268" height="36" rx="4" fill="#FFFFFF" stroke="#7C3AED" stroke-width="1.1"/>
  <text x="618" y="192" text-anchor="middle" font-size="14" fill="#6D28D9" font-family="ui-monospace, monospace">RIP ← IA32_LSTAR</text>
  <circle cx="452" cy="226" r="11" fill="#E11D48"/>
  <text x="452" y="231" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">4</text>
  <rect x="484" y="208" width="268" height="36" rx="4" fill="#FFF1F2" stroke="#E11D48" stroke-width="1.3"/>
  <text x="618" y="232" text-anchor="middle" font-size="14" font-weight="700" fill="#BE123C" font-family="ui-monospace, monospace">CS/SS ← kernel</text>

  <rect x="248" y="252" width="204" height="76" rx="8" fill="#F8FAFC" stroke="#475569" stroke-width="1.4"/>
  <text x="350" y="280" text-anchor="middle" font-size="14" font-weight="700" fill="#334155">MSR bank</text>
  <text x="350" y="306" text-anchor="middle" font-size="13" fill="#334155" font-family="ui-monospace, monospace">LSTAR · STAR · FMASK</text>

  <rect x="468" y="292" width="300" height="56" rx="8" fill="#FFFBEB" stroke="#D97706" stroke-width="1.5"/>
  <text x="618" y="326" text-anchor="middle" font-size="14" font-weight="700" fill="#B45309" font-family="ui-monospace, monospace">rsp — not switched</text>
</svg>
