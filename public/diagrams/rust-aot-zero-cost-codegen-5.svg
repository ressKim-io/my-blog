<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" role="img" aria-labelledby="t5 d5" font-family="Pretendard, ui-sans-serif, system-ui, -apple-system, sans-serif">
  <title id="t5">Codegen units split the crate — parallel build versus a single optimization horizon</title>
  <desc id="d5">By default rustc splits a crate into many codegen units, sixteen in release and two hundred fifty six in debug, and runs one LLVM instance per unit in parallel. Inlining cannot cross a unit boundary, so optimization opportunities are lost there. Setting codegen-units to one puts the whole crate into a single optimization horizon at the cost of all build parallelism.</desc>
  <rect x="0" y="0" width="800" height="320" fill="#FFFFFF"/>

  <line x1="400" y1="24" x2="400" y2="296" stroke="#E4E4E7" stroke-width="1.2"/>

  <text x="200" y="46" text-anchor="middle" font-size="15" font-weight="700" fill="#334155">many CGUs</text>
  <text x="200" y="68" text-anchor="middle" font-size="13" fill="#64748B">release 16 · debug 256</text>

  <rect x="32" y="96" width="76" height="72" rx="6" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.5"/>
  <text x="70" y="138" text-anchor="middle" font-size="14" font-weight="700" fill="#0E7490">CGU</text>
  <rect x="120" y="96" width="76" height="72" rx="6" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.5"/>
  <text x="158" y="138" text-anchor="middle" font-size="14" font-weight="700" fill="#0E7490">CGU</text>
  <rect x="208" y="96" width="76" height="72" rx="6" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.5"/>
  <text x="246" y="138" text-anchor="middle" font-size="14" font-weight="700" fill="#0E7490">CGU</text>
  <rect x="296" y="96" width="76" height="72" rx="6" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.5"/>
  <text x="334" y="138" text-anchor="middle" font-size="14" font-weight="700" fill="#0E7490">CGU</text>

  <rect x="32" y="196" width="340" height="88" rx="9" fill="#F8FAFC" stroke="#475569" stroke-width="1.4"/>
  <text x="202" y="228" text-anchor="middle" font-size="13" fill="#334155">inlining stops at each boundary</text>
  <text x="202" y="254" text-anchor="middle" font-size="14" font-weight="700" fill="#334155">fast build · weaker code</text>

  <text x="600" y="46" text-anchor="middle" font-size="15" font-weight="700" fill="#6D28D9" font-family="ui-monospace, monospace">codegen-units = 1</text>
  <text x="600" y="68" text-anchor="middle" font-size="13" fill="#64748B">maximum optimization</text>

  <rect x="428" y="96" width="340" height="72" rx="6" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.8"/>
  <text x="598" y="138" text-anchor="middle" font-size="15" font-weight="700" fill="#6D28D9">the whole crate</text>

  <rect x="428" y="196" width="340" height="88" rx="9" fill="#F8FAFC" stroke="#475569" stroke-width="1.4"/>
  <text x="598" y="228" text-anchor="middle" font-size="13" fill="#334155">one optimization horizon</text>
  <text x="598" y="254" text-anchor="middle" font-size="14" font-weight="700" fill="#334155">slow build · stronger code</text>
</svg>
