<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 480" role="img" aria-labelledby="t1 d1" width="100%" height="auto" preserveAspectRatio="xMidYMid meet" style="max-width: 920px;">
  <title id="t1">JWT 인증 흐름 — JWKS 검증 실패 위치</title>
  <desc id="d1">K6 클라이언트가 Cloudflare CDN, ALB, Istio Ingress Gateway를 거쳐 App Pod까지 가는 인증 흐름. Envoy Sidecar가 JWT를 파싱하고 JWKS로 서명을 검증하는데, 오래된 public key를 가진 채로 검증을 시도해 401을 반환</desc>

  <defs>
    <marker id="arr1" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#0A0A0A"/>
    </marker>
    <marker id="arr-err" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#E11D48"/>
    </marker>
  </defs>

  <style><![CDATA[
    .label   { font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif; font-size: 14px; font-weight: 600; }
    .meta    { font-family: 'Geist Mono', ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 11px; fill: #27272A; }
    .step    { font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif; font-size: 12px; fill: #27272A; }
    .err     { font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif; font-size: 12px; font-weight: 600; fill: #BE123C; }
    .arrow   { stroke: #0A0A0A; stroke-width: 1.5; fill: none; marker-end: url(#arr1); }
    .arrow-err { stroke: #E11D48; stroke-width: 1.5; fill: none; marker-end: url(#arr-err); }
  ]]></style>

  <!-- Row 1: 5 boxes horizontal flow -->
  <!-- K6 (external / slate) -->
  <rect x="24" y="40" width="144" height="64" rx="6" fill="#F8FAFC" stroke="#475569" stroke-width="1.5"/>
  <text x="96" y="68" text-anchor="middle" class="label" fill="#334155">K6</text>
  <text x="96" y="88" text-anchor="middle" class="meta">Client</text>

  <line x1="168" y1="72" x2="200" y2="72" class="arrow"/>

  <!-- Cloudflare CDN (cloud / amber) -->
  <rect x="200" y="40" width="144" height="64" rx="6" fill="#FFFBEB" stroke="#D97706" stroke-width="1.5"/>
  <text x="272" y="68" text-anchor="middle" class="label" fill="#B45309">Cloudflare</text>
  <text x="272" y="88" text-anchor="middle" class="meta">CDN</text>

  <line x1="344" y1="72" x2="376" y2="72" class="arrow"/>

  <!-- ALB (cloud / amber) -->
  <rect x="376" y="40" width="144" height="64" rx="6" fill="#FFFBEB" stroke="#D97706" stroke-width="1.5"/>
  <text x="448" y="76" text-anchor="middle" class="label" fill="#B45309">ALB</text>

  <line x1="520" y1="72" x2="552" y2="72" class="arrow"/>

  <!-- Istio Ingress GW (security / rose) -->
  <rect x="552" y="40" width="160" height="64" rx="6" fill="#FFF1F2" stroke="#E11D48" stroke-width="1.5"/>
  <text x="632" y="68" text-anchor="middle" class="label" fill="#BE123C">Istio Ingress GW</text>

  <line x1="712" y1="72" x2="744" y2="72" class="arrow"/>

  <!-- App Pod (backend / emerald) -->
  <rect x="744" y="40" width="144" height="64" rx="6" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="816" y="76" text-anchor="middle" class="label" fill="#047857">App Pod</text>

  <!-- Drop-down arrow from Istio Ingress GW -->
  <line x1="632" y1="104" x2="632" y2="160" class="arrow-err"/>

  <!-- Envoy Sidecar (security / rose) — JWT validation step -->
  <rect x="472" y="160" width="320" height="240" rx="6" fill="#FFF1F2" stroke="#E11D48" stroke-width="1.5"/>
  <text x="632" y="188" text-anchor="middle" class="label" fill="#BE123C">Envoy Sidecar</text>
  <text x="632" y="208" text-anchor="middle" class="meta">JWT 검증 단계</text>

  <text x="496" y="244" class="step">① JWT 파싱</text>
  <text x="496" y="276" class="step">② JWKS로 서명 검증</text>
  <text x="784" y="276" text-anchor="end" class="err">← 여기서 실패!</text>
  <text x="496" y="296" class="meta">    (오래된 public key)</text>
  <text x="496" y="332" class="step">③ 401 반환</text>

  <text x="632" y="384" text-anchor="middle" class="err">결과: 4ms만에 401</text>
</svg>
