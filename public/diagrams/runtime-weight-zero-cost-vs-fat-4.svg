<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" role="img" aria-labelledby="t4 d4" font-family="Pretendard, ui-sans-serif, system-ui, -apple-system, sans-serif">
  <title id="t4">JVM process memory map</title>
  <desc id="d4">Inside one JVM process the Java heap capped by -Xmx is only one region. Below it live off-heap regions: Metaspace, JIT code cache, thread stacks, direct memory used by NIO and Netty, and GC plus compiler threads. Direct memory is invisible to heap monitoring and its default cap roughly equals -Xmx. A container memory limit counts the whole RSS, so sizing only the heap leads to OOMKilled.</desc>
  <defs>
    <marker id="m4" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#E11D48"/>
    </marker>
    <marker id="m4b" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#B45309"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="800" height="480" fill="#FFFFFF"/>

  <text x="400" y="26" text-anchor="middle" font-size="12" fill="#64748B">a JVM process in a container — the heap is only one tenant</text>

  <rect x="56" y="48" width="480" height="372" rx="10" fill="none" stroke="#475569" stroke-width="1.5"/>
  <text x="72" y="70" font-size="11.5" font-weight="700" fill="#334155">JVM process (whole RSS)</text>

  <rect x="72" y="84" width="448" height="88" rx="8" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.7"/>
  <text x="296" y="122" text-anchor="middle" font-size="12.5" font-weight="700" fill="#6D28D9">Java heap — your objects</text>
  <text x="296" y="144" text-anchor="middle" font-size="10.5" fill="#6D28D9">capped by -Xmx</text>

  <text x="296" y="194" text-anchor="middle" font-size="10.5" fill="#64748B">everything below is off-heap — outside -Xmx</text>

  <rect x="72" y="204" width="448" height="34" rx="6" fill="#F8FAFC" stroke="#475569" stroke-width="1.2"/>
  <text x="296" y="226" text-anchor="middle" font-size="11" fill="#334155">Metaspace — class metadata</text>

  <rect x="72" y="246" width="448" height="34" rx="6" fill="#F8FAFC" stroke="#475569" stroke-width="1.2"/>
  <text x="296" y="268" text-anchor="middle" font-size="11" fill="#334155">JIT code cache — C1/C2 machine code</text>

  <rect x="72" y="288" width="448" height="34" rx="6" fill="#F8FAFC" stroke="#475569" stroke-width="1.2"/>
  <text x="296" y="310" text-anchor="middle" font-size="11" fill="#334155">thread stacks — -Xss per thread</text>

  <rect x="72" y="330" width="448" height="34" rx="6" fill="#FFF1F2" stroke="#E11D48" stroke-width="1.5"/>
  <text x="296" y="352" text-anchor="middle" font-size="11" font-weight="700" fill="#BE123C">direct memory — NIO/Netty DirectByteBuffer</text>

  <rect x="72" y="372" width="448" height="34" rx="6" fill="#F8FAFC" stroke="#475569" stroke-width="1.2"/>
  <text x="296" y="394" text-anchor="middle" font-size="11" fill="#334155">GC + compiler threads</text>

  <rect x="576" y="84" width="176" height="92" rx="8" fill="#FFFBEB" stroke="#D97706" stroke-width="1.4"/>
  <text x="664" y="108" text-anchor="middle" font-size="11.5" font-weight="700" fill="#B45309">container memory limit</text>
  <text x="664" y="130" text-anchor="middle" font-size="10.5" fill="#B45309">counts the whole RSS,</text>
  <text x="664" y="146" text-anchor="middle" font-size="10.5" fill="#B45309">not just the heap</text>
  <line x1="576" y1="118" x2="544" y2="118" stroke="#B45309" stroke-width="1.4" marker-end="url(#m4b)"/>

  <rect x="576" y="204" width="176" height="148" rx="8" fill="#FFF1F2" stroke="#FECDD3" stroke-width="1.2"/>
  <text x="664" y="228" text-anchor="middle" font-size="11.5" font-weight="700" fill="#BE123C">the double trap</text>
  <text x="664" y="250" text-anchor="middle" font-size="10.5" fill="#BE123C">invisible to heap monitoring,</text>
  <text x="664" y="266" text-anchor="middle" font-size="10.5" fill="#BE123C">only RSS grows</text>
  <text x="664" y="292" text-anchor="middle" font-size="10.5" fill="#BE123C">default cap ≈ -Xmx:</text>
  <text x="664" y="308" text-anchor="middle" font-size="10.5" fill="#BE123C">a 3GB heap allows</text>
  <text x="664" y="324" text-anchor="middle" font-size="10.5" fill="#BE123C">up to 3GB more</text>
  <line x1="576" y1="336" x2="528" y2="347" stroke="#E11D48" stroke-width="1.4" marker-end="url(#m4)"/>

  <rect x="56" y="434" width="696" height="34" rx="8" fill="#FFF1F2" stroke="#FECDD3" stroke-width="1"/>
  <text x="404" y="456" text-anchor="middle" font-size="11" font-weight="700" fill="#BE123C">sizing memory by heap alone → the container limit hits first → OOMKilled</text>
</svg>
