<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" role="img" aria-labelledby="t4 d4" font-family="Pretendard, ui-sans-serif, system-ui, -apple-system, sans-serif">
  <title id="t4">A JVM process in a container — the Java heap is only one tenant</title>
  <desc id="d4">The container memory limit counts the whole resident set of the JVM process, not just the Java heap. The heap is capped by -Xmx, but Metaspace, the JIT code cache, thread stacks, direct memory used by NIO and Netty, and the GC and compiler threads all live off-heap, outside that cap. Sizing memory by the heap alone is how a container hits its limit and gets OOMKilled.</desc>
  <rect x="0" y="0" width="800" height="440" fill="#FFFFFF"/>

  <rect x="24" y="48" width="752" height="368" rx="12" fill="#FFF1F2" stroke="#E11D48" stroke-width="1.8" stroke-dasharray="7 4"/>
  <text x="400" y="76" text-anchor="middle" font-size="15" font-weight="700" fill="#BE123C">container memory limit — counts the whole RSS</text>

  <rect x="56" y="96" width="688" height="296" rx="9" fill="#FAFAFA" stroke="#475569" stroke-width="1.6"/>
  <text x="400" y="124" text-anchor="middle" font-size="14" font-weight="700" fill="#334155">JVM process</text>

  <rect x="80" y="142" width="640" height="76" rx="8" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.8"/>
  <text x="400" y="172" text-anchor="middle" font-size="15" font-weight="700" fill="#0E7490">Java heap</text>
  <text x="400" y="198" text-anchor="middle" font-size="13" fill="#0E7490" font-family="ui-monospace, monospace">capped by -Xmx</text>

  <text x="400" y="244" text-anchor="middle" font-size="14" font-weight="700" fill="#B45309">off-heap — outside -Xmx</text>

  <rect x="80" y="258" width="200" height="56" rx="6" fill="#FFFBEB" stroke="#D97706" stroke-width="1.4"/>
  <text x="180" y="292" text-anchor="middle" font-size="13" fill="#B45309">Metaspace</text>
  <rect x="300" y="258" width="200" height="56" rx="6" fill="#FFFBEB" stroke="#D97706" stroke-width="1.4"/>
  <text x="400" y="292" text-anchor="middle" font-size="13" fill="#B45309">JIT code cache</text>
  <rect x="520" y="258" width="200" height="56" rx="6" fill="#FFFBEB" stroke="#D97706" stroke-width="1.4"/>
  <text x="620" y="292" text-anchor="middle" font-size="13" fill="#B45309">thread stacks</text>

  <rect x="80" y="326" width="310" height="56" rx="6" fill="#FFFBEB" stroke="#D97706" stroke-width="1.8"/>
  <text x="235" y="360" text-anchor="middle" font-size="13" font-weight="700" fill="#B45309">direct memory — the double trap</text>
  <rect x="410" y="326" width="310" height="56" rx="6" fill="#FFFBEB" stroke="#D97706" stroke-width="1.4"/>
  <text x="565" y="360" text-anchor="middle" font-size="13" fill="#B45309">GC + compiler threads</text>
</svg>
