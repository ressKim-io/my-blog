<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 420" font-family="Pretendard, ui-sans-serif, system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="ar" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="780" height="420" fill="#FFFFFF"/>

  <text x="390" y="28" text-anchor="middle" font-size="12" fill="#64748B">Both stores sit in store buffers, so each load reads the other's stale value — r1 == r2 == 0 is possible</text>

  <!-- Thread 1 -->
  <rect x="56" y="52" width="300" height="120" rx="9" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.6"/>
  <text x="206" y="78" text-anchor="middle" font-size="13.5" font-weight="700" fill="#0E7490">Thread 1</text>
  <text x="206" y="106" text-anchor="middle" font-size="12.5" font-family="'Geist Mono', ui-monospace, monospace" fill="#334155">x.store(1, Release)</text>
  <text x="206" y="132" text-anchor="middle" font-size="12.5" font-family="'Geist Mono', ui-monospace, monospace" fill="#334155">r1 = y.load(Acquire)</text>
  <text x="206" y="156" text-anchor="middle" font-size="11.5" font-weight="700" fill="#BE123C">r1 = 0  (stale)</text>

  <!-- Thread 2 -->
  <rect x="424" y="52" width="300" height="120" rx="9" fill="#ECFDF5" stroke="#059669" stroke-width="1.6"/>
  <text x="574" y="78" text-anchor="middle" font-size="13.5" font-weight="700" fill="#047857">Thread 2</text>
  <text x="574" y="106" text-anchor="middle" font-size="12.5" font-family="'Geist Mono', ui-monospace, monospace" fill="#334155">y.store(1, Release)</text>
  <text x="574" y="132" text-anchor="middle" font-size="12.5" font-family="'Geist Mono', ui-monospace, monospace" fill="#334155">r2 = x.load(Acquire)</text>
  <text x="574" y="156" text-anchor="middle" font-size="11.5" font-weight="700" fill="#BE123C">r2 = 0  (stale)</text>

  <!-- store buffers -->
  <rect x="86" y="198" width="240" height="40" rx="7" fill="#FFF1F2" stroke="#FB7185" stroke-width="1.4"/>
  <text x="206" y="223" text-anchor="middle" font-size="11.5" fill="#BE123C">store buffer: [ x = 1 ] not yet visible</text>
  <rect x="454" y="198" width="240" height="40" rx="7" fill="#FFF1F2" stroke="#FB7185" stroke-width="1.4"/>
  <text x="574" y="223" text-anchor="middle" font-size="11.5" fill="#BE123C">store buffer: [ y = 1 ] not yet visible</text>

  <line x1="206" y1="172" x2="206" y2="196" stroke="#475569" stroke-width="1.4" marker-end="url(#ar)"/>
  <line x1="574" y1="172" x2="574" y2="196" stroke="#475569" stroke-width="1.4" marker-end="url(#ar)"/>

  <!-- shared memory -->
  <rect x="250" y="276" width="280" height="48" rx="8" fill="#F8FAFC" stroke="#475569" stroke-width="1.6"/>
  <text x="390" y="300" text-anchor="middle" font-size="12.5" font-weight="700" fill="#334155">shared memory</text>
  <text x="390" y="317" text-anchor="middle" font-size="12" font-family="'Geist Mono', ui-monospace, monospace" fill="#64748B">x = 0    y = 0</text>

  <!-- loads read from memory -->
  <path d="M250,300 C180,300 180,250 206,240" fill="none" stroke="#475569" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#ar)"/>
  <path d="M530,300 C600,300 600,250 574,240" fill="none" stroke="#475569" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#ar)"/>
  <text x="150" y="276" font-size="10.5" fill="#94A3B8">load y → 0</text>
  <text x="566" y="276" font-size="10.5" fill="#94A3B8">load x → 0</text>

  <!-- takeaway -->
  <rect x="120" y="360" width="540" height="44" rx="9" fill="#F5F3FF" stroke="#DDD6FE" stroke-width="1"/>
  <text x="390" y="378" text-anchor="middle" font-size="11.5" fill="#6D28D9">This is StoreLoad reordering. SeqCst inserts a full fence that drains the store buffer</text>
  <text x="390" y="396" text-anchor="middle" font-size="11.5" fill="#6D28D9">before the load — which is why x86 pays the SeqCst cost on the store side.</text>
</svg>
