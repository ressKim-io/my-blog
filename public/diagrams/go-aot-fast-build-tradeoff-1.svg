<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 560" role="img" aria-labelledby="t1 d1" font-family="Pretendard, ui-sans-serif, system-ui, -apple-system, sans-serif">
  <title id="t1">The gc compiler pipeline</title>
  <desc id="d1">Go source becomes an AST, where escape analysis and inlining are decided. The AST lowers into Go's own SSA backend, which runs a short and shallow list of passes and deliberately has no auto-vectorization and no aggressive loop transforms. SSA then lowers to machine code and is statically linked into a single binary.</desc>
  <defs>
    <marker id="a1" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="800" height="560" fill="#FFFFFF"/>

  <line x1="250" y1="120" x2="250" y2="150" stroke="#475569" stroke-width="1.6" marker-end="url(#a1)"/>
  <line x1="250" y1="216" x2="250" y2="246" stroke="#475569" stroke-width="1.6" marker-end="url(#a1)"/>
  <line x1="250" y1="336" x2="250" y2="366" stroke="#475569" stroke-width="1.6" marker-end="url(#a1)"/>
  <line x1="250" y1="432" x2="250" y2="462" stroke="#475569" stroke-width="1.6" marker-end="url(#a1)"/>
  <line x1="380" y1="184" x2="456" y2="184" stroke="#94A3B8" stroke-width="1.3" stroke-dasharray="4 3"/>
  <line x1="380" y1="292" x2="456" y2="292" stroke="#94A3B8" stroke-width="1.3" stroke-dasharray="4 3"/>

  <rect x="120" y="56" width="260" height="64" rx="8" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.6"/>
  <text x="250" y="95" text-anchor="middle" font-size="15" font-weight="700" fill="#0E7490" font-family="ui-monospace, monospace">source .go</text>

  <rect x="120" y="152" width="260" height="64" rx="8" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.6"/>
  <text x="250" y="180" text-anchor="middle" font-size="15" font-weight="700" fill="#6D28D9">AST</text>
  <text x="250" y="203" text-anchor="middle" font-size="13" fill="#6D28D9">abstract syntax tree</text>

  <rect x="120" y="248" width="260" height="88" rx="8" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.6"/>
  <text x="250" y="276" text-anchor="middle" font-size="15" font-weight="700" fill="#6D28D9">SSA</text>
  <text x="250" y="299" text-anchor="middle" font-size="13" fill="#6D28D9">Go's own backend, not LLVM</text>
  <text x="250" y="321" text-anchor="middle" font-size="13" fill="#6D28D9">few, shallow passes</text>

  <rect x="120" y="368" width="260" height="64" rx="8" fill="#ECFDF5" stroke="#059669" stroke-width="1.6"/>
  <text x="250" y="407" text-anchor="middle" font-size="15" font-weight="700" fill="#047857">machine code</text>

  <rect x="120" y="464" width="260" height="64" rx="8" fill="#ECFDF5" stroke="#059669" stroke-width="1.6"/>
  <text x="250" y="492" text-anchor="middle" font-size="15" font-weight="700" fill="#047857">single binary</text>
  <text x="250" y="515" text-anchor="middle" font-size="13" fill="#047857">statically linked</text>

  <rect x="456" y="152" width="288" height="64" rx="8" fill="#F8FAFC" stroke="#475569" stroke-width="1.4"/>
  <text x="600" y="180" text-anchor="middle" font-size="13" font-weight="700" fill="#334155">decided here</text>
  <text x="600" y="203" text-anchor="middle" font-size="13" fill="#334155">escape analysis · inlining</text>

  <rect x="456" y="248" width="288" height="88" rx="8" fill="#FFF1F2" stroke="#E11D48" stroke-width="1.5"/>
  <text x="600" y="276" text-anchor="middle" font-size="13" font-weight="700" fill="#BE123C">the ceiling</text>
  <text x="600" y="300" text-anchor="middle" font-size="13" fill="#BE123C">no auto-vectorization</text>
  <text x="600" y="322" text-anchor="middle" font-size="13" fill="#BE123C">no loop unroll or fusion</text>
</svg>
