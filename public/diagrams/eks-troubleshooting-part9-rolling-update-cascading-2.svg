<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 480" role="img" aria-labelledby="t2 d2" width="100%" height="auto" preserveAspectRatio="xMidYMid meet" style="max-width: 760px;">
  <title id="t2">서브넷 IP 소진 데드락</title>
  <desc id="d2">신규 노드 8대는 서브넷 IP 부족으로 Pod 생성에 실패하고, 기존 노드 10대는 신규 노드로 Pod이 이동해야 drain 가능한데 신규 노드가 동작하지 않으니 drain되지 않아 IP를 계속 점유, 두 상태가 서로의 해소 조건을 막아 무한 루프</desc>

  <defs>
    <marker id="arr2" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#BE123C"/>
    </marker>
  </defs>

  <style><![CDATA[
    .label { font-family: 'Pretendard', sans-serif; font-size: 14px; font-weight: 600; }
    .meta  { font-family: 'Geist Mono', ui-monospace, Menlo, monospace; font-size: 11px; fill: #27272A; }
    .arrlbl { font-family: 'Pretendard', sans-serif; font-size: 11px; fill: #BE123C; }
    .deadlock { stroke: #BE123C; stroke-width: 1.5; stroke-dasharray: 5 3; fill: none; marker-end: url(#arr2); }
  ]]></style>

  <!-- Title -->
  <text x="380" y="40" text-anchor="middle" class="label" fill="#0A0A0A">신규 8대 + 기존 10대 = 18대 동시 존재 / /24 서브넷 254 IP 한계</text>

  <!-- 신규 노드 8대 (security / rose) -->
  <rect x="60" y="80" width="280" height="160" rx="6" fill="#FFF1F2" stroke="#E11D48" stroke-width="1.5"/>
  <text x="200" y="108" text-anchor="middle" class="label" fill="#BE123C">신규 노드 8대 (max-pods 110)</text>
  <text x="200" y="138" text-anchor="middle" class="meta">서브넷 IP 부족</text>
  <text x="200" y="160" text-anchor="middle" class="meta">→ Pod 생성 불가</text>
  <text x="200" y="182" text-anchor="middle" class="meta">→ 기존 노드 drain 받을 수 없음</text>
  <text x="200" y="212" text-anchor="middle" class="meta" fill="#BE123C">FailedCreatePodSandBox</text>

  <!-- 기존 노드 10대 (security / rose) -->
  <rect x="420" y="80" width="280" height="160" rx="6" fill="#FFF1F2" stroke="#E11D48" stroke-width="1.5"/>
  <text x="560" y="108" text-anchor="middle" class="label" fill="#BE123C">기존 노드 10대 (max-pods 35)</text>
  <text x="560" y="138" text-anchor="middle" class="meta">drain 대기 중</text>
  <text x="560" y="160" text-anchor="middle" class="meta">→ Pod 못 옮기니 IP 계속 점유</text>
  <text x="560" y="182" text-anchor="middle" class="meta">→ 서브넷 IP 고갈 유지</text>
  <text x="560" y="212" text-anchor="middle" class="meta" fill="#BE123C">drain 차단</text>

  <!-- Deadlock arrows -->
  <path d="M 340 140 H 420" class="deadlock"/>
  <text x="380" y="130" text-anchor="middle" class="arrlbl">drain 불가</text>

  <path d="M 420 200 H 340" class="deadlock"/>
  <text x="380" y="220" text-anchor="middle" class="arrlbl">IP 반환 안 됨</text>

  <!-- 결과 -->
  <rect x="160" y="312" width="440" height="100" rx="6" fill="#F8FAFC" stroke="#475569" stroke-width="1.5"/>
  <text x="380" y="338" text-anchor="middle" class="label" fill="#334155">데드락 — 무한 루프</text>
  <text x="380" y="362" text-anchor="middle" class="meta">신규 노드: IP 없어 Pod 못 올림</text>
  <text x="380" y="382" text-anchor="middle" class="meta">기존 노드: 이전할 노드 없어 drain 못 함</text>
  <text x="380" y="402" text-anchor="middle" class="meta">→ 양쪽이 서로의 해소 조건을 막음</text>
</svg>
