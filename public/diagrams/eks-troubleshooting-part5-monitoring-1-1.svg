<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" role="img" aria-labelledby="t1 d1" width="100%" height="auto" preserveAspectRatio="xMidYMid meet" style="max-width: 800px;">
  <title id="t1">초기 Monitoring Stack 구성도</title>
  <desc id="d1">Prometheus는 메트릭, Grafana는 시각화, Loki는 로그를 담당하며 각각 gp2/gp3 PVC에 저장. Promtail이 로그를 수집해 Loki로 보내고 node/redis exporter가 Prometheus로 메트릭을 노출하는 5컴포넌트 모니터링 스택</desc>

  <defs>
    <marker id="arr1" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#0A0A0A"/>
    </marker>
  </defs>

  <style><![CDATA[
    .label { font-family: 'Pretendard', sans-serif; font-size: 14px; font-weight: 600; }
    .meta  { font-family: 'Geist Mono', ui-monospace, Menlo, monospace; font-size: 11px; fill: #27272A; }
    .arrow { stroke: #0A0A0A; stroke-width: 1.5; fill: none; marker-end: url(#arr1); }
  ]]></style>

  <!-- Stack boundary -->
  <rect x="32" y="40" width="736" height="400" rx="10" fill="#FAFAFA" stroke="#D4D4D8" stroke-width="1.5" stroke-dasharray="6 3"/>
  <text x="48" y="68" class="meta" fill="#475569">Monitoring Stack</text>

  <!-- Row 1: Prometheus / Grafana / Loki (backend / emerald) -->
  <rect x="80" y="100" width="200" height="80" rx="6" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="180" y="128" text-anchor="middle" class="label" fill="#047857">Prometheus</text>
  <text x="180" y="150" text-anchor="middle" class="meta">메트릭 수집·저장</text>
  <text x="180" y="168" text-anchor="middle" class="meta">port 9090</text>

  <rect x="300" y="100" width="200" height="80" rx="6" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="400" y="128" text-anchor="middle" class="label" fill="#047857">Grafana</text>
  <text x="400" y="150" text-anchor="middle" class="meta">대시보드 시각화</text>
  <text x="400" y="168" text-anchor="middle" class="meta">port 3000</text>

  <rect x="520" y="100" width="200" height="80" rx="6" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="620" y="128" text-anchor="middle" class="label" fill="#047857">Loki</text>
  <text x="620" y="150" text-anchor="middle" class="meta">로그 저장</text>
  <text x="620" y="168" text-anchor="middle" class="meta">port 3100</text>

  <!-- arrows to PVCs -->
  <line x1="180" y1="180" x2="180" y2="216" class="arrow"/>
  <line x1="400" y1="180" x2="400" y2="216" class="arrow"/>
  <line x1="620" y1="180" x2="620" y2="216" class="arrow"/>

  <!-- Row 2: PVCs (database / violet) -->
  <rect x="80" y="216" width="200" height="64" rx="6" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="180" y="240" text-anchor="middle" class="label" fill="#6D28D9">PVC</text>
  <text x="180" y="262" text-anchor="middle" class="meta">gp2 / gp3</text>

  <rect x="300" y="216" width="200" height="64" rx="6" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="400" y="240" text-anchor="middle" class="label" fill="#6D28D9">PVC</text>
  <text x="400" y="262" text-anchor="middle" class="meta">gp2 / gp3</text>

  <rect x="520" y="216" width="200" height="64" rx="6" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="620" y="240" text-anchor="middle" class="label" fill="#6D28D9">PVC</text>
  <text x="620" y="262" text-anchor="middle" class="meta">gp2 / gp3</text>

  <!-- Row 3: Promtail / Exporters (frontend / cyan) -->
  <rect x="160" y="336" width="240" height="72" rx="6" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.5"/>
  <text x="280" y="362" text-anchor="middle" class="label" fill="#0E7490">Promtail</text>
  <text x="280" y="384" text-anchor="middle" class="meta">로그 수집 → Loki</text>

  <rect x="420" y="336" width="240" height="72" rx="6" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.5"/>
  <text x="540" y="362" text-anchor="middle" class="label" fill="#0E7490">Exporters</text>
  <text x="540" y="384" text-anchor="middle" class="meta">node-exporter / redis-exporter</text>

  <!-- Promtail -> Loki arrow (curved up-right) -->
  <path d="M 280 336 V 304 H 620 V 180" class="arrow"/>
  <!-- Exporters -> Prometheus arrow -->
  <path d="M 540 336 V 304 H 180 V 180" class="arrow"/>
</svg>
