<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 545" font-family="Pretendard, ui-sans-serif, system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="ar" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="760" height="545" fill="#FFFFFF"/>

  <!-- subtitle -->
  <text x="355" y="22" text-anchor="middle" font-size="11.5" fill="#64748B">Before TLS: DNS (1 RTT) + TCP 3-way handshake (1 RTT)</text>

  <!-- actor headers -->
  <rect x="110" y="40" width="120" height="34" rx="7" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.5"/>
  <text x="170" y="62" text-anchor="middle" font-size="14" font-weight="700" fill="#0E7490">Client</text>
  <rect x="480" y="40" width="120" height="34" rx="7" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="540" y="62" text-anchor="middle" font-size="14" font-weight="700" fill="#047857">Server</text>

  <!-- lifelines -->
  <line x1="170" y1="74" x2="170" y2="470" stroke="#CBD5E1" stroke-width="1.4" stroke-dasharray="4 4"/>
  <line x1="540" y1="74" x2="540" y2="470" stroke="#CBD5E1" stroke-width="1.4" stroke-dasharray="4 4"/>

  <!-- messages -->
  <text x="355" y="112" text-anchor="middle" font-size="12.5" font-family="'Geist Mono', ui-monospace, monospace" fill="#334155">ClientHello</text>
  <line x1="170" y1="120" x2="540" y2="120" stroke="#475569" stroke-width="1.6" marker-end="url(#ar)"/>

  <text x="355" y="150" text-anchor="middle" font-size="12.5" font-family="'Geist Mono', ui-monospace, monospace" fill="#334155">ServerHello, Certificate, Done</text>
  <line x1="540" y1="158" x2="170" y2="158" stroke="#475569" stroke-width="1.6" marker-end="url(#ar)"/>

  <text x="355" y="224" text-anchor="middle" font-size="12.5" font-family="'Geist Mono', ui-monospace, monospace" fill="#334155">ClientKeyExchange, Finished</text>
  <line x1="170" y1="232" x2="540" y2="232" stroke="#475569" stroke-width="1.6" marker-end="url(#ar)"/>

  <text x="355" y="262" text-anchor="middle" font-size="12.5" font-family="'Geist Mono', ui-monospace, monospace" fill="#334155">ChangeCipherSpec, Finished</text>
  <line x1="540" y1="270" x2="170" y2="270" stroke="#475569" stroke-width="1.6" marker-end="url(#ar)"/>

  <text x="355" y="336" text-anchor="middle" font-size="12.5" font-family="'Geist Mono', ui-monospace, monospace" fill="#334155">GET /</text>
  <line x1="170" y1="344" x2="540" y2="344" stroke="#475569" stroke-width="1.6" marker-end="url(#ar)"/>

  <text x="355" y="374" text-anchor="middle" font-size="12.5" font-family="'Geist Mono', ui-monospace, monospace" fill="#334155">200 OK</text>
  <line x1="540" y1="382" x2="170" y2="382" stroke="#475569" stroke-width="1.6" marker-end="url(#ar)"/>

  <!-- RTT brackets -->
  <path d="M638,108 L648,108 L648,170 L638,170" fill="none" stroke="#94A3B8" stroke-width="1.3"/>
  <text x="656" y="143" font-size="12" font-weight="700" fill="#475569">1 RTT</text>

  <path d="M638,220 L648,220 L648,282 L638,282" fill="none" stroke="#94A3B8" stroke-width="1.3"/>
  <text x="656" y="255" font-size="12" font-weight="700" fill="#475569">2 RTT</text>

  <path d="M638,332 L648,332 L648,394 L638,394" fill="none" stroke="#94A3B8" stroke-width="1.3"/>
  <text x="656" y="360" font-size="12" font-weight="700" fill="#475569">+1 RTT</text>
  <text x="656" y="375" font-size="10" fill="#94A3B8">first byte</text>

  <!-- takeaway -->
  <rect x="150" y="490" width="460" height="30" rx="7" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
  <text x="380" y="509" text-anchor="middle" font-size="11.5" fill="#64748B">TLS 1.3 collapses RTT 1 + 2 into a single round trip</text>
</svg>
