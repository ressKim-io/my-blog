<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-labelledby="c5 d5" font-family="Pretendard, ui-sans-serif, system-ui, -apple-system, sans-serif">
  <title id="c5">How the object model lays values out in memory</title>
  <desc id="d5">An array of Java objects is an array of references. Reading an element means following a pointer to somewhere else on the heap, where the object sits behind its own header, and neighbouring elements can be far apart. A Go slice of structs or a Rust vector lays the values themselves end to end, with no header in front of each one and no pointer to chase, which is what the prefetcher and the translation buffer reward.</desc>
