<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 430" font-family="Pretendard, ui-sans-serif, system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="ar" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="780" height="430" fill="#FFFFFF"/>

  <text x="390" y="26" text-anchor="middle" font-size="12" fill="#64748B">io_uring — two mmap'd rings shared by user and kernel; submit work, reap completions</text>

  <!-- USER SPACE label -->
  <text x="190" y="58" text-anchor="middle" font-size="11" font-weight="700" fill="#94A3B8">USER SPACE</text>
  <text x="590" y="58" text-anchor="middle" font-size="11" font-weight="700" fill="#94A3B8">KERNEL SPACE</text>

  <!-- divider -->
  <line x1="390" y1="68" x2="390" y2="372" stroke="#E2E8F0" stroke-width="1.4" stroke-dasharray="5 5"/>

  <!-- SQ -->
  <rect x="40" y="76" width="300" height="96" rx="9" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.6"/>
  <text x="190" y="100" text-anchor="middle" font-size="12.5" font-weight="700" fill="#0E7490">SQ — Submission Queue</text>
  <text x="190" y="120" text-anchor="middle" font-size="10.5" fill="#475569">app writes SQE, bumps tail</text>
  <text x="190" y="144" text-anchor="middle" font-size="11" font-family="'Geist Mono', ui-monospace, monospace" fill="#334155">[SQE][SQE][SQE] …</text>
  <text x="190" y="162" text-anchor="middle" font-size="10" fill="#94A3B8">head ··· tail</text>

  <!-- CQ -->
  <rect x="40" y="252" width="300" height="96" rx="9" fill="#ECFDF5" stroke="#059669" stroke-width="1.6"/>
  <text x="190" y="276" text-anchor="middle" font-size="12.5" font-weight="700" fill="#047857">CQ — Completion Queue</text>
  <text x="190" y="296" text-anchor="middle" font-size="10.5" fill="#475569">app reads CQE, bumps head</text>
  <text x="190" y="320" text-anchor="middle" font-size="11" font-family="'Geist Mono', ui-monospace, monospace" fill="#334155">[CQE][CQE][CQE] …</text>
  <text x="190" y="338" text-anchor="middle" font-size="10" fill="#94A3B8">head ··· tail</text>

  <!-- kernel box -->
  <rect x="440" y="120" width="300" height="180" rx="9" fill="#FFFBEB" stroke="#D97706" stroke-width="1.6"/>
  <text x="590" y="146" text-anchor="middle" font-size="12.5" font-weight="700" fill="#B45309">io_uring instance</text>
  <text x="590" y="170" text-anchor="middle" font-size="10.5" fill="#92400E">(optional) SQPOLL kernel thread</text>
  <text x="590" y="186" text-anchor="middle" font-size="10.5" fill="#92400E">polls SQ → steady-state syscall 0</text>
  <line x1="460" y1="202" x2="720" y2="202" stroke="#FDE68A" stroke-width="1"/>
  <text x="590" y="224" text-anchor="middle" font-size="11" fill="#92400E">does the work: accept / recv / read / write</text>
  <text x="590" y="244" text-anchor="middle" font-size="10.5" fill="#92400E">→ VFS / network stack</text>
  <text x="590" y="270" text-anchor="middle" font-size="10.5" fill="#92400E">writes CQE, bumps CQ tail</text>
  <text x="590" y="288" text-anchor="middle" font-size="10" fill="#B45309">CQE.user_data echoes SQE token → match</text>

  <!-- SQ -> kernel -->
  <path d="M340,124 C390,124 400,150 438,170" fill="none" stroke="#475569" stroke-width="1.6" marker-end="url(#ar)"/>
  <text x="392" y="118" text-anchor="middle" font-size="10" fill="#64748B">mmap (shared)</text>
  <!-- kernel -> CQ -->
  <path d="M438,260 C400,280 390,290 342,296" fill="none" stroke="#475569" stroke-width="1.6" marker-end="url(#ar)"/>
  <text x="392" y="312" text-anchor="middle" font-size="10" fill="#64748B">mmap (shared)</text>

  <!-- footer -->
  <rect x="80" y="378" width="620" height="40" rx="8" fill="#F5F3FF" stroke="#DDD6FE" stroke-width="1"/>
  <text x="390" y="396" text-anchor="middle" font-size="11" fill="#6D28D9">head/tail across CPUs need real barriers — this is 4편's acquire/release SPSC ring, literally.</text>
  <text x="390" y="412" text-anchor="middle" font-size="11" fill="#6D28D9">io_uring_enter batches many SQEs into one syscall; SQPOLL removes even that.</text>
</svg>
